                - row "哮喘 APPROPRIATE 地塞米松/甲泼尼龙用于急性加重，肾上腺素用于严重发作，福莫特罗为长效支气管舒张剂，莫米松为吸入糖皮质激素，均属于哮喘治疗药物。" [ref=e457]:
                  - cell "哮喘" [ref=e458]
                  - cell "APPROPRIATE" [ref=e459]
                  - cell "地塞米松/甲泼尼龙用于急性加重，肾上腺素用于严重发作，福莫特罗为长效支气管舒张剂，莫米松为吸入糖皮质激素，均属于哮喘治疗药物。" [ref=e460]
                - row "嗓子疼 PARTIALLY 同咽炎，全部为抗菌药物，仅适用于细菌感染引起的嗓子疼，绝大多数嗓子疼为病毒性，不推荐常规使用抗生素。" [ref=e461]:
                  - cell "嗓子疼" [ref=e462]
                  - cell "PARTIALLY" [ref=e463]
                  - cell "同咽炎，全部为抗菌药物，仅适用于细菌感染引起的嗓子疼，绝大多数嗓子疼为病毒性，不推荐常规使用抗生素。" [ref=e464]
                - row "坐骨神经痛 APPROPRIATE 阿司匹林镇痛抗炎，阿米替林治疗神经病理性疼痛，巴氯芬与卡立普多缓解肌痉挛，卡马西平可用于神经痛，均为坐骨神经痛对症治疗的选择。" [ref=e465]:
                  - cell "坐骨神经痛" [ref=e466]
                  - cell "APPROPRIATE" [ref=e467]
                  - cell "阿司匹林镇痛抗炎，阿米替林治疗神经病理性疼痛，巴氯芬与卡立普多缓解肌痉挛，卡马西平可用于神经痛，均为坐骨神经痛对症治疗的选择。" [ref=e468]
                - row "外周动脉疾病 APPROPRIATE 氯吡格雷抗血小板，前列地尔改善严重缺血，氨氯地平及复方制剂控制血压和心血管风险，均为外周动脉疾病管理的核心药物。" [ref=e469]:
                  - cell "外周动脉疾病" [ref=e470]
                  - cell "APPROPRIATE" [ref=e471]
                  - cell "氯吡格雷抗血小板，前列地尔改善严重缺血，氨氯地平及复方制剂控制血压和心血管风险，均为外周动脉疾病管理的核心药物。" [ref=e472]
                - row "多动症 PARTIALLY 可乐定、维洛沙秦、右哌甲酯、哌甲酯均是ADHD的有效治疗药物；但阿普唑仑为苯二氮䓬类，不用于ADHD的核心症状，可能导致注意力下降。" [ref=e473]:
                  - cell "多动症" [ref=e474]
                  - cell "PARTIALLY" [ref=e475]
                  - cell "可乐定、维洛沙秦、右哌甲酯、哌甲酯均是ADHD的有效治疗药物；但阿普唑仑为苯二氮䓬类，不用于ADHD的核心症状，可能导致注意力下降。" [ref=e476]
                - row "多囊卵巢综合征 PARTIALLY 二甲双胍改善代谢，螺内酯抗雄激素，克罗米芬促排卵，氟他胺属抗雄激素；但卡格列净为SGLT2抑制剂，非PCOS标准治疗，仅用于合并糖尿病者。" [ref=e477]:
                  - cell "多囊卵巢综合征" [ref=e478]
                  - cell "PARTIALLY" [ref=e479]
                  - cell "二甲双胍改善代谢，螺内酯抗雄激素，克罗米芬促排卵，氟他胺属抗雄激素；但卡格列净为SGLT2抑制剂，非PCOS标准治疗，仅用于合并糖尿病者。" [ref=e480]
                - row "失眠 APPROPRIATE 所列药物均有中枢镇静作用，虽多为苯二氮䓬类或三环类，但均可用于失眠的短期治疗，符合临床使用范畴。" [ref=e481]:
                  - cell "失眠" [ref=e482]
                  - cell "APPROPRIATE" [ref=e483]
                  - cell "所列药物均有中枢镇静作用，虽多为苯二氮䓬类或三环类，但均可用于失眠的短期治疗，符合临床使用范畴。" [ref=e484]
                - row "头痛 PARTIALLY 双氯芬酸、依托度酸、氟比洛芬为NSAIDs可缓解头痛；阿米替林用于预防偏头痛/紧张型头痛；但环苯扎林为肌松药，主要用于肌痉挛，不是头痛的常规用药。" [ref=e485]:
                  - cell "头痛" [ref=e486]
