              - generic [ref=e126] [cursor=pointer]:
                - img [ref=e128]
                - generic [ref=e131]: 已思考（用时 129 秒）
                - img [ref=e133]
              - generic [ref=e139]:
                - paragraph [ref=e140]: 我们被要求评估每个疾病对应的药物推荐是否适当。需要给出评分和简要理由，以表格形式输出。我将逐一分析。
                - paragraph [ref=e141]: "疾病: 呕吐 | Dexamethasone; Lorazepam; Metoclopramide; Meclizine; Prochlorperazine"
                - list [ref=e142]:
                  - listitem [ref=e143]:
                    - paragraph [ref=e144]: "Dexamethasone: 皮质类固醇，用于化疗引起的呕吐（与5-HT3拮抗剂联用）或脑水肿引起的呕吐等。但不是一线常规止吐药。在化疗止吐中可用。对于一般呕吐，不是首选。不过在某些指南中，地塞米松用于预防术后恶心呕吐。可以视为适当，但不是所有呕吐都需要。"
                  - listitem [ref=e145]:
                    - paragraph [ref=e146]: "Lorazepam: 苯二氮卓类，用于预期性呕吐（化疗前焦虑引起），或作为止吐辅助。并非标准止吐药，但用于特定情况。"
                  - listitem [ref=e147]:
                    - paragraph [ref=e148]: "Metoclopramide: 多巴胺拮抗剂，促动力，止吐，适合。"
                  - listitem [ref=e181]:
                    - paragraph [ref=e182]: "Meclizine: 抗组胺药，用于晕动病、眩晕引起的呕吐，适合。"
                  - listitem [ref=e183]:
                    - paragraph [ref=e184]:
                      - text: "Prochlorperazine: 吩噻嗪类止吐药，适合。"
                      - text: 总体来看，这些药物都可用于呕吐的不同病因。地塞米松和劳拉西泮用于化疗相关或预期性呕吐，但也算止吐。可能评为APPROPRIATE或PARTIALLY。由于它问的是“是否适合治疗该疾病”，通常呕吐可以有多种药物。所有5个均在适应症内。我倾向APPROPRIATE。
                - paragraph [ref=e185]: 咳嗽 | Dexamethasone; Diphenhydramine; Benzonatate; Hydrocodone; Codeine
                - list [ref=e186]:
                  - listitem [ref=e187]:
                    - paragraph [ref=e188]: "Dexamethasone: 皮质类固醇，用于炎症性咳嗽（哮喘、哮吼等），但不是常规镇咳药。"
                  - listitem [ref=e189]:
                    - paragraph [ref=e190]: "Diphenhydramine: 抗组胺药，用于过敏引起的咳嗽，有镇咳作用。"
                  - listitem [ref=e191]:
                    - paragraph [ref=e192]: "Benzonatate: 外周镇咳药，适合。"
                  - listitem [ref=e193]:
                    - paragraph [ref=e194]: "Hydrocodone: 阿片类镇咳药，适合。"
                  - listitem [ref=e195]:
                    - paragraph [ref=e196]:
                      - text: "Codeine: 阿片类镇咳药，适合。"
                      - text: 咳嗽治疗中，地塞米松可能用于某些咳嗽（如喉炎、哮喘），但作为止咳推荐可能不是一线。通常咳嗽药包括镇咳、祛痰。Diphenhydramine 用于过敏性咳嗽。总体部分适合，但地塞米松不是常规止咳。评为PARTIALLY。
                - paragraph [ref=e197]:
                  - text: 咽炎 | Amoxicillin; Azithromycin; Ceftibuten; Loracarbef; cefuroxime
                  - text: 咽炎通常是病毒性，不需要抗生素。如果是细菌性（A组链球菌），青霉素或阿莫西林是一线。这些抗生素都可用于细菌性咽炎，但很多是不必要或不推荐的。阿莫西林适当；阿奇霉素可用于青霉素过敏；头孢菌素类也可。但全部推荐抗生素可能导致过度使用。问题可能是：推荐这些药物治疗咽炎是否适当？这些药物是抗生素，对病毒性咽炎无效。但临床上对细菌性咽炎可以用。然而推荐前5个药物全是抗生素，可能暗示全部是抗生素，对咽炎并非所有都需要抗生素。从药物治疗角度看，这5个药都可以治疗细菌性咽炎。我判断PARTIALLY，因为咽炎多为病毒性，这些药并不总是适合。或INAPPROPRIATE？取决于解读。如果严格按照疾病，咽炎可以是细菌性，所以抗生素是适当的。但是否“完全适合治疗该疾病”？通常咽炎治疗推荐镇痛、润喉，除非细菌感染。但问题可能考察药物是否对症。这5个抗生素通常用于咽炎治疗指南中。Loracarbef是二代头孢，已撤市？但仍是抗生素。我会评为PARTIALLY，因为不是所有咽炎都需抗生素，全部推荐抗生素可能不当。或者更严格，APPROPRIATE仅当药物是指南推荐一线。阿莫西林是，阿奇霉素是替代，头孢类也可。或许PARTIALLY。
                - paragraph [ref=e198]: 哮喘 | Dexamethasone; Epinephrine; Formoterol; Methylprednisolone; Mometasone
                - list [ref=e199]:
                  - listitem [ref=e200]:
                    - paragraph [ref=e201]: "Dexamethasone: 全身性糖皮质激素，用于急性重症哮喘，适当。"
                  - listitem [ref=e202]:
                    - paragraph [ref=e203]: "Epinephrine: 用于严重哮喘发作，适当。"
                  - listitem [ref=e204]:
                    - paragraph [ref=e205]: "Formoterol: 长效β2激动剂（LABA），用于维持治疗，不用于急性发作，但可与ICS联用。适当。"
                  - listitem [ref=e206]:
                    - paragraph [ref=e207]: "Methylprednisolone: 全身用激素，用于急性加重，适当。"
                  - listitem [ref=e208]:
                    - paragraph [ref=e209]:
                      - text: "Mometasone: 吸入性糖皮质激素（ICS），适合哮喘控制。"
                      - text: 所有药物均用于哮喘。但Epinephrine不太常规（一般用于过敏性反应或严重哮喘）。Formoterol单药不适合（哮喘需与ICS联用），但本身可用于哮喘。总体都是哮喘用药。我评APPROPRIATE。
                - paragraph [ref=e210]:
                  - text: 嗓子疼 | Amoxicillin; Azithromycin; Cefaclor; Cefadroxil; Cefdinir
                  - text: 同咽炎，抗菌药物。嗓子疼多为病毒性，抗生素不常规推荐。全部是抗生素。评PARTIALLY或INAPPROPRIATE？我会给PARTIALLY。
                - paragraph [ref=e211]: 坐骨神经痛 | Aspirin; Amitriptyline; Baclofen; Carbamazepine; Carisoprodol
                - list [ref=e212]:
                  - listitem [ref=e213]:
                    - paragraph [ref=e214]: "Aspirin: NSAID，镇痛抗炎，适合。"
                  - listitem [ref=e215]:
                    - paragraph [ref=e216]: "Amitriptyline: 三环类抗抑郁药，用于神经性疼痛，适合。"
                  - listitem [ref=e217]:
                    - paragraph [ref=e218]: "Baclofen: 肌肉松弛剂，用于肌肉痉挛，可能用于坐骨神经痛相关的肌肉痉挛，适当。"
                  - listitem [ref=e219]:
                    - paragraph [ref=e220]: "Carbamazepine: 抗惊厥药，用于神经性疼痛（如三叉神经痛），有时用于坐骨神经痛？不是典型一线。可能部分适当。"
                  - listitem [ref=e221]:
                    - paragraph [ref=e222]:
                      - text: "Carisoprodol: 肌肉松弛剂，用于肌肉骨骼痛，适当。"
                      - text: 多数药物可用于坐骨神经痛的症状管理。卡马西平一般用于神经痛，但坐骨神经痛是神经根痛，有时使用加巴喷丁或普瑞巴林，卡马西平也可用。可评APPROPRIATE。
                - paragraph [ref=e223]: 外周动脉疾病 | Clopidogrel; Amlodipine; alprostadil; Amlodipine-Benazepril; Amlodipine-Valsartan
                - list [ref=e224]:
                  - listitem [ref=e225]:
                    - paragraph [ref=e226]: "Clopidogrel: 抗血小板，用于有症状的PAD，适当。"
                  - listitem [ref=e227]:
                    - paragraph [ref=e228]: "Amlodipine: 钙通道阻滞剂，用于高血压和冠心病，PAD患者常见合并症，非直接治疗PAD，但可控制危险因素，适当。"
                  - listitem [ref=e229]:
                    - paragraph [ref=e230]: "alprostadil: 前列腺素E1，用于改善严重肢体缺血，适当。"
                  - listitem [ref=e231]:
                    - paragraph [ref=e232]: "Amlodipine-Benazepril: 降压药，组合，控制危险因素。"
                  - listitem [ref=e233]:
                    - paragraph [ref=e234]:
                      - text: "Amlodipine-Valsartan: 同上。"
                      - text: 这些药物大部分是降压和抗血小板，用于PAD管理。Alprostadil直接用于严重PAD。总体适当。评APPROPRIATE。
                - paragraph [ref=e235]: 多动症 | Clonidine; Alprazolam; viloxazine; dexmethylphenidate; Methylphenidate
                - list [ref=e236]:
                  - listitem [ref=e237]:
                    - paragraph [ref=e238]: "Clonidine: α2激动剂，用于ADHD，尤其是儿童，适当。"
                  - listitem [ref=e239]:
                    - paragraph [ref=e240]: "Alprazolam: 苯二氮卓，不用于ADHD，可能加重注意力不集中，不当。"
                  - listitem [ref=e241]:
                    - paragraph [ref=e242]: "viloxazine: 选择性去甲肾上腺素再摄取抑制剂，FDA批准用于ADHD，适当。"
                  - listitem [ref=e243]:
                    - paragraph [ref=e244]: "dexmethylphenidate: 中枢兴奋剂，一线，适当。"
                  - listitem [ref=e245]:
                    - paragraph [ref=e246]:
                      - text: "Methylphenidate: 中枢兴奋剂，一线，适当。"
                      - text: 阿普唑仑不适合。评为PARTIALLY。
                - paragraph [ref=e247]: 多囊卵巢综合征 | Metformin; Canagliflozin; Spironolactone; Clomiphene; Flutamide
                - list [ref=e248]:
                  - listitem [ref=e249]:
                    - paragraph [ref=e250]: "Metformin: 胰岛素增敏，用于PCOS代谢异常，适当。"
                  - listitem [ref=e251]:
                    - paragraph [ref=e252]: "Canagliflozin: SGLT2抑制剂，降糖药，一般用于2型糖尿病，不是PCOS标准治疗。可能用于PCOS合并糖尿病，不是常规推荐。"
                  - listitem [ref=e253]:
                    - paragraph [ref=e254]: "Spironolactone: 抗雄激素，用于多毛、痤疮，适当。"
                  - listitem [ref=e255]:
                    - paragraph [ref=e256]: "Clomiphene: 促排卵，用于PCOS不孕，适当。"
                  - listitem [ref=e257]:
                    - paragraph [ref=e258]:
                      - text: "Flutamide: 抗雄激素，用于多毛，但因肝毒性不常用，但属抗雄激素。理论上可用于。"
                      - text: 卡格列净不常规用于PCOS。可评为PARTIALLY。
                - paragraph [ref=e259]: 失眠 | Alprazolam; Amitriptyline; Chlordiazepoxide; Clonazepam; Clorazepate
                - list [ref=e260]:
                  - listitem [ref=e261]:
                    - paragraph [ref=e262]: "Alprazolam: 苯二氮卓，可用于失眠，但有依赖，短期使用。"
                  - listitem [ref=e263]:
                    - paragraph [ref=e264]: "Amitriptyline: 三环类抗抑郁药，镇静，用于失眠。"
                  - listitem [ref=e265]:
                    - paragraph [ref=e266]: "Chlordiazepoxide: 苯二氮卓，用于失眠。"
                  - listitem [ref=e267]:
                    - paragraph [ref=e268]: "Clonazepam: 苯二氮卓，较长效，用于失眠。"
                  - listitem [ref=e269]:
                    - paragraph [ref=e270]:
                      - text: "Clorazepate: 苯二氮卓，用于失眠。"
                      - text: 全部都有镇静作用，可用于失眠。但某些（如alprazolam）主要用于焦虑，也可off-label失眠。氯硝西泮主要用于癫痫和焦虑，也有催眠效果。总的来说，这些药物可以用于失眠，尽管现在指南推荐non-BZD催眠药。评APPROPRIATE or PARTIALLY? 所有都可以诱导睡眠，所以适合治疗失眠。我评APPROPRIATE。
                - paragraph [ref=e271]: 头痛 | Cyclobenzaprine; Amitriptyline; Diclofenac; Etodolac; Flurbiprofen
                - list [ref=e272]:
                  - listitem [ref=e273]:
                    - paragraph [ref=e274]: "Cyclobenzaprine: 肌肉松弛剂，用于紧张性头痛？不是标准头痛用药。偏头痛不推荐。"
                  - listitem [ref=e275]:
                    - paragraph [ref=e276]: "Amitriptyline: 预防偏头痛和紧张性头痛，适当。"
                  - listitem [ref=e277]:
                    - paragraph [ref=e278]: "Diclofenac: NSAID，用于急性头痛，适当。"
                  - listitem [ref=e279]:
                    - paragraph [ref=e280]: "Etodolac: NSAID，适当。"
                  - listitem [ref=e281]:
                    - paragraph [ref=e282]:
                      - text: "Flurbiprofen: NSAID，适当。"
                      - text: Cyclobenzaprine 一般用于肌肉痉挛，不太用于头痛。所以PARTIALLY。
                - paragraph [ref=e283]: 子宫内膜异位症 | Goserelin; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine
                - list [ref=e284]:
                  - listitem [ref=e285]:
                    - paragraph [ref=e286]: "Goserelin: GnRH激动剂，用于子宫内膜异位症，适当。"
                  - listitem [ref=e287]:
                    - paragraph [ref=e288]: "Cimetidine: H2受体拮抗剂，抑酸药，不用于子宫内膜异位症。"
                  - listitem [ref=e289]:
                    - paragraph [ref=e290]: 其他都是质子泵抑制剂或H2阻滞剂，用于胃酸。完全不适合子宫内膜异位症。因此只有一个适当，其他都不对。评为INAPPROPRIATE。
                - paragraph [ref=e291]:
                  - text: 宫颈炎 | Amikacin; Amoxicillin; Amoxicillin-Clavulanate; Cefaclor; Cefadroxil
                  - text: 宫颈炎常见病原为沙眼衣原体、淋病奈瑟菌等，治疗用阿奇霉素或多西环素，注射头孢曲松等。氨基糖苷类如阿米卡星不常用。阿莫西林和头孢菌素不是一线，对淋病可能效果不如头孢曲松，但阿莫西林-克拉维酸可覆盖部分。总体这些抗生素部分可用于细菌性宫颈炎，但并非指南推荐的最佳选择。阿米卡星通常为耐药菌，不适合常规宫颈炎。我评PARTIALLY或INAPPROPRIATE。考虑到Amikacin不常用，其他也不是标准一线，倾向INAPPROPRIATE。
                - paragraph [ref=e292]:
                  - text: 寄生虫感染 | Paromomycin; Albendazole; Ivermectin; Mebendazole; Praziquantel
                  - text: 这些都是抗寄生虫药，覆盖不同寄生虫。作为广谱推荐，可用于寄生虫感染（具体看哪种寄生虫）。所有都是抗寄生虫药，所以APPROPRIATE。
                - paragraph [ref=e293]: 尿失禁 | oxybutynin(oral); Amikacin; oxybutynin(transdermal); flavoxate; darifenacin
                - list [ref=e294]:
                  - listitem [ref=e295]:
                    - paragraph [ref=e296]: "oxybutynin: 抗胆碱能药，用于膀胱过度活动症和急迫性尿失禁。"
                  - listitem [ref=e297]:
                    - paragraph [ref=e298]: "Amikacin: 抗生素，不用于尿失禁。"
                  - listitem [ref=e299]:
                    - paragraph [ref=e300]: "flavoxate: 用于尿频、尿急，可缓解症状。"
                  - listitem [ref=e301]:
                    - paragraph [ref=e302]:
                      - text: "darifenacin: 抗胆碱能药，用于尿失禁。"
                      - text: Amikacin完全不适合。因而PARTIALLY。
                - paragraph [ref=e303]: 尿路感染 | Amikacin; Fosfomycin; acetohydroxamic acid; Phenazopyridine; Gentamicin
                - list [ref=e304]:
                  - listitem [ref=e305]:
                    - paragraph [ref=e306]: "Amikacin: 氨基糖苷类抗生素，用于复杂UTI或耐药菌，不首选。"
                  - listitem [ref=e307]:
                    - paragraph [ref=e308]: "Fosfomycin: 用于单纯性UTI，适当。"
                  - listitem [ref=e309]:
                    - paragraph [ref=e310]: "acetohydroxamic acid: 脲酶抑制剂，用于鸟粪石结石，不用作UTI治疗。"
                  - listitem [ref=e311]:
                    - paragraph [ref=e312]: "Phenazopyridine: 尿路镇痛剂，缓解症状，不治疗感染。"
                  - listitem [ref=e313]:
                    - paragraph [ref=e314]:
                      - text: "Gentamicin: 氨基糖苷类，可肠道外用于严重UTI。"
                      - text: 部分药物是抗生素（Fosfomycin, Amikacin, Gentamicin），但acetohydroxamic acid和phenazopyridine不是抗感染药，用于症状缓解或结石。所以不适合作为UTI治疗药物。评为INAPPROPRIATE。或者因为Fosfomycin适合，部分适合，但另两个不是。评为PARTIALLY。考虑到UTI推荐药物应是抗菌药，Phenazopyridine是对症，acetohydroxamic acid不是。所以部分适合。我倾向PARTIALLY。
                - paragraph [ref=e315]: 尿路结石 | Allopurinol; Colchicine; Diclofenac; Etodolac; Flurbiprofen
                - list [ref=e316]:
                  - listitem [ref=e317]:
                    - paragraph [ref=e318]: "Allopurinol: 用于尿酸结石预防，高尿酸尿症，适当。"
                  - listitem [ref=e319]:
                    - paragraph [ref=e320]: "Colchicine: 用于痛风，不用于尿路结石急性发作或预防。不适当。"
                  - listitem [ref=e321]:
                    - paragraph [ref=e322]: "Diclofenac: NSAID，用于肾绞痛镇痛，适当。"
                  - listitem [ref=e323]:
                    - paragraph [ref=e324]: "Etodolac: NSAID，镇痛，适当。"
                  - listitem [ref=e325]:
                    - paragraph [ref=e326]:
                      - text: "Flurbiprofen: NSAID，镇痛，适当。"
                      - text: 秋水仙碱不合适。PARTIALLY。
                - paragraph [ref=e327]: 帕金森病 | Selegiline; Alprazolam; Rasagiline; Entacapone; Tolcapone
                - list [ref=e328]:
                  - listitem [ref=e329]:
                    - paragraph [ref=e330]: "Selegiline: MAO-B抑制剂，用于PD，适当。"
                  - listitem [ref=e331]:
                    - paragraph [ref=e332]: "Alprazolam: 苯二氮卓，不用于PD核心症状，可能用于焦虑或睡眠，但不是标准抗帕金森药。"
                  - listitem [ref=e333]:
                    - paragraph [ref=e334]: "Rasagiline: MAO-B抑制剂，适当。"
                  - listitem [ref=e335]:
                    - paragraph [ref=e336]: "Entacapone: COMT抑制剂，适当。"
                  - listitem [ref=e337]:
                    - paragraph [ref=e338]:
                      - text: "Tolcapone: COMT抑制剂，适当。"
                      - text: 阿普唑仑不当。评为PARTIALLY。
                - paragraph [ref=e339]: 带状疱疹 | Valacyclovir; Amitriptyline; acyclovir(oral); Acyclovir; Famciclovir
                - list [ref=e340]:
                  - listitem [ref=e341]:
                    - paragraph [ref=e342]: "Valacyclovir: 抗病毒，用于带状疱疹，适当。"
                  - listitem [ref=e343]:
                    - paragraph [ref=e344]: "Amitriptyline: 用于疱疹后神经痛，不是急性带状疱疹抗病毒治疗，但可缓解疼痛。"
                  - listitem [ref=e345]:
                    - paragraph [ref=e346]: "acyclovir: 抗病毒，适当。"
                  - listitem [ref=e347]:
                    - paragraph [ref=e348]:
                      - text: "Famciclovir: 抗病毒，适当。"
                      - text: 这个问题：阿米替林用于疼痛，但不是治疗带状疱疹病毒本身的抗病毒药物。推荐列表中有阿米替林，可能作为辅助止痛。总的治疗可以包括镇痛。评APPROPRIATE？或者PARTIALLY，因为阿米替林不是抗病毒。但“治疗该疾病”包括症状管理。我觉得可评APPROPRIATE。
                - paragraph [ref=e349]:
                  - text: 带状疱疹后神经痛 | Gabapentin; Amitriptyline; lidocaine topical; lidocaine(topical); Capsaicin+Lidocaine
                  - text: 全部都是用于PHN的药物：加巴喷丁、阿米替林、局部利多卡因、辣椒素。适当。APPROPRIATE。
                - paragraph [ref=e350]: 干眼症 | Fluorometholone; Cetirizine; Brimonidine; Brinzolamide; Latanoprost
                - list [ref=e351]:
                  - listitem [ref=e352]:
                    - paragraph [ref=e353]: "Fluorometholone: 糖皮质激素，用于干眼症相关的炎症（短期），适当。"
                  - listitem [ref=e354]:
                    - paragraph [ref=e355]: "Cetirizine: 抗组胺药，可导致眼干，不用于治疗干眼症。可能用于过敏性结膜炎，但干眼症通常避免口服抗组胺药。"
                  - listitem [ref=e356]:
                    - paragraph [ref=e357]: "Brimonidine: α2激动剂，用于青光眼，不用于干眼症。"
                  - listitem [ref=e358]:
                    - paragraph [ref=e359]: "Brinzolamide: 碳酸酐酶抑制剂，青光眼药。"
                  - listitem [ref=e360]:
                    - paragraph [ref=e361]:
                      - text: "Latanoprost: 前列腺素类似物，青光眼药。"
                      - text: 除了氟米龙，其他都不是干眼症治疗，且抗组胺药可能加重。评INAPPROPRIATE。
                - paragraph [ref=e362]: 强直性脊柱炎 | Diclofenac; Aspirin; Golimumab; Indomethacin; Naproxen
                - list [ref=e363]:
                  - listitem [ref=e364]:
                    - paragraph [ref=e365]: "Diclofenac: NSAID，一线，适当。"
                  - listitem [ref=e366]:
                    - paragraph [ref=e367]: "Aspirin: NSAID，一般不用，因为需要大剂量且副作用。目前指南不推荐阿司匹林用于AS。但它是NSAID。在AS中，消炎痛、萘普生是一线。阿司匹林不如其他NSAID，但仍有抗炎作用。可视为部分适合。"
                  - listitem [ref=e368]:
                    - paragraph [ref=e369]: "Golimumab: TNF抑制剂，用于AS，适当。"
                  - listitem [ref=e370]:
                    - paragraph [ref=e371]: "Indomethacin: NSAID，常用于AS，适当。"
                  - listitem [ref=e372]:
                    - paragraph [ref=e373]:
                      - text: "Naproxen: NSAID，适当。"
                      - text: 阿司匹林不是推荐NSAID，因为它对中轴性AS效果较差且胃肠道副作用大。但理论上可镇痛，不完全错误。评为PARTIALLY。
                - paragraph [ref=e374]: 强迫症 | Alprazolam; Aripiprazole; Bupropion; Buspirone; Chlordiazepoxide
                - list [ref=e375]:
                  - listitem [ref=e376]:
                    - paragraph [ref=e377]: "Alprazolam: 苯二氮卓，不治疗OCD核心症状，可能减轻焦虑，非标准。"
                  - listitem [ref=e378]:
                    - paragraph [ref=e379]: "Aripiprazole: 抗精神病药，可增效治疗OCD，适当。"
                  - listitem [ref=e380]:
                    - paragraph [ref=e381]: "Bupropion: 抗抑郁药，一般不用于OCD，可能加重焦虑。无充分证据。"
                  - listitem [ref=e382]:
                    - paragraph [ref=e383]: "Buspirone: 抗焦虑药，可能增效，证据有限，非一线。"
                  - listitem [ref=e384]:
                    - paragraph [ref=e385]:
                      - text: "Chlordiazepoxide: 苯二氮卓，不用于OCD。"
                      - text: 只有阿立哌唑被批准用于增效治疗OCD，其他都不是一线或推荐药物。所以INAPPROPRIATE。
                - paragraph [ref=e386]: 心力衰竭 | Amlodipine-Valsartan; Benazepril; Bumetanide; Canagliflozin; Candesartan
                - list [ref=e387]:
                  - listitem [ref=e388]:
                    - paragraph [ref=e389]: "Amlodipine-Valsartan: ARB+CCB，缬沙坦用于HFrEF，氨氯地平可安全用于HF但非核心治疗。"
                  - listitem [ref=e390]:
                    - paragraph [ref=e391]: "Benazepril: ACEI，用于HFrEF，适当。"
                  - listitem [ref=e392]:
                    - paragraph [ref=e393]: "Bumetanide: 利尿剂，用于心衰容量负荷，适当。"
                  - listitem [ref=e394]:
                    - paragraph [ref=e395]: "Canagliflozin: SGLT2抑制剂，用于HF（达格列净、恩格列净），卡格列净也有证据，可用于心衰。"
                  - listitem [ref=e396]:
                    - paragraph [ref=e397]:
                      - text: "Candesartan: ARB，用于HFrEF，适当。"
                      - text: 全部都是心衰标准治疗或可选药物。Amlodipine-Valsartan中缬沙坦合适，氨氯地平对血压控制可，但此组合包含ARB。评APPROPRIATE。
                - paragraph [ref=e398]: 心律失常 | Bisoprolol; Carvedilol; Diltiazem; Dofetilide; Esmolol
                - list [ref=e399]:
                  - listitem [ref=e400]:
                    - paragraph [ref=e401]: "Bisoprolol: β阻滞剂，抗心律失常，用于房颤、室上性等。"
                  - listitem [ref=e402]:
                    - paragraph [ref=e403]: "Carvedilol: β阻滞剂，适当。"
                  - listitem [ref=e404]:
                    - paragraph [ref=e405]: "Diltiazem: 钙通道阻滞剂，用于房颤率控。"
                  - listitem [ref=e406]:
                    - paragraph [ref=e407]: "Dofetilide: III类抗心律失常，用于房颤转复。"
                  - listitem [ref=e408]:
                    - paragraph [ref=e409]:
                      - text: "Esmolol: β阻滞剂，静脉用，适当。"
                      - text: 都可用于心律失常。APPROPRIATE。
                - paragraph [ref=e410]: 心房颤动 | Apixaban; Bisoprolol; Verapamil; Rivaroxaban; verapamil(oral/injection)
                - list [ref=e411]:
                  - listitem [ref=e412]:
                    - paragraph [ref=e413]: "Apixaban: 抗凝，预防卒中，适当。"
                  - listitem [ref=e414]:
                    - paragraph [ref=e415]: "Bisoprolol: 率控，适当。"
                  - listitem [ref=e416]:
                    - paragraph [ref=e417]: "Verapamil: 率控，适当。"
                  - listitem [ref=e418]:
                    - paragraph [ref=e419]:
                      - text: "Rivaroxaban: 抗凝，适当。"
                      - text: 全部适合。APPROPRIATE。
                - paragraph [ref=e420]:
                  - text: 心梗 | Captopril; Amlodipine-Valsartan; Prasugrel; Ticagrelor; Eptifibatide
                  - text: "心梗：ACEI (Captopril) 适用于心梗后，抗血小板 (Prasugrel, Ticagrelor), GPIIb/IIIa抑制剂 (Eptifibatide) 用于急性心梗PCI。Amlodipine-Valsartan: 缬沙坦可用于心梗后（代替ACEI不耐受），氨氯地平不是急性心梗指征，但组合中包含ARB。总体上用于心梗后管理和急性期。可能适当。APPROPRIATE。"
                - paragraph [ref=e421]: 心绞痛 | Amlodipine; Amlodipine-Valsartan; Bisoprolol; Bisoprolol-HCTZ; Carvedilol
                - list [ref=e422]:
                  - listitem [ref=e423]:
                    - paragraph [ref=e424]: "Amlodipine: CCB，抗心绞痛。"
                  - listitem [ref=e425]:
                    - paragraph [ref=e426]: "Amlodipine-Valsartan: CCB+ARB，控制血压，间接利于心绞痛。"
                  - listitem [ref=e427]:
                    - paragraph [ref=e428]: "Bisoprolol: β阻滞剂，一线。"
                  - listitem [ref=e429]:
                    - paragraph [ref=e430]: "Bisoprolol-HCTZ: β阻滞剂+利尿剂，降压，比索洛尔可抗心绞痛。"
                  - listitem [ref=e431]:
                    - paragraph [ref=e432]:
                      - text: "Carvedilol: β阻滞剂，可抗心绞痛。"
                      - text: 这些药都有β阻滞剂或CCB，均可用于慢性稳定型心绞痛。适当。APPROPRIATE。
                - paragraph [ref=e433]: 心肌梗死 | 同心梗：Captopril; Amlodipine-Valsartan; Prasugrel; Ticagrelor; Eptifibatide — APPROPRIATE。
                - paragraph [ref=e434]:
                  - text: 心肌病 | Amlodipine-Valsartan; Benazepril; Bumetanide; Canagliflozin; Candesartan
                  - text: 同心力衰竭类似，包括ACEI, ARB, 利尿剂, SGLT2i。心肌病心衰治疗，适当。APPROPRIATE。
                - paragraph [ref=e435]: 现在，将所有评估结果整理成表格。注意给出评分和简要理由。
            - table [ref=e438]:
              - rowgroup [ref=e439]:
                - row "疾病 评分 理由" [ref=e440]:
                  - columnheader "疾病" [ref=e441]
                  - columnheader "评分" [ref=e442]
                  - columnheader "理由" [ref=e443]
              - rowgroup [ref=e444]:
                - row "呕吐 APPROPRIATE 地塞米松、甲氧氯普胺、美克洛嗪、丙氯拉嗪均为不同机制的常用止吐药；劳拉西泮可用于预期性或焦虑相关的恶心呕吐，均适用于呕吐治疗。" [ref=e445]:
                  - cell "呕吐" [ref=e446]
                  - cell "APPROPRIATE" [ref=e447]
                  - cell "地塞米松、甲氧氯普胺、美克洛嗪、丙氯拉嗪均为不同机制的常用止吐药；劳拉西泮可用于预期性或焦虑相关的恶心呕吐，均适用于呕吐治疗。" [ref=e448]
                - row "咳嗽 PARTIALLY 苯佐那酯、氢可酮、可待因是标准镇咳药；苯海拉明可用于过敏相关咳嗽；但地塞米松并非常规镇咳药，仅用于哮吼等特殊炎性咳嗽，故部分适合。" [ref=e449]:
                  - cell "咳嗽" [ref=e450]
                  - cell "PARTIALLY" [ref=e451]
                  - cell "苯佐那酯、氢可酮、可待因是标准镇咳药；苯海拉明可用于过敏相关咳嗽；但地塞米松并非常规镇咳药，仅用于哮吼等特殊炎性咳嗽，故部分适合。" [ref=e452]
                - row "咽炎 PARTIALLY 所列均为抗菌药物，仅对细菌性咽炎有效；多数咽炎为病毒性，常规不推荐全部使用抗生素，但阿莫西林是A族链球菌咽炎的一线选择，故部分适合。" [ref=e453]:
                  - cell "咽炎" [ref=e454]
                  - cell "PARTIALLY" [ref=e455]
