        - generic [ref=e106]:
          - generic [ref=e108]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 呕吐 | Dexamethasone; Lorazepam; Metoclopramide; Meclizine; Prochlorperazine 疾病: 咳嗽 | Dexamethasone; Diphenhydramine; Benzonatate; Hydrocodone; Codeine 疾病: 咽炎 | Amoxicillin; Azithromycin; Ceftibuten; Loracarbef; cefuroxime 疾病: 哮喘 | Dexamethasone; Epinephrine; Formoterol; Methylprednisolone; Mometasone 疾病: 嗓子疼 | Amoxicillin; Azithromycin; Cefaclor; Cefadroxil; Cefdinir 疾病: 坐骨神经痛 | Aspirin; Amitriptyline; Baclofen; Carbamazepine; Carisoprodol 疾病: 外周动脉疾病 | Clopidogrel; Amlodipine; alprostadil; Amlodipine-Benazepril; Amlodipine-Valsartan 疾病: 多动症 | Clonidine; Alprazolam; viloxazine; dexmethylphenidate; Methylphenidate 疾病: 多囊卵巢综合征 | Metformin; Canagliflozin; Spironolactone; Clomiphene; Flutamide 疾病: 失眠 | Alprazolam; Amitriptyline; Chlordiazepoxide; Clonazepam; Clorazepate 疾病: 头痛 | Cyclobenzaprine; Amitriptyline; Diclofenac; Etodolac; Flurbiprofen 疾病: 子宫内膜异位症 | Goserelin; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine 疾病: 宫颈炎 | Amikacin; Amoxicillin; Amoxicillin-Clavulanate; Cefaclor; Cefadroxil 疾病: 寄生虫感染 | Paromomycin; Albendazole; Ivermectin; Mebendazole; Praziquantel 疾病: 尿失禁 | oxybutynin(oral); Amikacin; oxybutynin(transdermal); flavoxate; darifenacin 疾病: 尿路感染 | Amikacin; Fosfomycin; acetohydroxamic acid; Phenazopyridine; Gentamicin 疾病: 尿路结石 | Allopurinol; Colchicine; Diclofenac; Etodolac; Flurbiprofen 疾病: 帕金森病 | Selegiline; Alprazolam; Rasagiline; Entacapone; Tolcapone 疾病: 带状疱疹 | Valacyclovir; Amitriptyline; acyclovir(oral); Acyclovir; Famciclovir 疾病: 带状疱疹后神经痛 | Gabapentin; Amitriptyline; lidocaine topical; lidocaine(topical); Capsaicin+Lidocaine 疾病: 干眼症 | Fluorometholone; Cetirizine; Brimonidine; Brinzolamide; Latanoprost 疾病: 强直性脊柱炎 | Diclofenac; Aspirin; Golimumab; Indomethacin; Naproxen 疾病: 强迫症 | Alprazolam; Aripiprazole; Bupropion; Buspirone; Chlordiazepoxide 疾病: 心力衰竭 | Amlodipine-Valsartan; Benazepril; Bumetanide; Canagliflozin; Candesartan 疾病: 心律失常 | Bisoprolol; Carvedilol; Diltiazem; Dofetilide; Esmolol 疾病: 心房颤动 | Apixaban; Bisoprolol; Verapamil; Rivaroxaban; verapamil(oral/injection) 疾病: 心梗 | Captopril; Amlodipine-Valsartan; Prasugrel; Ticagrelor; Eptifibatide 疾病: 心绞痛 | Amlodipine; Amlodipine-Valsartan; Bisoprolol; Bisoprolol-HCTZ; Carvedilol 疾病: 心肌梗死 | Captopril; Amlodipine-Valsartan; Prasugrel; Ticagrelor; Eptifibatide 疾病: 心肌病 | Amlodipine-Valsartan; Benazepril; Bumetanide; Canagliflozin; Candesartan 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
          - generic [ref=e111]:
            - button [ref=e112] [cursor=pointer]:
