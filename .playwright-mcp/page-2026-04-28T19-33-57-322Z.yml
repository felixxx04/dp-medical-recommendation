                - paragraph [ref=e280]: rimegepant - CGRP抑制剂，妊娠分级N。禁忌：过敏；同时使用强CYP3A4抑制剂？rimegepant是CYP3A4底物，说明书可能禁忌与强CYP3A4抑制剂联用（如克拉霉素、伊曲康唑、酮康唑、利托那韦等）可能增加暴露量。严重肝病（Child-Pugh C级）应避免。终末期肾病。怀孕、哺乳可能相对禁忌。对于rimegepant和ubrogepant，常见禁忌是过敏，避免与强CYP3A4诱导剂或抑制剂联用可能是相对禁忌或禁忌。但请注意，ubrogepant也有类似。根据FDA标签：rimegepant禁忌症：超敏反应史。相对而言，严重肝功能不全、终末期肾病(ESRD)避免使用；同时使用强CYP3A4抑制剂避免重复给药？rimegepant用于急性治疗，一次剂量，如果同时用强CYP3A4抑制剂，需避免。ubrogepant 片 (Ubrelvy) 禁忌：同时使用强CYP3A4抑制剂。对于rimegepant，类似。我会列出过敏为绝对禁忌，药物类：强CYP3A4抑制剂联用为相对禁忌或禁忌，疾病：重度肝功能损害（Child-Pugh C）和终末期肾病（eGFR<15）为相对禁忌。
              - listitem [ref=e281]:
                - paragraph [ref=e282]: lasmiditan - 选择性5-HT1F受体激动剂，禁忌：与CYP1A2强抑制剂联合？lasmiditan是CYP1A2底物？实际上lasmiditan代谢通过非CYP途径，但也有药物相互作用：与强CYP1A2抑制剂联用可能增加暴露。还禁忌驾驶或操作机械（中枢神经系统抑制），但这不是传统禁忌症，属于注意事项。按label，lasmiditan有显著的中枢神经系统抑制和驾驶损伤，应警告。禁忌症：已知过敏。另外，严重肝功能受损？中至重度肝损伤可能增加暴露。相对禁忌：肝功能不全。在禁忌症中可能包括：严重肝损害（Child-Pugh C）是绝对？没有明确列为禁忌，但说明书警告。主要禁忌：过敏。有心率减慢作用，窦性心动过缓或一度房室传导阻滞，可能相对禁忌？不应同时使用具有中枢抑制的物质如酒精。但我们将列出相关禁忌：对lasmiditan过敏；严重肝功能障碍（相对）。并无与曲普坦类相同的心血管禁忌，因为它不是血管收缩剂。
