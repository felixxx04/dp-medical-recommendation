              - listitem [ref=e277]:
                - paragraph [ref=e278]: zolmitriptan (oral) - 类似曲普坦类药物，同样禁忌：缺血性心脏病、脑血管病、外周血管病、未控制高血压、MAO-A抑制剂(使用吗氯贝胺等？佐米曲普坦通过CYP1A2代谢，可能受氟伏沙明等影响，但药物类禁忌为MAO-A抑制剂。推荐绝对禁忌症：心肌梗死史、冠心病、变异型心绞痛、Wolff-Parkinson-White综合征或心律失常伴有旁路传导通路？有些文献提到WPW，但临床指南通常说缺血性心脏病。严重肝损害。相对禁忌：轻度肝病。24小时内使用麦角胺或其他曲普坦。偏瘫型偏头痛和基底型偏头痛。过敏。
