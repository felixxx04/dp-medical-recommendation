                  - paragraph [ref=e496]: "Benzoyl Peroxide and Clindamycin topical: 交互: \"tretinoin\" moderate (BPO降解); \"other topical irritants\" moderate. Clindamycin and Tretinoin topical: 含有tretinoin，有BPO降解交互 moderate; 同时也含克林霉素，无特别。Benzoyl Peroxide and Erythromycin: 同含BPO，与tretinoin moderate; irritation。Benzoyl Peroxide and Sulfur: BPO与tretinoin moderate; 硫增加刺激。Sulfacetamide Sodium and Sulfur: 硫增加刺激，与其他局部氧化剂? 可列出 moderate。 Resorcinol and Sulfur: 同样。"
