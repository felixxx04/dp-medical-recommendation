                  - paragraph [ref=e332]: "对于组合药物，按照要求列出每个成分的交互。可以这样表示：generic_name 为组合药名，如 \"Adapalene and Benzoyl Peroxide\"，然后 interactions 数组中 drug_a 可能是 \"adapalene and benzoyl peroxide\"，同时也可列出涉及每个成分的交互，但要求是“对于组合药物,列出每个成分的交互”。可能意味着，在 interactions 里列出的条目 drug_a 可以是组合药名，但可以提及如 \"adapalene\" 和其他交互? 但例子中是单一药物。为了清晰，我可以把组合药物作为整体，然后交互是针对组合的整体，例如 \"adapalene and benzoyl peroxide\" 与 \"topical retinoids\" 有 moderate interaction (增加刺激)，或者列出其中 adapalene 的交互（如与其他维A酸合用增加刺激），benzoyl peroxide 的交互（如与 tretinoin 合用失效）但组合本身含过氧化苯甲酰和 adapalene，那和 tretinoin 合用有互相作用。也可以分别列出 adapalene 交互和 benzoyl peroxide 交互，但 drug_a 仍用 \"adapalene and benzoyl peroxide\"。我会分别基于成分，描述交互。比如 drug_b 为 \"topical tretinoin\", clinical_effect: \"benzoyl peroxide 可能氧化降解 tretinoin，降低疗效\"，interaction_type moderate。对于 adapalene 成分，没有与 benzoyl peroxide 失活问题，但在同一个组合中，如果再合用其他外用维A酸，增加刺激。所以更合理的做法：对于组合，生成其可能的重要交互。由于局部用药交互很少，很多组合只有 simultaneous use of other topical irritants 导致刺激，可列为 moderate。我也会列出一些。"
                  - paragraph [ref=e333]: 根据临床知识，系统性药物交互：
                  - list [ref=e334]:
                    - listitem [ref=e335]:
                      - paragraph [ref=e336]: "Isotretinoin (口服) : major: 维生素A补充剂 (additive toxicity)，四环素类 (假性脑瘤)，甲氨蝶呤 (肝毒性增加)，酒精? (可能加重肝毒性，但 moderate)，CYP3A4 诱导剂/抑制剂? isotretinoin 代谢涉及 CYP 但不太显著。主要 interactions: 与 tetracyclines (major)，与 vitamin A (major)，与 methotrexate (major)，与 topical keratolytics? 不。与口服抗凝药 warfarin? 报道可能降低 warfarin 效果？查阅：isotretinoin 可能减少 warfarin 作用，moderate。与 progestin-only contraceptives? 可能降低有效性？实际上 isotretinoin 不降低口服避孕药效果，但可能要求用两种避孕。但不去乱编。与 St. John's wort? 降低避孕药效果，但对 isotretinoin 本身？不是。重点：列出 tetracycline antibiotics (major), vitamin A supplements (major), methotrexate (major), alcohol (moderate 肝毒性), warfarin (moderate)。还会有与 phenytoin? isotretinoin 降低 phenytoin 水平？有报道。可能 moderate。与 systemic corticosteroids? 可能增加骨质疏松风险，moderate。我会选取重要且常见。"
                    - listitem [ref=e337]:
                      - paragraph [ref=e338]: "Sulfamethoxazole/Trimethoprim (口服/注射): 磺胺类。主要交互：与 warfarin (显著增强抗凝，major)，与 methotrexate (增加骨髓抑制，major)，与 ACE inhibitors/ARB? 协同高钾血症? trimethoprim 有类似保钾作用，与 ACEI/ARB 或钾补充剂合用会致高钾 (major/moderate)。与口服降糖药 sulfonylureas (增强低血糖，moderate)。与 phenytoin (增加苯妥英浓度，moderate)。与 环孢素 (增加肾毒性，moderate)。与 利尿剂 (老年人增加血小板减少风险，moderate)。与 甲氨蝶呤 major。与 warfarin major。与 ACE inhibitors, ARBs, spironolactone (高钾) moderate/major。还要考虑 6-巯基嘌呤/硫唑嘌呤? trimethoprim 抑制 thiopurine methyltransferase? 不，是磺胺。有与 methotrexate 交互 major。我将选择 major: warfarin, methotrexate; moderate: ACE inhibitors, ARBs, potassium-sparing diuretics (高钾), sulfonylureas, phenytoin."
                    - listitem [ref=e339]:
                      - paragraph [ref=e340]: "Doxycycline (全身): 四环素类。主要交互：口服抗凝药 warfarin (增强，moderate)，青霉素 (bacteriostatic 可能拮抗 bactericidal，moderate)，抗酸剂/钙铁锌镁等 (螯合减少吸收，major/moderate)，口服维A酸类 (isotretinoin) 增加假性脑瘤风险 (major)，甲氨蝶呤 (增加毒性，moderate)。应列出: antacids, calcium, iron, magnesium, zinc supplements (moderate - 降低吸收)，warfarin (moderate - 增强抗凝)，isotretinoin (major 假性脑瘤)，penicillins (moderate - 拮抗)，口服避孕药 (可能降低避孕效果，moderate)。还有与 CYP3A4 inducers 如 rifampin 降低多西环素水平? 多西环素部分代谢，可 moderate。列出常见。"
                    - listitem [ref=e341]:
                      - paragraph [ref=e342]: "Minocycline (口服): 类似于多西环素，但可能还引起前庭毒性。交互：与 isotretinoin (major 假性脑瘤)，抗酸剂/金属离子 (moderate 减少吸收)，warfarin (moderate)，口服避孕药 (moderate)，青霉素 (moderate)。同时可能增加肝毒性与其他肝毒性药物，alcohol moderate。列出。"
                    - listitem [ref=e343]:
                      - paragraph [ref=e344]: "Tetracycline hydrochloride: 同上，交互类似。"
                    - listitem [ref=e345]:
                      - paragraph [ref=e346]: "Sarecycline: 新型四环素，窄谱，交互较少。但仍有与金属阳离子螯合 (moderate)，抗凝药 (moderate)，口服维A酸 (major)。列出。"
                    - listitem [ref=e347]:
                      - paragraph [ref=e348]: "口服避孕药( Drospirenone/EE, EE/Norgestimate, drospirenone/EE/levomefolate): 含有乙炔雌二醇和孕激素。主要交互：与 CYP3A4 inducers 如 rifampin, carbamazepine, phenytoin, St. John's wort 等降低避孕效果 (major/moderate 会导致意外妊娠)，与抗生素如青霉素、四环素类? 传统上认为降低避孕效果，但证据有限，可能 moderate。与 lamotrigine 相互降低水平，moderate。与 warfarin? 雌激素可能降低抗凝效果，moderate。与 CYP3A4 inhibitors 如 ketoconazole 增加激素水平，副作用。选择 major: CYP3A4 inducers (rifampin, carbamazepine, phenytoin, St. John's wort) 导致避孕失败。moderate: certain antibiotics (amoxicillin, tetracyclines), lamotrigine. 对于 levomefolate 组合，无额外交互。"
                    - listitem [ref=e349]:
                      - paragraph [ref=e350]: "外用维A酸类: tretinoin topical, adapalene topical, tazarotene topical, trifarotene topical。系统吸收极少，通常无全身药物交互。局部交互：与 benzoyl peroxide 同时使用可氧化降解 tretinoin，降低疗效 (moderate)。与局部刺激性产品（如其他维A酸、过氧化苯甲酰、水杨酸、硫磺等）可能增加皮肤刺激 (moderate)。与光敏药物? 局部维A酸增加光敏，但无药物相互作用。可列出: benzoyl peroxide (for tretinoin) moderate。对于 adapalene，更稳定，但与其他维A酸合用增加刺激 moderate。tazarotene, trifarotene 也有与其他刺激性外用制剂加重刺激。可列出 moderate interaction: \"other topical irritants (e.g., benzoyl peroxide, salicylic acid, sulfur)\" 增加皮肤刺激。符合临床意义。"
                    - listitem [ref=e351]:
                      - paragraph [ref=e352]: "外用抗生素: clindamycin topical, erythromycin topical, dapsone topical, retapamulin topical, minocycline topical。无全身显著交互。可能局部同时使用其他产品会导致刺激或配伍禁忌。如 clindamycin topical 和 benzoyl peroxide 合用时，过氧化苯甲酰氧化克林霉素？实际上有组合产品 (benzoyl peroxide/clindamycin)，是稳定的。但曾有文献说混合可能降解，但产品配方设计使其稳定，所以无显著交互。但是，局部克林霉素与红霉素可能拮抗？没有临床意义。外用抗生素与肌肉松弛剂? 无全身相互作用。所以可以只列出 moderate interaction: 与局部剥脱剂合用增加刺激。但可能由于临床关切，大多数外用药可以不列出交互，或仅列出与 other topical acne products causing irritation。为避免空 interactions，还是给出一些 moderate 条目，符合要求（每个药物生成交互列表）。对于无已知严重或中度交互的，可以列“暂无已知major/moderate交互”？但要求是生成交互列表，可能还是要尽量列出有临床意义的。如 clindamycin topical 与 topical erythromycin 可能拮抗（两者都是抗生素，但不共用）。不太确定。"
                    - listitem [ref=e353]:
                      - paragraph [ref=e354]: "过氧化苯甲酰外用: 与 tretinoin 合用可能降解维A酸 (moderate)。与其他维A酸如 adapalene 可合用。与含有间苯二酚、硫磺可能增加刺激。可列出: tretinoin (moderate)。"
