            - paragraph [ref=e211]: 我们被要求为给定的每种药物生成完整的禁忌症列表。需要输出JSON。注意列表中有一些药物是组合药物。我们需要为每种药物生成JSON对象，列出generic_name和禁忌症列表。禁忌症类型分为disease, allergy_type, physiological_condition, drug_class，严重程度分为absolute和relative。必须基于药物的适应症、类别等推断禁忌症。
            - paragraph [ref=e212]: 我们需要处理所有药物。注意有些药物是重复的，比如amlodipine和atorvastatin组合，还有单独的amlodipine等。还有nitroglycerin有多种剂型（oral route, sublingual route, transdermal, topical），但本质都是nitroglycerin，禁忌症可能相同，但可能需要区分？输入药物列表中的名字不一样，有些有route。要求是“为以下每种药物生成完整的禁忌症列表”，输入药物列表中的每个条目都应该作为一个独立的generic_name处理，尽管有些是同一药物不同剂型。所以我们应按照给定的条目输出。
            - paragraph [ref=e244]: 我们谨慎分析每种药物的禁忌症：
            - list [ref=e245]:
              - listitem [ref=e246]:
                - paragraph [ref=e247]: amlodipine and atorvastatin：这是氨氯地平（钙通道阻滞剂）和阿托伐他汀（他汀类）组合。适应症：高血压、高脂血症、预防心血管疾病。妊娠分级X。我们需要分别列出两者的禁忌症。组合药物禁忌症包括各成分的禁忌症。对于amlodipine：严重低血压（相对？绝对？），严重主动脉瓣狭窄（相对），不稳定心绞痛（相对？），肝功能损害（相对，氨氯地平在肝功能不全时需减量）。绝对禁忌：对氨氯地平过敏。相对：心力衰竭（非缺血性？但钙通道阻滞剂可能加重心衰，但氨氯地平在心力衰竭中可用？有证据显示氨氯地平对心衰安全，但严重心衰应谨慎）。更常见禁忌：严重低血压（收缩压<90 mmHg）绝对？氨氯地平说明书写：对二氢吡啶类过敏者禁用，严重低血压患者禁用。妊娠X级是组合中的atorvastatin，因为阿托伐他汀妊娠X级，整个组合妊娠X，所以绝对禁忌妊娠。阿托伐他汀：活动性肝病或无法解释的持续血清转氨酶升高（绝对）；妊娠和哺乳（绝对）；与他汀相关的肌病/横纹肌溶解症风险，相对禁忌严重肾功能不全？但阿托伐他汀不经肾排泄，但肾功能不全无需调整。相对禁忌：大量饮酒、肝病史。禁忌药物：CYP3A4强抑制剂（如克拉霉素、伊曲康唑等）增加肌病风险，属于drug_class相对禁忌。组合药物：绝对禁忌：妊娠（physiological_condition，因为atorvastatin X级），哺乳（atorvastatin可进入乳汁）。过敏：对氨氯地平、其他二氢吡啶类或阿托伐他汀任何成分过敏。疾病：活动性肝病或转氨酶持续升高（absolute，因他汀）；严重低血压（绝对）；心源性休克（绝对，因为氨氯地平）。相对：严重主动脉瓣狭窄，不稳定心绞痛（可能因血管扩张引起反射性心动过速），急性心肌梗死（？），严重肾功能不全（atorvastatin相对？），与强CYP3A4抑制剂合用（drug_class，相对）。等等。我们需简洁列出。
              - listitem [ref=e248]:
                - paragraph [ref=e249]: nitroglycerin (oral route, sublingual route)：硝酸甘油，抗心绞痛药，血管扩张剂。禁忌：对硝酸酯过敏（absolute）；严重贫血（relative，可能引起高铁血红蛋白?）；闭角型青光眼（relative，可能增加眼压）；颅内压增高/头部创伤/脑出血（absolute，因为血管扩张增加颅内压）；严重低血压（收缩压<90 mmHg）（absolute）；血容量不足（relative）；肥厚型梗阻性心肌病（相对，可能加重流出道梗阻）；与PDE5抑制剂（西地那非等）合用（drug_class，absolute，因严重低血压风险）；与利奥西呱合用（absolute，可能低血压）。妊娠C级，非绝对禁忌，但通常避免使用。生理状态：哺乳期相对安全但应慎用。
              - listitem [ref=e250]:
                - paragraph [ref=e251]: "verapamil (oral/injection): 维拉帕米，CCB，Group IV抗心律失常。适应症：高血压、心绞痛、房颤、室上速。妊娠C。禁忌：严重左心室功能不全（absolute，除非是房颤伴快速心室率，但一般心力衰竭慎用）；心源性休克（absolute）；低血压（收缩压<90 mmHg）（absolute）；病态窦房结综合征（无起搏器时，absolute）；二度或三度房室传导阻滞（无起搏器时，absolute）；心房扑动或房颤合并预激综合征（如WPW）（absolute，可能诱发室颤）；对维拉帕米过敏（absolute）；严重心动过缓（relative）；肝功能严重受损（relative，需减量）；与β受体阻滞剂合用（relative，加重负性肌力，相对禁忌，静脉给维拉帕米时禁用）；与伊伐布雷定合用（可能导致心动过缓）。静脉注射维拉帕米时禁止与β受体阻滞剂同时静脉使用。还要注意：妊娠C，哺乳期慎用。同时药物相互作用：CYP3A4底物，与强抑制剂合用增加毒性。列出禁忌类型。"
              - listitem [ref=e252]:
                - paragraph [ref=e253]: "Aspirin Enteric-Coated and Buffered Tablets: 阿司匹林肠溶缓释片。适应症：疼痛、发热、炎症、心血管事件预防。妊娠分级N（说明无分级，但妊娠晚期高剂量可导致动脉导管早闭，属于D）。禁忌：对阿司匹林或水杨酸盐过敏（absolute）；哮喘、鼻息肉三联征（阿司匹林加重呼吸系统疾病，absolute）；活动性胃十二指肠溃疡（absolute）；出血倾向/血友病等（relative，增加出血风险）；严重肾功能不全（relative，肾毒性）；严重肝功能不全（relative）；妊娠晚期（生理状态，绝对，可致动脉导管早闭、分娩延长等）；哺乳期慎用；与抗凝药合用（drug_class，relative，出血风险增加）；儿童病毒感染期间（Reye综合征风险，生理状态absolute，对于儿童发热)。注意：阿司匹林在儿童中因病毒感染（如水痘、流感）禁用。列出。"
              - listitem [ref=e254]:
                - paragraph [ref=e255]: "amlodipine (oral route): 单独氨氯地平。禁忌：对二氢吡啶类过敏（absolute）；严重低血压（absolute）；心源性休克（absolute）；严重主动脉瓣狭窄（relative）；不稳定心绞痛（relative？但氨氯地平可用于血管痉挛性心绞痛，并不是禁忌）；肝功能不全（relative，需减量）；妊娠C级，但通常可权衡利弊；哺乳期：可通过乳汁，但相对安全；与CYP3A4强抑制剂合用（relative，增加氨氯地平水平）。严重心力衰竭（非缺血性？相对）。没有绝对妊娠禁忌。列出。"
              - listitem [ref=e256]:
                - paragraph [ref=e257]: Aspirin Tablets：与第4个类似，只是剂型不同。禁忌症相同。
              - listitem [ref=e258]:
                - paragraph [ref=e259]: nitroglycerin (transdermal)：硝酸甘油贴片。禁忌症类似口服，因为同样药物。增加：对贴片粘合剂过敏（过敏类型？可能相对）。但通用：严重贫血、闭角型青光眼、颅内高压、严重低血压、PDE5抑制剂、利奥西呱等。列出。
              - listitem [ref=e260]:
                - paragraph [ref=e261]: heparin (injection)：普通肝素。禁忌：对肝素或猪肉制品过敏（absolute）；严重血小板减少症（尤其是肝素诱导的血小板减少症HIT，absolute）；活动性大出血（如颅内出血、消化道出血等，absolute）；近期手术或创伤（relative，取决于出血风险）；严重肝病/食管静脉曲张（relative）；未控制的严重高血压（relative）；细菌性心内膜炎（相对）；怀疑或确诊的HIT病史（absolute）。妊娠C，但肝素不通过胎盘，是妊娠抗凝选择。哺乳安全。药物类：与抗血小板药、溶栓药等合用增加出血。应列出。
              - listitem [ref=e262]:
                - paragraph [ref=e263]: propranolol (oral route)：普萘洛尔，非选择性β阻滞剂。适应症：高血压、心绞痛、偏头痛预防、特发性震颤、表演焦虑、心肌梗死。妊娠C。禁忌：支气管哮喘或慢性阻塞性肺疾病（绝对，非选择性β阻滞剂诱发支气管痉挛）；心源性休克（absolute）；失代偿性心力衰竭（absolute）；严重窦性心动过缓（absolute）；二度或三度房室传导阻滞（无起搏器，absolute）；病态窦房结综合征（absolute）；严重外周动脉疾病（相对，可加重）；变异型心绞痛（相对，可加重血管痉挛）；未控制的嗜铬细胞瘤（relative，必须先使用α阻滞剂）；糖尿病易发生低血糖者（相对，可掩盖低血糖症状）；甲状腺毒症（相对，突然停药可能诱发危象）；肝肾功能不全（需减量，相对）。与维拉帕米等非二氢吡啶类CCB合用（relative，负性肌力相加）。过敏：对普萘洛尔或任何成分过敏。哺乳期：进入乳汁，慎用。
              - listitem [ref=e264]:
                - paragraph [ref=e265]: "Metoprolol Extended-Release Capsules: 美托洛尔，选择性β1阻滞剂。禁忌：严重心动过缓、心源性休克、失代偿性心力衰竭、病态窦房结综合征、二度或三度房室传导阻滞（无起搏器）为absolute。对美托洛尔过敏（absolute）。相对禁忌：支气管哮喘（选择性仍可诱发，但比非选择性安全，相对禁忌）；严重肝功能不全（美托洛尔肝脏代谢，需减量）；严重外周动脉疾病；变异型心绞痛；嗜铬细胞瘤未用α阻滞剂；糖尿病（掩盖低血糖，但心动过速不会有，相对好一些）。与维拉帕米、地尔硫卓合用（相对）。妊娠C，哺乳期：大量进入乳汁，可能引起婴儿心动过缓等，相对禁忌。"
              - listitem [ref=e266]:
                - paragraph [ref=e267]: nitroglycerin (topical)：硝酸甘油软膏。适应症包括肛裂。禁忌症同样，但增加局部皮肤破损处不可用。妊娠C。
              - listitem [ref=e268]:
                - paragraph [ref=e269]: dalteparin：达肝素，低分子肝素。禁忌：对肝素或猪肉制品过敏（包括达肝素过敏，absolute）；HIT病史（absolute）；活动性大出血（absolute）；严重凝血障碍（relative）；近期脑、脊柱或眼科手术（relative）；严重高血压；严重肝病；妊娠B，相对安全，用于妊娠抗凝；哺乳安全。与抗血小板药物合用增加出血。肾功能不全需调整剂量，相对禁忌。
              - listitem [ref=e270]:
                - paragraph [ref=e271]: bivalirudin：比伐卢定，直接凝血酶抑制剂。适应症：PCI抗凝，ACS。禁忌：活动性大出血（absolute）；过敏（absolute）。相对禁忌：近期大手术、创伤、脑动脉瘤、出血倾向；严重高血压；肾功能不全（比伐卢定经肾排泄，Ccr<30ml/min需减量，相对禁忌？）；与抗血小板药等合用增加出血。妊娠B。
              - listitem [ref=e272]:
                - paragraph [ref=e273]: verapamil (oral route)：与注射剂类似，禁忌症：严重左心室功能不全、低血压、心源性休克、病窦、二度或三度AVB（无起搏器）、房颤伴预激综合征、过敏。相对：肝功能不全、与β阻滞剂合用（口服相对，但需谨慎）、肾功能不全、妊娠C。列出。
              - listitem [ref=e274]:
                - paragraph [ref=e275]: isosorbide dinitrate (oral route, sublingual route)：硝酸异山梨酯。禁忌症与硝酸甘油类似：严重低血压、血容量不足、严重贫血、闭角型青光眼、颅内高压/脑出血、肥厚型梗阻性心肌病、对硝酸酯类过敏。绝对禁忌：与PDE5抑制剂合用，与利奥西呱合用。妊娠C。
              - listitem [ref=e276]:
                - paragraph [ref=e277]: nitroglycerin：与前面类似。可能包括口服，舌下等。禁忌相同。
              - listitem [ref=e278]:
                - paragraph [ref=e279]: ranolazine (oral route)：雷诺嗪，抗心绞痛药。适应症：慢性心绞痛。禁忌：严重肝功能不全（absolute，因为CYP3A代谢）；肝硬化（absolute）；与CYP3A强抑制剂（如酮康唑、克拉霉素）合用（absolute，禁用）；与CYP3A诱导剂合用（relative，避免）；严重肾功能不全（Ccr<30 ml/min，相对禁忌，慎用）；长QT综合征或使用延长QT的药物（relative，可延长QT）；对雷诺嗪过敏（absolute）。妊娠C。
              - listitem [ref=e280]:
                - paragraph [ref=e281]: lorazepam (oral)：劳拉西泮，苯二氮卓类。适应症：焦虑、失眠、癫痫持续状态、术前镇静、化疗止吐。妊娠D（妊娠期增加唇裂风险，新生儿戒断症状等，通常禁忌，除非必要）。绝对禁忌：对苯二氮卓类过敏；急性闭角型青光眼（绝对，由于抗胆碱能作用？劳拉西泮本身无显著抗胆碱作用，但所有苯二氮卓类禁用于急性闭角型青光眼？通常苯二氮卓类可安全用于开角型青光眼，但闭角型因为可能增加眼压？实际上苯二氮卓类不推荐用于急性闭角型青光眼，列为禁忌）；严重呼吸功能不全（relative，因呼吸抑制）；睡眠呼吸暂停综合症（relative）；重症肌无力（relative，肌松作用）；严重肝功能不全（relative，劳拉西泮葡糖醛酸化代谢，肝病可能延长作用）。生理状态：妊娠（绝对，除非获益大于风险，分类D通常视为相对禁忌，但病情必须时可用，分类D为有证据的胎儿风险，但可能获益大于风险，所以相对禁忌？临床上妊娠D药物一般避免使用，除非绝对必要。我列
