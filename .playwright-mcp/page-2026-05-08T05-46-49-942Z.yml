        - generic [ref=e102]:
          - generic [ref=e104]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 心衰 | Amlodipine-Valsartan; Benazepril; Bumetanide; Canagliflozin; Candesartan 疾病: 念珠菌性阴道炎 | Amikacin; Butoconazole; Amoxicillin; Amoxicillin-Clavulanate; Cefaclor 疾病: 急性疼痛 | Aspirin; Tapentadol; Diclofenac; Baclofen; Carisoprodol 疾病: 恶心 | Dexamethasone; Lorazepam; Metoclopramide; Meclizine; Prochlorperazine 疾病: 惊恐障碍 | Alprazolam; Aripiprazole; Venlafaxine; Alprazolam Oral; venlafaxine HCl 疾病: 感冒 | Diphenhydramine; Doxylamine; diphenhydramine HCl; chlorpheniramine; Promethazine 疾病: 慢性疼痛 | Tapentadol; Buprenorphine; Fentanyl; oxycodone; Dronabinol 疾病: 慢性肾病 | Bumetanide; Linagliptin; Metolazone; Sevelamer; Torsemide 疾病: 慢性阻塞性肺疾病 | Albuterol-Ipratropium; Formoterol; Ipratropium; Olodaterol; Umeclidinium 疾病: 慢阻肺 | Albuterol-Ipratropium; Formoterol; Ipratropium; Olodaterol; Umeclidinium 疾病: 憩室炎 | Amikacin; Ciprofloxacin; Tigecycline; Amoxicillin; Ampicillin-Sulbactam 疾病: 戒烟 | Bupropion; Alprazolam; Varenicline; bupropion(oral); bupropion HCl 疾病: 房颤 | Apixaban; Bisoprolol; Verapamil; Rivaroxaban; verapamil(oral/injection) 疾病: 扁桃体炎 | Cefadroxil; Ibuprofen; Cefprozil; Indomethacin; Naproxen 疾病: 打喷嚏 | Cetirizine; Mometasone; Olopatadine; fluticasone; Loratadine 疾病: 抑郁 | Alprazolam; Citalopram; Clomipramine; Desipramine; Doxepin 疾病: 抑郁症 | Amitriptyline; Alprazolam; desipramine; nortriptyline; protriptyline 疾病: 接触性皮炎 | Desonide; Betamethasone; fluocinolone; hydrocortisone(topical); hydrocortisone topical 疾病: 支气管炎 | dyphylline+guaifenesin; Benzonatate; Hydrocodone; Codeine; codeine+phenylephrine+triprolidine 疾病: 新冠 | Dexamethasone; Ibuprofen; Tocilizumab; sotrovimab; bebtelovimab 疾病: 晕眩 | Meclizine; Prochlorperazine; diphenhydramine HCl; dimenhydrinate; Temsirolimus 疾病: 更年期综合征 | Conjugated Estrogens; Alprazolam; Estradiol; Medroxyprogesterone; Progesterone 疾病: 月经不调 | Folic Acid; Ferrous Sulfate; Epoetin Alfa; Meperidine; Zidovudine 疾病: 术后疼痛 | Ketorolac; Aspirin; Ropivacaine; oliceridine; Sufentanil 疾病: 梅毒 | Penicillin G; penicillin G benzathine+procaine; procaine penicillin; penicillin G potassium; penicillin G sodium 疾病: 水肿 | Bumetanide; Chlorthalidone; Enalapril-HCTZ; Eplerenone; Furosemide 疾病: 流感 | Oseltamivir; Ibuprofen; Amantadine; Zanamivir; Rimantadine 疾病: 流鼻涕 | Cetirizine; Diphenhydramine; Desloratadine; Loratadine; Mometasone 疾病: 消化道出血 | Cimetidine; Dexlansoprazole; Esomeprazole; Erythromycin; Famotidine 疾病: 淋巴瘤 | Methoxsalen; Folic Acid; Doxorubicin; Ifosfamide; Etoposide 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
