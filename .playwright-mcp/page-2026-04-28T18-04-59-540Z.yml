            - generic [ref=e220]:
              - paragraph [ref=e221]: 我们被要求输出JSON，只输出JSON。需要为每个药物生成完整的禁忌症列表。注意药物列表中有重复或变体（如不同品牌、不同剂型），但要求是针对每个输入生成独立的条目。需要输出一个JSON数组，每个元素对应一个药物。注意不要输出任何解释文本。
              - paragraph [ref=e222]: 我们要根据每个药物的类别、适应症、妊娠分级等信息推断禁忌症。禁忌症分为疾病禁忌、过敏类型、生理状态禁忌、药物类禁忌。严重程度分为绝对和相对。
              - paragraph [ref=e223]: 需要确保禁忌症具体且临床相关。对于组合药物，需要列出每个成分的禁忌症。但输入中的组合很少：casirivimab and imdevimab，以及nirmatrelvir and ritonavir，insulin aspart and insulin aspart protamine等。要列出每个成分的禁忌症？对于单克隆抗体组合，可能成分都是单抗，禁忌症类似。对于Paxlovid，有nirmatrelvir和ritonavir，ritonavir是CYP3A强抑制剂，有很多药物相互作用禁忌。但这里要求禁忌症类型有drug_class，例如与CYP3A底物等。我需要推断。
              - paragraph [ref=e255]: 对于COVID-19疫苗，禁忌症通常包括对前一剂或成分过敏等。妊娠分级N表示未分级，但通常疫苗在妊娠期不是绝对禁忌，而是相对。需要谨慎。
              - paragraph [ref=e256]: 我将根据专业知识和通用信息构建禁忌症。注意输出JSON。
              - paragraph [ref=e257]: 我会一一生成每个药物的禁忌症。确保没有解释文本，只输出JSON。
              - paragraph [ref=e258]: 开始构建JSON数组。药物列表按照给出的顺序。我需注意每个药物名字准确。包括剂型信息的也作为不同药物。
              - paragraph [ref=e259]: 下面逐个分析：
              - list [ref=e260]:
                - listitem [ref=e261]:
                  - paragraph [ref=e262]: anakinra：白介素-1受体拮抗剂，用于类风湿关节炎、CAPS等。禁忌症：对anakinra或大肠杆菌衍生蛋白过敏；活动性严重感染（如败血症），因为免疫抑制；中性粒细胞减少症（ANC < 1.5 x 10^9/L）时禁止开始治疗；同时使用TNF阻滞剂会增加严重感染风险，相对禁忌；妊娠分级B，动物未见风险，但缺少人类数据，属于相对禁忌；哺乳期慎用；儿童<2岁不推荐（相对）。绝对禁忌：过敏、活动性严重感染。药物类：与TNF抑制剂合用增加感染风险相对。生理状态：妊娠和哺乳相对。疾病：严重肾损害（CrCl<30mL/min）可能需要调整但非禁忌？anakinra由肾脏排泄，严重肾功能不全慎用，相对禁忌。
                - listitem [ref=e263]:
                  - paragraph [ref=e264]: COVID-19 vaccine, Moderna (mRNA疫苗)：禁忌症：对疫苗任何成分（如PEG，聚乙二醇，tromethamine等）有严重过敏史（anaphylaxis）; 对先前相同疫苗或mRNA疫苗有严重过敏反应。相对禁忌：急性发热性疾病（暂缓接种）；血小板减少症或凝血功能障碍（肌肉注射出血风险）；免疫缺陷（可能有效性降低但非禁忌）；妊娠N，但通常认为可接种，非禁忌。生理状态：未批准用于特定年龄以下？适应症是预防COVID-19，未提及年龄限制，但一般适用于成人和儿童。对婴幼儿可能尚未批准？但这里没有年龄，认为是通用。绝对禁忌：对前剂或成分严重过敏。相对禁忌：急性严重发热疾病。
                - listitem [ref=e265]:
                  - paragraph [ref=e266]: baricitinib：JAK抑制剂，用于RA、特应性皮炎、斑秃。禁忌症：绝对：活动性严重感染包括结核；淋巴细胞绝对计数<0.5 x 10^9/L, ANC <1 x 10^9/L, 血红蛋白 <8 g/dL 时不应启动；严重肝功能损害；妊娠（基于动物研究有生殖毒性，妊娠分级N但应避免）；哺乳期（相对）。相对：复发感染史；血栓栓塞风险（JAK抑制剂增加血栓风险，尤其在有风险因素者）；恶性肿瘤史；与生物DMARD或强免疫抑制剂合用（增加免疫抑制）；同时使用OAT3底物（可能抑制OAT3，增加药物浓度，如baricitinib是OAT3抑制剂，但可能增加其他药毒性），药物相互作用的相对禁忌。绝对禁忌：已知过敏；活动性严重感染；严重血液学异常；严重肝损伤；妊娠。
                - listitem [ref=e267]:
                  - paragraph [ref=e268]: molnupiravir：抗病毒药，用于COVID-19。禁忌症：妊娠（绝对禁忌，动物研究显示胚胎-胎儿毒性，妊娠分级N，但基于机制和动物数据，不应用于妊娠期）；哺乳期（治疗期间和治疗后4天内停止哺乳）；对成分过敏；严重肾功能损害（eGFR <30 mL/min/1.73 m2，缺乏数据，不推荐）；儿童（<18岁，可能影响骨骼和软骨发育，相对禁忌，未授权用于儿童）。绝对禁忌：妊娠，过敏。相对禁忌：哺乳期，严重肾功能不全，儿科。
                - listitem [ref=e269]:
                  - paragraph [ref=e270]: casirivimab and imdevimab：两种单克隆抗体组合（抗SARS-CoV-2刺突蛋白）。禁忌症：过敏史；妊娠哺乳期安全性未建立，相对禁忌。无特定疾病禁忌，但用于COVID-19治疗。绝对：对任何成分严重过敏。相对：妊娠，哺乳。
                - listitem [ref=e271]:
                  - paragraph [ref=e272]: sotrovimab：单抗。禁忌症：过敏；妊娠哺乳相对；无特定疾病禁忌。绝对：过敏史（尤其是对sotrovimab或辅料）。相对：妊娠，哺乳。
                - listitem [ref=e273]:
                  - paragraph [ref=e274]: molnupiravir (oral route)：与前面molnupiravir相同，列出同样禁忌症。
                - listitem [ref=e275]:
                  - paragraph [ref=e276]: bebtelovimab：单抗，用于COVID-19。禁忌症：过敏；妊娠哺乳相对；类似sotrovimab。绝对：对bebtelovimab或任何成分过敏（包括聚山梨酯等）。相对：妊娠，哺乳。
                - listitem [ref=e277]:
                  - paragraph [ref=e278]: COVID-19 Vaccine, mRNA：通用mRNA疫苗，可能指Moderna或Pfizer，根据成分。禁忌症类似Moderna疫苗：对PEG或相关成分严重过敏；对前一剂mRNA疫苗严重过敏。相对：急性发热疾病。
                - listitem [ref=e279]:
                  - paragraph [ref=e280]: nirmatrelvir and ritonavir (Paxlovid)：两种药物组合：nirmatrelvir是SARS-CoV-2蛋白酶抑制剂，ritonavir是CYP3A抑制剂，用于增强。禁忌症：
              - list [ref=e281]:
                - listitem [ref=e282]:
                  - paragraph [ref=e283]: 对nirmatrelvir、ritonavir或任何辅料过敏。
                - listitem [ref=e284]:
                  - paragraph [ref=e285]: 强CYP3A诱导剂药物合用，因会显著降低nirmatrelvir和ritonavir浓度，导致病毒学应答丧失和潜在耐药，例如：卡马西平、苯巴比妥、苯妥英、利福平、圣约翰草等。绝对禁忌症。
                - listitem [ref=e286]:
                  - paragraph [ref=e287]: 由于ritonavir是CYP3A强抑制剂，与某些主要经CYP3A代谢且浓度升高会导致严重和/或危及生命的反应的药物合用：如阿夫唑嗪、哌替啶、吡罗昔康、丙氧芬、胺碘酮、决奈达隆、雷诺嗪、氯氮平、喹硫平、鲁拉西酮、匹莫齐特、麦角衍生物、西沙必利、洛伐他汀、辛伐他汀、西地那非（当用于肺动脉高压时）、地西泮、口服咪达唑仑、三唑仑等。这些是绝对禁忌（与高度依赖CYP3A清除的药物合用，且血药浓度升高可致严重事件）。
                - listitem [ref=e288]:
                  - paragraph [ref=e289]: 严重肝功能损害（Child-Pugh C级）禁用，因ritonavir主要经肝脏代谢，nirmatrelvir也经肝脏代谢，肝损加重。
                - listitem [ref=e290]:
                  - paragraph [ref=e291]: 严重肾功能损害（eGFR <30 mL/min）禁忌nirmatrelvir（因无法调整剂量，且赋形剂蓄积风险），中度肾损需减量。绝对禁忌严重肾损。
                - listitem [ref=e292]:
                  - paragraph [ref=e293]: 相对禁忌：中度肝功能损害；与CYP3A底物但可能通过监测调整，还要注意许多药物相互作用。
              - paragraph [ref=e294]: 因此禁忌症：疾病：严重肝损伤（Child-Pugh C）、严重肾功能不全（eGFR<30）。药物类：CYP3A强诱导剂、CYP3A窄治疗指数底物。生理：妊娠分级N，动物研究无致畸但缺乏人类数据，相对禁忌，哺乳期相对。要列出很多具体药物类禁忌。
              - list [ref=e295]:
                - listitem [ref=e296]:
                  - paragraph [ref=e297]: COVID-19 bivalent booster vaccine, Pfizer (5-11y)：禁忌症：对疫苗任何成分（PEG、等）严重过敏；对前一剂辉瑞疫苗严重过敏。相对：急性发热。此年龄组批准，所以儿科不是禁忌，已经是适应症人群。
                - listitem [ref=e298]:
                  - paragraph [ref=e299]: COVID-19 bivalent booster vaccine, Pfizer (12y+)：类似，对成分过敏史绝对禁忌。
                - listitem [ref=e300]:
                  - paragraph [ref=e301]: COVID-19 vaccine, Pfizer (6m-4y)：禁忌症：对成分过敏史绝对禁忌。
                - listitem [ref=e302]:
                  - paragraph [ref=e303]: COVID-19 vaccine, Moderna (6m-5y)：对成分过敏绝对禁忌。
                - listitem [ref=e304]:
                  - paragraph [ref=e305]: COVID-19 vaccine, Moderna (6y-11y)：对成分过敏绝对禁忌。
                - listitem [ref=e306]:
                  - paragraph [ref=e307]: venlafaxine hydrochloride：SNRI。禁忌症：绝对：同时使用单胺氧化酶抑制剂（MAOIs），包括利奈唑胺、亚甲蓝等，因可致5-HT综合征；对文拉法辛过敏。相对：未控制的窄角型青光眼；严重心脏疾病如近期心肌梗死、不稳定心脏病；高血压未控制（可升高血压）；癫痫病史；低钠血症风险；妊娠分级C，晚期妊娠使用可能导致新生儿持续肺动脉高压和撤药综合征，相对；哺乳期；双相情感障碍可诱发躁狂；同时使用其他5-HT能药物（曲普坦、SSRIs等）增加血清素综合征风险，相对。疾病：窄角型青光眼，未控制高血压，癫痫。生理：妊娠，哺乳。药物类：MAOIs（绝对），其他5-HT能药物（相对）。
                - listitem [ref=e308]:
                  - paragraph [ref=e309]: l-methylfolate：叶酸活性形式。禁忌症：对成分过敏；注意叶酸可能掩盖恶性贫血的血液学表现，但不可逆转神经损害，因此未纠正的维生素B12缺乏导致的巨幼细胞性贫血是一个相对禁忌（使用前排除B12缺乏）。绝对禁忌：过敏。相对：未治疗的维生素B12缺乏。
                - listitem [ref=e310]:
                  - paragraph [ref=e311]: bupropion hydrochloride：NDRI。禁忌症：绝对：癫痫发作病史或现患癫痫；进食障碍（神经性厌食症或贪食症）目前或既往史，因会增加癫痫发作风险；突然停用酒精、镇静剂、抗癫痫药等；同时使用MAOIs（必须间隔14天）；对安非他酮过敏；严重肝损伤；脑肿瘤。相对：双相障碍可诱发躁狂；近期心肌梗死或不稳定心脏病；窄角型青光眼；妊娠分级C；哺乳期；同时使用其他降低癫痫阈值的药物（如抗精神病药、皮质类固醇、茶碱等）。疾病：癫痫、进食障碍、严重肝硬化。药物：MAOIs绝对。生理：妊娠、哺乳相对。
                - listitem [ref=e312]:
                  - paragraph [ref=e313]: bupropion (oral route)：同bupropion hydrochloride，相同。
                - listitem [ref=e314]:
                  - paragraph [ref=e315]: bupropion hydrobromide extended-release tablets：同样，禁忌类似。
                - listitem [ref=e316]:
                  - paragraph [ref=e317]: trazodone：SARI。禁忌症：绝对：同时使用MAOIs；对曲唑酮过敏；从急性心肌梗死恢复期（相对？通常慎用）。相对：心律失常史、QT延长；肝肾功能损害；妊娠C；哺乳；双相抑郁可能诱发躁狂；老年人低血压和镇静。注意曲唑酮有α1阻断作用，可引起体位性低血压，严重低血压相对禁忌。药物类：MAOIs绝对。
                - listitem [ref=e318]:
                  - paragraph [ref=e319]: levomilnacipran：SNRI。禁忌症：与MAOIs合用绝对禁忌；对左旋米那普仑过敏；未控制的窄角型青光眼。相对：心血管疾病如未控制高血压、心动过速、近期心肌梗死；癫痫；低钠血症；出血风险（与抗凝药合用）；肝功能损害；重度肾损（需减量），终末期肾病（ESRD）不推荐；妊娠C；哺乳；同时使用5-HT能药物。药物类：MAOIs绝对。
                - listitem [ref=e320]:
                  - paragraph [ref=e321]: tranylcypromine：MAOI。禁忌症：绝对：同时使用其他MAOIs或利奈唑胺、哌替啶、曲马多、SSRIs、SNRIs、TCAs、NDRIs、曲坦类药物、拟交感神经胺（包括减充血剂、兴奋剂）、右美沙芬、多巴胺等，因为可导致高血压危象或5-HT综合征；同时需要富含酪胺的饮食限制，但这不是禁忌症，而是预防措施。禁忌：严重心脏病、脑血管疾病、嗜铬细胞瘤（高血压危象风险）；肝功能损害；对反苯环丙胺过敏；计划进行择期手术需要麻醉（相对禁忌），因为与麻醉药相互作用。绝对禁忌：同时使用上述药物；嗜铬细胞瘤；心血管疾病如冠脉疾病、心力衰竭。相对：妊娠N，但常避免使用；哺乳；癫痫。药物类广泛。
                - listitem [ref=e322]:
                  - paragraph [ref=e323]: amoxapine：三环类抗抑郁药，也代谢为洛沙平，有抗精神病特性。禁忌症：绝对：同时使用MAOIs；急性心肌梗死恢复期（相对，但通常禁用TCAs）；对阿莫沙平过敏；严重肝损伤；癫痫发作史（因降低癫痫阈值）；心律失常（尤其是QT延长、束支阻滞）。相对：窄角型青光眼；前列腺增生尿潴留；甲状腺功能亢进；妊娠C；哺乳；同时使用CYP2D6抑制剂；有自杀风险。药物类：MAOIs绝对。
                - listitem [ref=e324]:
                  - paragraph [ref=e325]: nortriptyline (oral route)：TCA。禁忌症：绝对：同时使用MAOIs；急性心肌梗死恢复期；对去甲替林过敏；严重肝损伤。相对：窄角型青光眼；尿潴留；心律失常（如传导阻滞）；癫痫；甲状腺功能亢进；妊娠N（但权衡）；哺乳；老年人；同时使用多种药物。疾病：心肌梗死恢复期、心律失常。药物：MAOIs绝对。
                - listitem [ref=e326]:
                  - paragraph [ref=e327]: selegiline (transdermal)：MAOI透皮贴剂，用于抑郁症。禁忌症：绝对：同时使用其他MAOIs，哌替啶、曲马多、SSRIs、SNRIs、TCAs、安非他酮、米氮平、曲坦类、拟交感神经药、减充血剂（含伪麻黄碱等）、右美沙芬、圣约翰草等，易致5-HT综合征或高血压危象。贴片6mg/24h以上需要饮食酪胺限制；低剂量透皮可能不需饮食限制，但高剂量需要。肝损害；嗜铬细胞瘤；对司来吉兰过敏。相对：心血管疾病；精神分裂症等精神病史；妊娠C；哺乳；帕金森病合用左旋多巴可能增加不良反应。药物类更多。
                - listitem [ref=e328]:
                  - paragraph [ref=e329]: ketamine：麻醉药。禁忌症：绝对：对氯胺酮过敏；任何情况是血压或颅内压显著升高会构成危险的患者（如严重高血压、颅内压升高、眼内压升高、脑动脉瘤、头部外伤）；严重心血管疾病如失代偿性心力衰竭、近期心肌梗死；妊娠（诱发宫缩？相对，但用于麻醉可能，分级N）；精神病如精神分裂症（可加重）。相对：眼内压增高（青光眼）；卟啉病；甲状腺功能亢进未被控制；酒精中毒；哺乳。
                - listitem [ref=e330]:
                  - paragraph [ref=e331]: desipramine (oral route)：TCA。禁忌症：同去甲替林类似，MAOIs绝对禁忌；急性心梗恢复期；过敏。相对：窄角青光眼、尿潴留、心律失常、癫痫、甲状腺功能亢进、妊娠N、哺乳等。
                - listitem [ref=e332]:
                  - paragraph [ref=e333]: isocarboxazid：MAOI。禁忌症：与反苯环丙胺类似，绝对禁忌：同时使用SSRIs、SNRIs、TCAs、其他MAOIs、哌替啶、曲马多、拟交感药、右美沙芬、多巴胺、酪胺含量高的食物（需避免），但因服用药物后必须遵循饮食限制；严重心脏病、脑血管疾病、嗜铬细胞瘤、肝病。过敏。相对：妊娠C；哺乳；精神分裂症等。
                - listitem [ref=e334]:
                  - paragraph [ref=e335]: protriptyline (oral route)：TCA。禁忌症：MAOIs绝对禁忌；急性心梗恢复期；过敏；严重肝病。相对：窄角青光眼、尿潴留、心律失常、癫痫、甲亢、妊娠N、哺乳。
                - listitem [ref=e336]:
                  - paragraph [ref=e337]: esketamine (nasal)：用于耐药抑郁和急性自杀意念。禁忌症：绝对：对艾司氯胺酮、氯胺酮或任何辅料过敏；动脉瘤性血管疾病（包括胸腹主动脉、颅内动脉）或动静脉畸形；脑内出血病史；未受控制的高血压；同时使用MAOIs？艾司氯胺酮与MAOIs无已知严重相互作用，但可能引起血压升高；注意可能镇静、解离。禁忌症包括：狭窄未控制高血压，动脉瘤等。相对：精神病史；妊娠（分级N，但动物有发育毒性）；哺乳；物质使用障碍风险；肝功能损害。
                - listitem [ref=e338]:
                  - paragraph [ref=e339]: Methylfolate：与l-methylfolate相同。禁忌症：过敏，未治疗维生素B12缺乏相对。
                - listitem [ref=e340]:
                  - paragraph [ref=e341]: protriptyline：与protriptyline oral route一样。禁忌症相同。
                - listitem [ref=e342]:
                  - paragraph [ref=e343]: trimipramine (oral route)：TCA。禁忌症：MAOIs绝对；急性心梗恢复期；过敏；严重肝病。相对：窄角青光眼、尿潴留、心律失常、癫痫、甲亢、妊娠C、哺乳。
                - listitem [ref=e344]:
                  - paragraph [ref=e345]: thyroid (desiccated)：甲状腺片。禁忌症：绝对：未纠正的肾上腺皮质功能不全（甲状腺激素增加代谢，可诱发肾上腺危象）；急性心肌梗死、未控制的高血压、心绞痛等（甲状腺激素增加心肌耗氧）；甲状腺毒症。相对：心血管疾病如心律不齐；糖尿病（增加胰岛素需求）；骨质疏松；妊娠A（可安全使用，但需调整剂量），不是禁忌。药物：与口服抗凝药等相互作用但非禁忌。
                - listitem [ref=e346]:
                  - paragraph [ref=e347]: insulin glargine：胰岛素。禁忌症：绝对：低血糖；对胰岛素glargine或任何辅料过敏。相对：肝肾功能不全（需调整剂量）；妊娠C；哺乳期；同时使用噻唑烷二酮类（TZDs）可增加心衰风险，相对。
                - listitem [ref=e348]:
                  - paragraph [ref=e349]: insulin aspart and insulin aspart protamine：胰岛素。禁忌症：低血糖；过敏。相对：肝肾功能不全，妊娠B，相对安全；TZDs等。
                - listitem [ref=e350]:
                  - paragraph [ref=e351]: Insulin Lispro (U-200) Pens：低血糖；过敏。相对：肝肾功能不全，妊娠B。
                - listitem [ref=e352]:
                  - paragraph [ref=e353]: insulin degludec：低血糖；过敏。相对：肝肾功能不全，妊娠C。
                - listitem [ref=e354]:
                  - paragraph [ref=e355]: insulin isophane (NPH)：低血糖；过敏。相对：肝肾功能不全，妊娠B；TZDs。
                - listitem [ref=e356]:
                  - paragraph [ref=e357]: insulin regular：低血糖；过敏。相对：肝肾功能不全，妊娠B；静脉使用注意低钾血症等。
                - listitem [ref=e358]:
                  - paragraph [ref=e359]: insulin human：同regular和NPH组合，低血糖；过敏。妊娠C。
                - listitem [ref=e360]:
                  - paragraph [ref=e361]: insulin isophane and insulin regular (70/30等)：低血糖；过敏。相对：妊娠B。
                - listitem [ref=e362]:
                  - paragraph [ref=e363]: insulin lispro and insulin lispro protamine：低血糖；过敏。相对：妊娠B。
                - listitem [ref=e364]:
                  - paragraph [ref=e365]: insulin glargine-aglr, recombinant (皮下)：同insulin glargine。
                - listitem [ref=e366]:
                  - paragraph [ref=e367]: Insulin Glargine (U-300) Pens：低血糖；过敏。
                - listitem [ref=e368]:
                  - paragraph [ref=e369]: insulin regular, concentrated (U-500)：低血糖；过敏；注意严重胰岛素抵抗患者使用，但禁忌仍是低血糖。相对：肝肾功能不全。
                - listitem [ref=e370]:
                  - paragraph [ref=e371]: octreotide (oral/injection)：生长抑素类似物。禁忌症：对奥曲肽或任何成分过敏。相对：胆结石或胆汁淤积（可导致胆石症）；糖尿病（影响血糖控制）；甲状腺功能减退（抑制TSH）；心血管疾病如心动过缓、心律失常；妊娠B；哺乳。疾病：严重肝功能衰竭？没有绝对禁忌，有胆石症相对。
                - listitem [ref=e372]:
                  - paragraph [ref=e373]: insulin (inhalation)：吸入胰岛素。禁忌症：低血糖；过敏；慢性肺病如哮喘、COPD（因可能导致支气管痉挛或肺功能恶化）；急性支气管痉挛；吸烟者（增加胰岛素吸收，低血糖风险）。相对：吸烟、肺功能下降。疾病：哮喘、COPD绝对? 吸入胰岛素在肺病患者中禁忌。所以绝对禁忌：慢性肺病（哮喘、COPD等）；对胰岛素或辅料过敏；低血糖。
