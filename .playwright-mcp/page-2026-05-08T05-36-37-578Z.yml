              - generic [ref=e254]:
                - paragraph [ref=e255]: 我们需要评估每行疾病和药物列表。按评分标准给出APPROPRIATE, PARTIALLY, INAPPROPRIATE。提供简要理由。用表格输出。
                - paragraph [ref=e256]: 先解读疾病和药物：
                - list [ref=e257]:
                  - listitem [ref=e258]:
                    - paragraph [ref=e259]: "疾病: 1型糖尿病 | Canagliflozin; Colesevelam; insulin; teplizumab-mzwv; Empagliflozin"
                - list [ref=e260]:
                  - listitem [ref=e261]:
                    - paragraph [ref=e262]: 1型糖尿病：需胰岛素治疗。药物：Canagliflozin（SGLT2抑制剂，有时用于1型糖尿病辅助治疗，但非一线，可能引起酮症酸中毒风险，需谨慎，但FDA未批准用于1型糖尿病？实际上canagliflozin未被批准用于1型糖尿病，empagliflozin同样。但有时可能超说明书用于胰岛素联合，但非标准。Teplizumab-mzwv是抗CD3单抗，用于延缓1型糖尿病发病（用于高危人群），不是治疗已确诊的1型糖尿病？适应症是延缓3期1型糖尿病发病，用于8岁以上2期1型糖尿病。如果是已确诊的1型糖尿病，teplizumab不是治疗用药。Colesevelam是胆汁酸螯合剂，降胆固醇，也可降血糖但批准用于2型糖尿病，不用于1型糖尿病。Insulin是必需。所以这里5个药：insulin适合；canagliflozin和empagliflozin有可能作为辅助但未批准且风险，不适合一般推荐；colesevelam不适合；teplizumab不是治疗已确诊1型糖尿病的。所以整体部分适合（有胰岛素），其他不适合。评分为PARTIALLY。
                - list [ref=e267]:
                  - listitem [ref=e268]:
                    - paragraph [ref=e269]: "疾病: 2型糖尿病 | Canagliflozin; Colesevelam; tirzepatide; lixisenatide; ertugliflozin"
                - list [ref=e270]:
                  - listitem [ref=e271]:
                    - paragraph [ref=e272]: 2型糖尿病：Canagliflozin（SGLT2i，批准），Colesevelam（批准用于2型糖尿病改善血糖，但非首选），tirzepatide（GIP/GLP-1双激动剂，批准），lixisenatide（GLP-1激动剂，批准），ertugliflozin（SGLT2i，批准）。全部五个都可用于2型糖尿病，都是批准的治疗药物。不过colesevelam虽然是老药但可用。所以全部适合。评APPROPRIATE。
                - list [ref=e273]:
                  - listitem [ref=e274]:
                    - paragraph [ref=e275]: "疾病: HIV | Amoxicillin-Clavulanate; Delavirdine; Cefotaxime; Cefoxitin; Ceftaroline"
                - list [ref=e276]:
                  - listitem [ref=e277]:
                    - paragraph [ref=e278]: HIV：抗逆转录病毒治疗。列表中仅Delavirdine是NNRTI抗HIV药（已少用但算）。其他四个都是抗生素：Amoxicillin-Clavulanate、Cefotaxime、Cefoxitin、Ceftaroline，不治疗HIV。所以一个HIV药物，其他不适合。评PARTIALLY。
                - list [ref=e279]:
                  - listitem [ref=e280]:
                    - paragraph [ref=e281]: "疾病: 上呼吸道感染 | ampicillin; erythromycin; erythromycin; erythromycin; Probenecid"
                - list [ref=e282]:
                  - listitem [ref=e283]:
                    - paragraph [ref=e284]: 上呼吸道感染（多为病毒性），通常不推荐抗生素。所列：ampicillin（青霉素类，抗生素），erythromycin（大环内酯类，抗生素），重复了erythromycin三次，Probenecid（促尿酸排泄，也用于延长青霉素半衰期，但不用于上感）。这些都不是上呼吸道感染的标准治疗，尤其抗生素不适用病毒性上感。完全不适合。评INAPPROPRIATE。
                - list [ref=e285]:
                  - listitem [ref=e286]:
                    - paragraph [ref=e287]: "疾病: 上消化道出血 | Cimetidine; Dexlansoprazole; Esomeprazole; Erythromycin; Famotidine"
                - list [ref=e288]:
                  - listitem [ref=e289]:
                    - paragraph [ref=e290]: 上消化道出血：通常需要PPI（如esomeprazole、dexlansoprazole），H2阻断剂（cimetidine, famotidine）也可，但PPI首选。Erythromycin是促动力药，可用于上消化道出血辅助内镜检查前清除胃内血液（红霉素输注可用于改善视野），但不算主要治疗。所以：Cimetidine (H2RA), Dexlansoprazole (PPI), Esomeprazole (PPI), Erythromycin (促动力药，有时用于上消化道出血内镜前准备), Famotidine (H2RA)。这些药物都可用于上消化道出血的管理，但PPI是主要治疗，H2RA也可用于非静脉曲张出血，红霉素有证据。基本都合适。评APPROPRIATE? 需要注意：红霉素用于上消化道出血是辅助而不是止血药，但属于管理部分，所以可视为适当。全部5个药物在指南中都有提及。评APPROPRIATE。
                - list [ref=e291]:
                  - listitem [ref=e292]:
                    - paragraph [ref=e293]: "疾病: 不孕 | Clomiphene; Canagliflozin; Letrozole; HCG; Progesterone"
                - list [ref=e294]:
                  - listitem [ref=e295]:
                    - paragraph [ref=e296]: 不孕治疗：Clomiphene（促排卵），Letrozole（芳香化酶抑制剂，促排卵），HCG（触发排卵或支持黄体），Progesterone（黄体支持），均用于不孕症治疗。Canagliflozin是糖尿病药，不用于不孕。所以除了Canagliflozin，其他四个适合。评PARTIALLY。
                - list [ref=e297]:
                  - listitem [ref=e298]:
                    - paragraph [ref=e299]: "疾病: 中毒 | Succimer; Amoxicillin-Clavulanate; Cefotaxime; Cefoxitin; Ceftaroline"
                - list [ref=e300]:
                  - listitem [ref=e301]:
                    - paragraph [ref=e302]: 中毒：Succimer (二巯基丁二酸，用于重金属中毒如铅中毒，是解毒剂)。其他四种是抗菌药，不能治疗中毒。所以部分适合（一种解毒剂）。评PARTIALLY。
                - list [ref=e303]:
                  - listitem [ref=e304]:
                    - paragraph [ref=e305]: "疾病: 中耳炎 | Amoxicillin-Clavulanate; Ibuprofen; Amoxicillin; Azithromycin; Cefaclor"
                - list [ref=e306]:
                  - listitem [ref=e307]:
                    - paragraph [ref=e308]: 中耳炎（急性中耳炎）：抗生素如Amoxicillin是一线，Amoxicillin-Clavulanate可用于耐药或治疗失败，Azithromycin（大环内酯类，用于青霉素过敏），Cefaclor（二代头孢，可用）。Ibuprofen是止痛药，用于疼痛，是对症治疗。所以全部5种药物均可用于中耳炎的管理：抗生素+镇痛。评APPROPRIATE。
                - list [ref=e309]:
                  - listitem [ref=e310]:
                    - paragraph [ref=e311]: "疾病: 中风 | Aspirin; Amlodipine; Ticagrelor; Clopidogrel; Ticlopidine"
                - list [ref=e312]:
                  - listitem [ref=e313]:
                    - paragraph [ref=e314]: 中风（缺血性卒中）：抗血小板药如Aspirin、Clopidogrel、Ticagrelor、Ticlopidine（噻氯匹定，老药，很少用但仍是抗血小板）。Amlodipine是降压药，用于血压管理，预防卒中复发。这些都适合中风治疗或二级预防。但需注意缺血性卒中急性期和二级预防用药。Amlodipine作为降压药完全适合。全部5个都适合。评APPROPRIATE。
                - list [ref=e315]:
                  - listitem [ref=e316]:
                    - paragraph [ref=e317]: "疾病: 乳腺癌 | Pamidronate; Goserelin; Everolimus; Leuprolide; Raloxifene"
                - list [ref=e318]:
                  - listitem [ref=e319]:
                    - paragraph [ref=e320]: 乳腺癌治疗：Goserelin（GnRH激动剂，用于激素受体阳性乳腺癌卵巢抑制），Leuprolide（同类），Everolimus（mTOR抑制剂，用于HR+HER2-晚期乳腺癌），Raloxifene（SERM，用于预防乳腺癌和骨质疏松，但也可用于治疗？雷洛昔芬可用于降低乳腺癌风险，但在已确诊乳腺癌治疗中不是标准，更多是预防。Pamidronate是双膦酸盐，用于骨转移，减少骨相关事件，是支持治疗，不直接治疗乳腺癌本身。所以：Pamidronate可用于乳腺癌骨转移的辅助，算支持治疗。全部药物多少与乳腺癌有关？Goserelin和Leuprolide是内分泌治疗，Everolimus是靶向治疗，Pamidronate用于骨转移，Raloxifene虽然预防乳腺癌，但用于已确诊乳腺癌患者不常见。可能评级：基本适合，但Raloxifene不太合适用于已诊断乳腺癌的治疗。部分适合？更细一点：Pamidronate不是抗癌治疗，是骨转移并发症治疗，可视为治疗一部分。Raloxifene不是乳腺癌标准治疗药物，常用于预防。因此可能评PARTIALLY。但宽松点也可以算APPROPRIATE? 需要看标准。Goserelin, Leuprolide, Everolimus是标准治疗药物，Pamidronate有适应症（乳腺癌骨转移），Raloxifene适应症为降低乳腺癌风险，非治疗确诊乳腺癌。所以包含不合适药物，评为PARTIALLY较合理。
                - list [ref=e321]:
                  - listitem [ref=e322]:
                    - paragraph [ref=e323]: "疾病: 代谢综合征 | Canagliflozin; Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Benazepril"
                - list [ref=e324]:
                  - listitem [ref=e325]:
                    - paragraph [ref=e326]: 代谢综合征：包括高血压、高血糖、血脂异常等。药物：Canagliflozin（降糖，可能有益心血管），Amlodipine（降压），Amlodipine-Benazepril（复方降压），Amlodipine-Valsartan（复方降压），Benazepril（ACEI降压）。这些主要是降压药和降糖药。代谢综合征治疗需生活方式干预，有指征时用药。降压、降糖药物是合适。这些药物都可使用，没有明显不适当。评APPROPRIATE。
                - list [ref=e327]:
                  - listitem [ref=e328]:
                    - paragraph [ref=e329]: "疾病: 低血压 | Norepinephrine; Amlodipine; Fludrocortisone; Amlodipine-Benazepril; Amlodipine-Valsartan"
                - list [ref=e330]:
                  - listitem [ref=e331]:
                    - paragraph [ref=e332]: 低血压治疗：Norepinephrine是升压药（ICU用），Fludrocortisone用于体位性低血压（盐皮质激素）。但是Amlodipine（钙通道阻滞剂）是降压药，Amlodipine-Benazepril和Amlodipine-Valsartan都是降压药，会降低血压，完全不适合治疗低血压。所以只有Norepinephrine和Fludrocortisone适合，三个降压药不当。评PARTIALLY。
                - list [ref=e333]:
                  - listitem [ref=e334]:
                    - paragraph [ref=e335]: "疾病: 便秘 | Magnesium Hydroxide; Magnesium Oxide; Methylnaltrexone; Docusate; Methylcellulose"
                - list [ref=e336]:
                  - listitem [ref=e337]:
                    - paragraph [ref=e338]: 便秘：Magnesium Hydroxide（镁乳，渗透性泻药），Magnesium Oxide（氧化镁，渗透性泻药），Methylnaltrexone（阿片受体拮抗剂，用于阿片类药物引起的便秘），Docusate（多库酯，软化大便），Methylcellulose（纤维素，容积性泻药）。全部都是泻药/通便药，都可用于便秘（methylnaltrexone特定阿片性便秘，但属于便秘治疗）。评APPROPRIATE。
                - list [ref=e339]:
                  - listitem [ref=e340]:
                    - paragraph [ref=e341]: "疾病: 偏头痛 | Amitriptyline; Diclofenac; Ibuprofen; Lisinopril; Metoclopramide"
                - list [ref=e342]:
                  - listitem [ref=e343]:
                    - paragraph [ref=e344]: 偏头痛：Amitriptyline（预防性用药），Diclofenac（NSAID，急性治疗），Ibuprofen（NSAID，急性治疗），Metoclopramide（止吐，可辅助治疗偏头痛恶心，也有轻微止痛作用）。Lisinopril是ACEI降压药，没有已知用于偏头痛的适应症或证据，虽然有些降压药用于偏头痛预防（如β受体阻滞剂、坎地沙坦），但赖诺普利不推荐。所以Lisinopril不合适。其他4个适合。评PARTIALLY。
                - list [ref=e345]:
                  - listitem [ref=e346]:
                    - paragraph [ref=e347]: "疾病: 充血/鼻塞 | Cetirizine; Mometasone; Olopatadine; fluticasone; Loratadine"
                - list [ref=e348]:
                  - listitem [ref=e349]:
                    - paragraph [ref=e350]: 鼻塞/充血：Cetirizine（抗组胺，用于过敏性鼻炎可减轻鼻塞），Mometasone（鼻用皮质类固醇，减轻炎症），Olopatadine（抗组胺/肥大细胞稳定剂，鼻喷剂可，用于过敏性鼻炎），fluticasone（鼻用皮质类固醇），Loratadine（抗组胺）。全部可用于过敏性鼻炎导致的鼻塞，症状缓解。都适合。评APPROPRIATE。注意olopatadine鼻喷剂有适应症，fluticasone拼写小写没问题。评级APPROPRIATE。
                - paragraph [ref=e351]: 总结表格，列疾病、评分、简要理由。
                - paragraph [ref=e352]: 格式：表格。
            - generic [ref=e353]:
              - paragraph [ref=e354]: 以下是对每种疾病的用药推荐评估结果，以表格形式给出：
              - table [ref=e356]:
                - rowgroup [ref=e357]:
                  - row "疾病 评分 简要理由" [ref=e358]:
                    - columnheader "疾病" [ref=e359]
                    - columnheader "评分" [ref=e360]
                    - columnheader "简要理由" [ref=e361]
                - rowgroup [ref=e362]:
                  - row "1型糖尿病 PARTIALLY Insulin是必需治疗。Canagliflozin和Empagliflozin未批准用于1型糖尿病且增加酮症酸中毒风险；Colesevelam不用于1型糖尿病；teplizumab-mzwv用于延缓发病，非治疗已确诊的1型糖尿病。" [ref=e363]:
                    - cell "1型糖尿病" [ref=e364]
