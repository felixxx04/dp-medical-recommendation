                  - row "充血/鼻塞 APPROPRIATE Cetirizine、Loratadine（口服抗组胺药）、Mometasone、Fluticasone（鼻用糖皮质激素）和Olopatadine（抗组胺/稳定肥大细胞鼻喷剂）均为过敏性鼻炎所致鼻塞的有效治疗药物。" [ref=e419]:
