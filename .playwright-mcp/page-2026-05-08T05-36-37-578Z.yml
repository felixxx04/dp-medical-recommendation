                    - cell "Insulin是必需治疗。Canagliflozin和Empagliflozin未批准用于1型糖尿病且增加酮症酸中毒风险；Colesevelam不用于1型糖尿病；teplizumab-mzwv用于延缓发病，非治疗已确诊的1型糖尿病。" [ref=e366]
                  - row "2型糖尿病 APPROPRIATE 所有5种药物（Canagliflozin、Colesevelam、tirzepatide、lixisenatide、ertugliflozin）均已获批用于2型糖尿病，各自通过不同机制控制血糖。" [ref=e367]:
                    - cell "2型糖尿病" [ref=e368]
                    - cell "APPROPRIATE" [ref=e369]
                    - cell "所有5种药物（Canagliflozin、Colesevelam、tirzepatide、lixisenatide、ertugliflozin）均已获批用于2型糖尿病，各自通过不同机制控制血糖。" [ref=e370]
                  - row "HIV PARTIALLY Delavirdine是抗HIV非核苷逆转录酶抑制剂，可用于治疗HIV。其余4种为抗生素（阿莫西林克拉维酸、头孢噻肟、头孢西丁、头孢洛林），无抗HIV活性。" [ref=e371]:
                    - cell "HIV" [ref=e372]
                    - cell "PARTIALLY" [ref=e373]
                    - cell "Delavirdine是抗HIV非核苷逆转录酶抑制剂，可用于治疗HIV。其余4种为抗生素（阿莫西林克拉维酸、头孢噻肟、头孢西丁、头孢洛林），无抗HIV活性。" [ref=e374]
                  - row "上呼吸道感染 INAPPROPRIATE 上呼吸道感染多为病毒性，不应常规使用抗生素。所列ampicillin、erythromycin均为抗菌药，probenecid为促尿酸排泄药，均非治疗上感的适宜药物。" [ref=e375]:
                    - cell "上呼吸道感染" [ref=e376]
                    - cell "INAPPROPRIATE" [ref=e377]
                    - cell "上呼吸道感染多为病毒性，不应常规使用抗生素。所列ampicillin、erythromycin均为抗菌药，probenecid为促尿酸排泄药，均非治疗上感的适宜药物。" [ref=e378]
                  - row "上消化道出血 APPROPRIATE Dexlansoprazole和Esomeprazole（PPI）是首选抑酸止血药物；Cimetidine和Famotidine（H2RA）也可使用；Erythromycin可作内镜前准备以改善视野，均为指南认可的辅助用药。" [ref=e379]:
                    - cell "上消化道出血" [ref=e380]
                    - cell "APPROPRIATE" [ref=e381]
                    - cell "Dexlansoprazole和Esomeprazole（PPI）是首选抑酸止血药物；Cimetidine和Famotidine（H2RA）也可使用；Erythromycin可作内镜前准备以改善视野，均为指南认可的辅助用药。" [ref=e382]
                  - row "不孕 PARTIALLY Clomiphene、Letrozole为促排卵药，HCG用于触发排卵或黄体支持，Progesterone用于黄体支持，均属不孕治疗药物。Canagliflozin为降糖药，与不孕无关。" [ref=e383]:
                    - cell "不孕" [ref=e384]
                    - cell "PARTIALLY" [ref=e385]
                    - cell "Clomiphene、Letrozole为促排卵药，HCG用于触发排卵或黄体支持，Progesterone用于黄体支持，均属不孕治疗药物。Canagliflozin为降糖药，与不孕无关。" [ref=e386]
                  - row "中毒 PARTIALLY Succimer是重金属中毒的解救药。其余4种为抗菌药（阿莫西林克拉维酸、头孢噻肟、头孢西丁、头孢洛林），无解毒作用。" [ref=e387]:
                    - cell "中毒" [ref=e388]
                    - cell "PARTIALLY" [ref=e389]
                    - cell "Succimer是重金属中毒的解救药。其余4种为抗菌药（阿莫西林克拉维酸、头孢噻肟、头孢西丁、头孢洛林），无解毒作用。" [ref=e390]
                  - row "中耳炎 APPROPRIATE Amoxicillin为一线抗生素，Amoxicillin-Clavulanate、Cefaclor、Azithromycin为替代或二线选择；Ibuprofen用于缓解疼痛，均为急性中耳炎管理中的合理药物。" [ref=e391]:
                    - cell "中耳炎" [ref=e392]
                    - cell "APPROPRIATE" [ref=e393]
                    - cell "Amoxicillin为一线抗生素，Amoxicillin-Clavulanate、Cefaclor、Azithromycin为替代或二线选择；Ibuprofen用于缓解疼痛，均为急性中耳炎管理中的合理药物。" [ref=e394]
                  - row "中风 APPROPRIATE Aspirin、Clopidogrel、Ticagrelor、Ticlopidine均为抗血小板药物，用于缺血性卒中急性期或二级预防；Amlodipine用于控制血压，是卒中防治的重要组成部分。" [ref=e395]:
                    - cell "中风" [ref=e396]
                    - cell "APPROPRIATE" [ref=e397]
                    - cell "Aspirin、Clopidogrel、Ticagrelor、Ticlopidine均为抗血小板药物，用于缺血性卒中急性期或二级预防；Amlodipine用于控制血压，是卒中防治的重要组成部分。" [ref=e398]
                  - row "乳腺癌 PARTIALLY Goserelin和Leuprolide用于激素受体阳性乳腺癌的内分泌治疗；Everolimus用于HR+/HER2-晚期乳腺癌；Pamidronate适用于骨转移以减少骨相关事件。Raloxifene主要用于降低乳腺癌风险，而非治疗已确诊的乳腺癌。" [ref=e399]:
                    - cell "乳腺癌" [ref=e400]
                    - cell "PARTIALLY" [ref=e401]
                    - cell "Goserelin和Leuprolide用于激素受体阳性乳腺癌的内分泌治疗；Everolimus用于HR+/HER2-晚期乳腺癌；Pamidronate适用于骨转移以减少骨相关事件。Raloxifene主要用于降低乳腺癌风险，而非治疗已确诊的乳腺癌。" [ref=e402]
                  - row "代谢综合征 APPROPRIATE Canagliflozin可降糖并带来心血管获益；Amlodipine、Amlodipine-Benazepril、Amlodipine-Valsartan、Benazepril均为降压药，可用于控制代谢综合征中的高血压。所列药物均针对相关组分。" [ref=e403]:
                    - cell "代谢综合征" [ref=e404]
                    - cell "APPROPRIATE" [ref=e405]
                    - cell "Canagliflozin可降糖并带来心血管获益；Amlodipine、Amlodipine-Benazepril、Amlodipine-Valsartan、Benazepril均为降压药，可用于控制代谢综合征中的高血压。所列药物均针对相关组分。" [ref=e406]
                  - row "低血压 PARTIALLY Norepinephrine为升压药，Fludrocortisone用于体位性低血压，两者适合。Amlodipine及其复方制剂（Amlodipine-Benazepril、Amlodipine-Valsartan）均为降压药，会加重低血压，完全不适合。" [ref=e407]:
                    - cell "低血压" [ref=e408]
                    - cell "PARTIALLY" [ref=e409]
                    - cell "Norepinephrine为升压药，Fludrocortisone用于体位性低血压，两者适合。Amlodipine及其复方制剂（Amlodipine-Benazepril、Amlodipine-Valsartan）均为降压药，会加重低血压，完全不适合。" [ref=e410]
                  - row "便秘 APPROPRIATE Magnesium Hydroxide、Magnesium Oxide（渗透性泻药），Docusate（粪便软化剂），Methylcellulose（容积性泻药），Methylnaltrexone（阿片性便秘治疗药）均能有效缓解便秘，分别适用于不同类型。" [ref=e411]:
                    - cell "便秘" [ref=e412]
                    - cell "APPROPRIATE" [ref=e413]
                    - cell "Magnesium Hydroxide、Magnesium Oxide（渗透性泻药），Docusate（粪便软化剂），Methylcellulose（容积性泻药），Methylnaltrexone（阿片性便秘治疗药）均能有效缓解便秘，分别适用于不同类型。" [ref=e414]
                  - row "偏头痛 PARTIALLY Amitriptyline用于偏头痛预防，Diclofenac和Ibuprofen用于急性止痛，Metoclopramide用于止吐和辅助镇痛。Lisinopril为ACEI降压药，无偏头痛治疗证据，不适用。" [ref=e415]:
