            - generic [ref=e409]:
              - paragraph [ref=e410]: 我们需要为每个药物列出重要的药物交互（major和moderate），优先考虑常见药物类别。注意一些药物是组合药物，需要每个成分分别列出交互。输入药物列表很长，需要逐个处理。
              - paragraph [ref=e411]: 首先，理解药物类别和常见交互：
              - list [ref=e412]:
                - listitem [ref=e413]:
                  - paragraph [ref=e414]: 局部用药（anthralin, coal tar, salicylic acid局部）交互有限，通常系统性吸收很少，但可能与其他局部药物相互作用。但要求"临床意义"，局部用药往往交互很少，可能只有moderate。需要根据专业知识判断。
                - listitem [ref=e415]:
                  - paragraph [ref=e416]: 生物制剂（brodalumab, adalimumab, infliximab, certolizumab, etanercept, sarilumab, rituximab, alemtuzumab, abatacept）：免疫抑制剂，增加感染风险，与活疫苗、其他免疫抑制剂交互，可能影响CYP酶（但TNF抑制剂对CYP影响不如IL-6等）。brodalumab是IL-17受体抑制剂。常见交互：活疫苗（major），其他免疫抑制剂（moderate），可能影响CYP底物（如warfarin）？实际上，炎症因子下调时，CYP酶活性恢复，可能导致药物代谢改变，如TNF抑制剂与华法林、环孢素等。但这是中度。
                - listitem [ref=e417]:
                  - paragraph [ref=e418]: upadacitinib, tofacitinib：JAK抑制剂，免疫抑制，CYP3A4底物/抑制剂？tofacitinib是CYP3A4底物，与强CYP3A4 inhibitors/inducers有交互。upadacitinib也是CYP3A4底物。交互：强CYP3A4 inhibitors（如酮康唑）增加浓度，强CYP3A4 inducers降低浓度。免疫抑制剂，与活疫苗（major），与其他免疫抑制剂（moderate）。
                - listitem [ref=e422]:
                  - paragraph [ref=e423]: auranofin：金制剂，口服，有骨髓抑制等，与已知骨髓抑制药？与抗疟药、青霉胺等可能增加毒性？但major/moderate交互需要查。金制剂与青霉胺、抗疟药合用可能增加肾毒性或血液毒性。但常见交互：与ACE抑制剂可能增加肾毒性？不确定。保守，可能与immunosuppressants有叠加免疫抑制。但auranofin不太常用。列出：与其他骨髓抑制药物（如甲氨蝶呤、来氟米特）可能增加骨髓毒性，moderate。
                - listitem [ref=e424]:
                  - paragraph [ref=e425]: penicillamine：与抗酸药、铁剂、金制剂等螯合降低吸收；与免疫抑制剂增加毒性。与抗疟药（羟氯喹）可能增加皮肤反应。主要交互：与抗酸药、含铝/镁制剂，降低吸收，moderate。与金制剂、羟氯喹、免疫抑制剂合用增加不良反应。
                - listitem [ref=e426]:
                  - paragraph [ref=e427]: 抗精神病药物：很多有CYP2D6代谢，QT间期延长，低血压，镇静，抗胆碱能等。常见交互：与其他QT延长药（major），与CYP2D6 inhibitors（如氟西汀、帕罗西汀）增加血药浓度（moderate），与其他中枢抑制剂（苯二氮卓类、酒精、阿片类）增加镇静和呼吸抑制（major可能，特别是注射剂）。抗精神病药与降压药可能增加低血压。chlorpromazine是CYP2D6底物，也是α1阻断剂，与降压药交互。paliperidone是利培酮代谢产物，CYP2D6和P-gp？paliperidone主要经肾排泄，不受CYP2D6影响，但QT延长、中枢神经系统抑制。aripiprazole是CYP2D6和3A4底物，与强CYP2D6抑制剂（如氟西汀）或3A4抑制剂需要调整剂量。amisulpride主要经肾排泄，QT延长。asenapine是CYP1A2底物，与氟伏沙明（CYP1A2 inhibitor）可能增加浓度。loxapine代谢多种CYP。thiothixene经CYP1A2。等等。
                - listitem [ref=e428]:
                  - paragraph [ref=e429]: 苯二氮卓类（地西泮，咪达唑仑）：主要经CYP3A4代谢，与强CYP3A4 inhibitors（酮康唑，克拉霉素，利托那韦）增加镇静和呼吸抑制（major），与CYP3A4 inducers降低疗效。与阿片类、酒精等中枢抑制剂合用导致深度镇静、呼吸抑制（major）。地西泮还有活性代谢物。直肠和鼻内给药，但系统吸收。
                - listitem [ref=e430]:
                  - paragraph [ref=e431]: 拉科酰胺（lacosamide）：部分经CYP2C19代谢，但交互少。PR间期延长，与其他PR延长药（如β阻滞剂，钙通道阻滞剂）可能增加心脏传导阻滞风险，moderate。与其他抗癫痫药无显著交互。
                - listitem [ref=e432]:
                  - paragraph [ref=e433]: 左乙拉西坦（levetiracetam）：无显著代谢交互，但与其他中枢抑制药增加嗜睡。肾排泄，与丙磺舒可能竞争肾小管分泌？丙磺舒可降低左乙拉西坦清除率，moderate。
                - listitem [ref=e434]:
                  - paragraph [ref=e435]: 氨己烯酸（vigabatrin）：不可逆抑制GABA转氨酶，导致视野缺损等。交互：与其它中枢抑制剂增加镇静。与氯喹/羟氯喹可能增加视网膜毒性？不确定。但主要可能增加眼毒性，若与其他可致视网膜病变药物合用。但临床意义？可能moderate。与抗癫痫药物如苯妥英可能降低苯妥英浓度？vigabatrin不诱导肝酶。可能与其他药物引起严重皮肤反应？不确定。
                - listitem [ref=e436]:
                  - paragraph [ref=e437]: 局部用皮质类固醇与普莫卡因组合（Pramoxine and Hydrocortisone）：局部麻醉+皮质类固醇，直肠用。系统性吸收较少，但长期大量使用皮质类固醇可能系统作用，与其他免疫抑制剂合用增加感染风险。但局部直肠制剂通常低剂量。难以列出major交互。也许无临床意义的交互。但要求生成列表，可以写无已知严重交互，但必须返回空数组？要求是“为以下每种药物生成重要的药物交互列表”，如果没有，可能交互数组为空。但按照输出要求，每个药物都有interactions数组，可以空。不过，可能有些交互如与其他局部药物合用可能刺激。但鉴于局部使用，可忽略。但需要确保至少列出可能的中度交互，如与其他皮质类固醇合用增加局部不良反应。如果觉得无交互，返回空。
              - paragraph [ref=e438]: 对于Coal Tar and Salicylic Acid组合，每个成分考虑。Coal tar无显著系统交互。Salicylic acid局部有角质溶解，大量吸收可能导致水杨酸中毒，与口服抗凝药可能增加出血风险（水杨酸抗血小板），但通常局部低剂量，吸收少。严重或中度？如果大面积使用于破损皮肤，可能吸收。但常见建议：局部水杨酸与华法林可能增加出血，moderate。谨慎，可列出。
              - paragraph [ref=e439]: 仔细审查每个药物的药理：
              - list [ref=e440]:
                - listitem [ref=e441]:
                  - paragraph [ref=e442]: "anthralin (topical): 局部蒽林，无显著系统吸收，交互很少。但与其他局部刺激剂合用增加刺激。无major/moderate。返回空。"
                - listitem [ref=e443]:
                  - paragraph [ref=e444]: "coal tar (topical): 煤焦油，无系统交互。空。"
                - listitem [ref=e445]:
                  - paragraph [ref=e446]: "brodalumab: 抗IL-17受体单抗。免疫抑制，主要交互："
                  - list [ref=e447]:
                    - listitem [ref=e448]:
                      - paragraph [ref=e449]: 活疫苗：major，增加感染风险，应避免。
                    - listitem [ref=e450]:
                      - paragraph [ref=e451]: 其他免疫抑制剂（如TNF抑制剂，甲氨蝶呤）：moderate，增加免疫抑制和感染风险。
                    - listitem [ref=e452]:
                      - paragraph [ref=e453]: "CYP450: 炎症因子下调可能影响CYP酶活性，理论上与非甾体抗炎药？但通常没特别建议。维持空或添加。"
                    - listitem [ref=e454]:
                      - paragraph [ref=e455]:
                        - text: 与华法林：TNF抑制剂可能改变INR，但brodalumab IL-17，不确定。谨慎，不列。
                        - text: 列出活疫苗 major，与其它免疫抑制剂 moderate。
                - listitem [ref=e456]:
                  - paragraph [ref=e457]: "Coal Tar and Salicylic Acid: 组合药物，按成分分别列。Coal tar无交互。Salicylic acid (topical) 可能有："
                  - list [ref=e458]:
                    - listitem [ref=e459]:
                      - paragraph [ref=e460]: 抗凝药（华法林）：moderate，增加出血风险（水杨酸抑制血小板聚集，系统吸收可能导致）。
                    - listitem [ref=e461]:
                      - paragraph [ref=e462]: 其他水杨酸类（如阿司匹林）：additive salicylate toxicity。moderate。
                    - listitem [ref=e463]:
                      - paragraph [ref=e464]:
                        - text: 降糖药（磺脲类）：水杨酸可增强降糖作用。不过通常剂量低，但为全面，列出 moderate。
                        - text: "因是成分组合，应列出两个成分的交互。所以要为coal tar和salicylic acid分别生成。但药物是“Coal Tar and Salicylic Acid”，应按要求把组合药物的每个成分列出交互。我可以生成一个条目，里面包含这个组合药物，然后交互分两个成分。例如：\"interactions\": [{\"drug_a\": \"salicylic acid\", \"drug_b\": \"warfarin\", ...}, {\"drug_a\": \"coal tar\", ... 无交互?}]。但要求 drug_a 是当前药物，可能是组合药物的每个活性成分。所以可以针对salicylic acid列出交互，coal tar无交互。所以interactions数组里包含salicylic acid相关的交互，drug_a是salicylic acid。类似，对于 Pramoxine and Hydrocortisone Foam，要列出hydrocortisone（皮质类固醇）和pramoxine（局部麻醉）的交互。但皮质类固醇有许多交互，作为局部用药，系统吸收重要吗？如果是直肠泡沫，可能吸收，尤其破损黏膜。但一般局部皮质类固醇严重交互很少，可能与其他皮质类固醇合用增加副作用，与抗凝药（如华法林）可能改变凝血？不明确。但华法林与皮质类固醇合用可能增加消化道出血风险，尤其长期口服。局部使用也考虑？不太多。为严谨，列出皮质类固醇与华法林的moderate交互（增加胃肠道出血风险），与NSAIDs增加胃溃疡风险。与疫苗（活疫苗）如为免疫抑制剂量（系统作用），但局部直肠低剂量，通常不视为免疫抑制，可忽略。pramoxine是局部麻醉，与其他局麻药合用增加毒性，无临床意义。所以 Pramoxine and Hydrocortisone 组合，皮质类固醇可能交互：与NSAIDs (moderate: 增加胃肠道出血风险)，与抗凝药 (moderate: 增加出血风险)，与利尿剂 (钾丢失)。但肛门直肠给药，系统吸收很少。鉴于要求，勉强列出中度交互。同样，其他肾上腺皮质激素组合类似。"
                - listitem [ref=e465]:
                  - paragraph [ref=e466]: adalimumab-adbm, adalimumab-bwwd, adalimumab-fkjp, adalimumab-adaz, adalimumab-aqvh：都是阿达木单抗（生物类似药）。交互与TNF抑制剂相同：
                  - list [ref=e467]:
                    - listitem [ref=e468]:
                      - paragraph [ref=e469]: 活疫苗：major，避免。
