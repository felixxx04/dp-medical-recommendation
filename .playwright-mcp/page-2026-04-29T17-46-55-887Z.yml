                    - listitem [ref=e496]:
                      - paragraph [ref=e497]: 强CYP3A4抑制剂（如酮康唑、克拉霉素、利托那韦）：major，增加upadacitinib浓度，可能导致严重不良反应，需要减量或避免。
                    - listitem [ref=e498]:
