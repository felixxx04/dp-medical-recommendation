                        - text: 列出：强CYP3A4 inhibitors (major)，强CYP3A4 inducers (moderate)，活疫苗 (major)，其他免疫抑制剂 (moderate)。
                - listitem [ref=e506]:
                  - paragraph [ref=e507]: rituximab and variants：利妥昔单抗，CD20单抗，B细胞耗竭，免疫抑制。
