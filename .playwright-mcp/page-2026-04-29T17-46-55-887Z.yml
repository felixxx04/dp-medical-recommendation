                    - listitem [ref=e481]:
                      - paragraph [ref=e482]: 与非甾体抗炎药（NSAIDs）：moderate，增加胃肠道溃疡和出血风险。
                    - listitem [ref=e483]:
                      - paragraph [ref=e484]: 与利尿剂（丢钾的如呋塞米）：moderate，增加低钾血症风险。
                    - listitem [ref=e485]:
                      - paragraph [ref=e486]: 与疫苗（活疫苗）：如果系统吸收剂量足够致免疫抑制，major？通常局部制剂不致免疫抑制。但为严谨，不列。
                    - listitem [ref=e487]:
                      - paragraph [ref=e488]:
                        - text: 与CYP3A4诱导剂/抑制剂：皮质类固醇如氢化可的松主要内源性，外源性代谢受影响？不显著。可忽略。
                        - text: 选择：hydrocortisone与抗凝药 moderate，与NSAIDs moderate。这足够了。
                - listitem [ref=e489]:
                  - paragraph [ref=e490]: infliximab-qbtx：英夫利西单抗，TNF抑制剂，类似阿达木单抗。交互相同：活疫苗 major，其他免疫抑制剂 moderate，华法林 moderate。
