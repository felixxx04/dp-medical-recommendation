                    - listitem [ref=e502]:
                      - paragraph [ref=e503]: 其他免疫抑制剂（如TNF抑制剂，甲氨蝶呤）：moderate，增加感染风险。
                    - listitem [ref=e504]:
                      - paragraph [ref=e505]:
