                    - listitem [ref=e472]:
                      - paragraph [ref=e473]: CYP450底物药物（如华法林，茶碱）：炎症抑制时CYP活性恢复正常，可能导致药物水平变化，需监测。moderate。
                    - listitem [ref=e474]:
                      - paragraph [ref=e475]:
                        - text: 与抗真菌药（CYP3A4抑制剂）无直接交互。
                        - text: 所以包含活疫苗 major，与 anakinra、abatacept等moderate，与华法林moderate。
                - listitem [ref=e476]:
                  - paragraph [ref=e477]: Pramoxine and Hydrocortisone Foam, hydrocortisone and pramoxine (topical/rectal), hydrocortisone acetate and pramoxine hydrochloride, Pramoxine and Hydrocortisone Cream, Gel, and Ointment, Pramoxine and Hydrocortisone Rectal Foam：都是类似组合。列出hydrocortisone成分的交互，pramoxine几乎无临床意义交互。所以每个这些组合药物，interactions应基于hydrocortisone：
                  - list [ref=e478]:
                    - listitem [ref=e479]:
