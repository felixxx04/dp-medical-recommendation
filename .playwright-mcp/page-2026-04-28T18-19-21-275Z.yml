            - text: "\"contraindication_name\": \"history of pancreatitis\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"DPP-4 inhibitors have been associated with acute pancreatitis; careful consideration in patients with history of pancreatitis.\""
