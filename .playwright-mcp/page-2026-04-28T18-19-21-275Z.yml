            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Hepatic dysfunction increases risk of lactic acidosis from metformin; sitagliptin may require dose adjustment.\""
            - text: "},"
            - text: "{"
