            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Sulfonylurea component may cause hemolytic anemia in patients with G6PD deficiency.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"history of bladder cancer\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Pioglitazone is associated with increased bladder cancer risk; avoid in patients with active or history of bladder cancer.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"osteoporosis or high fracture risk\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Pioglitazone increases fracture risk in women; consider bone health.\""
