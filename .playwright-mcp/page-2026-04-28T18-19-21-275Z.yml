            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Alogliptin has been associated with a small increased risk of heart failure hospitalization; avoid in patients with severe heart failure.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"pregnancy (Category B)\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Limited human data; use during pregnancy only if clearly needed.\""
            - text: "},"
