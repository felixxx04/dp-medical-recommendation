            - text: "\"contraindication_type\": \"allergy_type\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Cross-sensitivity between sulfonamide antibiotics and sulfonylureas can cause allergic reactions; pioglitazone can also cause hypersensitivity.\""
            - text: "},"
            - text: "{"
