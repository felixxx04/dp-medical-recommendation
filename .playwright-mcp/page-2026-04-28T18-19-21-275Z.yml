            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Both components undergo hepatic metabolism; pioglitazone is contraindicated with ALT >2.5x ULN, and glimepiride hypoglycemia risk is increased.\""
            - text: "},"
