              - paragraph [ref=e223]: 我们被要求为给定的药物列表生成完整的禁忌症列表。需要输出JSON。药物重复？清单中有重复的药物（比如tirzepatide出现两次，dapagliflozin和Farxiga，semaglutide和Ozempic/Wegovy/Rybelsus等），但可能作为不同条目，按给定名称生成。我们将逐个分析每种药物，列出其禁忌症，包括疾病、过敏、生理状态、药物类禁忌，严重程度绝对或相对。需具体。
              - paragraph [ref=e224]: 我们要尽可能全面、临床相关。一些药物可能共享相似的类别禁忌症，例如SGLT-2抑制剂常有eGFR低、酮症酸中毒风险等。胰岛素：禁忌低血糖、对胰岛素过敏。GLP-1激动剂：禁忌甲状腺髓样癌个人或家族史、多发性内分泌腺瘤综合征2型等。组合药物：列出各成分禁忌症，合并。
              - paragraph [ref=e225]: 注意：有些适应症可助推断禁忌，例如降糖药禁忌低血糖，但禁忌症应更具体。如SGLT2抑制剂：可能导致酮症酸中毒、生殖器感染、容量不足，相对禁忌？通常绝对禁忌：严重肾损害（按eGFR阈值）、过敏等。我们将根据标准临床知识添加。
              - paragraph [ref=e257]: "输出JSON数组。我将为每个药物（在输入列表中出现的唯一名称）生成条目。有些药物列出了不同商品名但同一通用名，但输入中有分开的，如\"dapagliflozin\"和\"dapagliflozin Brand name: Farxiga\"，虽然后者也是dapagliflozin，但适应症稍有不同，但禁忌症应相同，可以合并或分别输出？由于输入是列表，要求为\"每种药物\"生成禁忌症。我将保留输入字符串的generic_name，即\"pramlintide (subcutaneous route)\"等，但generic_name应该用实际药物名。需求中generic_name示例是“Isotretinoin”，我猜测我们输出使用药物通用名，不加括号剂型，但为了匹配输入，可以单独处理。我输出时generic_name使用给出的名称如\"pramlintide (subcutaneous route)\"? 但更合理是只用\"pramlintide\"。检查示例：\"Isotretinoin\"。可能我们应输出干净的通用名。对于组合药物，如\"insulin nph and regular\"等，可用。对于品牌名如Farxiga，generic_name应为dapagliflozin。但输入有\"dapagliflozin Brand name: Farxiga\"，可以输出\"dapagliflozin\"。同样\"semaglutide Brand names: Ozempic, Wegovy, Rybelsus\"，输出\"semaglutide\"。"
              - paragraph [ref=e258]: 为了准确匹配每条输入，我将输出每个输入条目，但将generic_name字段设为最合理的通用名称。重复的条目（如两个tirzepatide）输出同样的禁忌症列表也不影响，故分别列。
              - paragraph [ref=e259]: 开始为每个药物生成禁忌症。
              - list [ref=e260]:
                - listitem [ref=e261]:
                  - paragraph [ref=e262]: "pramlintide (subcutaneous route): Amylin analogs. 适应症: type 1, type 2. 禁忌：低血糖意识受损、严重低血糖、胃轻瘫、过敏。妊娠C级。具体：pramlintide增加低血糖风险，尤其是与胰岛素联用时。绝对禁忌：confirmed hypoglycemia unawareness (disease), severe hypoglycemia events (disease), gastroparesis (disease). 相对禁忌：pediatric (physiological), pregnancy (physiological C级), lactation, 还有过敏。同时使用减慢胃排空药物（如抗胆碱能）可能相对禁忌。但drug class 禁忌：concurrent use of other drugs that slow gastric motility? 不太算绝对禁忌。可列出drug class: anticholinergic agents (relative) 增加胃排空延迟。我将其列为相对。过敏：pramlintide allergy (allergy_type absolute)."
                - listitem [ref=e263]:
                  - paragraph [ref=e264]: "insulin nph and regular (subcutaneous route): 胰岛素组合。禁忌症包括低血糖发作 (disease absolute)，对胰岛素过敏 (allergy absolute)。相对：renal impairment (降低胰岛素清除，增加低血糖风险)，hepatic impairment (糖异生受影响)，这些是相对禁忌，需调整剂量。生理状态：妊娠 (B级，可使用，但非禁忌，但有时 relative 由于需求增加?), lactation相对安全。没有绝对生理禁忌。还有与噻唑烷二酮类 (TZDs) 合用可能增加液体潴留心衰风险 (relative drug class)。与pramlintide联用增加低血糖风险，可列相对。但insulin本身禁忌症有限。"
                - listitem [ref=e265]:
                  - paragraph [ref=e266]: "teplizumab-mzwv: 抗CD3单抗，适应症延迟1型糖尿病发病。禁忌：严重活动性感染 (disease absolute)，对teplizumab过敏 (allergy absolute)。年龄：仅适用于8岁及以上，小于8岁是相对禁忌或未被批准 (physiological condition relative pediatric <8)。妊娠N级，无数据，备孕可能相对禁忌。还有淋巴组织增生疾病病史？药物可能导致淋巴细胞减少、细胞因子释放综合征。自身免疫性疾病？相对禁忌。还有疫苗接种：活疫苗不应在治疗前或治疗后一定时间内接种 (drug class relative)。具体：绝对禁忌：serious active infection, hypersensitivity. 相对：treatment with live vaccines, pregnancy, lactation."
                - listitem [ref=e267]:
                  - paragraph [ref=e268]: "dapagliflozin: SGLT-2 inhibitor. 绝对禁忌：severe renal impairment (eGFR <25 mL/min/1.73 m² for diabetes, 可能有不同阈值，心衰可更低，但绝对通常eGFR <15 for heart failure? 但通用禁忌症：severe renal impairment 透析绝对禁忌启动)。过敏。糖尿病酮症酸中毒 (DKA) 病史或反复DKA (disease relative/absolute). 相对：volume depletion, elderly, history of urinary tract infections or genital mycotic infections (relative). 妊娠C级 (physiological relative). 哺乳禁忌 (relative). 与利尿剂合用时低血压风险 (drug class relative). 绝对禁忌：hypersensitivity, dialysis. 还有低血糖与其他降糖药? 单独使用低血糖风险低。相对：hepatic impairment severe? 不推荐。"
                - listitem [ref=e269]:
                  - paragraph [ref=e270]: "dulaglutide: GLP-1 RA. 绝对禁忌：personal or family history of medullary thyroid carcinoma (MTC), multiple endocrine neoplasia syndrome type 2 (MEN2). 过敏。相对：severe gastroparesis, history of pancreatitis (谨慎), pregnancy C级 (relative), lactation. 严重肾功能不全? GLP-1可用于eGFR down to 15? 但GI副作用可能导致脱水。Drug class: simultaneous use of other GLP-1 receptor agonists. 相对禁忌：severe gastrointestinal disease."
                - listitem [ref=e271]:
                  - paragraph [ref=e272]: "semaglutide: 类似dulaglutide。绝对禁忌：MTC个人或家族史，MEN2。过敏。相对：pancreatitis history, diabetic retinopathy? semaglutide在SUSTAIN-6中增加视网膜病变风险，相对禁忌？尤其注射semaglutide，有严重视网膜病变相对禁忌。妊娠N级，不建议，相对。哺乳相对。"
                - listitem [ref=e273]:
                  - paragraph [ref=e274]: "dapagliflozin Brand name: Farxiga: 和dapagliflozin一样。"
                - listitem [ref=e275]:
                  - paragraph [ref=e276]: "semaglutide Brand names: Ozempic, Wegovy, Rybelsus: semaglutide（含口服）。禁忌同上，增加口服特有禁忌：严重胃吸收不良（相对）。绝对禁忌同注射。"
                - listitem [ref=e277]:
                  - paragraph [ref=e278]: "insulin glargine and lixisenatide: 组合。GLP-1 (lixisenatide) + insulin glargine。绝对禁忌：MTC個人/家族史，MEN2 (来自lixisenatide)，低血糖发作，过敏。相对：severe GI disease, renal impairment (lixisenatide 排泄，eGFR <30不推荐)，妊娠N级相对。Drug class: concomitant use of other GLP-1 agonists or prandial insulin? 组合本身为预混，不推荐与其他胰岛素合用？可能相对。"
                - listitem [ref=e279]:
                  - paragraph [ref=e280]: "tirzepatide: GIP/GLP-1共拮抗剂。禁忌类似GLP-1：MTC/MEN2 (绝对). 过敏。相对：pancreatitis history, severe GI disease, diabetic retinopathy? gallbladder disease? tirzepatide增加胆囊事件，相对。妊娠N相对。"
                - listitem [ref=e281]:
                  - paragraph [ref=e282]: "liraglutide: GLP-1, 绝对：MTC/MEN2, 过敏。relative: pancreatitis, gastroparesis. 妊娠C相对。哺乳相对。"
                - listitem [ref=e283]:
                  - paragraph [ref=e284]: "pioglitazone (oral): TZD. 绝对：NYHA Class III/IV heart failure (disease), 严重肝功能不全 (ALT >2.5x ULN), 过敏。相对：mild heart failure, bladder cancer history (pioglitazone可能与膀胱癌风险增加)，骨折风险 (女性)。妊娠C相对。哺乳相对。Drug class: insulin (增加心衰风险)，导致液体潴留。"
                - listitem [ref=e285]:
                  - paragraph [ref=e286]: "metformin and sitagliptin: metformin + DPP-4i. Metformin绝对禁忌：severe renal impairment (eGFR <30 mL/min/1.73 m²), acute or chronic metabolic acidosis (disease), 碘化造影剂使用（暂停）(relative temporarily)。过敏。DPP-4i: sitagliptin 过敏, 胰腺炎病史 (relative). 组合绝对：eGFR<30, metabolic acidosis, hypersensitivity. 妊娠B级，哺乳相对安全但需慎用。"
                - listitem [ref=e287]:
                  - paragraph [ref=e288]: "semaglutide injection: 与前面semaglutide相同。"
                - listitem [ref=e289]:
                  - paragraph [ref=e290]: "repaglinide (oral): meglitinide. 绝对禁忌：type 1 diabetes? Repaglinide not for T1D? 适应症仅T2DM，所以T1DM是禁忌？但通常磺脲类和格列奈类不用于T1DM。绝对禁忌：diabetic ketoacidosis, type 1 diabetes mellitus (disease). 严重肝损伤 (repaglinide主要通过肝脏代谢，绝对禁忌严重肝受损)。过敏。相对：renal impairment (谨慎，因为低血糖风险)，妊娠C级相对，哺乳相对。Drug class: gemfibrozil (强烈抑制CYP2C8，增加repaglinide暴露，禁忌合用，absolute），clopidogrel也增加暴露，相对。"
                - listitem [ref=e291]:
                  - paragraph [ref=e292]: "chromium picolinate: 矿物质。禁忌：hypersensitivity. 相对：severe renal impairment (铬排泄)，妊娠N级，哺乳。一些药物相互作用：可能影响胰岛素敏感性，无绝对禁忌。"
                - listitem [ref=e293]:
                  - paragraph [ref=e294]: "exenatide (Byetta): GLP-1, 同前，绝对MTC/MEN2, 过敏。相对：severe GI disease, history of pancreatitis. eGFR <30不推荐 (exenatide由肾清除). 妊娠C相对。哺乳。"
                - listitem [ref=e295]:
                  - paragraph [ref=e296]: "acarbose: alpha-glucosidase inhibitor. 绝对禁忌：inflammatory bowel disease, colonic ulceration, partial intestinal obstruction, or predisposition to intestinal obstruction (disease absolute); severe renal impairment (CrCl <25). 相对：mild-moderate renal impairment, hepatic impairment. 过敏。妊娠B级相对。与其他降糖药合用低血糖，但处理低血糖必须用葡萄糖而非蔗糖 (相对)。Drug class: digestive enzyme preparations? 可能相对。"
                - listitem [ref=e297]:
                  - paragraph [ref=e298]: "alogliptin: DPP-4i. 绝对禁忌：history of serious hypersensitivity to alogliptin, including anaphylaxis, angioedema, Stevens-Johnson syndrome. 相对：history of pancreatitis. severe hepatic impairment? 减量。Heart failure history? alogliptin在EXAMINE中可能增加心衰住院风险，相对禁忌。妊娠B级，相对。eGFR <30需减量，但非禁忌。"
                - listitem [ref=e299]:
                  - paragraph [ref=e300]: "glimepiride and pioglitazone. 磺脲+吡格列酮。绝对禁忌：Type 1 DM, DKA (磺脲), NYHA III/IV heart failure (吡格列酮), severe hepatic impairment, sulfonamide allergy? 磺脲类含有磺胺基团，交叉过敏可能。相对：G6PD deficiency (磺脲类可能溶血)， bladder cancer history, bone fractures, pregnancy C级。绝对禁忌应包含sulfonamide allergy? 一般相对。Drug class: insulin? 相对。"
                - listitem [ref=e301]:
                  - paragraph [ref=e302]: "glipizide (oral route): sulfonylurea. 绝对禁忌：type 1 DM, DKA, 过敏（包括磺胺过敏可能绝对? 通常如果对磺胺抗生素严重过敏，绝对禁忌）。严重肝损伤（代谢）。相对：severe renal impairment (低血糖)，G6PD deficiency，妊娠C。药物：concomitant use with bosentan? 升高肝酶风险，相对禁忌。"
                - listitem [ref=e303]:
                  - paragraph [ref=e304]: glyburide and metformin. 格列本脲+二甲双胍。绝对：eGFR<30, metabolic acidosis, type 1 DM, DKA, sulfonylurea hypersensitivity. 相对：G6PD, hepatic impairment, pregnancy C? 格列本脲在妊娠中相对禁忌，妊娠B组合? 磺脲类可透过胎盘，不推荐。相对禁忌。
                - listitem [ref=e305]:
                  - paragraph [ref=e306]: "metformin and saxagliptin. metformin 绝对 eGFR<30, metabolic acidosis. saxagliptin DPP-4i: 过敏。相对：history of pancreatitis, heart failure (saxagliptin增加心衰住院风险)，肝损。妊娠B。"
                - listitem [ref=e307]:
                  - paragraph [ref=e308]: dapagliflozin and metformin. 组合。绝对：eGFR<30 (metformin) or eGFR<25 for dapa，选择最严格 eGFR<30或透析禁忌. 代谢性酸中毒，过敏，反复DKA历史。相对：volume depletion, UTIs, pancreatitis? DPP-4无，可列相对。妊娠C。
                - listitem [ref=e309]:
                  - paragraph [ref=e310]: "lixisenatide: GLP-1 RA. 绝对MTC/MEN2, 过敏。相对：severe GI disease, eGFR <30不推荐, 妊娠N. 哺乳。"
                - listitem [ref=e311]:
                  - paragraph [ref=e312]: "bromocriptine (Parlodel): 多巴胺激动剂，用于糖尿病也是适应症。绝对禁忌：uncontrolled hypertension, ergot alkaloid sensitivity, pregnancy? 在用于产后断奶时已撤销，但通常怀孕禁忌（除非用于无功能垂体瘤等）。还有严重缺血性心脏病，周围血管疾病，瓣膜病变。相对：severe hepatic impairment, lactation (抑制泌乳). 用于糖尿病(快速释放剂型)的禁忌：syncope 倾向？相对。"
                - listitem [ref=e313]:
                  - paragraph [ref=e314]: empagliflozin and metformin. 同理SGLT2+metformin。绝对：eGFR<30, metabolic acidosis, DKA history, hypersensitivity. 相对：volume depletion, genital infections. 妊娠C.
                - listitem [ref=e315]:
                  - paragraph [ref=e316]: glipizide and metformin. 磺脲+metformin. 绝对：eGFR<30, metabolic acidosis, type 1 DM, DKA, sulfonylurea hypersensitivity. 相对：G6PD, hepatic impairment, pregnancy C.
                - listitem [ref=e317]:
                  - paragraph [ref=e318]: glyburide (oral route). 同磺脲。绝对：T1DM, DKA, hypersensitivity (sulfa), severe hepatic impairment. 相对：renal impairment, G6PD, pregnancy (C).
                - listitem [ref=e319]:
                  - paragraph [ref=e320]: linagliptin and metformin. DPP-4i + metformin. Linagliptin不通过肾排泄。绝对：metformin eGFR<30, metabolic acidosis, hypersensitivity. 相对：pancreatitis, heart failure? 无证据显示linagliptin增加心衰。妊娠B。
                - listitem [ref=e321]:
                  - paragraph [ref=e322]: metformin and pioglitazone. Metformin+pioglitazone. 绝对：eGFR<30, metabolic acidosis, NYHA III/IV heart failure, severe hepatic impairment, hypersensitivity. 相对：bladder cancer, bone fractures, pregnancy C.
                - listitem [ref=e323]:
                  - paragraph [ref=e324]: insulin degludec and liraglutide. IDegLira. 绝对：MTC/MEN2, hypoglycemia episode, hypersensitivity. 相对：severe renal/hepatic, pregnancy N, pancreatitis history.
                - listitem [ref=e325]:
                  - paragraph [ref=e326]: alogliptin and metformin. 同 alogliptin+metformin. 绝对：eGFR<30, metabolic acidosis, history of serious hypersensitivity (angioedema, SJS). 相对：heart failure, pancreatitis, hepatic impairment.
                - listitem [ref=e327]:
                  - paragraph [ref=e328]: alogliptin and pioglitazone. DPP-4i+TZD. 绝对：history of serious hypersensitivity (alogliptin), NYHA III/IV heart failure (pio), severe hepatic impairment, hypersensitivity. 相对：bladder cancer, fractures, heart failure, pancreatitis.
                - listitem [ref=e329]:
                  - paragraph [ref=e330]: exenatide (Bydureon). 同exenatide。
                - listitem [ref=e331]:
                  - paragraph [ref=e332]: canagliflozin and metformin. SGLT2+metformin. Canagliflozin禁忌：eGFR<30 (之前可能有截肢风险)，但绝对：eGFR<30 (ESRD透析)，metabolic acidosis, hypersensitivity. 相对：history of lower limb amputation, severe peripheral vascular disease, volume depletion, hyperkalemia? canagliflozin增加高钾风险。DKA risk, fracture risk (canagliflozin增加骨转换）。妊娠C。
                - listitem [ref=e333]:
                  - paragraph [ref=e334]: dapagliflozin and saxagliptin. SGLT2+DPP-4i. 绝对：severe renal impairment (eGFR <25 for dapa), hypersensitivity (either). 相对：volume depletion, genital infections, heart failure (saxagliptin心衰风险), pancreatitis. 没有metformin。绝对不包括代谢性酸中毒。eGFR<25禁忌。妊娠N。
                - listitem [ref=e335]:
                  - paragraph [ref=e336]: empagliflozin, linagliptin, and metformin. 三重。绝对：eGFR<30 (metformin)，metabolic acidosis, hypersensitivity. 相对：volume depletion, genital infections, heart failure? liraglutide无，linagliptin心衰安全，empagliflozin对心衰有益，所以无。妊娠N。
                - listitem [ref=e337]:
                  - paragraph [ref=e338]: empagliflozin and linagliptin. SGLT2+DPP-4i。绝对：severe renal impairment (eGFR <30? empagliflozin心衰可用极低eGFR，但通常对于糖尿病eGFR<20不推荐起始，绝对禁忌透析，过敏。相对：volume depletion, genital infections, pancreatitis.
                - listitem [ref=e339]:
                  - paragraph [ref=e340]: ertugliflozin and metformin. SGLT2+metformin. 绝对：eGFR<30, metabolic acidosis, hypersensitivity. 相对：volume depletion, genital infections, lower limb amputations? ertugliflozin无截肢信号强。妊娠N.
                - listitem [ref=e341]:
                  - paragraph [ref=e342]: ertugliflozin and sitagliptin. SGLT2+DPP-4i. 绝对：severe renal impairment (ertugliflozin禁忌eGFR <30? 起始eGFR<45不用，但eGFR<30绝对禁忌？是的透析禁忌，过敏。相对：volume depletion, genital infections, pancreatitis. 无metformin.
                - listitem [ref=e343]:
                  - paragraph [ref=e344]: "ertugliflozin: SGLT2单药。绝对：ESRD/dialysis, hypersensitivity. 相对：eGFR<45起始不推荐，volume depletion，DKA history, 妊娠N."
                - listitem [ref=e345]:
                  - paragraph [ref=e346]: "nateglinide (oral): Meglitinide. 类似repaglinide。绝对：type 1 DM, DKA, severe hepatic impairment, hypersensitivity. 相对：renal impairment, pregnancy C. 药物相互作用：gemfibrozil相对禁忌？没repaglinide那么强。Clopidogrel增加nateglinide暴露，相对。但通常不列为禁忌。"
                - listitem [ref=e347]:
                  - paragraph [ref=e348]: "albiglutide: GLP-1 (已退市). 绝对：MTC/MEN2, hypersensitivity. 相对：pancreatitis, severe GI disease, renal impairment? 妊娠C."
                - listitem [ref=e349]:
                  - paragraph [ref=e350]: tirzepatide (第二个出现). 同上。
                - listitem [ref=e351]:
                  - paragraph [ref=e352]: "atropine and diphenoxylate: 复方止泻药。绝对禁忌：obstructive jaundice (disease), 假膜性肠炎或抗生素相关性腹泻引起的腹泻？抗菌药相关腹泻禁忌止泻药？一般相对。绝对：children <2 years (physiological绝对)，acute severe ulcerative colitis (disease), 已知过敏。相对：pregnancy C, lactation, hepatic impairment, glaucoma, prostatic hypertrophy. 与MAO抑制剂同用可能高血压危象？diphenoxylate有阿片样作用。Drug class: MAO inhibitors (relative 因为可能导致5-HT综合征？不确定)。但阿托品禁忌于闭角型青光眼 (absolute)。所以我将列出：angle-closure glaucoma (absolute), obstructive jaundice, paralytic ileus, severe hepatic impairment (relative), children <2 years. 过敏。"
                - listitem [ref=e353]:
                  - paragraph [ref=e354]: "loperamide (oral route): 绝对禁忌： acute dysentery characterized by blood in stool and high fever (disease), acute ulcerative colitis (relative but some label absolute), pseudomembranous colitis, children <2 years, ileus, known hypersensitivity. 相对：severe hepatic impairment (loperamide 代谢), pregnancy C, lactation, use with CYP3A4 inhibitors like quinidine, ritonavir? 高剂量心脏毒性风险，相对。Drug class: P-glycoprotein inhibitors? 可能延长QT。列出与延长QT间期的药物合用 (relative)."
                - listitem [ref=e355]:
                  - paragraph [ref=e356]: "loperamide hydrochloride: 同loperamide."
                - listitem [ref=e357]:
                  - paragraph [ref=e358]: "bismuth subsalicylate: 水杨酸盐。绝对禁忌：hypersensitivity to salicylates, NSAIDs? 水杨酸盐过敏。 children or teenagers with or recovering from chicken pox or flu-like symptoms (Reye syndrome risk) (physiological absolute). 相对：gout, diabetes (salicylate影响尿糖?), bleeding disorders, anticoagulation therapy, pregnancy (third trimester), lactation. 药物类: other salicylates."
                - listitem [ref=e359]:
                  - paragraph [ref=e360]: "saccharomyces boulardii lyo: 益生菌。绝对禁忌：allergy to yeast, severe immunosuppression (central venous catheter, critically ill), 可能真菌血症。 Relative: pregnancy N, lactation, immunocompromised states."
              - paragraph [ref=e361]: 现在以JSON格式组织。注意severity用"absolute"或"relative"。提供reason。我会为每个药物条目生成。
