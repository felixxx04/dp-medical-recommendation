            - text: "\"contraindication_name\": \"hypersensitivity to exenatide or excipients\","
            - text: "\"contraindication_type\": \"allergy_type\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Anaphylactic and other serious hypersensitivity reactions have occurred.\""
            - text: "},"
            - text: "{"
