            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Drug and its metabolites accumulate significantly; risk of hepatotoxicity and systemic effects.\""
            - text: "},"
            - text: "{"
