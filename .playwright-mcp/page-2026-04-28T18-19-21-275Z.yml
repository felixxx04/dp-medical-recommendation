            - text: "\"contraindication_name\": \"pregnancy (Category C)\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Animal reproductive toxicity; use during pregnancy only if potential benefit justifies potential risk to fetus.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"lactation\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Exenatide excreted in rodent milk; unknown in humans. Risk to infant cannot be excluded.\""
            - text: "}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"acarbose\","
            - text: "\"contraindications\": ["
            - text: "{"
            - text: "\"contraindication_name\": \"inflammatory bowel disease\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Increased fermentation of undigested carbohydrates may worsen symptoms and exacerbate inflammation.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"colonic ulceration or partial intestinal obstruction\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Gas production from carbohydrate fermentation may cause bowel distention and perforation in predisposed patients.\""
