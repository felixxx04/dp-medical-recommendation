            - text: "\"contraindication_type\": \"drug_class\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Metformin must be temporarily withheld before and after iodinated contrast administration in patients with eGFR 30-60 to prevent contrast-induced nephropathy and subsequent lactic acidosis.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"pregnancy (Category B)\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"While metformin is increasingly used in pregnancy for gestational diabetes and PCOS, combination with sitagliptin lacks sufficient safety data; assess risk-benefit.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"lactation\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Metformin is excreted in milk; effects of sitagliptin are unknown. Caution advised.\""
            - text: "}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"repaglinide\","
            - text: "\"contraindications\": ["
            - text: "{"
            - text: "\"contraindication_name\": \"type 1 diabetes mellitus\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Repaglinide is ineffective in the absence of functional beta cells; indicated only for type 2 diabetes.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"diabetic ketoacidosis\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Requires insulin therapy; repaglinide is not appropriate for acute metabolic decompensation.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"severe hepatic impairment\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Repaglinide is metabolized mainly by the liver; severe impairment causes markedly increased exposure and hypoglycemia risk.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"hypersensitivity to repaglinide\","
            - text: "\"contraindication_type\": \"allergy_type\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Serious hypersensitivity reactions reported.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"concomitant gemfibrozil\","
            - text: "\"contraindication_type\": \"drug_class\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Gemfibrozil profoundly inhibits CYP2C8 and OATP1B1, leading to 8-fold greater repaglinide exposure and severe hypoglycemia; coadministration is contraindicated.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"severe renal impairment\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Greater sensitivity to glucose-lowering effect; initiate at low dose with careful titration.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"concomitant clopidogrel\","
            - text: "\"contraindication_type\": \"drug_class\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Clopidogrel increases repaglinide exposure via CYP2C8 inhibition; if combination is necessary, start repaglinide at low dose and monitor.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"pregnancy (Category C)\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Animal studies show fetal harm; no adequate human data. Use only if benefit outweighs risk.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"lactation\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Unknown excretion in human milk; potential for hypoglycemia in infant.\""
            - text: "}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"chromium picolinate\","
