            - text: "\"contraindication_type\": \"allergy_type\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Rare hypersensitivity reactions including rash and anaphylaxis.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"moderate renal impairment (CrCl 25–50 mL/min)\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Elevated systemic exposure; use with caution and consider reduced dose.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"severe hepatic impairment\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Acarbose has been associated with elevated liver transaminases and rare hepatotoxicity; avoid in active liver disease.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"pregnancy (Category B)\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Limited human data; systemic absorption is low, but should be used only if clearly needed.\""
            - text: "},"
            - text: "{"
            - text: "\"contraindication_name\": \"lactation\","
            - text: "\"contraindication_type\": \"physiological_condition\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Small amounts may appear in breast milk; potential risk of gastrointestinal effects in infant.\""
