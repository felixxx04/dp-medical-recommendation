            - text: "{"
            - text: "\"contraindication_name\": \"severe gastroparesis\","
            - text: "\"contraindication_type\": \"disease\","
            - text: "\"severity\": \"relative\","
            - text: "\"reason\": \"Delayed gastric emptying can exacerbate symptoms.\""
            - text: "},"
