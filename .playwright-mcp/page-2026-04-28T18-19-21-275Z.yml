            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"alogliptin\","
            - text: "\"contraindications\": ["
            - text: "{"
            - text: "\"contraindication_name\": \"history of serious hypersensitivity reaction to alogliptin\","
            - text: "\"contraindication_type\": \"allergy_type\","
            - text: "\"severity\": \"absolute\","
            - text: "\"reason\": \"Anaphylaxis, angioedema, and severe cutaneous adverse reactions (Stevens-Johnson syndrome) have been reported.\""
            - text: "},"
