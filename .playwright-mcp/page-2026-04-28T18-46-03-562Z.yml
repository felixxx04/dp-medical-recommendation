                  - paragraph [ref=e345]: allopurinol (oral route) 别嘌醇。禁忌：对别嘌醇过敏（包括发生DRESS/过敏综合征史）；与巯嘌呤/硫唑嘌呤合用（减少代谢，毒性增加），除非减剂量并密切监测；与茶碱合用可增毒；与阿莫西林等可增加皮疹风险，但不是禁忌。相对禁忌：严重肾功能不全（需减量）；肝功能不全；妊娠C级；哺乳；急性痛风发作（不应在急性发作时起始治疗，但已使用可继续）；HLA-B*5801等位基因携带者（高风险严重过敏反应）。绝对禁忌：过敏；合用硫唑嘌呤、巯嘌呤（未调整剂量）。
                - listitem [ref=e346]:
                  - paragraph [ref=e347]: allopurinol (intravenous route) 静脉别嘌醇。禁忌类似。
                - listitem [ref=e348]:
                  - paragraph [ref=e349]: rilonacept IL-1抑制剂，用于CAPS，心包炎，痛风。禁忌：严重活动性感染（如败血症、活动性结核），因免疫抑制；过敏；同时使用TNF抑制剂（增加严重感染风险），或其它白介素抑制剂增加免疫抑制。相对禁忌：慢性感染历史；妊娠C级；哺乳；中性粒细胞减少；活疫苗禁忌。绝对禁忌：严重活动性感染；对rilonacept过敏。
                - listitem [ref=e350]:
                  - paragraph [ref=e351]: minoxidil topical 外用米诺地尔。禁忌：对米诺地尔或丙二醇过敏；突然应用于大面积破损皮肤；妊娠C级，女性可能试图怀孕？通常禁止孕妇使用以防全身吸收；哺乳；儿童（如婴儿）；同时使用其他局部治疗如维A酸或二丙酸倍他米松可能增加吸收；有心血管疾病如冠心病，使用后可能全身吸收致心动过速，但罕见。绝对禁忌：过敏；怀孕（妊娠C，应避免）。相对禁忌：哺乳；心脏病；头皮异常（如晒伤、牛皮癣）。
                - listitem [ref=e352]:
                  - paragraph [ref=e353]: sulfasalazine 柳氮磺吡啶。禁忌：对磺胺类药物或水杨酸盐过敏；肠梗阻或尿路梗阻；卟啉症；严重肝肾功能不全；妊娠足月（增加新生儿黄疸风险）？妊娠分级B，但应避免近分娩期。哺乳（对磺胺过敏婴儿）。G6PD缺乏症患者（溶血风险）。相对禁忌：血液恶液质；哮喘；严重过敏。
                - listitem [ref=e354]:
                  - paragraph [ref=e355]: triamcinolone (injection route) 曲安奈德注射。皮质类固醇。禁忌：全身性真菌感染；对药物成分过敏；特发性血小板减少性紫癜肌注？其实禁忌：活动性感染未控制；活疫苗；脑型疟？典型的皮质类固醇禁忌：全身真菌感染（绝对）；同时使用米非司酮等（相对）；可能掩盖感染。绝对禁忌：未经治疗的全身性感染（真菌，细菌，病毒）；过敏。关节内注射：关节感染、不稳定关节、出血体质等。相对禁忌：糖尿病、高血压、心衰、精神病、单纯疱疹眼部感染等。妊娠C级。
                - listitem [ref=e356]:
                  - paragraph [ref=e357]: minoxidil (topical route) 同前。
                - listitem [ref=e358]:
                  - paragraph [ref=e359]: fluticasone nasal 氟替卡松鼻喷雾。禁忌：对氟替卡松过敏；近期鼻部手术或创伤，伤口未愈合。相对：活动性或静止期呼吸道结核感染；未治疗的真菌、细菌、病毒感染；单纯疱疹眼部感染；妊娠C级；哺乳。
                - listitem [ref=e360]:
                  - paragraph [ref=e361]: azelastine nasal 氮卓斯汀鼻喷，抗组胺。禁忌：对盐酸氮卓斯汀或成分过敏。相对：妊娠C级；哺乳；严重肾功能不全? 无需调整。可能与其他中枢抑制剂合用加重嗜睡。
                - listitem [ref=e362]:
                  - paragraph [ref=e363]: Fluticasone Nasal Spray 同上氟替卡松。
                - listitem [ref=e364]:
                  - paragraph [ref=e365]: azelastine and fluticasone nasal 组合，禁忌同各成分。
                - listitem [ref=e366]:
                  - paragraph [ref=e367]: triamcinolone (nasal) 曲安奈德鼻喷雾。禁忌类似氟替卡松鼻用。
                - listitem [ref=e368]:
                  - paragraph [ref=e369]: cetirizine hydrochloride 西替利嗪，抗组胺。口服。禁忌：对西替利嗪、羟嗪、或任何哌嗪类过敏；严重肾功能不全（CrCl<10ml/min，或透析患者禁忌？说明书：严重肾功能不全CrCl<10ml/min禁用；成人<30ml/min调整剂量，儿童严重障碍禁用）。相对禁忌：妊娠B级；哺乳；尿潴留风险（如前列腺增生）。绝对禁忌：过敏；终末期肾病（CrCl<10ml/min）或无尿；6个月以下婴儿（因无数据）。
                - listitem [ref=e370]:
                  - paragraph [ref=e371]: mometasone nasal 莫米松鼻喷雾。禁忌：对莫米松过敏；未治疗的局部感染（如鼻黏膜真菌、细菌感染）；近期鼻部手术或创伤。相对：活动性结核、妊娠C级、哺乳。
