        - generic [ref=e91]:
          - generic [ref=e93]: "For each disease below, evaluate whether the recommended drugs are medically appropriate for treating that disease. Answer with: APPROPRIATE / PARTIALLY / INAPPROPRIATE, and briefly explain why. 1. Disease: \"bacterial infection\" - Recommended: Amikacin, Cefotaxime, Echinacea, Loracarbef 2. Disease: \"intra-abdominal infection\" - Recommended: Amikacin, Cefotaxime, Echinacea, Loracarbef 3. Disease: \"neuropathic pain\" - Recommended: Diclofenac, Flurbiprofen, Ibuprofen, Ketoprofen 4. Disease: \"cluster headache\" - Recommended: Cyclobenzaprine, Lisinopril, Diclofenac, Mefenamic Acid 5. Disease: \"primary dysmenorrhea\" - Recommended: Naproxen, Diclofenac, Mefenamic Acid, Etodolac 6. Disease: \"musculoskeletal pain\" - Recommended: Diclofenac, Flurbiprofen, Ibuprofen, Ketoprofen 7. Disease: \"nausea and vomiting\" - Recommended: Metoclopramide, Lorazepam, Dexamethasone, Meclizine 8. Disease: \"edema associated with heart failure\" - Recommended: Amlodipine-Valsartan, Bumetanide, Benazepril, Captopril 9. Disease: \"constipation\" - Recommended: Lansoprazole, Magnesium Hydroxide, Rabeprazole, Omeprazole 10. Disease: \"skin and soft tissue infection\" - Recommended: Amikacin, Cefotaxime, Echinacea, Loracarbef 11. Disease: \"angina pectoris\" - Recommended: Metoprolol, Nicardipine, Perindopril, Pindolol 12. Disease: \"acne vulgaris\" - Recommended: Erythromycin, Spironolactone, Tazarotene, Oxytetracycline 13. Disease: \"type 2 diabetes mellitus\" - Recommended: Canagliflozin, Colesevelam, Empagliflozin, Glimepiride 14. Disease: \"ulcerative colitis\" - Recommended: Golimumab, Budesonide, Infliximab, Tofacitinib 15. Disease: \"psoriatic arthritis\" - Recommended: Golimumab, Apremilast, Leflunomide, Infliximab 16. Disease: \"non-hodgkin lymphoma\" - Recommended: Methotrexate, Doxorubicin, Cyclophosphamide, Pembrolizumab 17. Disease: \"allergic conjunctivitis\" - Recommended: Cetirizine, Olopatadine, Levocabastine, Lodoxamide 18. Disease: \"pain\" - Recommended: Diclofenac, Flurbiprofen, Ibuprofen, Ketoprofen"
