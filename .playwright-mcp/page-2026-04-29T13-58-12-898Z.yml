          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"CYP3A4 strong inhibitors\", \"interaction_type\": \"major\", \"clinical_effect\": \"显著升高地塞米松血药浓度，增加皮质醇增多症及免疫抑制风险\", \"mechanism\": \"CYP3A4代谢抑制\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"NSAIDs\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增加胃肠道溃疡和出血风险\", \"mechanism\": \"药效学协同的胃肠道损害\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"warfarin\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"改变抗凝效果，增加出血或血栓风险\", \"mechanism\": \"皮质类固醇改变凝血因子代谢及血管反应性\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"CYP3A4 strong inducers\", \"interaction_type\": \"major\", \"clinical_effect\": \"显著降低地塞米松血药浓度和治疗效果\", \"mechanism\": \"CYP3A4代谢诱导\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"antidiabetic agents\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"降低降糖药效果，导致高血糖\", \"mechanism\": \"皮质类固醇诱导糖异生并降低胰岛素敏感性\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"live vaccines\", \"interaction_type\": \"major\", \"clinical_effect\": \"增加疫苗引发全身感染的风险\", \"mechanism\": \"免疫抑制削弱疫苗安全性\"},"
          - text: "{\"drug_a\": \"dexamethasone\", \"drug_b\": \"fluoroquinolones\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增加肌腱炎和肌腱断裂风险\", \"mechanism\": \"叠加的肌腱毒性\"}"
          - text: "]"
          - text: "},"
          - text: "{"
          - text: "\"generic_name\": \"dyphylline and guaifenesin\","
          - text: "\"interactions\": ["
          - text: "{\"drug_a\": \"dyphylline\", \"drug_b\": \"CYP1A2 inhibitors\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"升高茶碱类药物血药浓度，增加恶心、心律失常、惊厥等毒性风险\", \"mechanism\": \"代谢抑制导致药物蓄积\"},"
          - text: "{\"drug_a\": \"dyphylline\", \"drug_b\": \"beta-adrenergic agonists\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增强对心脏的刺激作用，增加心动过速和心律失常风险\", \"mechanism\": \"药效学协同对心脏的肾上腺素能刺激\"}"
          - text: "]"
          - text: "},"
          - text: "{"
          - text: "\"generic_name\": \"Ipratropium Inhalation Aerosol\","
          - text: "\"interactions\": ["
          - text: "{\"drug_a\": \"ipratropium\", \"drug_b\": \"other anticholinergic agents\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增加抗胆碱能不良反应(便秘、尿潴留、口干、视力模糊)\", \"mechanism\": \"药效学加性抗胆碱能效应\"}"
          - text: "]"
          - text: "},"
          - text: "{"
          - text: "\"generic_name\": \"reslizumab\","
          - text: "\"interactions\": []"
          - text: "},"
          - text: "{"
          - text: "\"generic_name\": \"salbutamol\","
          - text: "\"interactions\": ["
          - text: "{\"drug_a\": \"salbutamol\", \"drug_b\": \"non-selective beta-blockers\", \"interaction_type\": \"major\", \"clinical_effect\": \"诱发严重支气管痉挛，降低沙丁胺醇抢救效果\", \"mechanism\": \"药效学拮抗-阻滞支气管β2受体\"},"
          - text: "{\"drug_a\": \"salbutamol\", \"drug_b\": \"MAO inhibitors\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增加心动过速和血压升高的风险\", \"mechanism\": \"沙丁胺醇代谢抑制及拟交感活性增强\"},"
          - text: "{\"drug_a\": \"salbutamol\", \"drug_b\": \"tricyclic antidepressants\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增强对心血管系统的作用，增加心律失常风险\", \"mechanism\": \"增强沙丁胺醇对血管的拟交感作用\"},"
          - text: "{\"drug_a\": \"salbutamol\", \"drug_b\": \"high-ceiling diuretics\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"加重低钾血症，增加心电图改变风险\", \"mechanism\": \"叠加的排钾效应\"}"
          - text: "]"
          - text: "},"
          - text: "{"
          - text: "\"generic_name\": \"aripiprazole (oral)\","
          - text: "\"interactions\": ["
          - text: "{\"drug_a\": \"aripiprazole\", \"drug_b\": \"CYP2D6 strong inhibitors\", \"interaction_type\": \"major\", \"clinical_effect\": \"升高阿立哌唑血药浓度，增加锥体外系症状和镇静风险\", \"mechanism\": \"CYP2D6代谢抑制\"},"
          - text: "{\"drug_a\": \"aripiprazole\", \"drug_b\": \"CYP3A4 strong inducers\", \"interaction_type\": \"major\", \"clinical_effect\": \"降低阿立哌唑血药浓度，可能导致治疗失败\", \"mechanism\": \"CYP3A4代谢诱导\"},"
          - text: "{\"drug_a\": \"aripiprazole\", \"drug_b\": \"CYP3A4 strong inhibitors\", \"interaction_type\": \"major\", \"clinical_effect\": \"显著升高阿立哌唑血药浓度，增加不良反应风险\", \"mechanism\": \"CYP3A4代谢抑制\"},"
          - text: "{\"drug_a\": \"aripiprazole\", \"drug_b\": \"other CNS depressants\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增强镇静、嗜睡和呼吸抑制风险\", \"mechanism\": \"药效学中枢神经系统协同抑制\"},"
          - text: "{\"drug_a\": \"aripiprazole\", \"drug_b\": \"QT-prolonging agents\", \"interaction_type\": \"moderate\", \"clinical_effect\": \"增加QT间期延长和尖端扭转型室速的风险\", \"mechanism\": \"叠加的心脏电生理效应\"}"
          - text: "]"
          - text: "},"
