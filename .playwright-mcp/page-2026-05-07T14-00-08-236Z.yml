        - generic [ref=e97]:
          - generic [ref=e99]: "你是一位临床药学专家。请评估以下医疗用药推荐系统对30种疾病的推荐结果是否临床适当。对每种疾病，判断推荐药物是APPROPRIATE（全部适当）、PARTIALLY（部分适当但有不适当药物）还是INAPPROPRIATE（主要药物不适当）。 疾病和推荐药物列表： 1. 冠心病(coronary artery disease): Perindopril, Amlodipine, amlodipine and benazepril, amlodipine and perindopril 2. 心肌梗死(myocardial infarction): Aspirin, Captopril, Prasugrel, Ticagrelor 3. 肺栓塞(pulmonary embolism): Apixaban, Enoxaparin, Rivaroxaban, Tenecteplase 4. 高血脂(hyperlipidemia): Pitavastatin, Pravastatin, amlodipine and atorvastatin, niacin 5. 1型糖尿病(type 1 diabetes): Insulin Aspart, Insulin Detemir, insulin inhalation, teplizumab-mzwv 6. 甲减(hypothyroidism): Liotrix, Levothyroxine, Liothyronine, levothyroxine oral/injection 7. 慢阻肺(COPD): Albuterol-Ipratropium, Ipratropium, Olodaterol, Umeclidinium 8. 胃溃疡(peptic ulcer): Cimetidine, Dexlansoprazole, aluminum hydroxide, calcium carbonate+famotidine+magnesium hydroxide 9. 溃疡性结肠炎(ulcerative colitis): Golimumab, Infliximab, Tofacitinib, Mesalamine 10. 克罗恩病(Crohn disease): Methotrexate, Infliximab, Mesalamine, Adalimumab 11. 肠易激综合征(IBS): Rifaximin, Dicyclomine, psyllium, polycarbophil 12. 便秘(constipation): Magnesium Hydroxide, Magnesium Oxide, Methylnaltrexone, Docusate 13. 肝炎(hepatitis): Tenofovir, Lamivudine, Sofosbuvir, Telbivudine 14. 抑郁症(major depressive disorder): Amitriptyline, Bupropion, desipramine, nortriptyline 15. 焦虑症(anxiety disorder): Alprazolam, Aripiprazole, Venlafaxine, venlafaxine HCl 16. 分簇性头痛(cluster headache): Ergotamine, Lithium, dihydroergotamine nasal, ergotamine+caffeine 17. 帕金森病(Parkinson disease): Selegiline, Rasagiline, Entacapone, Tolcapone 18. 多动症(ADHD): Clonidine, Bupropion, viloxazine, dexmethylphenidate+serdexmethylphenidate 19. 惊恐障碍(panic disorder): Alprazolam, Chlordiazepoxide, Venlafaxine, Alprazolam Oral Solution 20. 社交焦虑(social anxiety): Citalopram, Aripiprazole, Venlafaxine, venlafaxine HCl 21. 支气管炎(bronchitis): Lomefloxacin, dyphylline+guaifenesin, Sulfamethoxazole, Telithromycin 22. 感冒(common cold): Cefpodoxime, Cefixime, Cefaclor, Cefuroxime 23. 胆囊炎(cholecystitis): Lansoprazole, Omeprazole, Rabeprazole, Pantoprazole 24. 胆结石(cholelithiasis): Lansoprazole, Omeprazole, Rabeprazole, Pantoprazole 25. 阿尔茨海默病(Alzheimer disease): aducanumab, vitamin E variants, vitamin e oral 26. 强迫症(OCD): Propranolol, Nefazodone, Paroxetine, Clomipramine 27. 尿路结石(urinary calculi): Allopurinol, Cefepime, Cefpodoxime, Cefixime 28. 代谢综合征(metabolic syndrome): Captopril, Irbesartan, Losartan, Olmesartan 29. 肠炎(enteritis): Golimumab, Budesonide, Infliximab, Tofacitinib 30. 低血压(hypotension): Norepinephrine, Fludrocortisone, Captopril, Irbesartan 请用以下格式回复每种疾病的评估： 疾病编号: 判断(APPROPRIATE/PARTIALLY/INAPPROPRIATE) - 简要理由"
