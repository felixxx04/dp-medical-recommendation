            - list [ref=e359]:
              - listitem [ref=e360]:
                - paragraph [ref=e361]: "tenofovir disoproxil (TDF) - NRTI。主要交互：肾毒性药物（如氨基糖苷类、两性霉素B、膦甲酸、西多福韦、NSAIDs等）可增加肾毒性风险；与去羟肌苷（ddI）合用增加去羟肌苷浓度和毒性（ddI水平升高，可能引发胰腺炎、乳酸酸中毒），严重交互。另外，与阿德福韦或其它肾毒性药物。需要列出major和moderate。替诺福韦与某些蛋白酶抑制剂合用可能增加替诺福韦浓度，但那是与增效剂。但作为单独药物，主要交互是肾毒性药物，和ddI。去羟肌苷相互作用：替诺福韦增加去羟肌苷浓度，机制是抑制其嘌呤核苷磷酸化酶？实际上TDF增加ddI AUC，机制可能是竞争肾小管分泌？确切机制是替诺福韦增加去羟肌苷的浓度，可能导致严重毒性，是禁忌或major。还有与阿扎那韦合用：阿扎那韦需要酸性环境，与TDF合用会降低阿扎那韦浓度，但那是阿扎那韦与替诺福韦组合时需要用利托那韦或考比司他增效。但单独的替诺福韦与阿扎那韦无增效剂时，相互作用是阿扎那韦水平降低，反之为moderate。可列。还有与其它肾毒性药物。还要考虑与丙磺舒等。常见的：与NSAIDs可能增加肾毒性，moderate。与ACEi/ARB也可能有肾毒性增加。先列出几个重要交互：去羟肌苷 (ddI) - major；肾毒性药物 (aminoglycosides, amphotericin B, etc.) - major/moderate；与蛋白酶抑制剂阿扎那韦 (未增效) - moderate 降低阿扎那韦浓度。drug_b使用类别。我将生成：{\"drug_a\": \"tenofovir disoproxil\", \"drug_b\": \"didanosine\", \"interaction_type\": \"major\", \"clinical_effect\": \"增加去羟肌苷浓度和毒性风险（如胰腺炎、乳酸酸中毒）\", \"mechanism\": \"替诺福韦增加去羟肌苷的吸收/降低清除\"}, 注意机制。然后与肾毒性药物：\"drug_b\": \"nephrotoxic agents (e.g., aminoglycosides, amphotericin B)\", \"interaction_type\": \"major\", \"clinical_effect\": \"增加肾毒性风险\", \"mechanism\": \"药效学相加肾毒性\"}。与NSAIDs: \"moderate\", \"clinical_effect\": \"增加肾功能损害风险\", \"mechanism\": \"两者均影响肾脏灌注或肾小管功能\"}。与atazanavir (unboosted): \"moderate\", \"降低阿扎那韦血药浓度，可能导致HIV治疗失败\", \"mechanism\": \"替诺福韦降低阿扎那韦吸收/增加其清除\"?(实际是TDF减少阿扎那韦的AUC，机制不明，可能涉及pH，建议阿扎那韦需与利托那韦合用)。还可以与ledipasvir (丙肝药) 增加TDF浓度，但未要求丙肝药。但可以列与sofosbuvir/ledipasvir等，但这可能不是常见类别，优先列常见类别。暂列这些。"
              - listitem [ref=e362]:
                - paragraph [ref=e363]: "lopinavir and ritonavir (克力芝) - 蛋白酶抑制剂组合。包含利托那韦作为PK增效剂，是强CYP3A4抑制剂，同时也是CYP2D6抑制剂等。洛匹那韦也是CYP3A4底物和抑制剂。主要交互：与CYP3A4底物药物合用，导致底物浓度升高，出现严重毒性，如与抗心律失常药（胺碘酮、奎尼丁等）、麦角生物碱、西沙必利、匹莫齐特、咪达唑仑/三唑仑（口服）、辛伐他汀/洛伐他汀、阿夫唑嗪、沙美特罗？等等，这些都是禁忌或major。需列出重要的常见类别：与抗凝药如利伐沙班、阿哌沙班，华法林（影响不确定但可能），但利托那韦诱导CYP2C9和抑制CYP3A4，华法林相互作用可能复杂，可以列中度。与抗抑郁药（如曲唑酮，增加浓度，镇静，QT延长），抗真菌药如酮康唑（相互抑制），抗惊厥药（卡马西平、苯妥英、苯巴比妥降低PI浓度，major），与利福平（禁忌，显著降低浓度），与吸入氟替卡松（可能导致库欣综合征，major），与抗酸药/抑酸药（降低洛匹那韦吸收？），与HMG-CoA还原酶抑制剂（辛伐他汀、洛伐他汀禁忌，major；阿托伐他汀、瑞舒伐他汀需谨慎moderate）。还可与PDE5抑制剂（西地那非等增加浓度和低血压）。与圣约翰草（降低浓度，禁忌major）。与抗精神病药（氯氮平、匹莫齐特禁忌）。与抗心律失常药。列出主要几个，确保drug_a是\"lopinavir and ritonavir\"。要求优先列出常见类别。我会列出：与抗心律失常药 class IA, III；麦角生物碱；西沙必利；镇静催眠药（口服咪达唑仑，三唑仑）；HMG-CoA还原酶抑制剂（辛伐他汀、洛伐他汀）；α1受体阻断药（阿夫唑嗪）；抗精神病药（匹莫齐特）；抗结核药（利福平）；抗惊厥药（卡马西平，苯妥英）；吸入氟替卡松；沙美特罗？。还有与PDE5抑制剂。选择几个major和moderate。例如：\"drug_b\": \"class IA and III antiarrhythmics (e.g., amiodarone, quinidine)\", \"interaction_type\": \"major\", \"clinical_effect\": \"增加抗心律失常药浓度导致严重心律失常\", \"mechanism\": \"强CYP3A4抑制\"。与 \"ergot alkaloids\" major: 增加麦角中毒风险。与 \"rifampin\" major: 显著降低洛匹那韦浓度，导致HIV治疗失败。与 \"carbamazepine\" moderate: 降低洛匹那韦浓度，可能同时增加卡马西平浓度。与 \"inhaled fluticasone\" major: 导致库欣综合征，肾上腺抑制。与 \"simvastatin, lovastatin\" major: 增加横纹肌溶解风险。与 \"PDE5 inhibitors (sildenafil, tadalafil)\" major: 增加PDE5抑制剂浓度，导致低血压，异常勃起。与 \"midazolam (oral), triazolam\" major: 过度镇静，呼吸抑制。这些都可以。机制：强CYP3A4抑制/诱导等。利托那韦是CYP3A4、2D6抑制剂，也可诱导其他酶。"
              - listitem [ref=e364]:
                - paragraph [ref=e365]: etravirine - NNRTI，是CYP3A4诱导剂，CYP2C9，CYP2C19诱导剂，同时也是CYP2C9和2C19的抑制剂？实际上依曲韦林是CYP3A4诱导剂，轻度至中度诱导，同时也是CYP2C9，2C19抑制剂。相互作用较多。主要与CYP3A4底物药物合用会降低其浓度（如激素避孕药，抗凝药，免疫抑制剂），还有与其他NNRTIs? 不能与未增效的蛋白酶抑制剂合用？依曲韦林与某些蛋白酶抑制剂（如替拉那韦/利托那韦，阿扎那韦/利托那韦等）有相互作用。常见的重要交互：与抗凝药（华法林，降低其浓度？机制复杂，依曲韦林诱导CYP2C9，会降低S-华法林浓度，可能需要增加剂量，密切监测INR，moderate或major）。与激素避孕药（降低其浓度，导致避孕失败，major）。与抗惊厥药（卡马西平，苯妥英，苯巴比妥降低依曲韦林浓度，major禁忌）。与抗真菌药（伊曲康唑，酮康唑，可能影响依曲韦林，但通常合用需谨慎）。与免疫抑制剂（环孢素，他克莫司，西罗莫司，依曲韦林诱导CYP3A4降低其浓度，moderate/major）。与圣约翰草降低依曲韦林浓度。与克拉霉素（相互影响）。与丁丙诺啡（可能降低依曲韦林浓度）。与美沙酮（可能需要调整）。我将列出：与卡马西平/苯妥英（major降低依曲韦林浓度），与激素避孕药（major避孕失败），与华法林（moderate可能降低抗凝效果），与免疫抑制剂（他克莫司等moderate），与利福平（禁忌major），与质子泵抑制剂/抗酸药（依曲韦林需要酸性环境，抗酸药降低其吸收，moderate），与圣约翰草（major）。与阿托伐他汀等（降低他汀浓度）。选重要的。
              - listitem [ref=e366]:
                - paragraph [ref=e367]: abacavir (ABC) - NRTI。主要交互：与酒精（乙醇）增加阿巴卡韦水平？实际上阿巴卡韦与乙醇竞争醇脱氢酶，导致阿巴卡韦消除减少，AUC增加41%，但通常无临床显著影响，列为moderate。与美沙酮：美沙酮降低阿巴卡韦浓度，但机制不明，可能需要调整剂量。与利巴韦林：可能增加乳酸酸中毒风险。无major交互。可列与酒精moderate，与美沙酮moderate。也可与肾毒性药物无关。就这样。
