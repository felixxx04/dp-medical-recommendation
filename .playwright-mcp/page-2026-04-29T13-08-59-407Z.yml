                - paragraph [ref=e415]: doravirine, lamivudine, and tenofovir - 同上，多拉韦林交互+替诺福韦。与前面类似。
              - listitem [ref=e416]:
                - paragraph [ref=e417]: fostemsavir 重复，同前。
              - listitem [ref=e418]:
                - paragraph [ref=e419]: doxylamine (多西拉敏) - 抗组胺镇静药，具有抗胆碱作用。与CNS抑制剂（酒精，苯二氮卓类，阿片类，其他镇静药）合用增强中枢抑制，moderate或major（严重镇静、呼吸抑制）。与MAOIs合用可能延长和增强抗胆碱作用，major。与其它抗胆碱能药物增加副作用。与抗高血压药对血压影响不大。列出：与CNS depressants (opioids, benzodiazepines, alcohol) major，与MAO inhibitors major，与其他抗胆碱能药物 moderate（口干，便秘，视力模糊等）。这些可以。
              - listitem [ref=e420]:
                - paragraph [ref=e421]: corticotropin (促皮质素) - 刺激肾上腺皮质分泌皮质醇。与皮质类固醇类似，但其作用依赖肾上腺功能。交互：与可能导致低钾血症的药物（如利尿剂，两性霉素B，刺激性泻药）合用增加低钾风险 moderate/major。与NSAIDs增加胃肠溃疡风险。与血管紧张素转换酶抑制剂（ACEi）、血管紧张素受体拮抗剂（ARB）影响未知？但主要。可以列出与排钾利尿剂 moderate (低钾血症)。与NSAIDs moderate（溃疡风险）。与疫苗（活疫苗）可能抑制免疫反应 moderate。与抗糖尿病药（增高血糖） moderate。这些常见。
              - listitem [ref=e422]:
                - paragraph [ref=e423]: dexbrompheniramine (右溴苯那敏) - 抗组胺药，具有镇静和抗胆碱作用。交互类似多西拉敏：与CNS抑制剂 major，与MAOIs major，与抗胆碱药 moderate。可列。
              - listitem [ref=e424]:
                - paragraph [ref=e425]: dexbrompheniramine and phenylephrine 组合（右溴苯那敏+去氧肾上腺素）- 去氧肾上腺素是α1激动剂，用于鼻减充血。可能与MAOIs合用导致严重高血压危机major。与三环类抗抑郁药可能增强升压作用。与β阻滞剂可能减弱去氧肾上腺素效果，或加重高血压。与催产素等。药物交互：与MAO inhibitors major（高血压危象），与CNS抑制剂 moderate镇静（右溴苯那敏），与三环类抗抑郁药 moderate（增强升压效应），与抗高血压药 moderate（去氧肾上腺素拮抗降压效果）。列出。
              - listitem [ref=e426]:
                - paragraph [ref=e427]: doxylamine succinate 同 doxylamine。
              - listitem [ref=e428]:
                - paragraph [ref=e429]: donepezil (oral) - 胆碱酯酶抑制剂。交互：与抗胆碱能药物拮抗其认知效果，moderate（降低多奈哌齐疗效）。与拟胆碱药物（如氨甲酰甲胆碱）协同，增加胆碱能副作用。与可延长QT间期的药物合用增加尖端扭转型风险（多奈哌齐可致心动过缓），moderate。与NSAIDs合用增加胃酸和溃疡风险（胆碱能活性增加胃酸分泌），moderate。与CYP2D6、3A4抑制剂（如酮康唑，帕罗西汀）可能增加其浓度，但不需调整，moderate。与琥珀酰胆碱（肌松药）可能延长肌松作用。抗精神病药等。重要：与抗胆碱药 moderate，与延长QT药物 moderate，与NSAIDs moderate。列出。
              - listitem [ref=e430]:
                - paragraph [ref=e431]: etanercept - TNF抑制剂。主要交互：与活疫苗（如带状疱疹活疫苗）禁忌，有播散感染风险major。与其它免疫抑制剂（如硫唑嘌呤，环磷酰胺）可能增加免疫抑制/恶性肿瘤风险。与阿那白滞素等生物制剂联合可能增加感染。与抗凝药（华法林）可能影响INR？但一般。常见：与活疫苗 major，与其它生物DMARDs（如阿巴西普，阿那白滞素，托珠单抗）联合使用增加感染风险，不推荐，major。与安乃近？就这些。
              - listitem [ref=e432]:
                - paragraph [ref=e433]: rivastigmine (oral) - 胆碱酯酶抑制剂，交互与多奈哌齐类似：抗胆碱药拮抗，与NSAIDs增加溃疡，与延长QT药物，与拟胆碱药，与琥珀酰胆碱。还有与美托洛尔，卡维地洛合用可能导致心动过缓。可列 moderate抗胆碱药，NSAIDs，与β阻断剂 moderate（心动过缓）。
              - listitem [ref=e434]:
                - paragraph [ref=e435]: galantamine - 类似胆碱酯酶抑制剂。交互同上：抗胆碱药，NSAIDs，与酮康唑、帕罗西汀（CYP2D6和3A4抑制剂）增加其浓度 moderate，与β阻断剂心动过缓。列出。
              - listitem [ref=e436]:
                - paragraph [ref=e437]: donepezil and memantine (多奈哌齐和美金刚) - 多奈哌齐交互同上，美金刚是NMDA拮抗剂，交互：与金刚烷胺、克他命等增加CNS毒性，与酸碱平衡影响（尿液碱化剂如碳酸酐酶抑制剂降低美金刚清除），与碳酸酐酶抑制剂（乙酰唑胺） moderate增加美金刚浓度/毒性。与左旋多巴可能影响。与华法林可能增加INR。列出：多奈哌齐相关抗胆碱药 moderate，美金刚与碳酸酐酶抑制剂 moderate，与金刚烷胺 moderate等。可以结合。
              - listitem [ref=e438]:
                - paragraph [ref=e439]: vitamin E (tocopherol) 口服：维生素E可能与抗凝药（华法林，抗血小板药）合用增加出血风险，特别是高剂量，moderate。与铁剂？没什么。与环孢素可能？列出与抗凝药（warfarin, antiplatelet agents）moderate增加出血风险。
              - listitem [ref=e440]:
                - paragraph [ref=e441]: vitamin e (oral route) 同。
              - listitem [ref=e442]:
                - paragraph [ref=e443]: aducanumab-avwa 阿杜那单抗抗淀粉样蛋白抗体。交互：与抗血小板药物，抗凝药在治疗期间可能增加脑出血风险（ARIA），需谨慎。moderate。与溶栓药物
