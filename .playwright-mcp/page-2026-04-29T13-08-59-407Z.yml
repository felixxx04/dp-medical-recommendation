            - paragraph [ref=e353]: 我们需要为输入列表中的每种药物生成重要的药物相互作用列表，只列出major和moderate交互，具有临床意义，影响安全或疗效。每个交互包含drug_a（当前药物），drug_b（交互药物，使用通用类别名），interaction_type，clinical_effect，mechanism。优先列出与常见药物类的交互（抗凝药、抗抑郁药、抗真菌药、抗酸药等）。对于组合药物，列出每个成分的交互。输入药物列表很多，要求JSON输出。
            - paragraph [ref=e354]: "需要仔细分析每个药物。输入药物列表包含很多HIV药物（NRTIs, PIs, NNRTIs, INSTIs, 组合），以及其他类别的药物如多塞平、胆碱酯酶抑制剂、维生素E、阿司匹林、硝酸甘油、雷诺嗪、美托洛尔，还有免疫球蛋白、促皮质素、抗组胺药等。输出JSON数组，每个对象有generic_name和interactions数组。generic_name应该使用输入中给出的药品名，例如\"tenofovir disoproxil\"等。注意有些药物是组合，如\"lopinavir and ritonavir\"，应作为组合列出，并考虑成分相互作用。对于组合药物，要求“对于组合药物，列出每个成分的交互”，意味着我们需要在interactions里反映出组合中各个成分的相互作用，但整个药物作为一个generic_name，interactions可能是所有成分交互的集合。可能需要列出drug_a为组合名称或成分？题目要求drug_a是药物名称(当前药物)，如果是组合药物，drug_a是组合名还是成分名？看示例：示例中是单个药物。但要求说“对于组合药物，列出每个成分的交互”，所以可能interactions中的drug_a应使用成分名，或者我们使用组合名，但在机制里说明。但是drug_a要求是“药物名称(当前药物)”，如果当前药物是组合，如\"lopinavir and ritonavir\"，可以作为一个整体，但交互可能涉及其中一个成分，如洛匹那韦是CYP3A4底物/抑制剂，利托那韦是强CYP3A4抑制剂。可以列出针对这个组合的交互，drug_a写\"lopinavir and ritonavir\"，然后交互类型等。但可能更清晰是列出每个活性成分的交互，但generic_name是组合名称。在JSON中，generic_name是输入药物名，interactions列表中drug_a应该与generic_name对应或具体成分？根据描述\"drug_a: 药物名称(当前药物)\"，所以对于组合药，drug_a就填组合名称，如\"lopinavir and ritonavir\"。但为了满足“列出每个成分的交互”，我们可以把成分的交互也以组合名称作为drug_a，并说明涉及哪个成分。例如，\"lopinavir and ritonavir\"与CYP3A4底物药物的交互，机制可以说“ritonavir强CYP3A4抑制作用导致底物浓度升高”，临床效应相应。这样drug_a都是组合名。类似地，\"emtricitabine and tenofovir\"是一个组合，交互可以包括替诺福韦的肾毒性、恩曲他滨无显著交互，但要注意替诺福韦与肾毒性药物的交互。按要求列出major/moderate交互。"
