              - listitem [ref=e380]:
                - paragraph [ref=e381]: dolutegravir and rilpivirine (多替拉韦/利匹韦林) - 多替拉韦是INSTI，主要经UGT1A1代谢，抑制肾小管转运蛋白（OCT2, MATE）等。利匹韦林是NNRTI，CYP3A4底物，受CYP3A诱导剂/抑制剂影响，同时利匹韦林吸收依赖酸性环境。此组合药物交互：多替拉韦与多价阳离子（抗酸药、含钙/铁/镁/锌制剂）络合，降低吸收（major，需间隔时间）。多替拉韦与利福平需剂量加倍（moderate）。多替拉韦与卡马西平、苯妥英、苯巴比妥、圣约翰草等诱导剂可能降低多替拉韦浓度（moderate或major，禁忌）。多替拉韦与二甲双胍增加二甲双胍浓度（moderate），因抑制OCT2。利匹韦林：抗酸药、H2受体拮抗剂、质子泵抑制剂显著降低利匹韦林吸收（禁忌或major），因需要酸性环境。利匹韦林与CYP3A4诱导剂（利福平，卡马西平，苯妥英，圣约翰草）禁忌，降低浓度导致治疗失败。利匹韦林与CYP3A4抑制剂如克拉霉素、唑类抗真菌药，可能增加利匹韦林浓度和QT延长的风险（moderate）。利匹韦林与延长QT的药物合用增加尖端扭转型室速风险。所以组合交互包含多替拉韦和利匹韦林的各自重要交互。我们需要为这个组合列出交互，drug_a是"dolutegravir and rilpivirine"。可以列出：与多价阳离子抗酸剂/补充剂（major降低多替拉韦吸收），与质子泵抑制剂（major降低利匹韦林吸收），与利福平（major降低利匹韦林和多替拉韦），与卡马西平/苯妥英（major），与圣约翰草（major），与二甲双胍（moderate增加二甲双胍水平），与延长QT的药物如某些抗心律失常药（moderate，利匹韦林有QT延长风险）。另外，多替拉韦与阿扎那韦等无额外。我们就列重要的。
