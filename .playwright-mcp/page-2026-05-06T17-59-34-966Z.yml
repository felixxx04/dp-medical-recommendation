          - generic [ref=e263]: "请评估以下6例用药推荐是否正确。对每例，回答：1)推荐药物是否匹配疾病适应症(正确/部分正确/错误) 2)是否有禁忌冲突 3)排序是否合理 4)如有错误应推荐什么 【病例P0007】 患者疾病: acid reflux 推荐药物: 碳酸钙 (Calcium Carbonate) - 匹配疾病: 反酸, 适应症: acid reflux, antacid, osteoporosis, 分数: 1.0 考来维仑 (Colesevelam) - 匹配疾病: 胆汁酸吸收不良性腹泻, 适应症: diabetes, hypercholesterolemia, hyperlipidemia, 分数: 1.0 奥美拉唑 (Omeprazole) - 匹配疾病: 反酸, 适应症: acid reflux, gastroesophageal reflux disease, h. pylori eradication, 分数: 1.0 雷贝拉唑 (Rabeprazole) - 匹配疾病: 反酸, 适应症: acid reflux, gastroesophageal reflux disease, h. pylori eradication, 分数: 1.0 【病例P0017】 患者疾病: acne, back pain, hypertension 推荐药物: 氨氯地平 (Amlodipine) - 匹配疾病: 高血压, 适应症: angina, hypercholesterolemia, hypertension, 分数: 1.0 氨氯地平-贝那普利 (Amlodipine-Benazepril) - 匹配疾病: 高血压, 适应症: hypertension, 分数: 1.0 波生坦 (Bosentan) - 匹配疾病: 肺动脉高压, 适应症: pulmonary arterial hypertension, 分数: 1.0 布美他尼 (Bumetanide) - 匹配疾病: 高血压, 适应症: edema, heart failure, hypertension, 分数: 1.0 【病例P0038】 患者疾病: acute bacterial sinusitis 推荐药物: 阿米卡星 (Amikacin) - 匹配疾病: 尿路感染, 适应症: bacterial urinary tract infection, pneumonia, 分数: 1.0 阿莫西林克拉维酸 (Amoxicillin-Clavulanate) - 匹配疾病: 细菌性皮肤感染, 适应症: bacterial infections, bacterial skin infection, otitis media, 分数: 1.0 阿奇霉素 (Azithromycin) - 匹配疾病: 细菌性结膜炎, 适应症: acute bacterial sinusitis, bacterial conjunctivitis, common cold, 分数: 1.0 卡立普多 (Carisoprodol) - 匹配疾病: 急性肌肉疼痛, 适应症: back pain, muscle pain, 分数: 1.0 【病例P0056】 患者疾病: adenocarcinoma of pancreas, hypertension 推荐药物: 氨氯地平 (Amlodipine) - 匹配疾病: 高血压, 适应症: angina, hypercholesterolemia, hypertension, 分数: 1.0 氨氯地平-贝那普利 (Amlodipine-Benazepril) - 匹配疾病: 高血压, 适应症: hypertension, 分数: 1.0 氨氯地平缬沙坦 (Amlodipine-Valsartan) - 匹配疾病: 高血压, 适应症: hypertension, 分数: 1.0 贝那普利 (Benazepril) - 匹配疾病: 高血压, 适应症: heart failure, hypertension, 分数: 1.0 【病例P0274】 患者疾病: allergic rhinitis, sore throat 推荐药物: 左卡巴斯汀 (Levocabastine) - 匹配疾病: 过敏性结膜炎, 适应症: allergic conjunctivitis, conjunctivitis, 分数: 1.0 奥洛他定 (Olopatadine) - 匹配疾病: 过敏性鼻炎, 适应症: allergic conjunctivitis, allergic rhinitis, conjunctivitis, 分数: 1.0 泼尼松龙 (Prednisolone) - 匹配疾病: 过敏性疾病, 适应症: allergy, asthma, atopic dermatitis, 分数: 1.0 地塞米松 (Dexamethasone) - 匹配疾病: 过敏性疾病, 适应症: allergy, asthma, atopic dermatitis, 分数: 1.0 【病例P0039】 患者疾病: allergy, anxiety, endometriosis, psoriasis 推荐药物: 氯米帕明 (Clomipramine) - 匹配疾病: 焦虑, 适应症: anxiety, depression, ocd, 分数: 1.0 苯乙肼 (Phenelzine) - 匹配疾病: 焦虑, 适应症: anxiety, depression, social phobia, 分数: 1.0 普萘洛尔 (Propranolol) - 匹配疾病: 焦虑, 适应症: anxiety, arrhythmia, essential tremor, 分数: 1.0 帕罗西汀 (Paroxetine) - 匹配疾病: 焦虑, 适应症: anxiety, depression, fibromyalgia, 分数: 1.0"
