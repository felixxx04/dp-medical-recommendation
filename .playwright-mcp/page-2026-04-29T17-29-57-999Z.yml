            - paragraph [ref=e426]: "需要为每种药物生成交互。注意有的药物是同一个generic但不同剂型或品牌，需合并处理。例如 ustekinumab 和 Ustekinumab Brand name: Stelara 可以合并为 ustekinumab。同样 secukinumab, ixekizumab, guselkumab, infliximab 的不同品牌或生物类似药，本质上是同一活性成分，交互相同。输入中还有 methotrexate (injection) 和 methotrexate (injection route, subcutaneous route) 都是methotrexate注射，可合并。另外 vancomycin 口服和注射有不同适应症，但药物交互可能不同，需要考虑口服几乎不吸收，主要作用于肠道，系统交互少。但 vancomycin capsules 和 vancomycin (oral route) 相同。同样，aztreonam inhalation 可能主要是局部，但仍有吸收，但通常系统交互较少。需要查一下临床知识：氨曲南吸入可能用于囊性纤维化，可能与其他药物，但主要看机制。下面我需要基于药物知识生成交互列表。确保优先列出与常见药物类的交互，如抗凝药（warfarin），抗抑郁药（MAO inhibitors, SSRIs等），抗真菌药（azole antifungals），抗酸药（antacids），还有其它如他汀类、降压药等。对于抗生素，常见交互包括：与抗凝药（增强抗凝）、与口服避孕药（可能降低效果）、与丙戊酸、与甲氨蝶呤（某些抗生素增加毒性）、与神经肌肉阻滞剂（氨基糖苷类）、耳毒性/肾毒性药物等。还有QT延长、光敏等。对于生物制剂（白介素抑制剂、TNF抑制剂），交互包括：与活疫苗（禁忌）、与其他免疫抑制剂（增加感染风险）、与CYP代谢的窄治疗药物（某些生物制剂可能影响细胞因子调节CYP酶，导致药物代谢改变，如IL-6抑制剂托珠单抗会影响CYP，但这里的是IL-17, IL-23, IL-12/23抑制剂，ustekinumab是IL-12/23，secukinumab、ixekizumab是IL-17A，guselkumab、tildrakizumab、risankizumab是IL-23抑制剂。这类药物可能通过抑制慢性炎症可能恢复CYP酶活性，理论上可降低经CYP代谢的药物的浓度，如华法林，环孢素等。但通常对于IL-17, IL-23抑制剂，这种影响没有像IL-6抑制剂那样明确，但说明书可能提及与CYP底物合用应当监测。TNF抑制剂与华法林？也可能。需要分析。acitretin是维A酸类，有与维生素A、四环素类、甲氨蝶呤、酒精等的交互。methotrexate有与NSAIDs、质子泵抑制剂、青霉素、TMP/SMX、酒精等交互。cyclosporine有许多交互：与CYP3A4抑制剂/诱导剂，与保钾利尿剂、他克莫司、他汀类、秋水仙碱等。amikacin是与肾毒性/耳毒性药物、神经肌肉阻滞剂、袢利尿剂等。delafloxacin是喹诺酮类，有QT延长、与螯合剂（抗酸药、钙、铁、锌）、华法林、降糖药等。lefamulin是截短侧耳素类，CYP3A4底物和抑制剂？需要确认。是CYP3A4底物，与强CYP3A4抑制剂或诱导剂相互作用，也有QT延长。omadacycline是四环素类，与螯合剂、抗凝药、口服避孕药等。cefotetan有甲基四氮唑侧链，与酒精（双硫仑样反应），与抗凝药增加出血风险。ampicillin/sulbactam，青霉素类，可能与甲氨蝶呤（减少甲氨蝶呤清除）、抗凝药（可能增强）。avibactam/ceftazidime，头孢类，与丙磺舒、抗凝药。ceftolozane/tazobactam，头孢/β内酰胺酶抑制剂。nafcillin, oxacillin是耐青霉素酶青霉素，强CYP诱导剂，可降低华法林、环孢素、口服避孕药等。penicillin V, penicillin G等，主要与甲氨蝶呤、抗凝药。还有procaine penicillin，普鲁卡因成分可能与磺胺类、胆碱酯酶抑制剂等。bacitracin注射有肾毒性，与其他肾毒性药物相互作用。pramoxine and hydrocortisone rectal cream，局部用药，几乎不吸收，系统交互可能性小，但氢化可的松直肠可能吸收，尤其是破损，但口服或周身用药物交互？但可能无major/moderate交互，但可考虑与抗凝药（局部类固醇？）无。可能需要列无显著交互，但要求为每种药物生成重要的交互，不能为空。如果实在没有，可以留空数组？要求每个药物生成列表，但可以空列表。最好找出至少一个moderate交互。例如氢化可的松局部/直肠：与口服降糖药？没有。与去氨加压素有风险低钠？无。"
