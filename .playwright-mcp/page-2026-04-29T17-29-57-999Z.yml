            - paragraph [ref=e542]: "cyclosporine (oral)：详见前面。交互很多：major: CYP3A4 inhibitors (azole antifungals, macrolides, grapefruit juice) increase toxicity; CYP3A4 inducers (rifampin, St. John's wort) decrease efficacy; HMG-CoA reductase inhibitors (statins) increase myopathy/rhabdomyolysis risk; 其它肾毒性药物 increase nephrotoxicity. moderate: potassium-sparing diuretics (hyperkalemia); NSAIDs (nephrotoxicity); colchicine (toxicity). 此外，与钙通道阻滞剂（地尔硫卓，维拉帕米）等升高环孢素水平，可moderate. 但我会列出与 azole antifungals, macrolides (erythromycin, clarithromycin), rifampin, statins, 氨基糖苷类 等。"
