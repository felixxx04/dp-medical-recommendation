            - paragraph [ref=e513]: "注意 lefamulin: 主要用于社区获得性肺炎，口服/注射。已知是CYP3A4底物和转运动物？是CYP3A4底物，与强CYP3A4抑制剂酮康唑合用，lefamulin AUC增加，可能增加QT延长和副作用。与CYP3A4诱导剂利福平合用，浓度降低。也有QT延长，与其它延长QT药物合用增加风险。所以交互：与强CYP3A4抑制剂(如 ketoconazole, clarithromycin) etc. 和 强CYP3A4诱导剂，以及QT延长药物（如Class Ia, III抗心律失常药）等。"
            - paragraph [ref=e514]: 对于生物制剂：IL-17/23抑制剂，理论上炎症恢复正常可能会逆转细胞因子对CYP酶的下调，导致CYP底物药物代谢加速，浓度降低。例如ustekinumab药品说明书“The formation of CYP450 enzymes can be altered by increased levels of certain cytokines during chronic inflammation. Thus, ustekinumab could normalize CYP450 enzyme activity, and this may lead to decreased systemic exposure of CYP450 substrates with a narrow therapeutic index. Monitoring is recommended... ” 所以与窄治疗指数CYP底物（如华法林，环孢素）为中度的交互。可列为 moderate，药物类别“CYP450 substrates with narrow therapeutic index (e.g., warfarin, cyclosporine)” 临床效果“可能降低这些药物的疗效”，机制“逆转炎症导致的CYP酶抑制，使其活性正常化”。适用于ustekinumab, secukinumab, ixekizumab, guselkumab, risankizumab, tildrakizumab (IL-23/IL-17抑制剂)。infliximab和adalimumab是TNF抑制剂，也可能有类似影响，但TNF抑制剂对CYP酶的影响不同。TNF抑制剂如infliximab，可能也通过抗炎作用逆转CYP下调，降低华法林等药物浓度，有报道。所以可以列为 moderate交互。同时所有生物制剂有“活疫苗”禁忌，为major交互：“与活疫苗合用增加全身感染风险，应避免”。所以每个生物制剂至少有一个major交互： live vaccines。另外，与同时使用其他免疫抑制剂（如TNF抑制剂与IL抑制剂联合）增加免疫抑制和感染风险，可列为major或moderate。通常组合生物制剂不推荐，但如果有资料：TNF抑制剂与阿那白滞素（IL-1）合用增加严重感染风险，与IL-17抑制剂等没有特定禁忌，但通常不推荐同时使用多种生物制剂，增加感染风险，可列为moderate。还有与abatacept等。可以添加 “Other immunosuppressants (biologics)” 导致 additive immunosuppression，moderate。这样。
            - paragraph [ref=e515]: "对于acitretin: 主要的交互是与酒精（moderate? 严重？与酒精合用可增加阿维A转化为阿维A酯，延长其致畸作用，对于育龄妇女尤其重要，是 major 禁忌。其次是与四环素类增加假性脑瘤风险（major）。与甲氨蝶呤增加肝毒性风险（major）。与维生素A补充剂增加维生素A毒性（major）。还有与苯妥英（降低蛋白质结合？）等。所以需列出。"
            - paragraph [ref=e516]: "methotrexate: 注射与多种药物有严重交互。主要：NSAIDs（酮咯酸等减少甲氨蝶呤清除，增加毒性，major）；质子泵抑制剂（如奥美拉唑）可能减少MTX清除，升高水平，moderate？但实际有报告严重骨髓抑制，列为major? 一些指南列为major/interaction。可列为 moderate 或 major，通常与PPI合用可增加MTX毒性风险（尤其高剂量）。甲氨蝶呤与青霉素类药物（包括amoxicillin, penicillin）竞争肾小管分泌，减少MTX清除，导致毒性，major。与TMP/SMX（甲氧苄啶/磺胺甲恶唑）因叶酸拮抗协同，增加骨髓抑制，major。与丙戊酸可能降低丙戊酸水平？不重要。还有与酒精增加肝毒性，moderate。还有与类固醇？不是主要。与环孢素？可能增加毒性，moderate。与口服避孕药可有肝毒性？不太重要。主要交互：NSAIDs，青霉素类，probencid，PPI，TMP/SMX，叶酸拮抗剂。所以列出。"
            - paragraph [ref=e517]: "cyclosporine: 与许多药物交互，包括CYP3A4抑制剂（唑类抗真菌药，大环内酯类，葡萄柚汁）增加环孢素浓度和肾毒性，major。与CYP3A4诱导剂（利福平，卡马西平，苯妥英，圣约翰草）降低浓度，major。与保钾利尿剂（螺内酯，阿米洛利）联合增加高钾血症风险，moderate。与他汀类（洛伐他汀，辛伐他汀，阿托伐他汀）增加横纹肌溶解风险，剂型competition，major。与秋水仙碱增加毒性（尤其是神经肌肉毒性，肾功不良时），major。与ACEI/ARB：增加高钾血症和肾毒性？可moderate。与其他肾毒性药物（氨基糖苷类，两性霉素B，万古霉素等）增加肾毒性，major。与mTOR抑制剂（西罗莫司等）。还有与NSAIDs（增加肾毒性），moderate。所以需列出主要交互。"
            - paragraph [ref=e518]: 对于抗生素类，如氨曲南，没有显著系统CYP交互；但有与其他β-内酰胺类一样与丙磺舒竞争肾小管分泌（可能moderate？丙磺舒会升高氨曲南，可能需要调整，但通常临床意义不大）。与抗凝药（华法林）？可能有一些，但少见。氨曲南一般不抑制维生素K合成。吸入氨曲南全身吸收少，交互较少。可能主要与其它雾化药物合用影响肺，但非同品类。可只列与丙磺舒（probencid）可能增加氨曲南水平，moderate。但为保持一致，提供至少1个交互。也可说明无重大交互，但要求"每个药物生成重要的交互列表"，可以返回空数组，但最好有。氨曲南注射剂说明与丙磺舒相互竞争活性肾小管分泌，可能引起氨曲南浓度缓慢升高，但不建议调整。属于moderate。另外，与华法林联用抗生素可能引起凝血酶原时间改变，广谱抗生素可能影响维生素K肠道合成，但氨曲南是窄谱，对肠道菌群影响较小。可不列。
            - paragraph [ref=e519]: 青霉素V钾：主要交互：与甲氨蝶呤（减少清除，增加毒性）major；与抗凝药（华法林）可能增强，moderate；与丙磺舒竞争分泌，升高青霉素浓度，moderate；与口服避孕药可能降低避孕效果（有争议，可能moderate）；与伤寒疫苗等。列出一个主要的：与 methotrexate (major)，与 warfarin (moderate)，与 probenecid (moderate)。
            - paragraph [ref=e520]: 万古霉素口服：几乎不全身吸收，交互：与消胆胺（cholestyramine）等阴离子结合树脂可结合万古霉素，降低疗效，moderate。也可能与口服的抗酸剂含铝/镁等吸附剂？无证据。仅cholestyramine。
            - paragraph [ref=e521]: 万古霉素静脉：与肾毒性药物（氨基糖苷类，两性霉素B，环孢素，顺铂等）增加肾毒性，major；与耳毒性药物（氨基糖苷类，袢利尿剂等）增加耳毒性，moderate；与神经肌肉阻滞剂（琥珀胆碱，维库溴铵）合用时，如果腹腔内使用万古霉素可增强神经肌肉阻滞作用，静脉可能较少？但可列为 同时使用神经肌肉阻滞剂有潜在增强作用，moderate。
            - paragraph [ref=e522]: 阿米卡星注射：氨基糖苷类。肾毒性/耳毒性（与两性霉素B、万古霉素、环孢素、顺铂、袢利尿剂等）major；神经肌肉阻滞剂：增强神经肌肉阻滞，可能导致呼吸抑制，尤其是在有低钙、麻醉等情况，major；与维生素K拮抗剂：肠道菌群抑制可能增加抗凝作用，moderate；非去极化肌松药，加强作用；与某些头孢菌素可能增加肾毒性，moderate。
            - paragraph [ref=e523]: 氨苄西林/舒巴坦：含有舒巴坦，β-内酰胺酶抑制剂。交互：与甲氨蝶呤（减少清除，major）；与华法林（增强抗凝，moderate）；与丙磺舒（竞争分泌，增加氨苄西林和舒巴坦水平，moderate）；与别嘌醇可能增加皮疹发生率（主要是氨苄西林），moderate；舒巴坦本身无特殊。还有与口服避孕药，moderate。
            - paragraph [ref=e524]: 阿维巴坦/头孢他啶：阿维巴坦是新型β-内酰胺酶抑制剂。主要的交互：丙磺舒抑制OAT导致阿维巴坦血浓度升高，moderate；与华法林可能增强抗凝作用（广谱头孢类），moderate；与其他肾毒性药物？头孢他啶有潜在肾毒性但不大。可列出 probenecid 和 warfarin。
            - paragraph [ref=e525]: "氨曲南注射：与丙磺舒，moderate；与华法林？可能有轻微增强，moderate；吸入氨曲南：由于极小吸收，无重要交互，可以空，或标与丙磺舒，但吸入几乎不，可空。但要求最好有，可以列出与丙磺舒，但实际血清浓度很低，可不考虑。稳妥：吸入无signif，返回空数组。我会选择添加与 probenecid (moderate) 只是因为从机制存在，但可能没什么临床影响，但轻微，不算中重度？可以标moderate。为了不遗漏，也许列入 moderate，临床效果\"可能增加氨曲南暴露\"，mechanism\"竞争肾小管分泌\"。由于吸入主要局部，但仍有少量全身吸收，可能有影响。可列。但如果有更好的交互，如与华法林，但广谱吸入氨曲南可能影响肠道菌群，很少。我决定氨曲南吸入仅列与华法林？不，是吸入，几乎不进入消化道。吸入后可能导致全身暴露低，无影响。最好不列，空数组。或者给一个\"None significant\"，但要求生成交互，空数组允许。即 \"interactions\": []。同理pramoxine hydrocortisone直肠，亦可空。但必须确保没有major/moderate。直肠氢化可的松可能有少量吸收，若大面积使用，长期，与CYP3A4抑制剂？但氢化可的松是弱的，主要外用，没有与酮康唑等交互报道。可空。但我可以给一个 \"interactions\": []。"
            - paragraph [ref=e526]: bacitracin注射：有肾毒性，与其他肾毒性药物（氨基糖苷类、万古霉素等）合用增加肾毒性，major。也可致神经肌肉阻滞，与神经肌肉阻断剂合用，moderate。所以列。
            - paragraph [ref=e527]: delafloxacin：喹诺酮。主要交互：与螯合剂（antacids含铝/镁，钙，铁，锌，硫糖铝）显著减少吸收，应间隔服用，major；与华法林增强抗凝，moderate；与口服降糖药增强低血糖，moderate；与延长QT间期药物（如胺碘酮，氟哌啶醇，大环内酯）增加QT延长和心律失常风险，major；与非甾体抗炎药（NSAIDs）可能增加中枢神经刺激和癫痫，moderate；与皮质类固醇增加肌腱病风险，moderate。还包括与含金属离子的药。所以delafloxacin可列出螯合剂、QT延长药物、华法林等。
            - paragraph [ref=e528]: 青霉素G benzathine / procaine 组合：与甲氨蝶呤major，与华法林moderate，还有普鲁卡因可能与磺胺类拮抗作用，但significant? 普鲁卡因青霉素，普鲁卡因作为局部麻醉药，可能与其他有交互？但临床重要性低。与胆碱酯酶抑制剂（如用于重症肌无力的毒品豆碱？）可能减慢普鲁卡因代谢，增强毒性？历史上，但少用。可简单列出与华法林、甲氨蝶呤、probencid。
            - paragraph [ref=e529]: 头孢替坦：含NMTT侧链，引起双硫仑样反应（与酒精），用药期间及后几天避免酒精，major；与抗凝药（warfarin）因抑制维生素K合成导致出血风险增加，major；与肾毒性药物？可但次要。所以列出与酒精（major，双硫仑样反应）和与抗凝药（major）。
            - paragraph [ref=e530]: 头孢托洛嗪/他唑巴坦：与他唑巴坦无特殊，与丙磺舒轻微增加他唑巴坦，与华法林可能增强。可列与warfarin (moderate)，probenecid (moderate)。
            - paragraph [ref=e531]: lefamulin：与强CYP3A4抑制剂（如 ketoconazole, clarithromycin, itraconazole 等）导致 lefamulin 暴露增加，QT延长和不良反应风险增加，major（说明书推荐避免合用）；与强CYP3A4诱导剂（如 rifampin, carbamazepine）降低 lefamulin 浓度，致疗效下降，major；与 QT延长药物（class Ia, class III antiarrhythmics, 某些抗精神病药）增加QT延长风险，major/moderate？可列为 moderate 为了避免太多major，但与延长QT药物合用通常为警告，可列为major避免。也可 moderate：additive QT prolongation。与CYP3A4底物？lefamulin本身也是CYP3A4抑制剂？它是时间依赖性抑制剂，可增加CYP3A4底物如 midazolam, 钙通道阻滞剂等浓度。所以 lefamulin 与 敏感的CYP3A4底物（如simvastatin, midazolam）合用增加底物暴露，moderate。可列出。所以主要交互：强CYP3A4抑制剂，强CYP3A4诱导剂，QT延长药物，CYP3A4底物（窄治疗指数）。
            - paragraph [ref=e532]: nafcillin (耐酶青霉素，注射)：是强效CYP3A4诱导剂，可显著降低经CYP3A4代谢的药物浓度，如华法林（导致抗凝失败，major），环孢素（降低疗效，major），口服避孕药（避孕失败，moderate），以及许多抗艾滋病毒药等。主要交互：warfarin (major), cyclosporine (major), oral contraceptives (moderate)，还有与钙通道阻滞剂等。也是CYP2C9诱导剂？但可列出重要的。
            - paragraph [ref=e533]: omadacycline（口服/注射）：新型四环素类。交互与四环素类似：与螯合剂（抗酸剂，铁制剂，钙补充剂，锌等）显著降低口服吸收，major；与华法林增强抗凝，moderate；与口服避孕药降低效果，moderate；与异维A酸？避免合用增加假性脑瘤，但异维A酸是维甲酸，避免与四环素类因假性脑瘤，但omadacycline是四环素，所以与acitretin？acitretin是维甲酸类，增加假性脑瘤风险，可能列为major：与系统性维甲酸类（acitretin, isotretinoin）合用增加假性脑瘤风险。输入里有acitretin，所以omadacycline列出与维甲酸类（retinoids）有major交互。与抗凝药等。还有光敏性，但无其他药物。所以列出。
            - paragraph [ref=e534]: oxacillin (注射，耐青霉素酶)：与nafcillin类似，是轻中度CYP3A4诱导剂？实际上oxacillin也是CYP诱导剂，可降低华法林效果，但比萘夫西林弱。可列出与warfarin (moderate)，与环孢素可能降低，moderate。也列出与甲氨蝶呤(major)。
            - paragraph [ref=e535]: 青霉素G钾/钠/普鲁卡因青霉素：都可列出与甲氨蝶呤(major)，华法林(moderate)，丙磺舒(moderate)。普鲁卡因可另外与胆碱酯酶抑制剂（如吡斯的明，新斯的明）可能延缓普鲁卡因水解，但临床不寻常，可忽略。与磺胺类：过去认为磺胺类药物可拮抗普鲁卡因的抗菌作用，因PABA竞争，但这是抗菌作用，非临床交互，而是药效学拮抗，可能临床意义，如果同时使用磺胺类药物（像TMP/SMX），可能降低青霉素的疗效？实际上青霉素和磺胺常常联用，没有严重拮抗，因为作用机制不同。可以忽略。
            - paragraph [ref=e536]: ustekinumab, secukinumab, ixekizumab, risankizumab, guselkumab, tildrakizumab：生物制剂。共同交互：活疫苗(major) - avoid live vaccines due to risk of infection. 与CYP450窄治疗指数底物（如华法林，环孢素）(moderate) - 可能降低浓度。与其他免疫抑制剂 (moderate) - additive immunosuppression，增加感染风险。还有TNF抑制剂与这些白介素抑制剂是否使用？不特别列。所以每个生物制剂至少包含：live vaccines (major)，CYP450 substrates with narrow therapeutic index (moderate)，Other immunosuppressants (moderate)。对于TNF抑制剂infliximab, adalimumab，同样有活疫苗(major)，与华法林的交互（可能moderate），与免疫抑制剂(major? 联合其他TNF抑制剂或阿那白滞素增加感染风险，可列major)。但一般infliximab与abatacept合用增加感染，可列为moderate或major。我会将与其他生物制剂/免疫抑制剂联合的交互列为moderate，除非特别禁忌。活疫苗为major。还有infliximab与抗代谢药（如甲氨蝶呤）常常联用治疗，不算交互，这是标准疗法。所以只需活疫苗major，与CYP底物moderate，联合其他生物制剂可moderate。
