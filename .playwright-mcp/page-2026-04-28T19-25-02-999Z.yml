            - generic [ref=e232]:
              - paragraph [ref=e233]: 我们被要求输出JSON，不输出其他文本。需要为每种药物列出禁忌症。仔细阅读要求。需要输出JSON数组，每个药物一个对象，包含generic_name和contraindications数组。每个contraindication包含contraindication_name, contraindication_type, severity, reason。类型有disease, allergy_type, physiological_condition, drug_class。严重程度：absolute或relative。
              - paragraph [ref=e234]: 任务：为所列每种药物生成完整的禁忌症列表。输入列表很多，需要逐药处理。有些是组合药，需要列出每个成分的禁忌症。
              - paragraph [ref=e235]: 我在生成禁忌症时需要基于临床知识。对于没有明确给出“类别”的，可以推断。根据提供的类别、适应症、妊娠分级等。妊娠分级C、D、X提示妊娠可能相对或绝对禁忌。X绝对禁忌。
              - paragraph [ref=e236]: 注意：对于组合药，列出每个成分的禁忌症，即把组合药视为整体，列出所有相关的禁忌症。但要求说“对于组合药物,列出每个成分的禁忌症”，可以理解为输出该组合药物的禁忌症，应涵盖各成分的禁忌症。
              - paragraph [ref=e268]: 我要做：为每个generic_name生成禁忌症列表。注意同一药物可能有多个剂型但通用名相同，如levothyroxine (oral route) 和 levothyroxine sodium，可能都是levothyroxine，但列表里把它们分开给了，我需要为每个给定的完整药物名（包括括号里的route）生成不同的条目吗？输入列表是每个药物一行，有单独的描述如“levothyroxine (oral route)”。我认为每个条目是一个药物，需要生成对应禁忌症。虽然有些是相同活性成分，但可以单独列出，因为列表不一样。不过禁忌症可能基于活性成分相似。我将把每个条目视为独立的药物并生成禁忌症。
              - paragraph [ref=e269]: "我需要确保输出JSON包含所有这些药物。注意有些药物有多个品牌名，如infliximab等，输入中当作一个药物给出：\"infliximab, inliximab-abda, infliximab-axxq, infliximab-dyyb, infliximab-qbtx Brand names: ...\" 这需要作为一个药物，generic_name可能是“infliximab”，但里面包含了多个生物类似药，我可以统一用“infliximab”作为generic_name，表示英夫利昔单抗。禁忌症相同。"
              - paragraph [ref=e270]: 另外，有些条目如“Diphenhydramine (Sleep Aid) Capsules and Tablets”等等。我都列出。
              - paragraph [ref=e271]: 我需要查阅记忆中药物的禁忌症。作为临床药学专家，根据药物类别推断。例如：
              - paragraph [ref=e272]: "isradipine: CCB，禁忌：低血压，心源性休克，严重主动脉瓣狭窄，不稳定心绞痛等。妊娠C相对禁忌，哺乳期慎用。"
              - paragraph [ref=e273]: "metoprolol and hydrochlorothiazide: 组合，禁忌：心源性休克，窦性心动过缓，二度三度房室传导阻滞，明显心衰，严重外周动脉疾病，嗜铬细胞瘤未用α阻滞剂；氢氯噻嗪：无尿，磺胺过敏，严重肾损害。组合禁忌症合并。"
              - paragraph [ref=e274]: Hydrochlorothiazide and Triamterene：噻嗪类和保钾利尿剂。禁忌：高钾血症，无尿，严重肾/肝损害，Addison病，磺胺过敏，同时使用其他保钾利尿剂或钾补充剂。
              - paragraph [ref=e275]: mecamylamine：神经节阻断剂，禁忌：严重冠脉功能不全，近期心梗，尿毒症，青光眼，麻痹性肠梗阻，妊娠毒血症等。如今很少用。
              - paragraph [ref=e276]: "moexipril: ACEI，禁忌：妊娠（D级，绝对禁忌），血管神经性水肿史，双侧肾动脉狭窄，高钾血症。"
              - paragraph [ref=e277]: "nebivolol and valsartan: β阻断剂+ARB，禁忌：妊娠（ARB禁用），双侧肾动脉狭窄，心源性休克，严重心动过缓，严重肝损，同时使用阿利吉仑（糖尿病患者）。"
              - paragraph [ref=e278]: "nicardipine: CCB，禁忌：严重主动脉瓣狭窄，心源性休克，不稳定心绞痛（某些情况）。"
              - paragraph [ref=e279]: "trandolapril and verapamil: ACEI+非二氢吡啶CCB，禁忌：妊娠（D，ACEI绝对），心源性休克，二度三度AVB，病窦综合征无起搏器，严重心衰，房扑/房颤伴预激，同时使用丹曲林。"
              - paragraph [ref=e280]: "Atenolol and Chlorthalidone: β阻断剂+噻嗪，禁忌：心源性休克，窦缓和AVB，失代偿心衰，严重外周动脉疾病，嗜铬细胞瘤，无尿，磺胺过敏等。"
              - paragraph [ref=e281]: levothyroxine系列：禁忌：未纠正的肾上腺皮质功能不全（相对），急性心梗，甲状腺毒症未治疗。过敏于成分。
              - paragraph [ref=e282]: budesonide (oral)：糖皮质激素，禁忌：未控制的感染（特别是全身真菌感染），对布地奈德过敏。相对禁忌症：糖尿病，骨质疏松，消化性溃疡，高血压，青光眼，白内障等。口服用于IBD，需排除感染。
              - paragraph [ref=e283]: mesalamine：水杨酸盐，禁忌：对水杨酸盐过敏，严重肾损害，活动性胃十二指肠溃疡。相对：肝病。
              - paragraph [ref=e284]: infliximab：TNF抑制剂，禁忌：严重感染如活动性结核，败血症，脓肿，机会性感染；中重度心衰（NYHA III/IV）；对鼠蛋白或英夫利昔单抗过敏。相对：脱髓鞘疾病，恶性肿瘤史。
              - paragraph [ref=e285]: hydrocortisone：糖皮质激素，禁忌：全身真菌感染（绝对），未控制感染，对本品过敏。相对：糖尿病，高血压，骨质疏松，消化性溃疡，青光眼等。
              - paragraph [ref=e286]: cromolyn sodium：肥大细胞稳定剂，口服用于肥大细胞增多症。禁忌：对色甘酸钠过敏。相对：肝肾功能不全。
              - paragraph [ref=e287]: oxybutynin, darifenacin, flavoxate：尿解痉剂，禁忌：尿潴留，胃潴留，未控制的闭角型青光眼，重症肌无力。严重UC。过敏。
              - paragraph [ref=e288]: onabotulinumtoxinA：禁忌：对肉毒毒素过敏，注射部位感染，神经肌肉疾病（如重症肌无力，Lambert-Eaton），妊娠。
              - paragraph [ref=e289]: suvorexant, lemborexant, daridorexant：食欲素受体拮抗剂。禁忌：发作性睡病（绝对）。同用强CYP3A抑制剂。相对：肝损害，严重的睡眠呼吸暂停，肌无力等。
              - paragraph [ref=e290]: zolpidem：禁忌：对zolpidem过敏，使用后曾发生复杂睡眠行为。相对：肝损，呼吸功能不全，肌无力，抑郁等。
              - paragraph [ref=e291]: ramelteon：褪黑素受体激动剂，禁忌：对本品过敏。相对：严重肝损，同用氟伏沙明（强CYP1A2抑制剂）等。
              - paragraph [ref=e292]: diphenhydramine and ibuprofen：联用，禁忌：对苯海拉明或布洛芬过敏，布洛芬过敏诱发的哮喘，严重心衰，冠脉搭桥术围术期，活动性消化性溃疡，严重肾损害，妊娠晚期。苯海拉明：闭角型青光眼，前列腺增生有尿潴留，新生儿。
              - paragraph [ref=e293]: quazepam：BZD，禁忌：对苯二氮卓类过敏，急性闭角型青光眼，重症肌无力，严重呼吸功能不全，睡眠呼吸暂停综合征，严重肝损。妊娠C相对禁忌。
              - paragraph [ref=e294]: acetaminophen and diphenhydramine：对乙酰氨基酚和苯海拉明。禁忌：对成分过敏，严重肝损（对乙），闭角型青光眼、前列腺增生尿潴留，MAO抑制剂（苯海拉明，14天内）。
              - paragraph [ref=e295]: Chloral Hydrate：禁忌：严重肝肾功能不全，严重心脏病，胃溃疡。相对：卟啉症。
              - paragraph [ref=e296]: dimenhydrinate：茶苯海明，类似苯海拉明，禁忌：闭角型青光眼，前列腺增生，哮喘，MAO抑制剂等。
              - paragraph [ref=e297]: diphenhydramine sleep aid：同上。
              - paragraph [ref=e298]: pentobarbital：巴比妥类，禁忌：卟啉症，严重肝病，严重呼吸功能不全，过敏。妊娠D。
              - paragraph [ref=e299]: diphenhydramine and naproxen：布洛芬同类，禁忌：对NSAID过敏，阿司匹林三联征，冠脉搭桥围术期，活动性消化性溃疡，严重肾损，心衰，妊娠晚期。加上苯海拉明的。
              - paragraph [ref=e300]: diphenhydramine and magnesium salicylate：水杨酸镁+苯海拉明，禁忌：水杨酸盐过敏，G6PD缺乏，活动性溃疡，严重肾损害，出血性疾病，妊娠晚期。苯海拉明同上。
              - paragraph [ref=e301]: zopiclone：佐匹克隆，禁忌：重症肌无力，严重呼吸功能不全，睡眠呼吸暂停综合征，严重肝损，对本品过敏。
              - paragraph [ref=e302]: esterified estrogens and methyltestosterone：雌激素+甲睾酮，禁忌：妊娠（X，绝对），乳腺癌，雌激素依赖性肿瘤，未诊断的阴道出血，活动性深静脉血栓/肺栓塞，严重肝病，心血管病。雄激素：前列腺癌，男性乳腺癌。高钙血症。
              - paragraph [ref=e303]: 注意，许多药物妊娠分级C表示相对禁忌，需要权衡利弊，注明“relative”。D表示证据有害但可能收益大于风险，但仍可以是相对或绝对，如moexipril（ACEI）在妊娠中绝对禁忌（D级但中晚期可致胎儿损伤，应避免），我会标记absolute。一般ACEI/ARB是绝对禁忌。X级是绝对禁忌。
              - paragraph [ref=e304]: "我能推断。生成JSON。我必须列出所有输入的药物，共约40多种。我要正确提取generic_name。有些如 “Diphenhydramine (Sleep Aid) Capsules and Tablets” ，我将generic_name设为 “diphenhydramine (sleep aid)”，匹配输入。但要求输出中generic_name使用什么？最好与输入中药物名一致，如“isradipine”或“metoprolol and hydrochlorothiazide (oral route)”。我会使用输入的完整药物名称作为generic_name，便于识别。但要注意，infliximab的那个输入包含了很多名称，我可以用第一个“infliximab”。或者整体 “infliximab, infliximab-abda, infliximab-axxq, infliximab-dyyb, infliximab-qbtx”但太长，取“infliximab”可能合理，但输入行是“infliximab, inliximab-abda, infliximab-axxq, infliximab-dyyb, infliximab-qbtx Brand names: Remicade , Avsola , Inflectra , Ixifi , Renflexis”，我想generic_name可用“infliximab”。同样，最后zopiclone那一行generic_name是zopiclone。"
              - paragraph [ref=e305]: 所有，我会产出JSON。务必列出合理且具体的禁忌症。我将为每个药物构建contraindications列表，至少3-5个关键禁忌症。注意严重程度。
