              - listitem [ref=e388]:
                - paragraph [ref=e389]: doravirine, lamivudine, and tenofovir disoproxil fumarate (多拉韦林/拉米夫定/TDF) - 多拉韦林是NNRTI，CYP3A4底物，受诱导剂影响，但利福平降低多拉韦林浓度，禁忌。不显著抑制或诱导CYP酶，但与CYP3A诱导剂（利福平，卡马西平，恩杂鲁胺等）合用禁忌。与抗酸药、含多价阳离子补充剂可能降低多拉韦林吸收？多拉韦林不是整合酶抑制剂，不需担心多价阳离子？多拉韦林不螯合多价阳离子，但说明书：与含铝/镁的抗酸剂同时服用会降低多拉韦林浓度，因pH影响？需要酸性环境？多拉韦林溶解性pH依赖，抗酸药可能降低其生物利用度，建议分开服用。与H2受体拮抗剂，质子泵抑制剂也降低浓度。所以多拉韦林交互：与PPI、H2RA、抗酸药 moderate/major？与利福平禁忌major。与卡马西平禁忌major。还有替诺福韦的交互。拉米夫定无。所以组合药物交互包括：与利福平major降低多拉韦林浓度，与卡马西平major，与抗酸药moderate降低多拉韦林吸收，与质子泵抑制剂major降低多拉韦林（可能major, 说明书禁忌与PPI联用？查：多拉韦林与奥美拉唑合用AUC降低约50%，不推荐合用，可能moderate/major。可列major）。同时替诺福韦：去羟肌苷major，肾毒性药物major。所以列出。
              - listitem [ref=e390]:
                - paragraph [ref=e391]: "efavirenz, lamivudine, and tenofovir (依非韦伦/拉米夫定/TDF) - 依非韦伦是NNRTI，CYP3A4和2B6诱导剂，本身底物。交互较多。重要交互：与CYP3A4底物药物合用降低浓度，如激素避孕药（增加避孕失败风险），免疫抑制剂（环孢素，他克莫司），抗真菌药（伏立康唑相互影响，依非韦伦降低伏立康唑浓度，伏立康唑升高依非韦伦，需调整剂量），与抗凝药（华法林，可能降低或增加？有报道，需监测）。与抗抑郁药（如舍曲林？），与美沙酮（降低美沙酮浓度，导致戒断），与圣约翰草降低依非韦伦浓度，与利福平需要调整剂量。与CYP3A4抑制剂会增高依非韦伦浓度，但一般不严重。与延Q-T间期药物，依非韦伦可延长QT，需谨慎。替诺福韦交互同样。所以组合交互需列出：依非韦伦与激素避孕药major，与伏立康唑major/moderate，与美沙酮moderate，与圣约翰草major，与华法林moderate，与利福平moderate（依非韦伦浓度降低，建议增加剂量）。替诺福韦：去羟肌苷major，肾毒性药物major。组合药物drug_a: \"efavirenz, lamivudine, and tenofovir\"。注意拉米夫定无。"
              - listitem [ref=e392]:
                - paragraph [ref=e393]: atazanavir and cobicistat (阿扎那韦/考比司他) - 蛋白酶抑制剂+增效剂，类似cobicistat强CYP3A抑制，阿扎那韦也是CYP3A底物和UGT1A1抑制剂。交互：与CYP3A底物药物浓度升高，禁忌类似其他增效PI。同时阿扎那韦可抑制UGT1A1，使潜在相互作用如与拉替拉韦？但主要。阿扎那韦需要酸性环境吸收，与抗酸药，H2RA，PPI合用会显著降低浓度，需要间隔和调整剂量。与PPI在PI初治患者禁忌？实际上阿扎那韦增效剂下与PPI合用有严格限制。交互：与PPI moderate/major（降低阿扎那韦浓度，可能导致失败）。与抗酸药moderate。同时考比司他强抑制CYP3A4，导致与前述相似的禁忌药（麦角，辛伐他汀等）。还需注意与替诺福韦合用会降低阿扎那韦浓度（但考比司他时是否还有？通常替诺福韦与阿扎那韦/ritonavir合用，阿扎那韦浓度降低，需用利托那韦或考比司他增强。但在atazanavir/cobicistat组合中，替诺福韦仍然降低阿扎那韦AUC，需要增加阿扎那韦剂量？说明书：与替诺福韦合用，阿扎那韦300mg/考比司他150mg + TDF，阿扎那韦浓度降低约25%，但不调整剂量，视为moderate。另外阿扎那韦抑制UGT1A1，可能导致伊立替康等毒性。可列与SN-38（伊立替康）活性代谢物增加毒性major？但仅列出常见类别。所以交互：与PPI major（禁忌或避免），与抗酸药 moderate，与CYP3A底物（麦角，咪达唑仑等）major，与辛伐他汀/洛伐他汀 major，与替诺福韦 moderate（降低阿扎那韦浓度）。这要注意，atazanavir and cobicistat本身，drug_a是这个组合，交互drug_b可以用类别。如与质子泵抑制剂major，机制是胃酸减少降低阿扎那韦吸收。与CYP3A底物类别，多列几个。与替诺福韦 moderate。
