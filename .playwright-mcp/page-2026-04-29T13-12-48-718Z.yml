              - listitem [ref=e418]:
                - paragraph [ref=e419]: doxylamine (多西拉敏) - 抗组胺镇静药，具有抗胆碱作用。与CNS抑制剂（酒精，苯二氮卓类，阿片类，其他镇静药）合用增强中枢抑制，moderate或major（严重镇静、呼吸抑制）。与MAOIs合用可能延长和增强抗胆碱作用，major。与其它抗胆碱能药物增加副作用。与抗高血压药对血压影响不大。列出：与CNS depressants (opioids, benzodiazepines, alcohol) major，与MAO inhibitors major，与其他抗胆碱能药物 moderate（口干，便秘，视力模糊等）。这些可以。
              - listitem [ref=e420]:
                - paragraph [ref=e421]: corticotropin (促皮质素) - 刺激肾上腺皮质分泌皮质醇。与皮质类固醇类似，但其作用依赖肾上腺功能。交互：与可能导致低钾血症的药物（如利尿剂，两性霉素B，刺激性泻药）合用增加低钾风险 moderate/major。与NSAIDs增加胃肠溃疡风险。与血管紧张素转换酶抑制剂（ACEi）、血管紧张素受体拮抗剂（ARB）影响未知？但主要。可以列出与排钾利尿剂 moderate (低钾血症)。与NSAIDs moderate（溃疡风险）。与疫苗（活疫苗）可能抑制免疫反应 moderate。与抗糖尿病药（增高血糖） moderate。这些常见。
