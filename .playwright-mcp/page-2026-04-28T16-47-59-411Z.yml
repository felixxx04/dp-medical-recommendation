              - generic [ref=e204]: 已思考（用时 172 秒）
              - img [ref=e206]
            - generic [ref=e212]:
              - paragraph [ref=e213]: 我们被要求输出JSON，列出每种药物的禁忌症。需要仔细根据药物类别、适应症等推断。注意区分绝对和相对禁忌症，分类到disease, allergy_type, physiological_condition, drug_class。要具体且临床相关。
              - paragraph [ref=e214]: 下面逐个分析：
              - list [ref=e215]:
                - listitem [ref=e216]:
                  - paragraph [ref=e217]:
                    - text: dexamethasone (injection) | Glucocorticoids
                    - text: 适应症：炎症、过敏、哮喘、肾上腺功能不全、RA、SLE、MS恶化、脑水肿、严重过敏反应、化疗恶心呕吐、重症COVID-19。妊娠C。
                    - text: 禁忌症：
              - list [ref=e218]:
                - listitem [ref=e219]:
                  - paragraph [ref=e220]: 全身真菌感染：absolute, disease, 糖皮质激素免疫抑制。
                - listitem [ref=e221]:
                  - paragraph [ref=e222]: 对地塞米松过敏：absolute, allergy_type.
                - listitem [ref=e223]:
                  - paragraph [ref=e224]: 近期使用活疫苗或减毒活疫苗：relative, drug_class (immunosuppressants) 增加感染风险。
                - listitem [ref=e225]:
                  - paragraph [ref=e226]: 未控制的严重高血压、糖尿病、消化性溃疡等相对禁忌，但糖皮质激素类可能加重。可列为相对禁忌。
                - listitem [ref=e227]:
                  - paragraph [ref=e228]: 皮质类固醇可致精神症状，严重精神病可能相对禁忌。
                - listitem [ref=e229]:
                  - paragraph [ref=e230]: 妊娠早期可能相对禁忌（C级），但按需。通常标注妊娠期慎用。作为physiological_condition, relative.
                - listitem [ref=e231]:
                  - paragraph [ref=e263]: 哺乳期：相对禁忌。
                - listitem [ref=e264]:
                  - paragraph [ref=e265]: 可能引起肾上腺抑制，突然停药有风险，但不是禁忌症。通常列出：
                - listitem [ref=e266]:
                  - paragraph [ref=e267]: "systemic fungal infections: absolute."
                - listitem [ref=e268]:
                  - paragraph [ref=e269]: "known hypersensitivity to dexamethasone: absolute."
                - listitem [ref=e270]:
                  - paragraph [ref=e271]: "cerebral malaria: relative? 不常用。"
                - listitem [ref=e272]:
                  - paragraph [ref=e273]: "使用活疫苗: relative."
                - listitem [ref=e274]:
                  - paragraph [ref=e275]: "结核病活动期未治: relative, 免疫抑制可能加重。"
                - listitem [ref=e276]:
                  - paragraph [ref=e277]: "单纯疱疹性角膜炎: absolute? 通常眼部单纯疱疹是禁忌，因为可致角膜穿孔。"
                - listitem [ref=e278]:
                  - paragraph [ref=e279]:
                    - text: 此外，地塞米松磷酸盐注射剂含有防腐剂（某些制剂含苯甲醇），新生儿禁忌。
                    - text: "所以列出：systemic fungal infection (absolute); hypersensitivity (absolute); live or attenuated vaccine administration (relative); active untreated tuberculosis (relative); ocular herpes simplex (absolute). 妊娠期: 相对, 哺乳期: 相对。可能还包括：severe psychiatric disorders (relative)."
              - list [ref=e280]:
                - listitem [ref=e281]:
                  - paragraph [ref=e282]:
                    - text: dyphylline and guaifenesin | Antiasthmatic combinations
                    - text: 成分：dyphylline (黄嘌呤衍生物，类似茶碱) + guaifenesin (祛痰剂)
                    - text: 适应症：哮喘、支气管炎、祛痰。妊娠C。
                    - text: 禁忌症：
              - list [ref=e283]:
                - listitem [ref=e284]:
                  - paragraph [ref=e285]: "dyphylline: 对黄嘌呤类过敏（包括茶碱、咖啡因等）absolute; 活动性消化性溃疡 relative; 严重高血压、心律失常等 relative. 还有喹诺酮类、西咪替丁等合用可增加dyphylline血药浓度，但不是绝对禁忌。可能引起癫痫发作的倾向。"
                - listitem [ref=e286]:
                  - paragraph [ref=e287]:
                    - text: "guaifenesin: 过敏 absolute; 持续性咳嗽原因不明 relative（可能掩盖疾病）。"
                    - text: 组合药物禁忌症包括：对任何成分过敏 absolute; 活动性消化性溃疡 relative; 严重心脏病（如心律失常）relative; 癫痫未控制 relative。妊娠C相对禁忌。
                    - text: 列出：hypersensitivity to dyphylline, guaifenesin, or other xanthines (absolute). 活动性胃十二指肠溃疡 (relative). 严重心律失常 (relative). 癫痫 (relative). 妊娠 (relative). 哺乳期 (relative). 同时使用MAOIs? 无。Xanthine类药物禁忌与某些药物合用，但不作为禁忌症类型，通常为precaution. 可加severe renal impairment? dyphylline经肾排泄，严重肾损相对禁忌。所以：severe renal impairment (relative). 还有severe hepatic impairment? dyphylline部分代谢，可列入相对。需要谨慎。输出简洁：列出主要成分。合并：对黄嘌呤衍生物或愈创甘油醚过敏；活动性消化性溃疡；严重肝或肾功能不全；心律失常；癫痫；妊娠及哺乳。
              - list [ref=e288]:
                - listitem [ref=e289]:
                  - paragraph [ref=e290]:
                    - text: Ipratropium Inhalation Aerosol | Anticholinergic bronchodilators
                    - text: 适应症：COPD, asthma. 妊娠B。
                    - text: 禁忌症：对异丙托溴铵、阿托品或其衍生物过敏 absolute; 窄角型青光眼 relative（可致眼压升高）; 膀胱颈梗阻/尿潴留 relative; 前列腺增生导致尿潴留 risk. 妊娠B较安全，不列为禁忌。哺乳期相对。列出：hypersensitivity to ipratropium, atropine, or similar (absolute); narrow-angle glaucoma (relative); bladder neck obstruction/urinary retention (relative). 另有：不要用于急性支气管痉挛急救（非禁忌症而是疗效慢）。
                - listitem [ref=e291]:
                  - paragraph [ref=e292]:
                    - text: reslizumab | Interleukin inhibitors (抗IL-5单抗)
                    - text: 适应症： severe eosinophilic asthma. 妊娠N，没有分级。
                    - text: 禁忌症：过敏 absolute。可能还包括活动性寄生虫感染（蠕虫），因为IL-5参与抗寄生虫免疫，相对禁忌，治疗前应先治寄生虫。所以：已知对reslizumab过敏 absolute。已存在蠕虫感染未治 relative。妊娠哺乳：无数据，相对禁忌，权衡。也列出：acute asthma exacerbation or status asthmaticus (不作为急救药). 不是禁忌症但说明。我们给禁忌症：对reslizumab或任何成分过敏 absolute；未经治疗的寄生虫感染 relative；妊娠期 relative；哺乳期 relative。
                - listitem [ref=e293]:
                  - paragraph [ref=e294]:
                    - text: salbutamol | Adrenergic bronchodilators (短效β2激动剂)
                    - text: "适应症：哮喘、支气管痉挛、COPD。妊娠N？实际是C? 输入显示妊娠分级: N，可能未知。通常沙丁胺醇妊娠C，但广泛使用。禁忌症：过敏 absolute。严重过敏反应可能因赋形剂等。相对禁忌：严重高血压、心律失常、甲状腺功能亢进、糖尿病（可能升高血糖和导致低钾）、嗜铬细胞瘤？可用于分娩抑制宫缩，但有心血管疾病慎用。列出：hypersensitivity to salbutamol (absolute); severe hypertension, tachyarrhythmias, hyperthyroidism (relative); concomitant use with non-selective beta-blockers (relative) 因为会减弱支气管扩张作用，可能诱发哮喘，但这不是禁忌症，是相互作用。drug_class禁忌可列为 non-selective beta-blockers 相对禁忌（哮喘）。还有妊娠和哺乳相对。但是β-blocker在哮喘患者中是相对禁忌的，药物本身禁忌没提这个，而是说β阻滞剂对哮喘患者禁忌。我们只列salbutamol禁忌症：过敏绝对；严重心脏病如冠脉供血不足等相对；甲亢相对；糖尿病相对；低血钾相对；嗜铬细胞瘤相对。可列：pheochromocytoma (relative), hypertrophic obstructive cardiomyopathy (relative). 常规：prior hypersensitivity."
                - listitem [ref=e295]:
                  - paragraph [ref=e296]:
                    - text: aripiprazole (oral) | Atypical antipsychotics
                    - text: 适应症：精神分裂症、双相、孤独症易激惹、Tourette's、MDD辅助。妊娠C。
                    - text: 禁忌症：对阿立哌唑过敏 absolute。与抗精神病药物相关的痴呆相关精神病老年患者死亡率增加（黑框警告），绝对禁忌？通常说老年痴呆相关精神病患者用抗精神病药增加死亡风险，是绝对禁忌。还有严重肝功能不全？相对。QT延长风险，合用延长QT的药物或本身QTc延长者相对。脑血管意外风险。列出：known hypersensitivity to aripiprazole (absolute); elderly patients with dementia-related psychosis (absolute, boxed warning) ; 严重肝功能不全(Child-Pugh C)？相对。儿童青少年自杀风险？相对。低血压、心血管疾病相对。简化为：dementia-related psychosis (absolute); hypersensitivity (absolute). 同时使用延长QT间期的药物或先天性长QT综合征 (relative)。妊娠C相对，哺乳相对。因制剂含乳糖，严重乳糖不耐受相对。可能还包括seizure disorders相对。主要给出：dementia-related psychosis (absolute, boxed warning) 类别 disease， hypersensitivity (absolute, allergy_type)。其他相对：severe hepatic impairment, seizure disorders, congenital long QT syndrome, pregnancy, lactation。
                - listitem [ref=e297]:
                  - paragraph [ref=e298]:
                    - text: cariprazine | Atypical antipsychotics.
                    - text: 适应症：精神分裂症、双相I。妊娠N。
                    - text: 类似：对卡利拉嗪过敏绝对；痴呆相关精神病绝对；严重肝功能不全相对（CYP3A4代谢），肾损相对。QT延长相对。引发代谢变化。列出：hypersensitivity (absolute); elderly patients with dementia-related psychosis (absolute); severe hepatic impairment (relative); severe renal impairment (relative); pregnancy/lactation (relative). 也可以包括：与强CYP3A4抑制剂或诱导剂合用, 但是drug interaction, 非禁忌症。
                - listitem [ref=e299]:
                  - paragraph [ref=e300]:
                    - text: lumateperone | Atypical antipsychotics
                    - text: 适应症：精神分裂症、双相抑郁。妊娠N。
                    - text: 类似：过敏 absolute; 痴呆相关精神病 absolute; 严重肝功能不全 (Child-Pugh C) relative; 中重度肾损害 relative; QT延长相对。妊娠哺乳相对。列出：known hypersensitivity (absolute); dementia-related psychosis (absolute); severe hepatic impairment (relative); moderate to severe renal impairment (relative); pregnancy/lactation (relative).
                - listitem [ref=e301]:
                  - paragraph [ref=e302]:
                    - text: olanzapine and samidorphan | Psychotherapeutic combinations
                    - text: 适应症：精神分裂症、双相I。妊娠N。
                    - text: 成分：奥氮平（抗精神病）和 samidorphan（阿片受体拮抗剂，减轻奥氮平体重增加）。禁忌症应考虑各成分。
                    - text: 奥氮平：过敏绝对；痴呆相关精神病绝对；窄角型青光眼相对；麻痹性肠梗阻相对；严重肝功能不全相对。
                    - text: Samidorphan：作为阿片拮抗剂，导致正使用阿片类药物或阿片依赖者出现急性戒断绝对禁忌。所以组合：目前长期用阿片类药物，或急性阿片戒断 risk 绝对禁忌。合并：对奥氮平、samidorphan 过敏绝对；痴呆相关精神病绝对；与阿片类药物合用或阿片依赖 (absolute)；窄角型青光眼 (relative)；麻痹性肠梗阻 (relative)；严重肝损 (relative)；妊娠哺乳相对。此外，samidorphan可能引发阿片戒断，不可用于正在使用阿片类镇痛的患者。所以关键禁忌症：concurrent use of opioids or acute opioid withdrawal (absolute). 要写清楚。
                - listitem [ref=e303]:
                  - paragraph [ref=e304]:
                    - text: quetiapine | Atypical antipsychotics
                    - text: 适应症：同上。妊娠C。
                    - text: 禁忌症：过敏绝对；痴呆相关精神病绝对；严重肝功能不全相对；与强效CYP3A4抑制剂合用会增加风险，但不是禁忌症。低血压、QT延长。列：hypersensitivity (absolute); dementia-related psychosis (absolute); severe hepatic impairment (relative); pregnancy/lactation (relative). 还有，窄角型青光眼可能相对。不过喹硫平相对抗胆碱能作用较轻，但仍可列出。
                - listitem [ref=e305]:
                  - paragraph [ref=e306]:
                    - text: divalproex sodium | Fatty acid derivative anticonvulsants
                    - text: 适应症：癫痫、双相障碍、偏头痛预防。妊娠D。
                    - text: 禁忌症：过敏性绝对；肝病（严重肝功能不全）绝对（肝毒性风险）。线粒体疾病（如POLG突变相关疾病）绝对，因为可能引发肝衰竭。尿素循环障碍绝对（高氨血症风险）。胰腺炎相对。妊娠D，为绝对禁忌（神经管缺陷风险高）。育龄妇女相对。哺乳期相对。与某些药物如碳青霉烯类合用降低丙戊酸血药浓度。列出：known hypersensitivity to valproate (absolute); severe hepatic impairment or significant hepatic dysfunction (absolute); known mitochondrial disorders caused by mutations in mitochondrial DNA polymerase gamma (POLG) (absolute); known urea cycle disorders (absolute); pregnancy (absolute, pregnancy category D, neural tube defects); lactation (relative); pancreatitis (relative). 可再写：suspected POLG disorder in children <2 years (absolute). 加入。
                - listitem [ref=e307]:
                  - paragraph [ref=e308]:
                    - text: olanzapine (oral) | Atypical antipsychotics
                    - text: 适应症：前述。禁忌症：过敏绝对；痴呆相关精神病绝对；窄角型青光眼相对；麻痹性肠梗阻相对；严重肝功能不全相对；妊娠C哺乳相对。
                - listitem [ref=e309]:
                  - paragraph [ref=e310]:
                    - text: asenapine (sublingual) | Atypical antipsychotics
                    - text: 适应症：精神分裂症、双相I。妊娠C。
                    - text: 禁忌症：过敏绝对；痴呆相关精神病绝对；严重肝功能不全 (Child-Pugh C) 相对；严重心血管疾病（如近期心肌梗死、心力衰竭）相对；QT延长相对；妊娠哺乳相对。此外，舌下片含明胶，过敏？一般不会。列出：hypersensitivity (absolute); dementia-related psychosis (absolute); severe hepatic impairment (relative); severe cardiovascular disease (relative); pregnancy/lactation (relative).
                - listitem [ref=e311]:
                  - paragraph [ref=e312]:
                    - text: carbamazepine (oral) | Dibenzazepine anticonvulsants
                    - text: 适应症：癫痫、三叉神经痛、双相。妊娠D。
                    - text: 禁忌症：过敏绝对；骨髓抑制/既往有骨髓抑制病史绝对；已知对三环类抗抑郁药过敏（交叉过敏）相对。与MAOIs合用（用后14天内）绝对禁忌（严重高血压、5-HT综合征等）；严重肝功能不全绝对；严重心血管疾病相对；妊娠D，神经管缺陷等，绝对禁忌；哺乳相对。HLA-B*1502等位基因筛查（亚洲人群）强烈预警但不是绝对禁忌，但史蒂文斯约翰逊综合征风险，可列为相对禁忌？临床常作为禁忌。可列为HLA-B*1502 allele positive in at-risk populations (relative/absolute?). 实际上FDA说明书有黑框：HLA-B*1502阳性患者避免使用卡马西平，除非获益大于风险。可以列为相对禁忌。还有与奈法唑酮等合用。列出：hypersensitivity to carbamazepine or tricyclic antidepressants (absolute); bone marrow suppression (absolute); concomitant use with MAOIs or within 14 days of discontinuation (absolute, drug_class); severe hepatic impairment (absolute); pregnancy (absolute, category D); lactation (relative); HLA-B*1502 positive status in high-risk ethnicities (relative). 同时porphyria急性间歇性血卟啉症相对禁忌。列入porphyria (relative). 等。
                - listitem [ref=e313]:
                  - paragraph [ref=e314]:
                    - text: ziprasidone (oral/injection) | Atypical antipsychotics
                    - text: 适应症：精神分裂症、双相I、激越。妊娠C。
                    - text: 禁忌症：过敏绝对；痴呆相关精神病绝对；已知QT间期延长或先天性长QT综合征绝对（齐拉西酮导致QT延长，禁忌用于QT延长患者或合用延长QT间期的药物，如Ia、III类抗心律失常药等，是禁忌）。有黑框：QT延长，不应与延长QT的药物联用。所以禁忌：已知QT延长、近期心肌梗死、非代偿性心衰、心律失常需用抗心律失常药物等。列出：known hypersensitivity (absolute); dementia-related psychosis (absolute); known prolonged QT interval, congenital long QT syndrome, or concomitant use of drugs that prolong the QT interval (such as Class Ia and III antiarrhythmics, certain antipsychotics, methadone, etc.) (absolute); recent acute myocardial infarction or uncompensated heart failure (relative); severe hepatic impairment (relative); pregnancy/lactation (relative). 这是绝对禁忌：QT延长及合用药。
                - listitem [ref=e315]:
                  - paragraph [ref=e316]:
                    - text: fluoxetine and olanzapine | Psychotherapeutic combinations
                    - text: 适应症：双相抑郁、难治性抑郁。妊娠C。
                    - text: 成分：氟西汀（SSRI）和奥氮平（抗精神病）。禁忌：共同：对任一成分过敏绝对；痴呆相关精神病绝对；与MAOIs合用（或停用MAOI 14天内）绝对（氟西汀禁忌）；与奥氮平合用可能引起恶性综合征等。氟西汀禁忌MAOI，绝对。所以组合禁忌： hypersensitivity (absolute); dementia-related psychosis (absolute); concomitant use with MAOIs or within 14 days of stopping MAOIs (absolute, drug_class); 窄角型青光眼 relative；氟西汀可增加出血风险，与抗凝相对。严重肝功能不全相对；妊娠C哺乳相对；癫痫 relative。特别是：合并齐拉西酮等延长QT也不推荐。列出已知的：concomitant MAOIs (absolute). 此外，开始使用氟西汀/奥氮平前需停用MAOI至少5周（因氟西汀长半衰期），而其他MAOI限制。
                - listitem [ref=e317]:
                  - paragraph [ref=e318]:
                    - text: valproic acid (oral/injection) | Fatty acid derivative anticonvulsants
                    - text: 同 divalproex sodium，成分丙戊酸。禁忌症类似。重复：对丙戊酸过敏 absolute；严重肝病或肝功能不全 absolute；线粒体疾病POLG absolute；尿素循环障碍 absolute；妊娠 absolute（D级）；哺乳相对；胰腺炎相对。
                - listitem [ref=e319]:
                  - paragraph [ref=e320]:
                    - text: levetiracetam (oral/injection) | Pyrrolidine anticonvulsants
                    - text: 适应症：部分性发作，全面性强直阵挛，肌阵挛发作。妊娠C。
                    - text: 禁忌症：过敏 absolute。严重肾功能不全需调整剂量，但不一定是禁忌。行为精神副作用，但非禁忌。所以主要 hypersensitivity absolute；哺乳相对；妊娠相对。相对禁忌：有自杀倾向？可能列depression相对。简单：known hypersensitivity to levetiracetam (absolute); severe renal impairment (CrCl <30) 一般剂量调整，不算禁忌。可列为相对禁忌（需减量）。妊娠 lactation 相对。没什么绝对的了。
                - listitem [ref=e321]:
                  - paragraph [ref=e322]:
                    - text: lamotrigine (oral route) | Triazine anticonvulsants
                    - text: 适应症：癫痫、双相I。妊娠C。
                    - text: 禁忌症：过敏（尤其严重皮疹包括SJS）绝对。虽然小心滴定，但过敏是绝对。妊娠C相对；哺乳相对。严重肝功能不全相对。Child-Pugh B/C？相对。与丙戊酸合用需调整剂量，不是禁忌。列出：known hypersensitivity to lamotrigine (absolute); severe hepatic impairment (relative); pregnancy/lactation (relative).
                - listitem [ref=e323]:
                  - paragraph [ref=e324]:
                    - text: paliperidone (oral) | Atypical antipsychotics (帕利哌酮是利培酮的代谢物)
                    - text: 禁忌症类似：过敏绝对；痴呆相关精神病绝对；严重肾功能不全需减量，但不是绝对禁忌。QT延长相对。窄角型青光眼相对。肠梗阻相对。妊娠C哺乳相对。帕利哌酮缓释片由于渗透泵不可破坏，有严重胃肠狭窄的患者可能相对禁忌。列出：hypersensitivity (absolute); dementia-related psychosis (absolute); severe gastrointestinal narrowing (relative, due to non-deformable tablet formulation); severe renal impairment (relative, dose adjustment needed); pregnancy/lactation (relative). 加上窄角型青光眼相对。
                - listitem [ref=e325]:
                  - paragraph [ref=e326]:
                    - text: risperidone (injection) | Atypical antipsychotics
                    - text: 适应症：精神分裂症、双相I。妊娠C。
                    - text: 禁忌症：过敏绝对；痴呆相关精神病绝对；妊娠C相对，哺乳相对。还有，利培酮可致高催乳素血症，垂体瘤（催乳素瘤）相对禁忌。帕金森病精神症状用抗精神病药可加重运动症状，相对禁忌（多巴胺拮抗）。此处列出：hypersensitivity (absolute); dementia-related psychosis (absolute); prolactin-dependent tumors (relative); severe hepatic or renal impairment (relative); Parkinson's disease (relative, may worsen motor symptoms); pregnancy/lactation (relative).
                - listitem [ref=e327]:
                  - paragraph [ref=e328]: aripiprazole (oral with sensor) | 与阿立哌唑相同，只是含传感器。禁忌症同aripiprazole oral：过敏绝对，痴呆相关精神病绝对，等。
                - listitem [ref=e329]:
                  - paragraph [ref=e330]:
                    - text: olanzapine (intramuscular route) | Atypical antipsychotics
                    - text: 禁忌症同奥氮平口服：过敏绝对，痴呆相关精神病绝对，窄角型青光眼，麻痹性肠梗阻，严重肝功能不全，心血管疾病相对，妊娠C哺乳。但肌内注射还含苯甲醇防腐剂，新生儿禁忌？对于儿科可能禁忌。不过没有给出。只提供常规。此外，肌注可能致低血压、心动过缓，与苯二氮卓类合用避免。所以列出：hypersensitivity (absolute); dementia-related psychosis (absolute); narrow-angle glaucoma (relative); ileus (relative); severe hepatic impairment (relative); pregnancy/lactation (relative).
                - listitem [ref=e331]:
                  - paragraph [ref=e332]: guaifenesin | 单一成分。过敏 absolute; 持续性咳嗽未明确诊断相对；妊娠C相对。无其他。列出：hypersensitivity to guaifenesin (absolute); persistent cough of unknown etiology (relative); pregnancy/lactation (relative).
                - listitem [ref=e333]:
                  - paragraph [ref=e334]:
                    - text: azithromycin (oral/injection) | Macrolides
                    - text: 禁忌症：对阿奇霉素、红霉素、任何大环内酯类过敏 absolute；肝功能不全/胆汁淤积性黄疸史（既往用阿奇霉素引起）absolute; 同时使用匹莫齐特、麦角胺等可致QT延长和严重心律失常相对；有先天性长QT综合征相对；严重肝功能损害相对。还有重症肌无力可能加重。列：hypersensitivity to macrolides (absolute); history of cholestatic jaundice/hepatic dysfunction associated with prior azithromycin use (absolute); concomitant use with pimozide or ergot alkaloids (relative, QT prolongation risk); congenital long QT syndrome (relative); myasthenia gravis (relative, exacerbation); pregnancy/lactation (relative). 注意：阿奇霉素一般不作为妊娠禁忌，B级。
                - listitem [ref=e335]:
                  - paragraph [ref=e336]:
                    - text: levofloxacin (oral) | Quinolones
                    - text: 适应症：社区获得性肺炎、鼻窦炎等。妊娠C。
                    - text: 禁忌症：对左氧氟沙星或任何氟喹诺酮类过敏 absolute；有癫痫病史（可诱发）relative；重症肌无力（可能加重呼吸肌无力）absolute警告，其实FDA强禁忌：fluoroquinolones contraindicated in patients with myasthenia gravis. 绝对禁忌。QT延长相对；使用类固醇患者增加肌腱炎风险，但非禁忌。儿童、青少年（小于18岁）致关节病，相对禁忌，但某些情况下可用。妊娠哺乳相对。所以：hypersensitivity to fluoroquinolones (absolute); myasthenia gravis (absolute, may exacerbate muscle weakness); epilepsy (relative, lowers seizure threshold); prolonged QT interval (relative); pediatric patients (<18 y) except for specific indications (relative); pregnancy/lactation (relative). 同时患有主动脉瘤或夹层风险相对。可以加：known aortic aneurysm or dissection (relative).
                - listitem [ref=e337]:
                  - paragraph [ref=e338]:
                    - text: amoxicillin and clavulanate potassium | Beta-lactamase inhibitors
                    - text: 禁忌症：对青霉素类/头孢类过敏（过敏史） absolute, 尤其是速发型过敏；由阿莫西林克拉维酸引起的肝功能障碍/黄疸史 absolute；传染性单核细胞增多症（可能引起皮疹，相对禁忌不是绝对）。严重肾功能不全需调整剂量。列出：hypersensitivity to penicillins, cephalosporins, or any component (absolute); history of hepatic dysfunction or jaundice with amoxicillin/clavulanate (absolute); infectious mononucleosis (relative, high risk of rash); severe renal impairment (relative, requires dose adjustment); pregnancy/lactation (relative, but B safe). 对于青霉素过敏，交叉过敏头孢需谨慎，作为相对禁忌。
                - listitem [ref=e339]:
                  - paragraph [ref=e340]:
                    - text: ciprofloxacin (oral) | Quinolones.
                    - text: 同左氧氟沙星类似：过敏 absolute，重症肌无力 absolute，癫痫 relative，QT延长 relative，儿童 adolescent relative，妊娠哺乳C relative。肌腱病风险，肾功能不全剂量调整。添加： known aortic aneurysm/dissection risk.
                - listitem [ref=e341]:
                  - paragraph [ref=e342]:
                    - text: cefuroxime (oral/injection) | Second generation cephalosporins
                    - text: 禁忌症：对头孢菌素类或青霉素类有严重速发型过敏（如过敏性休克）absolute。但青霉素过敏不一定都是绝对禁忌，谨慎。严重肾功能不全需调整。列出：known severe hypersensitivity (anaphylaxis) to cephalosporins or penicillins (absolute); history of severe hypersensitivity to beta-lactams (absolute); severe renal impairment (relative); pregnancy/lactation (relative, B安全). 加上：如果对有青霉素过敏休克史，头孢菌素绝对禁忌？很多指南说绝对禁忌。所以可：serious penicillin allergy with anaphylaxis (absolute).
                - listitem [ref=e343]:
                  - paragraph [ref=e344]:
                    - text: moxifloxacin (oral/injection) | Quinolones
                    - text: 同喹诺酮类：过敏 absolute；重症肌无力 absolute；癫痫相对；QT延长绝对？莫西沙星延长QT比其他明显，通常禁忌用于QT延长患者，合用延长QT的药物绝对禁忌。说明书说已知QT延长、低血钾未纠正、有临床相关的心动过缓等。所以禁忌：known prolonged QT interval, uncorrected hypokalemia, or concomitant use of drugs that prolong QT interval (absolute). 其他和喹诺酮一样。加上：myasthenia gravis (absolute), epilepsy (relative), pregnancy/lactation, children.
                - listitem [ref=e345]:
                  - paragraph [ref=e346]:
                    - text: erythromycin (oral/injection) | Macrolides
                    - text: 禁忌症：对红霉素或大环内酯类过敏 absolute；同时服用特非那定、阿斯咪唑、匹莫齐特、QT延长药物（严重相互作用导致心律失常）absolute（药物类）；先天性长QT综合征 absolute；严重肝功能不全 relative；妊娠哺乳B相对。红霉素可致幽门狭窄婴儿风险。列出：hypersensitivity to erythromycin or macrolides (absolute); concomitant use with terfenadine, astemizole, pimozide, or other drugs that prolong QT interval and are metabolized by CYP3A4 (absolute); congenital long QT syndrome (absolute); severe hepatic impairment (relative); infantile hypertrophic pyloric stenosis (relative, history); pregnancy/lactation (relative).
                - listitem [ref=e347]:
                  - paragraph [ref=e348]:
                    - text: ceftriaxone (injection) | Third generation cephalosporins
                    - text: 禁忌症：对头孢菌素严重过敏 absolute；与青霉素严重过敏交叉绝对；新生儿高胆红素血症（尤其是早产儿）绝对，因为头孢曲松置换胆红素。同时钙沉淀，新生儿不能与含钙溶液合用，<28天新生儿禁止与含钙静脉制剂联合使用（绝对）。列出：severe hypersensitivity to cephalosporins or penicillins (absolute); hyperbilirubinemic neonates, particularly premature infants (absolute); concomitant use with intravenous calcium-containing solutions in neonates ≤28 days (absolute); severe hepatic and renal dysfunction (relative); pregnancy/lactation (relative, B). 有胆囊结石风险相关但不是禁忌。
                - listitem [ref=e349]:
                  - paragraph [ref=e350]:
                    - text: amoxicillin (oral route) | Aminopenicillins
                    - text: 禁忌症：对青霉素过敏 absolute；传染性单核细胞增多症相对（皮疹）。严重肾功能不全相对。列出：hypersensitivity to penicillins (absolute); infectious mononucleosis (relative); severe renal impairment (relative); pregnancy/lactation (relative, B).
                - listitem [ref=e351]:
                  - paragraph [ref=e352]:
                    - text: beclomethasone inhalation | Inhaled corticosteroids
                    - text: 适应症：哮喘。妊娠C。
                    - text: 禁忌症：对beclomethasone过敏 absolute；哮喘持续状态或急性哮喘发作作为主要治疗（不作为缓解用药）relative；活动性或静息期肺结核、真菌、细菌、病毒呼吸道感染相对（可能加重）；妊娠C相对。列出：hypersensitivity to beclomethasone (absolute); status asthmaticus or acute asthma episode (not for primary treatment) (relative); active or untreated respiratory tract infections including tuberculosis, fungal, bacterial, or viral infections (relative); pregnancy/lactation (relative). 还有未治疗的全身感染？吸入一般影响小。
                - listitem [ref=e353]:
                  - paragraph [ref=e354]:
                    - text: ciprofloxacin (injection) | Quinolones
                    - text: 同口服，禁忌症：过敏 absolute；重症肌无力 absolute；癫痫 relative；QT延长相对；儿童 adolescent relative；妊娠C哺乳相对；主动脉瘤风险。
                - listitem [ref=e355]:
                  - paragraph [ref=e356]: amoxicillin and clavulanate (oral route) 同前。
                - listitem [ref=e357]:
                  - paragraph [ref=e358]: erythromycin (oral) 同前。
                - listitem [ref=e359]:
                  - paragraph [ref=e360]: guaifenesin (oral route) 同 guaifenesin。
                - listitem [ref=e361]:
                  - paragraph [ref=e362]:
                    - text: ampicillin (oral) | Aminopenicillins
                    - text: 同amoxicillin：青霉素过敏 absolute；传染性单核细胞增多症相对（皮疹风险高）；严重肾功能不全相对。
                - listitem [ref=e363]:
                  - paragraph [ref=e364]: cough and cold combinations (oral route) | 成分不确定。通常含有愈创甘油醚、伪麻黄碱、右美沙芬等。但未列成分，只写类别Expectorants。但药物名称“cough and cold combinations”过于宽泛。假设包括多种，可能对成分过敏绝对，MAOI合用绝对（右美沙芬禁忌与MAOI），严重高血压、甲亢、心脏病等避免使用拟交感药相对。但很难确定。可以列出：hypersensitivity to any component (absolute); concomitant use of MAOIs or within 14 days (absolute, if contains dextromethorphan or pseudoephedrine); severe hypertension or coronary artery disease (relative, if contains decongestant); pregnancy/lactation (relative). 但可能不含信息。我们谨慎列为相对笼统但临床相关的。包含常见成分：愈创甘油醚，右美沙芬，伪麻黄碱/去氧肾上腺素。根据这些成分，禁忌包括MAOI合用绝对，高血压冠心病甲亢相对。可以不列那么细，但选择：hypertension, hyperthyroidism, MAOI use, hypersensitivity。输出时注意通用。
                - listitem [ref=e365]:
                  - paragraph [ref=e366]: erythromycin (oral route) 同。
                - listitem [ref=e367]:
                  - paragraph [ref=e368]: erythromycin (intravenous route) 同前。
                - listitem [ref=e369]:
                  - paragraph [ref=e370]:
                    - text: ofloxacin (oral) | Quinolones
                    - text: 同左氧氟沙星，氧氟沙星是外消旋体。禁忌症一样：过敏 absolute，重症肌无力 absolute，癫痫 relative，QT延长 relative，儿童相对，妊娠C哺乳相对。
                - listitem [ref=e371]:
                  - paragraph [ref=e372]:
                    - text: gemifloxacin | Quinolones
                    - text: 同moxifloxacin等，有QT延长禁忌：过敏 absolute; 重症肌无力 absolute; QT延长或合用延长QT药物 absolute; 癫痫 relative; 儿童、孕妇相对。
                - listitem [ref=e373]:
                  - paragraph [ref=e374]: Guaifenesin Liquid/Tablets/Granules 同 guaifenesin 单一成分。
                - listitem [ref=e375]:
                  - paragraph [ref=e376]: cefuroxime (injection route) 同头孢呋辛，增加注射过敏 absolute。
                - listitem [ref=e377]:
                  - paragraph [ref=e378]: moxifloxacin (intravenous route) 同moxifloxacin。
                - listitem [ref=e379]:
                  - paragraph [ref=e380]:
                    - text: imipenem and cilastatin | Carbapenems
                    - text: 禁忌症：对任何成分过敏 absolute；对青霉素、头孢菌素类或其他β-内酰胺类严重过敏（可能交叉）relative/absolute。大多数对青霉素过敏患者慎用，但如果有速发型严重过敏应绝对避免。所以严重青霉素过敏(过敏性休克) absolute。此外，癫痫相对（亚胺培南降低惊厥阈），肾功能不全需调整否则神经毒性。列出：severe hypersensitivity to imipenem, cilastatin, or other beta-lactams (absolute); severe immediate-type hypersensitivity to penicillins or cephalosporins (absolute); seizure disorders or history of seizures without adequate anticonvulsant therapy (relative); severe renal impairment (relative, increased seizure risk); pregnancy/lactation (relative, C). 也可加： meningitis because seizures (relative).
              - paragraph [ref=e381]: 现在，生成JSON。我将为每个药物结构列出contraindications数组。注意药物名称要与输入一致。输入有重复如dyphylline and guaifenesin，amoxicillin and clavulanate potassium/ amoxicillin and clavulanate (oral route) 视为相同，cough and cold combinations，等等。需要对所有输入药物生成。必须注意输入中的重复项：如amoxicillin and clavulanate potassium和amoxicillin and clavulanate (oral route)是同一药物不同表述，克雷同。erythromycin (oral) 和 erythromycin (oral route) 视为同。但列表中分开，需都给。以及Guaifenesin Liquid, Tablets, Granules 都是愈创甘油醚不同剂型，禁忌相同。还有erythromycin (oral route) 和 erythromycin (intravenous route) 是不同剂型，禁忌基本相同，注射可以列出。为准确，我们将全部按要求列出。
              - paragraph [ref=e382]: 另外，aripiprazole (oral with sensor) 与 aripiprazole (oral) 相同禁忌。ziprasidone (oral/injection) 结合。
              - paragraph [ref=e383]: 输出必须只JSON。开始构建。注意严谨，严重程度 absolute/relative，类型分类：disease, allergy_type, physiological_condition, drug_class。
              - paragraph [ref=e384]: 对于药物“dyphylline and guaifenesin”，禁忌症包括对xanthines或guaifenesin过敏 absolute; 消化性溃疡、严重肝肾疾病、心律失常、癫痫、妊娠等相对。要具体。
              - paragraph [ref=e385]: "\"cough and cold combinations (oral route)\" 我将其视为复合制剂，列出常见成分可能的禁忌：绝对禁忌：与MAOIs合用（若含右美沙芬或伪麻黄碱）；过敏绝对；严重高血压、冠心病、甲亢相对；妊娠哺乳相对。但无法确切知道成分，仍按经验写。"
              - paragraph [ref=e386]: 注意，部分药物如divalproex sodium，妊娠分级D，绝对禁忌。aripiprazole 妊娠C通常为相对禁忌，而不是绝对。
              - paragraph [ref=e387]: 开始构建JSON数组。将生成50个条目。确保每个名称与输入一致。用英文。
              - paragraph [ref=e388]: 我将在reason中简要解释。
