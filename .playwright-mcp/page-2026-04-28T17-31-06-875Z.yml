              - paragraph [ref=e1311]:
                - text: "药物44: chlophedianol, dexchlorpheniramine, and pseudoephedrine"
                - text: "成分: chlophedianol (止咳), dexchlorpheniramine (抗组胺), pseudoephedrine (减充血剂)"
                - text: 禁忌症需考虑各成分。chlophedianol具有抗胆碱能和中枢作用，结构与某些药物相似，可能MAOI相互作用。dexchlorpheniramine是氯苯那敏的右旋异构体，抗组胺/抗胆碱。pseudoephedrine是交感胺。
              - paragraph [ref=e1312]: "绝对禁忌:"
              - list [ref=e1313]:
                - listitem [ref=e1314]:
                  - paragraph [ref=e1315]: hypersensitivity to any component
                - listitem [ref=e1316]:
                  - paragraph [ref=e1317]: narrow-angle glaucoma (抗胆碱能+交感胺)
                - listitem [ref=e1318]:
                  - paragraph [ref=e1319]: urinary retention (BPH)
                - listitem [ref=e1320]:
                  - paragraph [ref=e1321]: pyloroduodenal obstruction
                - listitem [ref=e1322]:
                  - paragraph [ref=e1323]: neonates and premature infants (dexchlorpheniramine禁忌)
                - listitem [ref=e1324]:
                  - paragraph [ref=e1325]: severe hypertension (pseudoephedrine)
                - listitem [ref=e1326]:
                  - paragraph [ref=e1327]: severe CAD (pseudoephedrine)
                - listitem [ref=e1328]:
                  - paragraph [ref=e1329]:
                    - text: concurrent MAOI or within 14 days (pseudoephedrine hypertensive crisis, chlophedianol可能有serotonergic/adrenergic effects, 抗胆碱能)
                    - text: "相对禁忌:"
                - listitem [ref=e1330]:
                  - paragraph [ref=e1331]: hyperthyroidism
                - listitem [ref=e1332]:
                  - paragraph [ref=e1333]: children <2 years
                - listitem [ref=e1334]:
                  - paragraph [ref=e1335]: lactation (pseudoephedrine减少泌乳，dexchlorpheniramine镇静)
              - paragraph [ref=e1336]:
                - text: "药物45: chlorcyclizine and phenylephrine"
                - text: "chlorcyclizine: piperazine类抗组胺，抗胆碱能，止吐。phenylephrine: 减充血剂。"
                - text: "禁忌: hypersensitivity, narrow-angle glaucoma, urinary retention, pyloroduodenal obstruction, neonates/premature infants (antihistamine contraindicated), severe hypertension, severe CAD, concurrent MAOI, hyperthyroidism (relative), children <2 years, lactation."
              - paragraph [ref=e1337]:
                - text: "药物46: chlorpheniramine, phenylephrine, and phenyltoloxamine"
                - text: "phenyltoloxamine: 抗组胺，与diphenhydramine类似，抗胆碱能。"
                - text: "所以，三个成分: chlorpheniramine (抗组胺/抗胆碱), phenylephrine (减充血), phenyltoloxamine (抗组胺/抗胆碱)。抗胆碱能负担更重。"
                - text: "禁忌: hypersensitivity, narrow-angle glaucoma, urinary retention, pyloroduodenal obstruction, neonates/premature infants, severe hypertension, severe CAD, concurrent MAOI, hyperthyroidism, children <2 years, lactation."
