              - generic [ref=e216]:
                - paragraph [ref=e217]: 我们被要求为每种药物生成完整的禁忌症列表。输入是药物列表，有些是组合药物。我们需要为每种药物列出禁忌症。输出应该是JSON数组，每个元素有generic_name（组合药物的名称，保持原样）和contraindications数组，每个禁忌症有contraindication_name, contraindication_type (disease, allergy_type, physiological_condition, drug_class), severity (absolute/relative), reason。
                - paragraph [ref=e218]: 我们需要分析每个组合的成分，然后推断每个成分的禁忌症，并考虑到组合可能导致的整体禁忌症。注意：妊娠分级不是禁忌症，但妊娠可能是一个生理状态禁忌，取决于药物。有些药物妊娠分级D或X可能禁忌。我们需要根据已知的临床药理学知识列出禁忌症。
                - paragraph [ref=e219]: 我们将逐一对每个药物生成禁忌症列表。要确保完整性，但也要注意组合药物的适应症（如鼻塞、过敏等），避免过于笼统。同时也要考虑常见禁忌，如MAOIs与拟交感神经药（如伪麻黄碱、去氧肾上腺素）的禁忌，闭角型青光眼与抗组胺药，尿潴留与抗组胺药，等等。
                - paragraph [ref=e251]: 我会基于常见成分：氯苯那敏（chlorpheniramine）、苯海拉明（diphenhydramine）、多西拉敏（doxylamine）等是第一代抗组胺药，其抗胆碱能作用禁忌：窄角型青光眼、尿潴留（如前列腺增生）、幽门十二指肠梗阻等。伪麻黄碱（pseudoephedrine）、去氧肾上腺素（phenylephrine）是减充血剂，拟交感神经药，禁忌：严重高血压、冠心病、MAOIs合用、闭角型青光眼（可能相对禁忌），甲亢等。阿片类镇咳药（可待因codeine、氢可酮hydrocodone）禁忌：呼吸抑制、哮喘急性发作、儿童（某些年龄），头部损伤，颅内压升高，MAOIs合用，以及过敏。对乙酰氨基酚（acetaminophen）禁忌：严重肝功能损害，G6PD缺乏（相对），过敏。布洛芬（ibuprofen）禁忌：活动性消化道溃疡出血，严重心衰，严重肾损，阿司匹林过敏（交叉过敏），妊娠晚期（妊娠分级D），冠脉搭桥术后疼痛（围手术期）。咖啡因禁忌：严重高血压、心律失常、失眠等，但较轻微。愈创甘油醚（guaifenesin）禁忌：过敏。右美沙芬（dextromethorphan）禁忌：MAOIs合用（5-羟色胺综合征风险），儿童（某些年龄），呼吸抑制（相对）。卡比沙明（carbinoxamine）等。还要考虑药物组合整体：含有抗组胺药和减充血剂，所以禁忌症包括MAOI合用、窄角型青光眼、尿潴留等；含有阿片类镇咳药，添加相关禁忌。含有对乙酰氨基酚，禁忌严重肝病。含有布洛芬，禁忌活动性消化性溃疡等。含有可待因/氢可酮，注意儿童（12岁以下不建议用于咳嗽感冒）和哺乳禁忌（可待因超快代谢者）。
                - paragraph [ref=e252]: 我将为每个药物生成列表。注意妊娠分级D意味着有证据表明对胎儿有风险，但可能在某些情况下使用。对于非阿片类药物，抗组胺药一般妊娠分级C，伪麻黄碱C，去氧肾上腺素C，对乙酰氨基酚B，布洛芬D（晚期妊娠），可待因C/D。组合药物的妊娠分级可能来自成分最严的。有些输入中标明妊娠分级D，如chlorpheniramine, ibuprofen, and pseudoephedrine，因为含布洛芬，妊娠晚期禁忌。那么禁忌症中应包括妊娠（尤其是第三孕期）。对于标明妊娠分级C的，可能相对禁忌，可以从生理状况列为相对禁忌。
                - paragraph [ref=e253]: 我将生成JSON。为了简化，我将每种组合药物列出。总共约44种药物。注意有些药物名称重复如ibuprofen and phenylephrine出现两次，但成分相同，我只生成一次，但输入有两次，可能都要输出，但为了减少冗余，可以输出两次同样的，但我会为每个条目生成。输入列表中，名字可能略有不同，如“Acetaminophen/Chlorpheniramine/Dextromethorphan/Phenylephrine Caps & Tabs”和“Acetaminophen, Chlorpheniramine, Dextromethorphan, Phenylephrine Liquid”等，按输入列表名称。我会逐个处理。
                - paragraph [ref=e254]: 禁忌症需要具体。例如，抗组胺药：窄角型青光眼（angle-closure glaucoma），前列腺增生尿潴留（prostatic hyperplasia with urinary retention），幽门狭窄（pyloric stenosis），膀胱颈梗阻（bladder neck obstruction）。减充血剂：严重高血压（severe hypertension），重度冠心病（severe coronary artery disease），甲状腺功能亢进（hyperthyroidism），同时使用MAOIs（14天内）。阿片类：急性或重度支气管哮喘（acute or severe asthma）在没有适当监测下，呼吸抑制（respiratory depression），肠梗阻（known or suspected gastrointestinal obstruction），头部损伤及颅内压升高（head injury, increased intracranial pressure），同时使用MAOIs。对乙酰氨基酚：已知对乙酰氨基酚过敏，严重肝功能不全（severe hepatic impairment），G6PD缺乏症（相对）。布洛芬：在使用布洛芬或其他NSAIDs后出现过哮喘、荨麻疹或过敏反应（aspirin-sensitive asthma, nasal polyps），活动性消化性溃疡/出血（active or history of recurrent peptic ulcer/hemorrhage），重度心力衰竭（severe heart failure），严重肾功能不全（severe renal impairment），妊娠晚期（third trimester），冠脉搭桥术围手术期疼痛（perioperative pain in CABG）。咖啡因：严重高血压，心律失常，失眠等，相对。注意药物类：MAOIs与伪麻黄碱/去氧肾上腺素/右美沙芬/阿片类/抗组胺药可能有相互作用，通常列为绝对禁忌。右美沙芬+MAOIs：可能引起5-羟色胺综合征，绝对禁忌。伪麻黄碱+MAOIs：高血压危象。抗组胺药+MAOIs：可能增强抗胆碱能作用，但一般也列为禁忌。可待因+MAOIs：也禁忌。所以几乎每种含减充血剂或右美沙芬或阿片类的组合，都会禁忌MAOIs。
                - paragraph [ref=e255]: 此外，儿童年龄限制：对于含可待因或氢可酮的复方感冒药，FDA不推荐用于儿童，有些标签有年龄限制。可待因：12岁以下儿童禁忌用于咳嗽或感冒（相对/绝对？）。我们将作为相对禁忌，或注明不建议使用。含有抗组胺药和减充血剂的产品，一般不用于2岁以下儿童（相对）。我会适当添加儿科禁忌（例如children under 2 years, 或 under 6 years），但需谨慎。我将为阿片类镇咳药注明pediatric use restricted。对于含有可待因或氢可酮的，可添加“children <12 years (for cough and cold)”作为相对禁忌，或“pediatric patients for postoperative pain”等。但为了符合标准，我可以列出 "pediatric use in children under 12 years (risk of respiratory depression with codeine)" 等。
                - paragraph [ref=e256]: 哺乳期：伪麻黄碱减少乳汁分泌，抗组胺药可能使婴儿镇静或兴奋，阿片类可能进入乳汁，所以有些列为相对禁忌。
                - paragraph [ref=e257]: 过敏：对任何成分过敏是绝对禁忌。
                - paragraph [ref=e258]: 严重程度：大多数为absolute，对于相对禁忌，如严重肝功能不全时对乙酰氨基酚慎用，相对；轻度高血压用减充血剂相对；老年人慎用等。我会按典型医嘱。
