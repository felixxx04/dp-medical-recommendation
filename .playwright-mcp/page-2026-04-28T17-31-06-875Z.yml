              - text: "\"generic_name\": \"chlorpheniramine, ibuprofen, and pseudoephedrine\","
              - text: "\"contraindications\": ["
              - text: "{\"contraindication_name\": \"hypersensitivity to chlorpheniramine, ibuprofen, pseudoephedrine, or other NSAIDs\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic reactions, including cross-reactivity with aspirin and other NSAIDs\"},"
              - text: "{\"contraindication_name\": \"third trimester of pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Ibuprofen may cause premature closure of the ductus arteriosus and delay labor\"},"
              - text: "{\"contraindication_name\": \"active or history of recurrent peptic ulcer, gastrointestinal bleeding, or perforation\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Ibuprofen increases risk of GI ulceration and bleeding\"},"
              - text: "{\"contraindication_name\": \"severe heart failure (NYHA class III–IV)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Ibuprofen can cause fluid retention and worsen heart failure\"},"
              - text: "{\"contraindication_name\": \"severe renal impairment (eGFR <30 mL/min)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Ibuprofen may precipitate acute renal failure and further reduce function\"},"
              - text: "{\"contraindication_name\": \"perioperative pain in coronary artery bypass graft (CABG) surgery\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Ibuprofen linked to increased risk of cardiovascular thrombotic events in this setting\"},"
              - text: "{\"contraindication_name\": \"aspirin- or NSAID-exacerbated respiratory disease (asthma, nasal polyps, angioedema)\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Cross-sensitivity with ibuprofen can trigger severe bronchospasm and anaphylactoid reactions\"},"
              - text: "{\"contraindication_name\": \"narrow-angle glaucoma\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Chlorpheniramine and pseudoephedrine can increase intraocular pressure, precipitating acute closure\"},"
              - text: "{\"contraindication_name\": \"urinary retention (prostatic hyperplasia, bladder neck obstruction)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Anticholinergic effect of chlorpheniramine and alpha-adrenergic effect of pseudoephedrine exacerbate obstruction\"},"
              - text: "{\"contraindication_name\": \"pyloroduodenal obstruction\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Anticholinergic effect of chlorpheniramine impairs gastric emptying\"},"
              - text: "{\"contraindication_name\": \"severe hypertension\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Pseudoephedrine can further elevate blood pressure by vasoconstriction\"},"
              - text: "{\"contraindication_name\": \"severe coronary artery disease\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Pseudoephedrine increases myocardial oxygen demand and may provoke ischemia\"},"
              - text: "{\"contraindication_name\": \"concurrent or recent (within 14 days) monoamine oxidase inhibitor (MAOI) therapy\", \"contraindication_type\": \"drug_class\", \"severity\": \"absolute\", \"reason\": \"Severe hypertensive crisis with pseudoephedrine; additive anticholinergic effects with chlorpheniramine\"},"
              - text: "{\"contraindication_name\": \"hyperthyroidism\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Pseudoephedrine may exacerbate tachycardia and tremor\"},"
              - text: "{\"contraindication_name\": \"lactation\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pseudoephedrine can reduce milk supply; chlorpheniramine may cause infant sedation; ibuprofen is preferred but this combination not recommended\"},"
              - text: "{\"contraindication_name\": \"severe hepatic impairment\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Ibuprofen may worsen hepatotoxicity and bleeding risk\"},"
              - text: "{\"contraindication_name\": \"coagulation disorders\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Ibuprofen inhibits platelet aggregation and may increase bleeding\"}"
              - text: "]"
              - text: "},"
