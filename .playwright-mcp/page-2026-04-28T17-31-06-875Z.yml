                  - listitem [ref=e1044]:
                    - paragraph [ref=e1045]: 儿童<2岁 (relative)
                  - listitem [ref=e1046]:
                    - paragraph [ref=e1047]: 哺乳 (relative)
                - list [ref=e1048]:
                  - listitem [ref=e1049]:
                    - paragraph [ref=e1050]: Triprolidine and Pseudoephedrine Liquid
                - list [ref=e1051]:
                  - listitem [ref=e1052]:
                    - paragraph [ref=e1053]:
                      - text: 曲普利啶，伪麻黄碱。妊娠分级C。
                      - text: 禁忌症：同其他抗组胺+减充血剂。
                - list [ref=e1054]:
                  - listitem [ref=e1055]:
                    - paragraph [ref=e1056]: diphenhydramine hydrochloride and phenylephrine hydrochloride
                - list [ref=e1057]:
                  - listitem [ref=e1058]:
                    - paragraph [ref=e1059]: 与第4个重复（diphenhydramine and phenylephrine）。列出相同。
                - list [ref=e1060]:
                  - listitem [ref=e1061]:
                    - paragraph [ref=e1062]: carbetapentane and chlorpheniramine
                - list [ref=e1063]:
                  - listitem [ref=e1064]:
                    - paragraph [ref=e1065]:
                      - text: 卡比芬（镇咳药，类似右美沙芬但还有抗胆碱能作用），氯苯那敏。妊娠分级C。
                      - text: 禁忌症：
                  - listitem [ref=e1066]:
                    - paragraph [ref=e1067]: 过敏
                  - listitem [ref=e1068]:
                    - paragraph [ref=e1069]: 窄角型青光眼 (absolute)
                  - listitem [ref=e1070]:
                    - paragraph [ref=e1071]: 尿潴留/前列腺增生 (absolute)
                  - listitem [ref=e1072]:
                    - paragraph [ref=e1073]: 幽门梗阻 (absolute)
                  - listitem [ref=e1074]:
                    - paragraph [ref=e1075]: 新生儿/早产儿 (absolute)
                  - listitem [ref=e1076]:
                    - paragraph [ref=e1077]: MAOIs合用 (absolute) – carbetapentane may interact
                  - listitem [ref=e1078]:
                    - paragraph [ref=e1079]: 儿童<2岁 (relative)
                  - listitem [ref=e1080]:
                    - paragraph [ref=e1081]: 哺乳 (relative)
                - list [ref=e1082]:
                  - listitem [ref=e1083]:
                    - paragraph [ref=e1084]: camphor and menthol topical
                - list [ref=e1085]:
                  - listitem [ref=e1086]:
                    - paragraph [ref=e1087]:
                      - text: 樟脑，薄荷醇局部。适应症肌肉关节痛、瘙痒、胸塞、咳嗽。妊娠分级N。
                      - text: 禁忌症类似Camphor Cream：过敏，破损皮肤，黏膜，儿童（尤其是面部、鼻腔），可能引起中毒。特定：对外用。列出：allergy, broken skin, infants/young children (apply to chest may cause respiratory distress), asthma (inhaled menthol may trigger bronchospasm in children). 相对禁忌。
                - list [ref=e1088]:
                  - listitem [ref=e1089]:
                    - paragraph [ref=e1090]: chlophedianol, dexchlorpheniramine, and pseudoephedrine
                - list [ref=e1091]:
                  - listitem [ref=e1092]:
                    - paragraph [ref=e1093]:
                      - text: 氯苯达诺，右氯苯那敏，伪麻黄碱。妊娠分级C。
                      - text: 禁忌症：抗组胺药和减充血剂相关全部，加氯苯达诺抗胆碱能。
                - list [ref=e1094]:
                  - listitem [ref=e1095]:
                    - paragraph [ref=e1096]: chlorcyclizine and phenylephrine
                - list [ref=e1097]:
                  - listitem [ref=e1098]:
                    - paragraph [ref=e1099]:
                      - text: 氯环力嗪（抗组胺），去氧肾上腺素。妊娠分级N。
                      - text: 禁忌症类似 doxylamine and phenylephrine。
                - list [ref=e1100]:
                  - listitem [ref=e1101]:
                    - paragraph [ref=e1102]: chlorpheniramine, phenylephrine, and phenyltoloxamine
                - list [ref=e1103]:
                  - listitem [ref=e1104]:
                    - paragraph [ref=e1105]:
                      - text: 氯苯那敏，去氧肾上腺素，苯托沙敏（抗组胺，与苯海拉明相似）。妊娠分级C。
                      - text: 三个抗组胺成分？实际上两个抗组胺，一个减充血剂。禁忌症相同。
                - list [ref=e1106]:
                  - listitem [ref=e1107]:
                    - paragraph [ref=e1108]: Chlorpheniramine, Pseudoephedrine, and Codeine Liquid
                - list [ref=e1109]:
                  - listitem [ref=e1110]:
                    - paragraph [ref=e1111]:
                      - text: 氯苯那敏，伪麻黄碱，可待因。妊娠分级N。
                      - text: 禁忌症丰富：过敏，窄角型青光眼，尿潴留，幽门梗阻，新生儿，严重高血压，重度冠心病，哮喘/呼吸抑制，胃肠梗阻，头部损伤，MAOIs合用，儿童<12岁（可待因绝对禁忌症于感冒咳嗽），哺乳绝对禁忌（可待因），妊娠相对。
                - list [ref=e1112]:
                  - listitem [ref=e1113]:
                    - paragraph [ref=e1114]: chlorpheniramine and codeine
                - list [ref=e1115]:
                  - listitem [ref=e1116]:
                    - paragraph [ref=e1117]:
                      - text: 氯苯那敏，可待因。妊娠分级C。
                      - text: 相似禁忌，但无减充血剂，不强调高血压/冠心病。窄角型青光眼、尿潴留、幽门梗阻、呼吸抑制、头部损伤、MAOIs、儿童<12岁、哺乳禁忌。
                - list [ref=e1118]:
                  - listitem [ref=e1119]:
                    - paragraph [ref=e1120]: Acetaminophen, Dextromethorphan, and Doxylamine Liquid
                - list [ref=e1121]:
                  - listitem [ref=e1122]:
                    - paragraph [ref=e1123]:
                      - text: 对乙酰氨基酚，右美沙芬，多西拉敏。适应症：咳嗽，打喷嚏，流涕，头痛，疼痛，发热，失眠。妊娠分级N。
                      - text: 禁忌症：严重肝功能不全（对乙酰氨基酚），窄角型青光眼（多西拉敏），尿潴留/前列腺增生，幽门梗阻，新生儿，MAOIs合用（右美沙芬+多西拉敏），儿童<2岁，哺乳。没有减充血剂。
                - list [ref=e1124]:
                  - listitem [ref=e1125]:
                    - paragraph [ref=e1126]: codeine, phenylephrine, and triprolidine
                - list [ref=e1127]:
                  - listitem [ref=e1128]:
                    - paragraph [ref=e1129]:
                      - text: 可待因，去氧肾上腺素，曲普利啶。妊娠分级N。
                      - text: 禁忌症：可待因相关禁忌（呼吸抑制等），再加抗组胺和减充血剂。儿童<12岁，哺乳绝对禁忌，窄角型青光眼，尿潴留，严重高血压，重度冠心病，MAOIs，等等。
                - paragraph [ref=e1130]: 我已经覆盖所有药物。有些重复名称，我会按照输入输出。我会确保每个条目都有 JSON。现在开始编写JSON。注意不要有输出解释文本，只输出JSON数组。保持名字与输入一致。我将一一构建。
