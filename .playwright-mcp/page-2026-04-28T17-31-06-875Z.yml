              - text: "{\"contraindication_name\": \"hypersensitivity to acetaminophen, chlorpheniramine, dextromethorphan, phenylephrine, or related compounds\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Anaphylactic and severe hypersensitivity reactions possible\"},"
