              - text: "{\"contraindication_name\": \"acute or severe bronchial asthma in unmonitored settings or without resuscitative equipment\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Opioid-induced respiratory depression can be fatal in vulnerable patients\"},"
              - text: "{\"contraindication_name\": \"known or suspected gastrointestinal obstruction, including paralytic ileus\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Hydrocodone reduces peristalsis and may worsen obstruction\"},"
