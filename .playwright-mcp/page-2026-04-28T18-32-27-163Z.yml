            - text: "\"generic_name\": \"fluticasone topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Suppresses local defenses leading to progression.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May cause tinea incognito or worsen candidiasis.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Potential for severe disseminated viral infection.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Exacerbates facial inflammatory dermatoses.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to fluticasone or formulation\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis is possible.\"},"
            - text: "{\"contraindication_name\": \"face, groin, or occluded application (moderate to high potency)\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Increases systemic absorption and risk of atrophy.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients with prolonged or extensive use\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Higher susceptibility to HPA suppression.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; use only for limited disease when benefit outweighs risk.\"}"
