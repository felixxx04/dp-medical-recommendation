            - text: "\"generic_name\": \"fluocinolone topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Steroid impairs local immunity and may foster bacterial spread.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Risk of tinea incognito and worsening fungal infection.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Viral dissemination and vaccine site complications possible.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Fluocinolone may trigger and exacerbate these dermatoses.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to fluocinolone or excipients\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis can arise.\"},"
            - text: "{\"contraindication_name\": \"application on face, groin, or occluded areas for long durations\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Increased risk of local atrophy and systemic absorption.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients with extensive or prolonged use\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Greater systemic effects due to body surface area to weight ratio.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; limited use when clearly necessary.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"fluocinolone otic\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"tympanic membrane perforation\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Otic steroid can enter middle ear and cause ototoxicity or infection in the setting of non-intact TM.\"},"
            - text: "{\"contraindication_name\": \"active viral ear infection (herpes simplex, vaccinia, varicella)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Corticosteroid may promote viral replication and worsen infection.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to fluocinolone or vehicle\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Local allergic reaction in external ear canal.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category N for otic formulation; minimal systemic absorption expected but safety data limited.\"}"
