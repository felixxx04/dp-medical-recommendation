            - text: "\"generic_name\": \"hydrocortisone rectal (cream, suppository)\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated local bacterial, fungal, or viral infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Suppression of local immunity may accelerate infection, especially in proctitis or perianal area.\"},"
            - text: "{\"contraindication_name\": \"intestinal obstruction, perforation, or abscess\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Steroid may mask symptoms and delay surgery; rectal administration dangerous in anatomical disruption.\"},"
            - text: "{\"contraindication_name\": \"rectal bleeding of unknown origin\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Requires diagnosis to exclude malignancy or serious gastrointestinal pathology.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to hydrocortisone or suppository base\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Contact hypersensitivity reactions may worsen local symptoms.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; systemic absorption possible, particularly with inflamed mucosa; use only if clearly needed.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"methotrexate (oral)\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Pregnancy Category X; known teratogen causing severe fetal malformations and death; must be avoided in pregnancy or if pregnancy planned.\"},"
            - text: "{\"contraindication_name\": \"lactation\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Excreted in breast milk in clinically significant amounts; contraindicated due to risk of infant immunosuppression and carcinogenicity.\"},"
            - text: "{\"contraindication_name\": \"severe hepatic impairment / active liver disease\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Hepatotoxic agent; baseline liver disease increases risk of cirrhosis and fulminant hepatitis.\"},"
            - text: "{\"contraindication_name\": \"severe renal impairment (CrCl <30 mL/min)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Renal excretion is primary; accumulation leads to severe bone marrow suppression and mucositis.\"},"
            - text: "{\"contraindication_name\": \"preexisting bone marrow suppression / significant cytopenias\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Profound myelosuppression can result in life-threatening infection and bleeding.\"},"
            - text: "{\"contraindication_name\": \"active serious infection / immunodeficiency syndromes\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Further immunosuppression may produce overwhelming sepsis.\"},"
            - text: "{\"contraindication_name\": \"alcoholism / excessive alcohol intake\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Synergistic hepatotoxicity increases risk of cirrhosis and liver failure.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to methotrexate\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic pneumonitis, rash, and anaphylaxis have been reported.\"},"
            - text: "{\"contraindication_name\": \"concurrent administration of live vaccines\", \"contraindication_type\": \"drug_class\", \"severity\": \"absolute\", \"reason\": \"Immunosuppression may allow unchecked live vaccine replication and severe disease.\"},"
            - text: "{\"contraindication_name\": \"ascites or pleural effusions\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Methotrexate distributes into third spaces, delaying clearance and increasing toxicity; drain effusions before therapy.\"},"
            - text: "{\"contraindication_name\": \"peptic ulcer disease\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"May exacerbate mucosal injury and precipitate gastrointestinal bleeding.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"clobetasol topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Superpotent immunosuppression promotes bacterial growth and masks infection.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Fungal overgrowth and tinea incognito may occur.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Disseminated viral infection possible; vaccination site complications.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Very high potency steroids strongly worsen these conditions; severe rebound risk.\"},"
            - text: "{\"contraindication_name\": \"application on face, groin, axillae, or intertriginous areas\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Ultra-high potency steroid; causes rapid atrophy, striae, telangiectasias, and systemic absorption in these regions.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients <12 years old\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Enhanced systemic absorption and risk of HPA axis suppression, growth retardation, and intracranial hypertension.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to clobetasol or formulation components\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis, urticaria, or anaphylaxis may occur.\"},"
            - text: "{\"contraindication_name\": \"extensive body surface area or occlusive dressing use\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Dramatically raises systemic burden; reserve such use for very limited, resistant plaques under strict supervision.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; high potency and systemic absorption risk; avoid unless no safer alternative and minimal quantity on smallest area.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"dupilumab Brand name: Dupixent\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"hypersensitivity to dupilumab or any excipient\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"May cause severe allergic reactions including anaphylaxis and serum sickness-like illness.\"},"
            - text: "{\"contraindication_name\": \"acute asthma symptoms or status asthmaticus\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Dupilumab is not a rescue bronchodilator; initiate in stable patients only.\"},"
            - text: "{\"contraindication_name\": \"pre-existing helminth infection\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Eosinophil-modulating therapy may reduce host defenses; treat helminth infections before initiating dupilumab.\"},"
            - text: "{\"contraindication_name\": \"concurrent vaccination with live vaccines\", \"contraindication_type\": \"drug_class\", \"severity\": \"relative\", \"reason\": \"Immunomodulation may increase risk of vaccine-related infection; complete age-appropriate live immunizations before therapy.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category N; no well-controlled human data; use only if potential benefit justifies unknown fetal risk.\"},"
            - text: "{\"contraindication_name\": \"lactation\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Unknown if excreted in human milk; caution advised, especially in preterm or immunocompromised infants.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"pimecrolimus topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"hypersensitivity to pimecrolimus or any component\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Immediate allergic reactions may occur.\"},"
            - text: "{\"contraindication_name\": \"active bacterial skin infection (e.g., impetigo)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Local immunosuppression impairs bacterial clearance and can spread infection.\"},"
            - text: "{\"contraindication_name\": \"active fungal skin infection (e.g., dermatophytosis, candidiasis)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Risk of worsening fungal invasion with altered immune response.\"},"
            - text: "{\"contraindication_name\": \"active viral skin infection (e.g., herpes simplex, varicella zoster, molluscum contagiosum)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May provoke disseminated viral disease or eczema herpeticum.\"},"
            - text: "{\"contraindication_name\": \"congenital or acquired immunodeficiency states\", \"contraindication_type\": \"disease\", \"severity\": \"relative\", \"reason\": \"Increased risk of severe infections and possibly lymphoma; long-term safety data lacking.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients <2 years of age\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Safety and efficacy not established; limited data on immune development.\"},"
            - text: "{\"contraindication_name\": \"concurrent phototherapy or excessive natural/artificial UV exposure\", \"contraindication_type\": \"drug_class\", \"severity\": \"relative\", \"reason\": \"Theoretical increased risk of skin malignancy; avoid UV light exposure during treatment.\"},"
            - text: "{\"contraindication_name\": \"application under occlusion\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Enhanced systemic absorption may increase immunosuppressive load.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; minimal systemic absorption typical, but avoid unless clearly needed.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"fluocinonide topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"High-potency steroid can mask and exacerbate bacterial growth.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Causes tinea incognito and worsens dermatophyte or yeast infections.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Risk of dissemination and severe atypical presentation.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"High-potency steroids can precipitate or severely aggravate these conditions.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to fluocinonide or excipients\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis and immediate reactions possible.\"},"
            - text: "{\"contraindication_name\": \"face, groin, or intertriginous application for prolonged periods\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Thin skin sites absorb more steroid, leading to atrophy, striae, and systemic effects.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients with extensive use\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Children have increased risk of HPA axis suppression and growth effects.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; limit dose and area to minimize fetal risk.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"desonide topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Local immunosuppression masks infection signs and may allow progression.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Low potency doesn't eliminate risk of tinea incognito.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Viral dissemination risk, especially in vaccinia inoculation sites.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May induce or aggravate these facial dermatoses.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to desonide or vehicle\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Contact and immediate allergic reactions possible.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients with extensive or occluded application\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Even low-potency steroids can cause HPA suppression and growth retardation when used in large quantities.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; use sparingly unless benefit is clearly established.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"desoximetasone topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Corticosteroid immunosuppression may lead to unchecked bacterial multiplication.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May provoke tinea incognito or aggravate candidiasis.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Dissemination risk in active viral lesions.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Potentially aggravates and triggers rebound.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to desoximetasone or excipients\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis is possible.\"},"
            - text: "{\"contraindication_name\": \"application on face, groin, or under occlusion for prolonged periods\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"High potency increases risk of atrophy and systemic absorption.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients with extensive use\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Susceptibility to HPA axis suppression and iatrogenic Cushing's.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; minimize exposure; avoid occlusive techniques.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"hydrocortisone (topical application route)\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Steroid suppresses local defense against pyogenic bacteria.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May worsen dermatophytosis and candidiasis.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Not to be applied to active viral lesions due to dissemination risk.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Low-potency steroids can still cause or exacerbate these conditions.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to hydrocortisone or vehicle\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Contact allergy may occur.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients requiring large-scale or prolonged application\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Children absorb proportionally more drug, risking HPA suppression.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; brief, limited use appears acceptable; avoid high doses.\"}"
            - text: "]"
            - text: "},"
            - text: "{"
            - text: "\"generic_name\": \"halobetasol topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Superpotent steroid can mask signs and cause rapid bacterial proliferation.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Risk of severe tinea incognito and systemic candidal superinfection.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May cause disseminated viral infection and complicate vaccination.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Superpotent steroids induce severe flares and difficult-to-treat rebound.\"},"
            - text: "{\"contraindication_name\": \"application on face, groin, axillae, or intertriginous sites\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Ultra-high potency in thin skin causes atrophy, striae, and significant systemic absorption.\"},"
            - text: "{\"contraindication_name\": \"pediatric patients <12 years old\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"absolute\", \"reason\": \"Enhanced absorption leads to adrenal suppression, growth retardation, and potential intracranial hypertension.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to halobetasol or formulation\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis and systemic allergic reactions may occur.\"},"
            - text: "{\"contraindication_name\": \"extensive body surface area or occlusive dressings\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Systemic toxicity risk increased substantially; avoid unless for severe, limited disease.\"},"
            - text: "{\"contraindication_name\": \"pregnancy\", \"contraindication_type\": \"physiological_condition\", \"severity\": \"relative\", \"reason\": \"Pregnancy Category C; restrict to smallest area for shortest time when benefit outweighs risk.\"}"
            - text: "]"
            - text: "},"
