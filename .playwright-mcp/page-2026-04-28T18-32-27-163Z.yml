              - paragraph [ref=e551]: "要注意区分不同名称，但同成分可复用禁忌症。对于组合药物，应列出每个成分的禁忌症，同时说明整体禁忌。JSON结构中每个药物一个对象，contraindications数组。对于组合产品，可以把各个成分的禁忌症作为独立的contraindication列出，并注明来自哪个成分。例如：\"contraindication_name\": \"iodine hypersensitivity (from iodoquinol)\", 并设置类型。"
              - paragraph [ref=e552]: 现在需要为每个药物构建禁忌列表。确保使用规定类型：disease, allergy_type, physiological_condition, drug_class。严重程度absolute或relative。给出合理理由。妊娠分级C通常不是绝对禁忌，而是relative，除非X级为absolute。所以C级都列为relative，并说明“potential risk, use if benefit outweighs risk”。对于局部药物，妊娠C也是relative。dupilumab妊娠N也是没有数据，可能列为relative。哺乳期一般如无明确数据列为relative。
              - paragraph [ref=e553]: 局部类固醇的禁忌包括：未经治疗的细菌（如脓疱疮）、真菌（如癣）、病毒（如单纯疱疹、水痘带状疱疹、牛痘）皮肤感染；以及寄生虫感染（疥疮）；对皮质类固醇过敏；口周皮炎；玫瑰痤疮；寻常痤疮；皮肤萎缩；溃疡；对辅料过敏。儿童和老年人皮肤薄，吸收增加，全身毒性风险；需要慎用，属于relative。强效激素避免用于面部、间擦部位、婴儿尿布区（封包），这些可以视为relative contraindication（特定部位使用）。为避免过于笼统，可以列出“application to face, groin, axillae (ultra-high potency steroids)”作为相对禁忌，严重程度relative，理由：皮肤萎缩等。但需保持节制。我将在超强效激素中包括“application on face, groin, or intertriginous areas (relative)” 。
              - paragraph [ref=e554]: 对于口服补液盐，高钠/高钾血症、无尿、肠梗阻等。
              - paragraph [ref=e555]: "crofelemer: 几乎没有全身吸收，但若有对Crofelemer或任何辅料过敏则为绝对禁忌；适应症为非感染性腹泻，如果在感染性腹泻中使用可能掩盖症状，但并非绝对禁忌。可列为relative：已知感染性腹泻需抗感染时不宜单用。"
              - paragraph [ref=e556]: "difenoxin and atropine: 阿托品部分带来抗胆碱能禁忌：闭角型青光眼、前列腺增生尿潴留、幽门狭窄、重症肌无力等。地芬诺辛为阿片类，禁忌同阿片类：呼吸抑制、肝病等。还有对成分过敏。由于是组合，列出所有。"
              - paragraph [ref=e557]: "methotrexate: 妊娠X绝对禁忌；哺乳绝对；严重肾功能不全（CrCl <30 mL/min）相对还是绝对？通常，甲氨蝶呤在肾功能显著下降时禁用（absolute）。肝病严重者为绝对。酒精滥用为相对。血液病如骨髓抑制、白细胞减少、血小板减少、贫血严重为相对。活动性感染，免疫缺陷综合征，胸腔积液或腹水（可能增加毒性，相对）。同时接种活疫苗相对。"
              - paragraph [ref=e558]: "cyclosporine: 肾功能不全（相对，需调整剂量，严重CrCl<30? 有时列为绝对禁忌取决于具体情况，但通常严重肾功能损害为相对，因为有肾毒性），未控制的高血压（relative），恶性肿瘤（特别是非黑色素瘤皮肤癌，relative），感染。绝对：过敏（含聚氧乙基化蓖麻油，IV剂型可能过敏）。还有同时使用他克莫司（药物类禁忌，相对或绝对，因为增加肾毒性）。光疗（PUVA）增加皮肤癌风险（relative）。妊娠C级relative。"
              - paragraph [ref=e559]: "doxepin topical: 尽管外用，但经皮吸收可引起全身抗胆碱作用，禁忌：闭角型青光眼，尿潴留（absolute? 通常列为absolute）。对多塞平或辅料过敏absolute。MAO抑制剂使用（14天内）为绝对禁忌，因可能引起谵妄、高热等。妊娠B级相对安全，但哺乳期数据少。儿童<12岁无安全性数据列为relative。"
              - paragraph [ref=e560]: 碘喹啉/碘氯羟喹：禁忌碘过敏，甲状腺结节或甲状腺疾病（吸收碘可能干扰），肝病（可致肝损害），对8岁以下儿童（？），妊娠C相对。还有皮肤刺激过敏。
              - paragraph [ref=e561]: 乳酸铵/尿素：肾功能严重不全（尿素可吸收导致氮质血症）列为relative。皮肤破损感染禁用（absolute）。过敏absolute。
              - paragraph [ref=e562]: 对于口服电解质，禁忌包括：肠梗阻、穿孔（absolute），无尿/肾衰（absolute），严重呕吐无法口服补液（relative），需要静脉补液时。葡萄糖-半乳糖吸收不良（absolute）。高钾/高钠血症需根据实验室值调整。
              - paragraph [ref=e563]: 所有局部激素的感染禁忌：应该列出具体的如“varicella”, “herpes simplex”, “vaccinia”, “fungal infections”作为疾病禁忌，类型disease，绝对禁忌。也可用“untreated skin infections (bacterial, fungal, viral, parasitic)” 但可能过于笼统，要求的“禁忌症应具体且临床相关，避免过于笼统”，最好列出具体疾病：bacterial skin infections (impetigo), fungal infections (dermatophytosis, candidiasis), viral skin infections (herpes simplex, varicella zoster, vaccinia), scabies, etc. 但这样过多，可以使用一个综合条目“untreated cutaneous bacterial, fungal, viral, or parasitic infections” 并标明为disease, absolute. 也会被接受。或者再细分。为了简洁并避免冗长，每个局部激素都会重复一组。我可以使用“active untreated skin infections (bacterial, fungal, viral, parasitic)” ，但还不够具体。考虑到要求“具体且临床相关”，可列举几种：如“herpes simplex infection”、“varicella infection”、“fungal dermatophyte infection”、“cutaneous tuberculosis”、“scabies”等，但给太多也不现实。折中方案：每个激素给出“active bacterial skin infection (e.g., impetigo)”、“active fungal skin infection (e.g., dermatophytosis, candidiasis)”、“active viral skin infection (e.g., herpes simplex, varicella, vaccinia)”再加上“rosacea”、“perioral dermatitis”等作为绝对禁忌。这样可以保持具体且临床相关。我会采用这种模式。
              - paragraph [ref=e564]: 同时注意：有些弱效激素（如氢化可的松）用于湿疹，通常感染是禁忌，但如果有合用抗感染成分（如与碘喹啉合用），则感染不是绝对禁忌，但需要抗感染成分有效。所以对于组合产品，感染不是绝对禁忌（因为适应症即为伴感染），但需要指明“infections caused by organisms resistant to iodoquinol/iodochlorhydroxyquin” 等。不过，组合产品适应症是“suspected infection”，如果确定某种感染耐药，则是禁忌。我们将列相对禁忌。
              - paragraph [ref=e565]: 仔细阅读：hydrocortisone and iodochlorhydroxyquin等是“eczema with suspected bacterial or fungal infection”，故感染并非禁忌，但如果感染是对成分不敏感，可能不宜。禁忌主要关注过敏和碘相关疾病。
              - paragraph [ref=e566]: 因此对于这些组合药物，需要列出碘过敏、甲状腺疾病、肝病等。
              - paragraph [ref=e567]: 关于鸦片制剂：列出呼吸抑制（如急性或重度支气管哮喘、慢性阻塞性肺病）、头部损伤、颅内压升高、麻痹性肠梗阻等，绝对禁忌。相对禁忌包括妊娠、哺乳、低血压、BPH、肝肾功能不全等。药物类：MAO抑制剂合用或停用14天内（absolute/relative），酒精或其他中枢抑制剂（relative）。鸦片制剂与MAOIs合用可引起严重反应，通常列为absolute。我会加上MAO inhibitor use (concurrent or within 14 days) 作为drug_class, absolute。
              - paragraph [ref=e568]: dupilumab：不用于急性哮喘发作（disease, relative），已知过敏（absolute），活动性蠕虫感染（disease, relative，治疗前先处理），妊娠N相对。同时，避免接种活疫苗（drug_class, relative），因为抑制免疫可能使疫苗相关感染风险增加。
              - paragraph [ref=e569]: pimecrolimus：禁忌包括过敏、活动性病毒感染（水痘、带状疱疹、单纯疱疹），绝对禁忌？说明书列为禁忌：用于有潜在免疫抑制的患者，以及2岁以下儿童（因安全性和有效性未建立，通常避免，相对）。不能用于细菌和真菌感染皮肤。有皮肤恶性肿瘤风险所以告诫避免大量紫外线暴露。避免使用封包。因此我会列为：allergy (absolute), active viral skin infections (herpes simplex, varicella) (absolute), bacterial and fungal skin infections (absolute), immunosuppression (relative), age <2 years (relative), concurrent phototherapy or excessive sunlight (relative). 药物类，钙调神经磷酸酶抑制剂与光疗联用增加皮肤癌风险。也会提到避免活疫苗。
              - paragraph [ref=e570]: doxepin topical：排除了MAOI。
              - paragraph [ref=e571]: 口服环孢素：避免活疫苗，葡萄柚与环孢素相互作用（药物-食物），但不属于禁忌症，可列为drug_class或food interactions？题目要求禁忌症类型只有disease, allergy_type, physiological_condition, drug_class。所以不列入食物。但可以列出与肾脏毒性药物（氨基糖苷类、两性霉素B等）合用增加肾毒性（drug_class, relative），与他克莫司同时使用（drug_class, absolute？通常避免合用）。可加“concomitant use with tacrolimus” drug_class, absolute。
              - paragraph [ref=e572]: 补液盐：高钾血症型肾小管酸中毒(IV型)等。我们列出主要：anuria, acute renal failure, intestinal obstruction, glucose-galactose malabsorption。
              - paragraph [ref=e573]: 下面逐一整理。
              - paragraph [ref=e574]: 注意： "Electrolyte Oral Solution, Freezer-Pops, and Jell Cups" 和 "carbohydrate and electrolyte combination (oral route)" 和 "Electrolyte Tablets" 可能有相同禁忌。但片剂不能用于无法吞咽患者。
              - paragraph [ref=e575]: 将开始构建JSON。确保每个药物的generic_name与输入一致。
              - paragraph [ref=e576]: "对于重复的dupilumab，输入中有\"dupilumab\"和\"dupilumab Brand name: Dupixent\"，我将两个合并为一个\"dupilumab\"，并在内部包括所有适应症。但是在输出JSON时，应该有一个条目对应输入，但要求输入为列表，应保留两者还是去重？提示说“输入药物列表”，输出应该对应每个输入药物。所以即使是重复，我也输出两个相同generic_name？最好分别输出，因为后续处理可能基于输入顺序。我会为两个条目都生成禁忌症列表，内容相同，generic_name可以都是\"dupilumab\"。我会这样做。"
              - paragraph [ref=e577]: 同样，triamcinolone topical, triamcinolone (topical application route)和triamcinolone acetonide视为不同generic_name吗？输入里有"triamcinolone topical", "triamcinolone (topical application route)", "triamcinolone acetonide"。我分开输出。有些是相同的成分，禁忌一样。
              - paragraph [ref=e578]: hydrocortisone rectal单独列出，其禁忌特别包括肠穿孔、脓肿等。
              - paragraph [ref=e579]: 确保JSON格式正确，数组，每个对象。contraindications数组内每个元素有contraindication_name等字段。reason给出简短解释。
              - paragraph [ref=e580]: 现在为每个药物写出禁忌症。使用英文，专业术语。
              - paragraph [ref=e581]: 开始。
