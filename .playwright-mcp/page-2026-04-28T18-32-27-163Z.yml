            - text: "\"generic_name\": \"clocortolone topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Mid-potency steroid can mask infection.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Tinea incognito or candidiasis may worsen.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Viral dissemination risk.\"},"
