              - paragraph [ref=e225]: 我们被要求为一系列药物生成完整的禁忌症列表。输出JSON格式。需要仔细考虑每个药物。注意有些是组合药物或重复条目。
              - paragraph [ref=e226]: 先列出所有药物，去重。有很多重复的糖皮质激素局部药，但可能列出不同规格或组合。注意添加"dupilumab"出现两次（一次有品牌名），应合并。局部类固醇有很多类似禁忌。还有口服补液盐等。对于组合产品，列每个成分禁忌症，但也可以总体禁忌症。
              - paragraph [ref=e227]: 我们将按列表逐一生成。每个药物，列出禁忌症，包括绝对和相对，类型分类。严重程度用absolute/relative。
              - paragraph [ref=e228]: 注意opium preparation是阿片类，禁忌很多：呼吸抑制、麻痹性肠梗阻、颅脑损伤、严重哮喘等。crofelemer是抗腹泻药，适应症HIV患者非感染性腹泻，禁忌相对少。电解质口服液/片等，禁忌可能包括肾功能不全（高钾血症等，但有不同配方，通常含钠、钾等）、肠梗阻、无尿、葡萄糖吸收不良等。注意组合产品。
              - paragraph [ref=e260]: 对于局部类固醇，禁忌包括：未经治疗的细菌、真菌、病毒感染；对成分过敏；口周皮炎；玫瑰痤疮；皮肤萎缩；肝病（大剂量长期吸收）；儿童慎用等。三唑仑等。doxepin局部：闭角型青光眼、尿潴留。methotrexate：妊娠X级，绝对禁忌；肝病、肾病、骨髓抑制、酒精中毒、免疫缺陷等。
              - paragraph [ref=e261]: "duplilumab: 对活性物质过敏；急性哮喘症状；蠕虫感染？等等。"
              - paragraph [ref=e262]: "iodoquinol: 对碘过敏，肝病，甲状腺疾病。组合产品类似。"
              - paragraph [ref=e263]: 需要输出JSON，确保每个generic_name都是从输入提取的。输入有"opium preparation"、"crofelemer"、"Electrolyte Oral Solution, Freezer-Pops, and Jell Cups"（商品名？但我们可以将其视为Electrolyte Oral Solution类似物）等。有些名字包含剂型，我们保留输入名称。重复名称如"hydrocortisone topical"和"hydrocortisone (topical application route)"可能视为相同，但输入不同，分别输出。
