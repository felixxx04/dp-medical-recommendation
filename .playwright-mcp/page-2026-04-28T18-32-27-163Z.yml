            - text: "\"generic_name\": \"alclometasone topical\","
            - text: "\"contraindications\": ["
            - text: "{\"contraindication_name\": \"untreated bacterial skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Local immunosuppression masks symptoms.\"},"
            - text: "{\"contraindication_name\": \"untreated fungal skin infection\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Low-potency steroid can still promote fungal growth.\"},"
            - text: "{\"contraindication_name\": \"untreated viral skin infection (herpes simplex, varicella, vaccinia)\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"May disseminate viral infection.\"},"
            - text: "{\"contraindication_name\": \"rosacea / perioral dermatitis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"Can provoke or worsen these conditions.\"},"
            - text: "{\"contraindication_name\": \"hypersensitivity to alclometasone or vehicle\", \"contraindication_type\": \"allergy_type\", \"severity\": \"absolute\", \"reason\": \"Allergic contact dermatitis possible.\"},"
