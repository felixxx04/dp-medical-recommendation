            - paragraph [ref=e441]: 现在构建每个药物的交互列表。需要专业的临床药学知识，列出 major 和 moderate 交互。优先与常见药物类（抗凝药、抗抑郁药、抗真菌药、抗酸药等）。每个交互需包含 drug_a (当前药物), drug_b (交互药物类或具体药品，用通用类别名如 "warfarin", "MAO inhibitors", "CYP3A4 inhibitors" 等)，interaction_type, clinical_effect, mechanism。
            - paragraph [ref=e442]: 药物：
            - list [ref=e443]:
              - listitem [ref=e444]:
                - paragraph [ref=e445]: "amlodipine: 二氢吡啶类钙通道阻滞剂。主要交互："
                - list [ref=e446]:
                  - listitem [ref=e447]:
                    - paragraph [ref=e448]: CYP3A4 强抑制剂（如酮康唑、伊曲康唑、克拉霉素、ritonavir）增加 amlodipine 血药浓度，导致低血压、水肿。 Major? moderate. 通常为 moderate，因为 amlodipine 是 CYP3A4 底物，抑制会导致 AUC 增加，需调整剂量。列为 moderate。
                  - listitem [ref=e449]:
                    - paragraph [ref=e450]: CYP3A4 诱导剂（如利福平、圣约翰草）降低 amlodipine 效果。 Moderate.
                  - listitem [ref=e451]:
                    - paragraph [ref=e452]: 与 beta-blockers 合用有叠加降压和负性肌力作用，但通常 moderate。
                  - listitem [ref=e453]:
                    - paragraph [ref=e454]: 与他汀类（simvastatin, atorvastatin）合用增加他汀暴露，可能导致肌病 (amlodipine 抑制 OATP1B1 等)。是 moderate，增加他汀毒性风险。因为 amlodipine 本身和他汀组合，这个交互在组合药中体现为内部成分交互？但组合药 "amlodipine and atorvastatin" 内部已知并用，临床需要关注，但作为交互，通常 amlodipine 与 atorvastatin 合用时，atorvastatin 暴露增加，需要限制剂量。会列为 moderate。对 amlodipine 条目，可包括与 simvastatin, atorvastatin 交互。对组合药，可以不列这个交互？最好还是在交互列表中体现可能的外部药物交互，不必列内部成分间交互（因为组合药本身就是固定剂量复方，是允许的，但警告不要额外交互药物）。按指令为组合药列出每个成分的交互，那么 amlodipine 成分有交互包括 CYP3A4 抑制剂等，atorvastatin 成分有交互包括 CYP3A4 抑制剂、贝特类等。可以列出 amlodipine 与其他 CYP3A4 抑制剂，而 atorvastatin 与吉非贝齐等，但不能列 amlodipine 与 atorvastatin 因为那是成分内部，但可以列 atorvastatin 与 amlodipine 交互？该组合药就是两者合用，已知相互作用已通过剂量调整处理，不应再作为交互警告。因此为组合药列交互时，只列与外部药物的交互。对于 amlodipine 成分，交互包括 CYP3A4 抑制剂/诱导剂，与 beta-blockers。对于 atorvastatin 成分，交互包括 CYP3A4 抑制剂、环孢素、吉非贝齐等。好，照此处理。
