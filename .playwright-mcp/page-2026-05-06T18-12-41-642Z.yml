in, hypertension 推荐药物: 布美他尼 (Bumetanide) - 匹配疾病: 高血压, 适应症: edema, heart failure, hypertension, 分数: 1.0 卡托普利 (Captopril) - 匹配疾病: 高血压, 适应症: heart failure, hypertension, 分数: 1.0 氯噻酮 (Chlorthalidone) - 匹配疾病: 高血压, 适应症: edema, hypertension, 分数: 1.0 可乐定 (Clonidine) - 匹配疾病: 高血压, 适应症: adhd, hypertension, menopause symptoms, 分数: 1.0 【病例P0399】 患者疾病: atrial fibrillation, endometriosis, fever, hypercholesterolemia 推荐药物: 普萘洛尔 (Propranolol) - 匹配疾病: 心房颤动, 适应症: anxiety, arrhythmia, essential tremor, 分数: 1.0 地尔硫卓 (Diltiazem) - 匹配疾病: 心房颤动率控制, 适应症: angina, arrhythmia, hypertension, 分数: 1.0 普罗帕酮 (Propafenone) - 匹配疾病: 心房扑动, 适应症: arrhythmia, ventricular arrhythmias, 分数: 1.0 普鲁卡因酰胺 (Procainamide) - 匹配疾病: 心房扑动, 适应症: arrhythmia, ventricular arrhythmias, 分数: 1.0 对每例请回答：1)推荐药物是否匹配疾病适应症(正确/部分正确/错误) 2)是否有禁忌冲突 3)排序是否合理 4)如有错误应推荐什么"
