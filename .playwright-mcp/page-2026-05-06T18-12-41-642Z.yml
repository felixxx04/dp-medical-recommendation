                    - listitem [ref=e1496]:
                      - paragraph [ref=e1497]: 中耳炎首选阿莫西林（非阿莫西林克拉维酸），除非耐药或治疗失败。
                    - listitem [ref=e1498]:
                      - paragraph [ref=e1499]: 阿奇霉素、头孢地尼、头孢泊肟不是常规一线。
