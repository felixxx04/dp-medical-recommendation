        - generic [ref=e102]:
          - generic [ref=e104]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 肺结核 | Amikacin; Levofloxacin; Moxifloxacin; Streptomycin; Rifapentine 疾病: 肾结石 | Chlorthalidone; Allopurinol; Hydrochlorothiazide; Colchicine; Diclofenac 疾病: 胀气 | Calcium Carbonate; Aluminum+Magnesium+Simethicone; Cimetidine; Dexlansoprazole; Esomeprazole 疾病: 胃出血 | Cimetidine; Dexlansoprazole; Esomeprazole; Erythromycin; Famotidine 疾病: 胃溃疡 | Cimetidine; Dexlansoprazole; aluminum hydroxide; calcium carbonate+famotidine+magnesium; Aluminum+Magnesium+Simethicone Suspension 疾病: 胃炎 | Cimetidine; Dexlansoprazole; Erythromycin; Esomeprazole; Famotidine 疾病: 胃酸反流 | Calcium Carbonate; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine 疾病: 胃食管反流 | Calcium Carbonate; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine 疾病: 胆囊炎 | Probenecid; Allopurinol; Colchicine; Diclofenac; Etodolac 疾病: 胆固醇高 | Amlodipine; Colesevelam; Ezetimibe; Fenofibrate; Fluvastatin 疾病: 胆结石 | Probenecid; Allopurinol; Colchicine; Diclofenac; Etodolac 疾病: 胰腺炎 | Calcium Carbonate; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine 疾病: 胰腺癌 | Paclitaxel; Cimetidine; Fluorouracil; Gemcitabine; Doxorubicin 疾病: 脂肪肝 | vitamin E; Calcium Carbonate; vitamin e(oral); Vitamin E Capsules; Cimetidine 疾病: 脑出血 | Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Aspirin; Benazepril 疾病: 脑卒中 | Aspirin; Amlodipine; Ticagrelor; Clopidogrel; Ticlopidine 疾病: 脑梗 | Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Aspirin; Benazepril 疾病: 脑梗死 | Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Aspirin; Benazepril 疾病: 脑溢血 | Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Aspirin; Benazepril 疾病: 脱发 | Minoxidil; Folic Acid; baricitinib; Clobetasol; Fluocinolone 疾病: 腮腺炎 | Ibuprofen; Indomethacin; Naproxen; acetaminophen; Aspirin 疾病: 腰背痛 | Aspirin; Baclofen; Carisoprodol; Cyclobenzaprine; Metaxalone 疾病: 腹泻 | Ciprofloxacin; Metronidazole; Rifaximin; Diphenoxylate-Atropine; Loperamide 疾病: 腺癌 | Paclitaxel; Fluorouracil; Gemcitabine; Docetaxel; Mitomycin 疾病: 艾滋病 | Delavirdine; Tenofovir; Nevirapine; Maraviroc; Raltegravir 疾病: 荨麻疹 | Cetirizine; Mometasone; Diphenhydramine; Cyproheptadine; diphenhydramine HCl 疾病: 蛔虫 | Mebendazole; Albendazole; Amoxicillin-Clavulanate; Cefotaxime; Cefoxitin 疾病: 贫血 | Folic Acid; Ferrous Sulfate; Epoetin Alfa; Irbesartan; Captopril 疾病: 躁郁症 | Lamotrigine; Lithium; Oxcarbazepine; Zonisamide; Topiramate 疾病: 过敏 | Cetirizine; Betamethasone; Clobetasol; Cimetidine; Desloratadine 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
