                  - listitem [ref=e487]:
                    - paragraph [ref=e488]: "与 降压药、血管扩张剂 合用: moderate，叠加低血压。"
                  - listitem [ref=e489]:
                    - paragraph [ref=e490]: 与 ergotamine 等合用可能引起心绞痛对抗？不太重要。主要列出 PDE5 抑制剂 major，riociguat major，酒精 moderate，其他降压药 moderate。
              - listitem [ref=e491]:
                - paragraph [ref=e492]: "verapamil: 非二氢吡啶类钙通道阻滞剂。重要交互："
                - list [ref=e493]:
                  - listitem [ref=e494]:
                    - paragraph [ref=e495]: "与 beta-blockers (尤其是静脉注射) 合用: major，导致严重心动过缓、心搏停止、心力衰竭。机理：相加负性肌力/变时作用。"
                  - listitem [ref=e496]:
                    - paragraph [ref=e497]: "与 digoxin 合用: moderate，增加 digoxin 血清浓度和毒性风险（地高辛中毒）。机制：verapamil 降低 digoxin 清除率。"
                  - listitem [ref=e498]:
                    - paragraph [ref=e499]: "与 CYP3A4 抑制剂: moderate，增加 verapamil 浓度及副作用（低血压、心动过缓）。"
                  - listitem [ref=e500]:
                    - paragraph [ref=e501]: "与 CYP3A4 诱导剂: moderate，降低 verapamil 疗效。"
                  - listitem [ref=e502]:
                    - paragraph [ref=e503]: "与 simvastatin, atorvastatin: major/moderate? verapamil 是 CYP3A4 抑制剂，可显著升高 simvastatin 浓度，增加肌病风险，列为 major（与 simvastatin 禁忌，与 atorvastatin moderate）。通用：与 statins 代谢 via CYP3A4."
                  - listitem [ref=e504]:
                    - paragraph [ref=e505]: "与 dabigatran: moderate，增加出血风险 (verapamil 抑制 P-gp，增加 dabigatran 暴露)。"
                  - listitem [ref=e506]:
