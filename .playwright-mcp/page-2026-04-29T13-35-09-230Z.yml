                - paragraph [ref=e479]: "nitroglycerin: 有机硝酸酯。重要交互："
                - list [ref=e480]:
                  - listitem [ref=e481]:
                    - paragraph [ref=e482]: "与 PDE5 抑制剂 (sildenafil, tadalafil, vardenafil, avanafil) 合用: major，严重低血压。机制：协同血管舒张。"
