            - paragraph [ref=e258]: "首先解析输入药物列表，去重。相同药物可能多次出现（如 amlodipine 有单独也有组合；nitroglycerin 有多种途径；verapamil 口服和注射；aspirin 片和肠溶片；diazepam 口服途径等）。我们可以按通用名合并，忽略剂型，但交互是按照药物本身。输出应列出每个药物实体（generic_name）？输入有多个重复药物名称和不同剂型，但交互通常是基于活性成分，剂型影响不大（除了像局部用药可能不影响全身交互，但这里口服/注射/吸入等全身吸收都会考虑）。题目要求为“每种药物”生成交互列表，输入列表可能重复，我们可以去重，使用 generic_name。比如 \"amlodipine and atorvastatin\" 是一个组合药物，需要列出每个成分的交互。单独有 amlodipine (oral route)，所以 amlodipine 作为一个成分也会出现在组合药中，但我们可以为 \"amlodipine\" 生成一个交互列表，然后组合药 \"amlodipine and atorvastatin\" 也要列出其成分交互？要求说“对于组合药物,列出每个成分的交互”，意思是为组合药物生成一个条目，其 interactions 包含每个成分的交互（drug_a 分别写 amlodipine 和 atorvastatin）。但是为简化，我们可以把 amlodipine 单独列一个 generic_name 条目，atorvastatin 列一个条目，然后组合药再列？如果为每个药物生成交互列表，组合药 \"amlodipine and atorvastatin\" 本身作为一个 generic_name，其交互可包含两类交互：amlodipine 的交互和 atorvastatin 的交互。我们按指令：为每种药物生成重要交互列表。输入药物列表是这些，那么对于\"amlodipine and atorvastatin\" ，它就是一个药物。我们生成一个对象，generic_name: \"amlodipine and atorvastatin\"，interactions 中 drug_a 分别使用 \"amlodipine\" 和 \"atorvastatin\"。"
