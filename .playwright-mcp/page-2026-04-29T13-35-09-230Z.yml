                  - listitem [ref=e522]:
                    - paragraph [ref=e523]: "与 SSRIs/SNRIs: moderate, 增加上消化道出血风险 (additive antiplatelet effect)。"
                  - listitem [ref=e524]:
                    - paragraph [ref=e525]: "与 valproic acid: moderate, 增加 valproic acid 游离浓度和毒性。"
              - listitem [ref=e526]:
                - paragraph [ref=e527]: "heparin (unfractionated heparin): 主要交互："
                - list [ref=e528]:
                  - listitem [ref=e529]:
                    - paragraph [ref=e530]: "与 other anticoagulants/antiplatelets/warfarin/DOACs/NSAIDs: major, 出血风险增加。"
                  - listitem [ref=e531]:
                    - paragraph [ref=e532]: "与 antiplatelet agents (aspirin, clopidogrel): major."
                  - listitem [ref=e533]:
                    - paragraph [ref=e534]: "与 dextran: major, 出血风险。"
                  - listitem [ref=e535]:
                    - paragraph [ref=e536]: "与 thrombolytics: major."
                  - listitem [ref=e537]:
                    - paragraph [ref=e538]: "与 SSRIs/SNRIs: moderate, 出血风险增加。"
              - listitem [ref=e539]:
                - paragraph [ref=e540]: "propranolol: 非选择性 beta-blocker."
                - list [ref=e541]:
                  - listitem [ref=e542]:
                    - paragraph [ref=e543]: "与 verapamil 或其他非二氢吡啶类 CCBs: major, 心动过缓、心衰、心搏停止。"
                  - listitem [ref=e544]:
                    - paragraph [ref=e545]: "与 clonidine: major, 反跳性高血压（若突然停用 clonidine 而继续使用 beta-blocker）。"
                  - listitem [ref=e546]:
                    - paragraph [ref=e547]: "与 insulin/sulfonylureas: moderate, 掩盖低血糖症状（心悸）并可能导致低血糖或高血压（非选择性 beta-blocker 可抑制糖原分解）。"
                  - listitem [ref=e548]:
                    - paragraph [ref=e549]: "与 epinephrine: major, 严重高血压和心动过缓 (非选择性 beta-blocker 与 epinephrine 合用导致 alpha 血管收缩无对抗)。"
                  - listitem [ref=e550]:
                    - paragraph [ref=e551]: "与 amiodarone: moderate, 心动过缓、心搏停止。"
                  - listitem [ref=e552]:
                    - paragraph [ref=e553]: "与 CYP2D6 inhibitors (fluoxetine, paroxetine, bupropion): moderate, 增加 propranolol 浓度。"
                  - listitem [ref=e554]:
                    - paragraph [ref=e555]: "与 NSAIDs: moderate, 降低降压效果。"
              - listitem [ref=e556]:
                - paragraph [ref=e557]: "metoprolol: 选择性 beta1-blocker. 主要交互："
                - list [ref=e558]:
                  - listitem [ref=e559]:
                    - paragraph [ref=e560]: "与 CYP2D6 inhibitors (paroxetine, fluoxetine, bupropion): major/moderate? 可能显著增加 metoprolol 浓度导致心动过缓。列为 moderate 或 major? 通常 moderate (FDA 建议监测)。"
                  - listitem [ref=e561]:
                    - paragraph [ref=e562]: "与 verapamil, diltiazem: major (静脉合用)，口服 moderate 心动过缓和负性肌力。"
                  - listitem [ref=e563]:
                    - paragraph [ref=e564]: "与 clonidine: major 反弹高血压。"
                  - listitem [ref=e565]:
                    - paragraph [ref=e566]: "与 amiodarone: moderate 心动过缓。"
                  - listitem [ref=e567]:
                    - paragraph [ref=e568]: "与 digoxin: moderate 增加心动过缓风险。"
                  - listitem [ref=e569]:
                    - paragraph [ref=e570]: "与 NSAIDs: moderate 减弱降压。"
                  - listitem [ref=e571]:
                    - paragraph [ref=e572]: "与 insulin/sulfonylureas: moderate 掩盖低血糖症状（选择性 beta1 也会掩盖，但风险低于非选择性）。"
                  - listitem [ref=e573]:
                    - paragraph [ref=e574]: "与 epinephrine: moderate 高血压心动过缓（选择性 beta1 也会但较弱）。"
              - listitem [ref=e575]:
                - paragraph [ref=e576]: "dalteparin: 低分子肝素。交互类似肝素:"
                - list [ref=e577]:
                  - listitem [ref=e578]:
                    - paragraph [ref=e579]: "与 anticoagulants, antiplatelets, NSAIDs, thrombolytics: major 出血风险。"
                  - listitem [ref=e580]:
                    - paragraph [ref=e581]: "与 SSRIs/SNRIs: moderate."
              - listitem [ref=e582]:
                - paragraph [ref=e583]: "bivalirudin: 直接凝血酶抑制剂。交互："
                - list [ref=e584]:
                  - listitem [ref=e585]:
                    - paragraph [ref=e586]: "与抗血小板药 (aspirin, clopidogrel, prasugrel, ticagrelor), 抗凝药 (warfarin, heparin, DOACs): major 出血风险。"
                  - listitem [ref=e587]:
                    - paragraph [ref=e588]: "与 thrombolytics: major."
                  - listitem [ref=e589]:
                    - paragraph [ref=e590]: "与 NSAIDs: moderate 出血。"
              - listitem [ref=e591]:
                - paragraph [ref=e592]: "isosorbide dinitrate: 有机硝酸酯，同 nitroglycerin:"
                - list [ref=e593]:
                  - listitem [ref=e594]:
                    - paragraph [ref=e595]: "PDE5 inhibitors: major 低血压。"
                  - listitem [ref=e596]:
                    - paragraph [ref=e597]: "riociguat: major 低血压。"
                  - listitem [ref=e598]:
                    - paragraph [ref=e599]: "alcohol: moderate 低血压头晕。"
                  - listitem [ref=e600]:
                    - paragraph [ref=e601]: "其他降压药: moderate."
              - listitem [ref=e602]:
                - paragraph [ref=e603]: "ranolazine: 抗心绞痛药。主要交互："
                - list [ref=e604]:
                  - listitem [ref=e605]:
                    - paragraph [ref=e606]: "与 CYP3A4 强抑制剂 (ketoconazole, clarithromycin): major (禁忌)，增加 ranolazine 浓度导致 QT 延长和心律失常。"
                  - listitem [ref=e607]:
                    - paragraph [ref=e608]: "与 CYP3A4 中等抑制剂 (diltiazem, verapamil): moderate，增加暴露，需限制剂量。"
                  - listitem [ref=e609]:
                    - paragraph [ref=e610]: "与 CYP3A4 诱导剂 (rifampin): major, 显著降低疗效。"
                  - listitem [ref=e611]:
                    - paragraph [ref=e612]: "与 P-gp 抑制剂 (cyclosporine): moderate, 增加暴露。"
                  - listitem [ref=e613]:
                    - paragraph [ref=e614]: "与 QT 延长药物 (Class Ia/III 抗心律失常，某些抗精神病药): moderate, 潜在叠加 QT 延长。"
                  - listitem [ref=e615]:
                    - paragraph [ref=e616]: "与 simvastatin: moderate, 增加 simvastatin 暴露 (CYP3A4 抑制? ranolazine 是弱抑制剂？) FDA 标注 ranolazine 增加 simvastatin 剂量相关肌病风险，限制 simvastatin 剂量。列为 moderate。"
                  - listitem [ref=e617]:
                    - paragraph [ref=e618]: "与 metformin: moderate, 可能增加 metformin 暴露 (ranolazine 抑制 OCT2)，不重大。"
              - listitem [ref=e619]:
                - paragraph [ref=e620]: "lorazepam: 苯二氮卓类。主要通过葡糖醛酸化代谢，不是 CYP 底物。主要交互："
                - list [ref=e621]:
                  - listitem [ref=e622]:
                    - paragraph [ref=e623]: "与其他 CNS 抑制剂 (opioids, alcohol, other benzodiazepines, barbiturates, sedatives): major (与 opioids 合用有严重呼吸抑制、镇静、死亡风险) -> 应列为 major 或 moderate。与阿片类合用是 major 警告。主要机制是药效学相加。"
                  - listitem [ref=e624]:
                    - paragraph [ref=e625]: "与 alcohol: major 或 moderate? FDA boxed warning 与 opioids 是 major，与酒精是 moderate 可能。通常 alcohol 增加 CNS 抑制。"
                  - listitem [ref=e626]:
                    - paragraph [ref=e627]: "与 probenecid: moderate, 可能增加 lorazepam 效果 (抑制葡糖醛酸化)。"
                  - listitem [ref=e628]:
                    - paragraph [ref=e629]: "与 valproate: moderate, 可能增加 lorazepam 浓度。"
              - listitem [ref=e630]:
                - paragraph [ref=e631]: "diazepam: 经 CYP2C19 和 CYP3A4 代谢。交互："
                - list [ref=e632]:
                  - listitem [ref=e633]:
                    - paragraph [ref=e634]: "与 opioids: major 呼吸抑制、镇静。"
                  - listitem [ref=e635]:
                    - paragraph [ref=e636]: "与 alcohol: major 或 moderate。"
                  - listitem [ref=e637]:
                    - paragraph [ref=e638]: "与 CYP3A4 抑制剂 (ketoconazole, fluvoxamine? fluvoxamine 是强 CYP1A2 和 CYP2C19 抑制剂，可能影响): moderate，增加镇静和呼吸抑制。氟伏沙明抑制 diazepam 代谢 (CYP2C19 和 CYP3A4)。"
                  - listitem [ref=e639]:
                    - paragraph [ref=e640]: "与 cimetidine: moderate 抑制代谢。"
                  - listitem [ref=e641]:
                    - paragraph [ref=e642]: "与 omeprazole (CYP2C19 抑制剂): moderate 增加 diazepam 效果。"
                  - listitem [ref=e643]:
                    - paragraph [ref=e644]: "与 phenytoin: 复杂，相互影响代谢。"
                  - listitem [ref=e645]:
                    - paragraph [ref=e646]: 与其他 CNS 抑制剂。
              - listitem [ref=e647]:
                - paragraph [ref=e648]: "alprazolam: 经 CYP3A4 代谢。交互："
                - list [ref=e649]:
                  - listitem [ref=e650]:
                    - paragraph [ref=e651]: "与 strong CYP3A4 inhibitors (ketoconazole, itraconazole, ritonavir): major, 显著增加 alprazolam 浓度导致呼吸抑制、过度镇静。"
                  - listitem [ref=e652]:
                    - paragraph [ref=e653]: "与 moderate CYP3A4 inhibitors (erythromycin, fluvoxamine, grapefruit): moderate 增加效果。"
                  - listitem [ref=e654]:
                    - paragraph [ref=e655]: "与 opioids: major 或 moderate (if major boxed warning). 按 FDA: 苯二氮卓与阿片类合用有严重风险，列为 major。"
                  - listitem [ref=e656]:
                    - paragraph [ref=e657]: "与 alcohol: major 或 moderate。"
                  - listitem [ref=e658]:
                    - paragraph [ref=e659]: "与 CYP3A4 inducers (rifampin, carbamazepine): moderate 降低疗效。"
              - listitem [ref=e660]:
                - paragraph [ref=e661]: "risperidone: 经 CYP2D6 及 CYP3A4 代谢。交互："
                - list [ref=e662]:
                  - listitem [ref=e663]:
                    - paragraph [ref=e664]: "与 strong CYP2D6 inhibitors (fluoxetine, paroxetine): major/moderate? fluoxetine 显著增加 risperidone 暴露，导致 QT 延长、锥体外系症状等。moderate 至 major，一般 moderate (调整剂量)。"
                  - listitem [ref=e665]:
                    - paragraph [ref=e666]: "与 CYP3A4 inducers (carbamazepine, rifampin): moderate 降低 risperidone 水平。"
                  - listitem [ref=e667]:
                    - paragraph [ref=e668]: "与 drugs that prolong QT (class IA/III antiarrhythmics, other antipsychotics, methadone): major/moderate 增加尖端扭转型室速风险。"
                  - listitem [ref=e669]:
                    - paragraph [ref=e670]: "与 antihypertensives: moderate 相加低血压。"
                  - listitem [ref=e671]:
                    - paragraph [ref=e672]: "与 dopamine agonists (levodopa): moderate 拮抗效果。"
                  - listitem [ref=e673]:
                    - paragraph [ref=e674]: "与 opioids: moderate 加重 CNS 抑制。"
              - listitem [ref=e675]:
                - paragraph [ref=e676]: "clorazepate: 前药，转化为去甲地西泮 (nordiazepam)，经 CYP3A4 代谢。与 diazepam 类似。主要："
                - list [ref=e677]:
                  - listitem [ref=e678]:
                    - paragraph [ref=e679]: "与 opioids: major."
                  - listitem [ref=e680]:
                    - paragraph [ref=e681]: "与 alcohol: major/moderate."
                  - listitem [ref=e682]:
                    - paragraph [ref=e683]: 与 CYP3A4 inhibitors/inducers.
                  - listitem [ref=e684]:
                    - paragraph [ref=e685]: "与 valproate: 可能增加。"
              - listitem [ref=e686]:
                - paragraph [ref=e687]: "doxepin: 三环类抗抑郁药。经 CYP2D6 和 CYP2C19 代谢。交互："
                - list [ref=e688]:
                  - listitem [ref=e689]:
                    - paragraph [ref=e690]: "与 MAO inhibitors: major, 严重，5-羟色胺综合征，体温过高，惊厥，死亡。禁用。"
                  - listitem [ref=e691]:
                    - paragraph [ref=e692]: "与 serotonergic drugs (SSRIs, SNRIs, triptans, linezolid): moderate/major, 5-羟色胺综合征风险。"
                  - listitem [ref=e693]:
                    - paragraph [ref=e694]: "与 CYP2D6 inhibitors (fluoxetine, paroxetine, bupropion): moderate，升高 doxepin 浓度，增加心脏毒性和抗胆碱能效应。"
                  - listitem [ref=e695]:
                    - paragraph [ref=e696]: "与 drugs that prolong QT (class IA/III antiarrhythmics): major, 增加尖端扭转型室速风险。"
                  - listitem [ref=e697]:
                    - paragraph [ref=e698]: "与 anticholinergic drugs: moderate 相加抗胆碱能。"
                  - listitem [ref=e699]:
                    - paragraph [ref=e700]: "与 alcohol, CNS depressants: moderate."
              - listitem [ref=e701]:
                - paragraph [ref=e702]:
                  - text: "amitriptyline and perphenazine: 成分 amitriptyline (TCA) 和 perphenazine (phenothiazine 抗精神病药)。"
                  - text: 为 amitriptyline 交互：
                - list [ref=e703]:
                  - listitem [ref=e704]:
                    - paragraph [ref=e705]: "MAO inhibitors: major."
                  - listitem [ref=e706]:
                    - paragraph [ref=e707]: "serotonergic drugs: serotonin syndrome moderate."
                  - listitem [ref=e708]:
                    - paragraph [ref=e709]: "CYP2D6 inhibitors: moderate increase amitriptyline."
                  - listitem [ref=e710]:
                    - paragraph [ref=e711]: "QT prolonging agents: major."
                  - listitem [ref=e712]:
                    - paragraph [ref=e713]: "anticholinergics: moderate."
                  - listitem [ref=e714]:
                    - paragraph [ref=e715]:
                      - text: "CNS depressants: moderate."
                      - text: 为 perphenazine 交互：
                  - listitem [ref=e716]:
                    - paragraph [ref=e717]: "CYP2D6 inhibitors: moderate increase perphenazine (risk of EPS, QT)."
                  - listitem [ref=e718]:
                    - paragraph [ref=e719]: "QT prolonging drugs: major."
                  - listitem [ref=e720]:
                    - paragraph [ref=e721]: "anticholinergics: moderate."
                  - listitem [ref=e722]:
                    - paragraph [ref=e723]: "CNS depressants: moderate (opioids, alcohol, benzos)。"
                  - listitem [ref=e724]:
                    - paragraph [ref=e725]: "antihypertensives: moderate 相加低血压."
                  - listitem [ref=e726]:
                    - paragraph [ref=e727]: "lithium: moderate, 神经毒性。"
              - listitem [ref=e728]:
                - paragraph [ref=e729]: "phenytoin: 强 CYP 诱导剂 (3A4, 2C9, 2C19) 且本身代谢受其他药影响。交互多。"
                - list [ref=e730]:
                  - listitem [ref=e731]:
                    - paragraph [ref=e732]: "与 other anticonvulsants (carbamazepine, valproate, phenobarbital): 复杂，moderate/major，血浓度变化。"
                  - listitem [ref=e733]:
                    - paragraph [ref=e734]: "与 warfarin: major, 初始增加抗凝作用（置换），然后因诱导代谢降低抗凝效果，出血或凝血风险。列为 moderate/major。"
                  - listitem [ref=e735]:
                    - paragraph [ref=e736]: "与 oral contraceptives: major, 显著降低避孕效果。"
                  - listitem [ref=e737]:
                    - paragraph [ref=e738]: "与 CYP substrates: 很多药物代谢加速，如 statins, corticosteroids, antifungals (azole), 钙通道阻滞剂。应列出常见。比如：major/moderate 降低 amlodipine, verapamil, atorvastatin 等疗效。"
                  - listitem [ref=e739]:
                    - paragraph [ref=e740]: "与 corticosteroids (dexamethasone, methylprednisolone): moderate, 降低激素效果。"
                  - listitem [ref=e741]:
                    - paragraph [ref=e742]: "与 voriconazole: major, 双向，phenytoin 降低 voriconazole 浓度，voriconazole 升高 phenytoin。contraindicated."
                  - listitem [ref=e743]:
                    - paragraph [ref=e744]: "与 cimetidine, fluconazole: moderate, 增加 phenytoin 毒性。"
                  - listitem [ref=e745]:
                    - paragraph [ref=e746]: "与 叶酸: moderate, 长期 phenytoin 降低叶酸水平，补充叶酸可能降低 phenytoin 浓度。"
                  - listitem [ref=e747]:
                    - paragraph [ref=e748]: "与 enteral feeding: moderate, 减少吸收。"
              - listitem [ref=e749]:
                - paragraph [ref=e750]: "prochlorperazine: 酚噻嗪类止吐/抗精神病药。类似于 perphenazine 交互。"
                - list [ref=e751]:
                  - listitem [ref=e752]:
                    - paragraph [ref=e753]: "QT prolonging drugs: major."
                  - listitem [ref=e754]:
                    - paragraph [ref=e755]: "CNS depressants (opioids, alcohol, benzos): major/moderate 呼吸抑制、过度镇静."
                  - listitem [ref=e756]:
                    - paragraph [ref=e757]: "anticholinergics: moderate."
                  - listitem [ref=e758]:
                    - paragraph [ref=e759]: "antihypertensives: moderate 低血压."
                  - listitem [ref=e760]:
                    - paragraph [ref=e761]: "CYP2D6 inhibitors: moderate 可能增加浓度."
              - listitem [ref=e762]:
                - paragraph [ref=e763]:
                  - text: "amitriptyline and chlordiazepoxide: 成分 amitriptyline (同上) 和 chlordiazepoxide (苯二氮卓)。交互："
                  - text: amitriptyline 如上。
                  - text: "chlordiazepoxide: 经 CYP3A4 代谢。交互："
                - list [ref=e764]:
                  - listitem [ref=e765]:
                    - paragraph [ref=e766]: "opioids: major."
                  - listitem [ref=e767]:
                    - paragraph [ref=e768]: "alcohol, CNS depressants: major/moderate."
                  - listitem [ref=e769]:
                    - paragraph [ref=e770]: "CYP3A4 inhibitors: moderate 增加镇静."
                  - listitem [ref=e771]:
                    - paragraph [ref=e772]: "CYP3A4 inducers: moderate 降低疗效。"
              - listitem [ref=e773]:
                - paragraph [ref=e774]: "meprobamate: 镇静剂。主要 CNS 抑制："
                - list [ref=e775]:
                  - listitem [ref=e776]:
                    - paragraph [ref=e777]: "opioids: major 呼吸抑制."
                  - listitem [ref=e778]:
                    - paragraph [ref=e779]: "alcohol, benzodiazepines, barbiturates: major/moderate."
                  - listitem [ref=e780]:
                    - paragraph [ref=e781]:
                      - text: "other CNS depressants: moderate."
                      - text: 交互较少特异性。
              - listitem [ref=e782]:
                - paragraph [ref=e783]:
                  - text: "fluticasone, umeclidinium, and vilanterol: 三联吸入剂。成分：fluticasone furoate (皮质类固醇), umeclidinium (长效抗胆碱能), vilanterol (长效β2激动剂)。吸入给药，全身暴露低，但仍有相互作用可能。"
                  - text: "fluticasone furoate: 主要为 CYP3A4 代谢。与 strong CYP3A4 inhibitors (ritonavir, ketoconazole) 合用可增加全身暴露，导致皮质醇抑制等。major/moderate。对吸入 fluticasone furoate，与 ritonavir 是 major，可能导致库欣综合征。"
                  - text: "umeclidinium: 抗胆碱能作用，相加与其他抗胆碱能药导致便秘、尿潴留，青光眼。与 other anticholinergics (oxybutynin, tricyclics) 可能 moderate 相加副作用，但临床意义可能 low。但吸入给药，全身效应不大，可列 moderate。"
                  - text: "vilanterol: 长效 beta 激动剂。与 beta-blockers 药效学拮抗， moderate，可降低支气管扩张效果。与 non-potassium sparing diuretics, 可加重低血钾，但与吸入 vilanterol 风险低。与 MAO inhibitors, TCAs: 可能增加心血管效应（协同交感），moderate。与强 CYP3A4 抑制剂也可能增加 vilanterol 暴露，但吸入剂全身影响有限。我们可列出主要:"
                - list [ref=e784]:
                  - listitem [ref=e785]:
                    - paragraph [ref=e786]: fluticasone component + riton
