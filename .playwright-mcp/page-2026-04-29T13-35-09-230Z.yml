                - paragraph [ref=e510]: 需要列出重要的。clinically significant 交互。优先与抗凝药、抗抑郁药等。verapamil 与 warfarin? 可能影响，但非主要。
              - listitem [ref=e511]:
                - paragraph [ref=e512]: "aspirin (抗血小板剂量和镇痛剂量)。主要交互:"
                - list [ref=e513]:
                  - listitem [ref=e514]:
                    - paragraph [ref=e515]: "与 other anticoagulants/antiplatelets (warfarin, heparin, clopidogrel, DOACs, NSAIDs): major, 增加出血风险。"
                  - listitem [ref=e516]:
                    - paragraph [ref=e517]: "与 ibuprofen 等 NSAIDs: moderate，减弱 aspirin 的抗血小板作用 (药效学拮抗，ibuprofen 结合 COX-1 位点) 且增加 GI 出血风险。"
