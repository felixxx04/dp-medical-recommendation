            - paragraph [ref=e236]: 将从estradiol and progesterone开始，逐个分析。可能需要注意一些隐含禁忌：比如偏头痛药物（曲普坦类）禁忌于心血管疾病（冠心病、脑血管病、未控制的高血压等）；ergot类禁忌于心血管病、怀孕等；NSAIDs禁忌于严重肾损害、消化道溃疡、出血、过敏、哮喘等；对乙酰氨基酚禁忌于严重肝病；咖啡因组合；妊娠分级：X意味着绝对禁忌怀孕；C、D等也需考虑。
