              - paragraph [ref=e356]: 磺胺醋酰钠/硫：磺胺过敏，肾脏疾病。
              - paragraph [ref=e357]: 间苯二酚：过敏。
              - paragraph [ref=e358]: 镁乳：严重肾损害（相对），阑尾炎症状，肠梗阻，高镁血症。
              - paragraph [ref=e359]: 雌二醇/炔诺酮（HRT）：怀孕X级，乳腺癌，子宫内膜癌，深静脉血栓/肺栓塞史，肝疾病，异常阴道出血，等等。
              - paragraph [ref=e360]: 避孕药（炔雌醇/屈螺酮，炔雌醇/诺孕酯）：同样，怀孕X，血栓栓塞疾病，脑血管/冠状动脉疾病，肝肿瘤，未确诊阴道出血，乳腺癌，偏头痛伴先兆等。
              - paragraph [ref=e361]: omega-3：过敏。
              - paragraph [ref=e362]: CNS兴奋剂：心血管疾病（结构性心脏病，心肌病，心律失常），动脉硬化，高血压未控制，甲亢，青光眼，MAOI使用14天内，焦虑/激动状态，图雷特综合征史或抽搐，怀孕C相对，物质滥用史。
              - paragraph [ref=e363]: viloxazine，atomoxetine：MAOI使用14天内，嗜铬细胞瘤，窄角型青光眼，等等。atomoxetine有严重肝损伤。
              - paragraph [ref=e364]: 可乐定口服：过敏，严重心动过缓，病窦综合征。
              - paragraph [ref=e365]: 司来吉兰口服：MAOI，与许多药物相互作用（5-羟色胺药物，拟交感药，哌替啶），手术前停药？与某些抗抑郁药合用禁忌。
              - paragraph [ref=e366]: 去甲文拉法辛：MAOI，未控制窄角型青光眼，等等。
              - paragraph [ref=e367]: 抗HIV药物：阿巴卡韦组合需要HLA-B*5701等位基因检测，否则超敏反应禁忌。恩曲他滨/替诺福韦的肾损害，替诺福韦DF的骨密度问题。依法韦仑的精神病史，怀孕D级。阿扎那韦：严重肝损伤，等等。考比司他强CYP3A抑制，与许多药物禁忌。
              - paragraph [ref=e368]: 我将为每种药物生成一个合理列表。为避免过长，我会简洁但有临床意义。输出将是一个大JSON数组。现在生成。
