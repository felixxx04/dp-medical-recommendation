                - listitem [ref=e829]:
                  - paragraph [ref=e830]: "meloxicam (intravenous route): NSAID。"
                - listitem [ref=e831]:
                  - paragraph [ref=e832]: "oxycodone (oral route): 羟考酮单方，CYP3A4底物。"
                - listitem [ref=e833]:
                  - paragraph [ref=e834]: "Lidocaine Aerosol: 外用利多卡因。交互：与 class I antiarrhythmics (mexiletine) moderate，与其他局部麻醉剂 moderate。"
                - listitem [ref=e835]:
                  - paragraph [ref=e836]: "lidocaine (topical application route): 同上。"
                - listitem [ref=e837]:
                  - paragraph [ref=e838]: "morphine (injection route): 吗啡交互。"
                - listitem [ref=e839]:
                  - paragraph [ref=e840]: "buprenorphine (oral/buccal): 丁丙诺啡，部分激动剂。交互：与 benzodiazepines/CNS depressants major；与 CYP3A4 inhibitors major；与 CYP3A4 inducers moderate；与全阿片激动剂 (full opioid agonists) moderate 导致戒断或降低镇痛；与 MAO inhibitors？通常可严重，丁丙诺啡与MAOIs也可列major。加上 MAOIs major。抗胆碱 moderate，利尿 moderate。"
                - listitem [ref=e841]:
                  - paragraph [ref=e842]: "menthol topical: 无交互，输出空数组。"
                - listitem [ref=e843]:
                  - paragraph [ref=e844]: "butorphanol (injection): 布托啡诺，混合激动-拮抗剂。交互：CNS depressants major；与全阿片激动剂 moderate 降低镇痛/戒断；MAOIs major? 布托啡诺是κ激动剂和μ拮抗剂，与MAOI合用的严重性低于哌替啶，但仍可列major (如标签)。一般有警告，与MAOIs增加抑制，可列major。再加抗胆碱、利尿。"
                - listitem [ref=e845]:
                  - paragraph [ref=e846]: "buprenorphine transdermal (skin patch): 同丁丙诺啡。"
                - listitem [ref=e847]:
                  - paragraph [ref=e848]: "lidocaine hydrochloride: 外用。同利多卡因。"
                - listitem [ref=e849]:
                  - paragraph [ref=e850]: "Diphenhydramine (topical): 外用苯海拉明，与CNS depressants moderate 嗜睡。"
                - listitem [ref=e851]:
                  - paragraph [ref=e852]: "clonidine (injection): 可乐定交互。"
                - listitem [ref=e853]:
                  - paragraph [ref=e854]: "morphine (injection): 吗啡。"
                - listitem [ref=e855]:
                  - paragraph [ref=e856]: "fentanyl (buccal/sublingual): 芬太尼。"
                - listitem [ref=e857]:
                  - paragraph [ref=e858]: "levorphanol (oral): 左啡诺，非CYP3A4主要？左啡诺代谢为葡萄糖醛酸，类似吗啡。交互同吗啡。"
                - listitem [ref=e859]:
                  - paragraph [ref=e860]: "methadone (oral route): 美沙酮。交互："
              - list [ref=e861]:
                - listitem [ref=e862]:
                  - paragraph [ref=e863]: benzodiazepines/CNS depressants major
                - listitem [ref=e864]:
                  - paragraph [ref=e865]: MAO inhibitors major
                - listitem [ref=e866]:
                  - paragraph [ref=e867]: CYP3A4 inhibitors major
                - listitem [ref=e868]:
                  - paragraph [ref=e869]: CYP3A4 inducers moderate
                - listitem [ref=e870]:
                  - paragraph [ref=e871]: QT-prolonging agents (Class Ia/III antiarrhythmics, macrolides, fluoroquinolones, antipsychotics) major 尖端扭转
                - listitem [ref=e872]:
                  - paragraph [ref=e873]: anticholinergics moderate
                - listitem [ref=e874]:
                  - paragraph [ref=e875]: diuretics moderate
              - list [ref=e876]:
                - listitem [ref=e877]:
                  - paragraph [ref=e878]: "benzocaine (topical application route): 苯佐卡因交互。"
                - listitem [ref=e879]:
                  - paragraph [ref=e880]: "acetaminophen and benzhydrocodone: 对乙酰氨基酚 + 苯并氢可酮(氢可酮前药)。对乙酰氨基酚交互 + 氢可酮阿片交互（CYP3A4底物）。合并。"
                - listitem [ref=e881]:
                  - paragraph [ref=e882]: "acetaminophen, caffeine, and dihydrocodeine: 对乙酰氨基酚交互 + 咖啡因交互 (CYP1A2抑制剂如fluvoxamine, ciprofloxacin moderate 增加咖啡因作用) + 双氢可待因交互。双氢可待因类似可待因，前药CYP2D6，与CYP2D6抑制剂 moderate 降低镇痛；与MAOIs major；与CNS抑郁 major。合并。"
                - listitem [ref=e883]:
                  - paragraph [ref=e884]: "acetaminophen and ibuprofen: 对乙酰氨基酚 + 布洛芬，合并。"
                - listitem [ref=e885]:
                  - paragraph [ref=e886]: "Acetaminophen, Salicylamide, and Phenyltoloxamine: 对乙酰氨基酚 + 水杨酰胺（类似阿司匹林） + 苯托沙敏。水杨酰胺交互：抗凝、甲氨蝶呤、其它NSAIDs等。苯托沙敏：CNS抑制、抗胆碱、MAOIs。合并。"
                - listitem [ref=e887]:
                  - paragraph [ref=e888]: "aspirin and caffeine: 阿司匹林交互（同NSAIDs） + 咖啡因交互。"
                - listitem [ref=e889]:
                  - paragraph [ref=e890]: "benzocaine topical: 苯佐卡因。"
                - listitem [ref=e891]:
                  - paragraph [ref=e892]: "Menthol Gel, Liquid, and Solution: 薄荷醇，无交互。"
                - listitem [ref=e893]:
                  - paragraph [ref=e894]: "aspirin, carisoprodol, and codeine: 阿司匹林 + 卡立普多 + 可待因。卡立普多交互：CNS抑制剂，CYP2C19抑制剂；可待因：CNS抑制剂，CYP2D6抑制剂，MAOIs；阿司匹林交互。合并。"
              - paragraph [ref=e895]: 开始构建JSON。我将创建数组，每个元素一个对象。注意所有字符串双引号转义。我会确保正确。
