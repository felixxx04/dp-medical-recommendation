          - generic [ref=e102]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 过敏性皮炎 | Cetirizine; Betamethasone; Clobetasol; Desloratadine; Desonide 疾病: 过敏性鼻炎 | Cetirizine; Mometasone; Olopatadine; fluticasone; Loratadine 疾病: 酒渣鼻 | Doxycycline; Erythromycin; Oxytetracycline; Spironolactone; Tazarotene 疾病: 酗酒 | Alprazolam; Aripiprazole; Bupropion; Buspirone; Chlordiazepoxide 疾病: 银屑病 | Betamethasone; Clobetasol; Desonide; Desoximetasone; Fluocinolone 疾病: 银屑病关节炎 | Diclofenac; Apremilast; Betamethasone; Calcitriol; Clobetasol 疾病: 链球菌咽炎 | Amoxicillin; Azithromycin; Cefaclor; Cefadroxil; Cefdinir 疾病: 阑尾炎 | Amoxicillin-Clavulanate; Cefotaxime; Cefoxitin; Ceftaroline; Ceftibuten 疾病: 阳痿 | Sildenafil; Tadalafil; Papaverine; Vardenafil; alprostadil 疾病: 阴道炎 | Amikacin; Amoxicillin; Amoxicillin-Clavulanate; Cefaclor; Cefadroxil 疾病: 阿尔茨海默病 | aducanumab; Lorazepam; vitamin E; vitamin e(oral); Vitamin E Capsules 疾病: 附件炎 | Amikacin; Amoxicillin; Amoxicillin-Clavulanate; Ampicillin-Sulbactam; Cefaclor 疾病: 青光眼 | Timolol; betaxolol; Brimonidine; Brinzolamide; Latanoprost 疾病: 预防中风 | Amlodipine; Fluvastatin; Amlodipine-Benazepril; Amlodipine-Valsartan; Benazepril 疾病: 颈椎病 | Aspirin; Baclofen; Carisoprodol; Cyclobenzaprine; Diclofenac 疾病: 骨关节炎 | Diclofenac; Etodolac; Flurbiprofen; Ibuprofen; Indomethacin 疾病: 骨质疏松 | Estradiol; Pamidronate; Calcium Carbonate; Calcitonin; Raloxifene 疾病: 骨质疏松症 | Estradiol; Pamidronate; Calcium Carbonate; Calcitonin; Raloxifene 疾病: 高胆固醇 | Amlodipine; Colesevelam; Ezetimibe; Fenofibrate; Fluvastatin 疾病: 高脂血症 | Colesevelam; Amlodipine; amlodipine+atorvastatin; niacin; niacin(oral) 疾病: 高血压 | Amlodipine; Amlodipine-Benazepril; Amlodipine-Valsartan; Benazepril; Bumetanide 疾病: 高血脂 | Colesevelam; Amlodipine; amlodipine+atorvastatin; niacin; niacin(oral) 疾病: 鼻塞 | Cetirizine; Mometasone; Olopatadine; fluticasone; Loratadine 疾病: 鼻窦炎 | Amoxicillin; Amoxicillin-Clavulanate; Cefaclor; Ce