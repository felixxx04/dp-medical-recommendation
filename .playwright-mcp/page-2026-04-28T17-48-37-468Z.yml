              - img [ref=e212]
            - generic [ref=e218]:
              - paragraph [ref=e219]: 我们被要求为给定列表中的每种药物生成完整的禁忌症列表。输出必须是JSON格式，包含generic_name和contraindications数组。每个禁忌症有contraindication_name, contraindication_type, severity, reason。禁忌症类型包括disease, allergy_type, physiological_condition, drug_class。严重程度absolute或relative。需要为每个药物仔细考虑禁忌症。注意一些药物是组合药物，需要列出每个成分的禁忌症，但可能合并成整体禁忌症列表，如问题描述"对于组合药物,列出每个成分的禁忌症"，不过最终JSON中generic_name是对应整个组合药物，contraindications应该是该组合药物的禁忌症，可以整合所有成分的禁忌。我将按照药物列表逐一处理。
              - paragraph [ref=e220]: 首先，理清每个药物，然后搜索每个药物的已知禁忌症（我作为临床药学专家知识）。注意禁忌症应具体且临床相关。我会根据常用药物知识生成。
              - list [ref=e221]:
                - listitem [ref=e222]:
                  - paragraph [ref=e223]: "Phenylephrine/Pyrilamine/Dextromethorphan Syrup: 组合: phenylephrine (去氧肾上腺素，α激动剂，减充血)，pyrilamine (吡拉明，抗组胺药，第一代抗组胺)，dextromethorphan (右美沙芬，镇咳)。妊娠分级C。适应症: 鼻塞，鼻窦充血，打喷嚏，流鼻涕，咳嗽，过敏性鼻炎。禁忌症："
              - list [ref=e255]:
                - listitem [ref=e256]:
                  - paragraph [ref=e257]: "高血压、冠心病、甲亢、窄角型青光眼、尿潴留、MAO抑制剂使用、妊娠（C级相对），婴儿等。phenylephrine: 严重高血压，冠心病，MAOIs。pyrilamine: 窄角型青光眼，尿潴留，前列腺增生，新生儿，MAOIs，哮喘急性发作？ dextromethorphan: MAOIs，服用SSRI（血清素综合征风险，相对）。整合。"
              - list [ref=e258]:
                - listitem [ref=e259]:
                  - paragraph [ref=e260]: "Guaifenesin, Pseudoephedrine, and Codeine: 愈创甘油醚，伪麻黄碱，可待因。适应症咳嗽，胸充血，鼻塞等。妊娠C。可待因阿片类药物，禁忌：呼吸抑制，急性哮喘，儿童（相对），MAOIs，颅内压升高，肠梗阻等。伪麻黄碱：严重高血压，冠心病，甲亢，窄角型青光眼，尿潴留，MAOIs。愈创甘油醚相对安全。可待因 ultrarapid metabolizers 禁忌（FDA黑框，儿童）。"
                - listitem [ref=e261]:
                  - paragraph [ref=e262]: "dextromethorphan, diphenhydramine, and phenylephrine: 右美沙芬，苯海拉明（抗组胺、抗胆碱），去氧肾上腺素。禁忌：MAOIs，窄角型青光眼，尿潴留，前列腺增生，新生儿，严重高血压，冠心病，哮喘（苯海拉明相对？），血清素综合征风险（右美沙芬+某些药物）。"
                - listitem [ref=e263]:
                  - paragraph [ref=e264]: "Dexbrompheniramine and Pseudoephedrine Sustained-Release Tablets: 右溴苯那敏（抗组胺），伪麻黄碱。禁忌类似：MAOIs，严重高血压，冠心病，窄角型青光眼，尿潴留，新生儿，妊娠C。"
                - listitem [ref=e265]:
                  - paragraph [ref=e266]: "Acetaminophen, Chlorpheniramine, and Phenylephrine Effervescent Tablets: 对乙酰氨基酚，氯苯那敏，去氧肾上腺素。禁忌：严重肝功能损害（对乙酰氨基酚过量慎用，相对），MAOIs，窄角型青光眼，尿潴留，前列腺增生，严重高血压，冠心病。对乙酰氨基酚禁忌：严重肝病（相对），G6PD缺乏？一般禁忌为严重肝损伤。妊娠N（未分类？可能是C，但写N表示无分类，这里标N，我们按成分可能妊娠C？实际对乙酰氨基酚B，氯苯那敏B，去氧肾上腺素C，组合为C，但写着N，忽略，只用已知禁忌）。氯苯那敏：新生儿，哺乳期（慎用）。去氧肾上腺素：同上。"
                - listitem [ref=e267]:
                  - paragraph [ref=e268]: "Triprolidine and Phenylephrine Syrup: 曲普利啶（抗组胺），去氧肾上腺素。禁忌症类似，MAOIs，窄角型青光眼，尿潴留，前列腺增生，严重高血压，冠心病。"
                - listitem [ref=e269]:
                  - paragraph [ref=e270]: "Chlorpheniramine and Phenylephrine Liquid: 同上。"
                - listitem [ref=e271]:
                  - paragraph [ref=e272]: "Acetaminophen and Dextromethorphan Liquid: 对乙酰氨基酚，右美沙芬。禁忌：严重肝功能损害（对乙酰氨基酚过量风险），MAOIs（右美沙芬绝对禁忌？右美沙芬与MAOIs合用可导致血清素综合征，绝对禁忌），酒精肝病？ 右美沙芬在儿童某些禁忌。"
                - listitem [ref=e273]:
                  - paragraph [ref=e274]: "Acetaminophen, Chlorpheniramine, and Dextromethorphan Liquid and Syrup: 对乙酰氨基酚，氯苯那敏，右美沙芬。禁忌：严重肝功能损害，MAOIs，窄角型青光眼，尿潴留，新生儿，血清素综合征风险。"
                - listitem [ref=e275]:
                  - paragraph [ref=e276]: "Chlorpheniramine, Pseudoephedrine, and Codeine Suspension: 氯苯那敏，伪麻黄碱，可待因。禁忌：MAOIs，严重高血压，冠心病，窄角型青光眼，尿潴留，呼吸抑制，急性哮喘，肠梗阻，儿童扁桃体切除术后等。可待因哺乳期相对禁忌。"
                - listitem [ref=e277]:
                  - paragraph [ref=e278]: "docusate (oral/rectal): 多库酯钠，大便软化剂。禁忌：肠梗阻，急性腹痛，恶心呕吐，矿物油合用？实际多库酯可能会增加矿物油吸收，禁忌合并使用？相对禁忌：粪块嵌塞？不，它用于fecal impaction，但如果有肠梗阻是绝对禁忌。还有过敏。"
                - listitem [ref=e279]:
                  - paragraph [ref=e280]: "polyethylene glycol 3350: 聚乙二醇，禁忌：肠梗阻，肠穿孔，中毒性巨结肠，胃潴留。过敏。妊娠C。"
                - listitem [ref=e281]:
                  - paragraph [ref=e282]: "bisacodyl (oral and rectal): 比沙可啶，刺激性泻药。禁忌：肠梗阻，急腹症，阑尾炎，未确诊的腹痛、直肠出血，严重脱水，炎性肠病？相对禁忌。"
                - listitem [ref=e283]:
                  - paragraph [ref=e284]: "docusate sodium 100mg capsules: 同多库酯钠。"
                - listitem [ref=e285]:
                  - paragraph [ref=e286]: "magnesium oxide: 氧化镁。禁忌：严重肾功能损害（镁蓄积），心传导阻滞？相对：使用神经肌肉阻滞剂？高镁血症。阑尾炎症状？等等。"
                - listitem [ref=e287]:
                  - paragraph [ref=e288]: "magnesium citrate: 枸橼酸镁。禁忌：肾功能不全，高镁血症，肠梗阻，阑尾炎，急腹症，恶心呕吐，严重脱水。"
                - listitem [ref=e289]:
                  - paragraph [ref=e290]: "psyllium: 车前草，容积性泻药。禁忌：肠梗阻，粪便嵌塞，吞咽困难，食管狭窄，窄肠。可能过敏。相对：精神病患者？需要充分饮水。"
                - listitem [ref=e291]:
                  - paragraph [ref=e292]: "docusate sodium: 同多库酯。"
                - listitem [ref=e293]:
                  - paragraph [ref=e294]: "polycarbophil: 聚卡波非。禁忌：肠梗阻，粪便嵌塞，吞咽困难，恶心呕吐，腹痛。同样需充分液体。"
                - listitem [ref=e295]:
                  - paragraph [ref=e296]: "sodium biphosphate and sodium phosphate (rectal): 磷酸钠盐灌肠。禁忌：肾功能不全，充血性心力衰竭，高磷血症，低钙血症，电解质紊乱，肠道梗阻，巨结肠，已存在的肠穿孔。儿童禁忌（可能引起严重电解质紊乱）。"
                - listitem [ref=e297]:
                  - paragraph [ref=e298]: "Docusate Capsules and Tablets: 同。"
                - listitem [ref=e299]:
                  - paragraph [ref=e300]: "Docusate Enema: 多库酯灌肠。禁忌：肠梗阻，腹痛，直肠出血。含矿物油？多库酯灌肠通常含多库酯，可能也有其他成分。多库酯灌肠禁忌类似。"
                - listitem [ref=e301]:
                  - paragraph [ref=e302]: "Bisacodyl Suppositories: 比沙可啶栓。禁忌：肛裂，直肠炎，溃疡性直肠炎；腹痛，肠梗阻。"
                - listitem [ref=e303]:
                  - paragraph [ref=e304]: "Bisacodyl Tablets: 比沙可啶片。禁忌：肠梗阻，急腹症，恶心呕吐。"
                - listitem [ref=e305]:
                  - paragraph [ref=e306]: "Docusate Liquid and Syrup: 同。"
                - listitem [ref=e307]:
                  - paragraph [ref=e308]: "Bisacodyl Enema: 比沙可啶灌肠剂？通常没有比沙可啶灌肠，但有类似灌肠。禁忌类似。"
                - listitem [ref=e309]:
                  - paragraph [ref=e310]: "Magnesium Oxide: 同上。"
                - listitem [ref=e311]:
                  - paragraph [ref=e312]: "glycerin (rectal): 甘油栓/灌肠。禁忌：肠梗阻，直肠出血，未确诊的腹痛。过敏。"
                - listitem [ref=e313]:
                  - paragraph [ref=e314]: "sodium biphosphate and sodium phosphate (oral): 口服磷酸钠，用于结肠准备。禁忌：肾功能不全(急性磷酸盐肾病风险)，充血性心力衰竭，肝硬化伴腹水，高磷血症，低钙血症，电解质紊乱，炎症性肠病，肠梗阻。年龄>55或使用某些药物慎用。"
                - listitem [ref=e315]:
                  - paragraph [ref=e316]: "Polycarbophil Tablets: 同。"
                - listitem [ref=e317]:
                  - paragraph [ref=e318]: "sodium phosphate dibasic and sodium phosphate monobasic (oral route): 同口服磷酸钠。"
                - listitem [ref=e319]:
                  - paragraph [ref=e320]: "mineral oil (oral/rectal): 矿物油。禁忌：肠梗阻，吞咽困难（口服），脂质吸入性肺炎（老人、婴幼儿禁忌口服），孕期？可能。直肠：肛门损伤。与多库酯合用可增加吸收，禁忌。慢性便秘长期使用导致脂溶性维生素吸收不良。"
                - listitem [ref=e321]:
                  - paragraph [ref=e322]: "sorbitol: 山梨醇。禁忌：肠梗阻，急腹症，果糖不耐受（遗传性果糖不耐受）。过敏。"
                - listitem [ref=e323]:
                  - paragraph [ref=e324]: "Benzocaine and Docusate: 苯佐卡因+多库酯。禁忌：过敏（苯佐卡因，酯类局麻药），高铁血红蛋白血症史，肠梗阻（多库酯），急性腹痛，与矿物油合用？苯佐卡因用于直肠疼痛，不能用于肛门直肠有损伤。"
                - listitem [ref=e325]:
                  - paragraph [ref=e326]: "potassium phosphate: 磷酸钾。禁忌：严重肾功能不全，高钾血症，高磷血症，低钙血症，Addison病，严重脱水。磷补充剂慎用。"
                - listitem [ref=e327]:
                  - paragraph [ref=e328]: "budesonide and formoterol (inhalation): 布地奈德福莫特罗吸入剂。禁忌：过敏，严重牛奶蛋白过敏（可能？有些干粉含乳糖）。哮喘持续状态（福莫特罗LABA不用于急性发作）。绝对禁忌：对任一成分过敏。相对：心血管疾病（延长QT），甲亢，糖尿病，低钾血症，活动性或静止性肺结核，全身真菌感染，免疫抑制患者（布地奈德免疫抑制）。"
                - listitem [ref=e329]:
                  - paragraph [ref=e330]: "budesonide, glycopyrrolate, and formoterol fumarate: 三联吸入剂。禁忌同上。格隆溴铵（抗胆碱）禁忌：窄角型青光眼，尿潴留，前列腺增生。过敏。"
                - listitem [ref=e331]:
                  - paragraph [ref=e332]: "umeclidinium and vilanterol: 乌美溴铵维兰特罗。禁忌：严重牛奶蛋白过敏（干粉含乳糖），窄角型青光眼，尿潴留（抗胆碱）。过敏。LABA不用于无吸入性糖皮质激素的哮喘（单独使用增加哮喘相关死亡风险），对COPD适应症，有哮喘患者禁忌？相对。"
                - listitem [ref=e333]:
                  - paragraph [ref=e334]: "roflumilast: 罗氟司特（PDE4抑制剂）。禁忌：严重肝损伤（Child-Pugh C级）。某些精神状况慎用（抑郁、自杀行为）。体重过轻慎用。"
                - listitem [ref=e335]:
                  - paragraph [ref=e336]: "aclidinium: 阿地溴铵（抗胆碱）。禁忌：窄角型青光眼，尿潴留。过敏。"
                - listitem [ref=e337]:
                  - paragraph [ref=e338]: "olodaterol and tiotropium: 奥达特罗噻托溴铵。禁忌：哮喘（未经ICS治疗，LABA单用增加风险），窄角型青光眼，尿潴留，过敏。"
                - listitem [ref=e339]:
                  - paragraph [ref=e340]: "formoterol and glycopyrrolate: 福莫特罗格隆溴铵。禁忌：哮喘未使用ICS，窄角型青光眼，尿潴留，过敏。"
                - listitem [ref=e341]:
                  - paragraph [ref=e342]: "olodaterol (inhalation): 奥达特罗（LABA）。禁忌：哮喘未用ICS，过敏。"
                - listitem [ref=e343]:
                  - paragraph [ref=e344]: "revefenacin (inhalation): 雷芬那辛（抗胆碱）。禁忌：窄角型青光眼，尿潴留，过敏。"
                - listitem [ref=e345]:
                  - paragraph [ref=e346]: "aclidinium and formoterol: 阿地溴铵福莫特罗。禁忌：哮喘未用ICS，窄角型青光眼，尿潴留，过敏。"
                - listitem [ref=e347]:
                  - paragraph [ref=e348]: "budesonide and formoterol fumarate: 同上布地奈德福莫特罗。"
                - listitem [ref=e349]:
                  - paragraph [ref=e350]: "budesonide, formoterol, and glycopyrrolate: 同上三联。"
                - listitem [ref=e351]:
                  - paragraph [ref=e352]: "ivermectin (oral): 伊维菌素。禁忌：脑膜炎，孕期（C），过敏。正在服用华法林？相对：Loa loa感染（严重脑病风险）。儿童<15kg慎用。"
                - listitem [ref=e353]:
                  - paragraph [ref=e354]: "COVID-19 vaccine, Pfizer: 辉瑞新冠疫苗。禁忌：对疫苗成分（包括聚乙二醇 PEG）严重过敏反应（anaphylaxis）。过敏史（mRNA疫苗成分）。相对：急性发热，血小板减少症（如肝素诱导），心肌炎/心包炎史（相对）。"
                - listitem [ref=e355]:
                  - paragraph [ref=e356]: "nirmatrelvir and ritonavir: 奈玛特韦/利托那韦。禁忌：严重肝损伤（Child-Pugh C级），严重肾损伤（eGFR <30 mL/min，奈玛特韦因肾清除不能推荐？实际上说明书中，严重肾损伤 eGFR <30 不推荐；eGFR 30-60 减量）。与强CYP3A诱导剂和某些底物合用禁忌（因为利托那韦是强CYP3A抑制剂，引起严重相互作用）。某些药物禁忌：阿夫唑嗪、哌替啶、匹莫齐特、西沙必利、麦角衍生物、洛伐他汀、辛伐他汀、鲁拉西酮、三唑仑、咪达唑仑口服等。列出drug_class: CYP3A inducers, substrates with narrow therapeutic index等。绝对禁忌：与这些药物合用。相对禁忌：肝病，肾病。"
