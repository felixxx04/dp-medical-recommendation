                - paragraph [ref=e1366]: 对于重复的药物，比如tenofovir disoproxil单独出现，在组合中出现，仍需为每个generic_name生成禁忌症。但组合药物列出每个成分的禁忌症，那么我可以结合成分的禁忌症。对于维生素E、阿司匹林等有多个条目但基本一样，可生成相同禁忌症。对于doxylamine和doxylamine succinate一样。对于nitroglycerin sublingual和oral/sublingual，一样。对于corticotropin，需要注意。对于etanercept等。
                - paragraph [ref=e1367]: 我需要生成准确、有临床依据的禁忌症。尽量不遗漏重要禁忌症。例如：
                - list [ref=e1368]:
                  - listitem [ref=e1369]:
                    - paragraph [ref=e1370]: "tenofovir disoproxil: 肾功能不全（eGFR < 某值）相对禁忌？其说明书：禁用于之前对替诺福韦过敏者。疾病：严重肾功能损害需调整剂量，但不是绝对禁忌？替诺福韦可能导致肾毒性，在eGFR < 50 mL/min时不推荐使用替诺福韦地索普西（富马酸替诺福韦二吡呋酯），因为需要调整剂量，但有的指南认为严重肾功能不全为相对禁忌，因为可能加重肾损伤。妊娠：B级，不是禁忌。说明书禁忌：已知对替诺福韦或任何辅料过敏。绝对。需要查实。最常见：替诺福韦地索普西禁用于严重肾功能不全（肌酐清除率 < 60 或 50？），其实富马酸替诺福韦二吡呋酯 300mg每日一次，在CrCl < 50 mL/min不推荐使用，因为研究不充分且肾毒性。所以严重肾损伤可作为相对禁忌或绝对？通常作为警告，可能需要减量或换用丙酚替诺福韦。我会将其列为相对禁忌：severe renal impairment (CrCl < 50 mL/min)，因为肾毒性风险增大。绝对禁忌：hypersensitivity to tenofovir or any component。"
                  - listitem [ref=e1371]:
                    - paragraph [ref=e1372]: "lopinavir and ritonavir：禁忌症：对洛匹那韦、利托那韦或任何辅料过敏。严重肝病(失代偿肝硬化) 绝对禁忌？洛匹那韦/利托那韦在严重肝损伤禁用。药物相互作用禁忌：与主要依赖CYP3A代谢且血药浓度升高导致严重和/或危及生命事件（如胺碘酮、奎尼丁、匹莫齐特、咪达唑仑、三唑仑、西沙必利、麦角衍生物、辛伐他汀、洛伐他汀等）禁止合用。与强CYP3A诱导剂如利福平、圣约翰草合并禁用，因可能导致抗病毒失败和耐药。与氟替卡松合用可能降低皮质醇浓度？其实与吸入或鼻用氟替卡松联用会导致库欣综合征，但不一定是绝对禁忌，但有些说明书列为禁忌。需要列几个关键。drug_class: CYP3A substrates with narrow therapeutic index, strong CYP3A inducers. 绝对禁忌。"
                  - listitem [ref=e1373]:
                    - paragraph [ref=e1374]: etravirine：禁忌症：对依曲韦林或任何辅料过敏。药物相互作用：禁止与强CYP3A诱导剂如卡马西平、苯妥英、苯巴比妥、利福平、利福喷丁等合用，会显著降低依曲韦林血药浓度导致病毒学失败。与仅依赖CYP3A消除的药物合用可能需调整。与其他抗逆转录病毒药如未增强蛋白酶抑制剂相关的相互作用。禁忌绝对：hypersensitivity；绝对：coadministration with strong CYP3A inducers that significantly reduce etravirine exposure. 许多国家说明书禁止与替拉那韦/利托那韦、福沙那韦等？不太确定，但一般NNRTI间可能交叉耐药。相对禁忌严重肝损伤？轻中度肝损伤不需调整，重度缺乏数据。妊娠B级。
                  - listitem [ref=e1375]:
                    - paragraph [ref=e1376]: abacavir：绝对禁忌症：HLA-B*5701等位基因阳性(超敏反应风险)。超敏反应史。对阿巴卡韦过敏。严重肝损伤(Child-Pugh > 6的严重)相对禁忌？阿巴卡韦主要通过醇脱氢酶代谢，轻中度肝损伤可使用，严重肝损伤不推荐。所以相对禁忌severe hepatic impairment。与酒精使用会增加阿巴卡韦水平？没有绝对禁忌。
                  - listitem [ref=e1377]:
                    - paragraph [ref=e1378]: emtricitabine and tenofovir（恩曲他滨替诺福韦）：组合。禁忌包括成分禁忌：恩曲他滨过敏，替诺福韦过敏。替诺福韦禁忌严重肾功能不全。恩曲他滨也要根据肾功能调整剂量，严重肾损伤禁用。恩曲他滨禁用于已知对恩曲他滨过敏。相对禁忌：CrCl < 50 mL/min（替诺福韦），或 < 30 mL/min（恩曲他滨）？恩曲他滨在CrCl < 30 mL/min不推荐。组合恩曲他滨替诺福韦（特鲁瓦达）禁用CrCl < 50 mL/min（因为替诺福韦）。绝对禁忌：hypersensitivity to any component。相对禁忌：severe renal impairment (CrCl < 50 mL/min). 恩曲他滨哺乳期？妊娠B。
                  - listitem [ref=e1379]:
                    - paragraph [ref=e1380]: cobicistat and darunavir：组合，包含达芦那韦和考比司他。禁忌：对任何成分过敏。严重肝损伤（失代偿）禁用（达芦那韦+考比司他）。药物相互作用：考比司他是强CYP3A抑制剂和CYP2D6底物，禁止与高度依赖CYP3A代谢且浓度升高导致严重风险（如阿普唑仑、三唑仑、咪达唑仑、赛迪那非、西沙必利、匹莫齐特、麦角衍生物、辛伐他汀、洛伐他汀等）合用。与强CYP3A诱导剂（利福平、卡马西平、苯妥英、圣约翰草）禁用，因可能减低达芦那韦/考比司他和水平导致耐药。绝对禁忌：与阿夫唑秦合用？阿夫唑秦也是CYP3A底物会升高。很多。我将列出关键的：CYP3A substrates that are highly dependent, strong CYP3A inducers. 绝对。妊娠C，相对禁忌妊娠？可能权衡利弊。
                  - listitem [ref=e1381]:
                    - paragraph [ref=e1382]: lamivudine and zidovudine（拉米夫定齐多夫定）：成分禁忌：拉米夫定过敏，齐多夫定过敏。齐多夫定禁忌于严重骨髓抑制（中性粒细胞 < 0.75x10^9/L，血红蛋白 < 7.5 g/dL）。肝功能？拉米夫定在严重肝功能不全慎用？齐多夫定肝毒性。拉米夫定主要经肾排出，肾功能不全需调整剂量，严重肾损伤禁忌？拉米夫定在CrCl < 50 mL/min需减量，CrCl < 5 mL/min不推荐。所以相对禁忌severe renal impairment (CrCl < 30 mL/min for lamivudine). 齐多夫定：严重骨髓抑制相对禁忌可能。绝对禁忌：hypersensitivity. 相对禁忌：severe bone marrow suppression, severe renal impairment.
                  - listitem [ref=e1383]:
                    - paragraph [ref=e1384]: zidovudine单独：过敏绝对。严重骨髓抑制相对禁忌，但通常列为警告，可能需停药。严重肝损伤相对。肌病？绝对禁忌症不多。可以列：已知过敏（绝对），严重中性粒细胞减少（<0.75x10^9/L）和严重贫血（Hb<7.5g/dL）为相对禁忌（需要密切监测）。妊娠C。
                  - listitem [ref=e1385]:
                    - paragraph [ref=e1386]: emtricitabine单独：过敏绝对。严重肾功能损伤（CrCl < 30 mL/min）需禁用（胶囊200mg，口服溶液可能需要调整），这是禁忌症。所以绝对：hypersensitivity to emtricitabine. 相对或绝对：end-stage renal disease requiring dialysis not using appropriate dose adjustment? 通常不推荐使用。说明书：恩曲他滨禁用于先前过敏者。未提肾功能不全为禁忌但需调整剂量。然而，有些剂型在CrCl < 30 mL/min禁用。我会列为相对禁忌：severe renal impairment (CrCl < 30 mL/min) without dose adjustment. 绝对：已知过敏。
                  - listitem [ref=e1387]:
                    - paragraph [ref=e1388]: dolutegravir and rilpivirine：成分：多替拉韦和利匹韦林。多替拉韦过敏绝对。利匹韦林过敏绝对。禁忌：多替拉韦与多非利特合用绝对禁忌（通过肾小管转运体）。强CYP3A诱导剂？利匹韦林禁忌与强CYP3A诱导剂（卡马西平、苯妥英、利福平、圣约翰草等）合用，因为降低利匹韦林血药浓度。质子泵抑制剂？利匹韦林需酸性环境，与质子泵抑制剂合用是禁忌（美国家说明书：禁忌）。多替拉韦与某些抗惊厥药如奥卡西平、苯妥英、卡马西平可能降低多替拉韦？但多替拉韦与强诱导剂合用可导致浓度降低，但不一定是绝对禁忌。但组合里包含利匹韦林，其依赖酸性环境，所以禁忌PPIs、H2受体拮抗剂需要注意，H2受体拮抗剂不是绝对禁忌但需时间隔开。绝对禁忌：与质子泵抑制剂合用（利匹韦林），与多非利特合用（多替拉韦）。绝对：对任何成分过敏。相对禁忌：严重肝功能障碍（Child-Pugh C）？多替拉韦和利匹韦林对严重肝损伤数据不足，可能相对。妊娠N。
                  - listitem [ref=e1389]:
                    - paragraph [ref=e1390]: "cobicistat, darunavir, emtricitabine, and tenofovir：所有成分的禁忌症综合。绝对：过敏。绝对：与高度依赖CYP3A的底物和强CYP3A诱导剂合用（考比司他、达芦那韦）。恩曲他滨替诺福韦的肾禁忌：CrCl < 50 mL/min 不推荐（因为替诺福韦）。因此，绝对：hypersensitivity; 药物相互作用：CYP3A narrow therapeutic index substrates, strong CYP3A inducers. 相对：severe renal impairment (CrCl < 50 mL/min). 此外，达芦那韦含磺胺基，磺胺过敏是否绝对禁忌？达芦那韦含磺酰胺结构，对磺胺过敏者慎用，非绝对禁忌，但可能交叉过敏。可列为relative: sulfonamide allergy (达芦那韦)。"
                  - listitem [ref=e1391]:
                    - paragraph [ref=e1392]: "abacavir, lamivudine, and zidovudine: 成分禁忌。绝对：HLA-B*5701阳性（阿巴卡韦）。对任何成分过敏。相对：齐多夫定的严重骨髓抑制，拉米夫定的严重肾损伤，齐多夫定的肝损伤等。绝对：HLA-B*5701 positive (abacavir). 绝对过敏。药物相互作用：阿巴卡韦、拉米夫定、齐多夫定无重大禁忌，但齐多夫定避免与司他夫定合用（拮抗）。可以加入：avoid concomitant stavudine (relative). 绝对禁忌：hypersensitivity, HLA-B*5701 allele."
                  - listitem [ref=e1393]:
                    - paragraph [ref=e1394]: "lamivudine and tenofovir: 拉米夫定和替诺福韦。过敏绝对。替诺福韦严重肾功能不全禁忌，拉米夫定严重肾损伤需减量。组合要求CrCl > 50 mL/min (替诺福韦)。所以相对禁忌：severe renal impairment (CrCl < 50 mL/min)。绝对过敏。无其他明确绝对禁忌。禁忌与其他含有拉米夫定或替诺福韦的药物合用（重复）。相对。"
                  - listitem [ref=e1395]:
                    - paragraph [ref=e1396]: "doravirine, lamivudine, and tenofovir disoproxil fumarate: 多拉韦林+3TC+TDF。禁忌：过敏绝对。多拉韦林禁忌与强CYP3A诱导剂：卡马西平、苯妥英、利福平、圣约翰草等合用（降低多拉韦林浓度）。替诺福韦严重肾损伤相对禁忌。绝对：hypersensitivity, coadministration with strong CYP3A inducers (如rifampicin, carbamazepine)。相对：severe renal impairment (CrCl < 50 mL/min)。"
                  - listitem [ref=e1397]:
                    - paragraph [ref=e1398]: "efavirenz, lamivudine, and tenofovir: 依非韦伦+3TC+TDF。依非韦伦过敏绝对，依非韦伦禁忌于严重肝损伤(Child-Pugh C)？依非韦伦有肝毒性和精神病学不良反应，严重肝病禁用。药物相互作用：依非韦伦是CYP3A诱导剂，也是CYP2B6底物。禁忌与标准剂量的伏立康唑合用（双向相互作用），与麦角衍生物、咪达唑仑、三唑仑等CYP3A底物禁忌？依非韦伦可能降低激素避孕药有效性。绝对禁忌：hypersensitivity to any component, coadministration with voriconazole (standard doses), and drugs highly dependent on CYP3A for clearance which elevated levels cause serious events? 其实依非韦伦是诱导剂，会降低这些底物的浓度，所以不是禁忌底物浓度升高。但依非韦伦禁止与 elbasvir/grazoprevir 合用，与某些抗丙型肝炎病毒药物。我应加入：绝对禁忌： concomitant use with voriconazole (standard dose)可能导致缺乏疗效？但依非韦伦降低伏立康唑，伏立康唑升高依非韦伦，可能需要调整剂量，是禁忌。另外相对禁忌：first trimester pregnancy (依非韦伦可能致神经管缺陷，妊娠分级D，但此处写妊娠分级N，但实际依非韦伦旧分级D，现在认为可能风险？妊娠情况相对禁忌，育龄妇女应避免妊娠。由于提示给的妊娠分级N，但依非韦伦曾有妊娠警告，我会列为相对禁忌：pregnancy (especially first trimester), 因为神经管缺陷。还有严重肝损伤禁用，绝对。精神病病史相对。绝对：severe hepatic impairment (Child-Pugh C), hypersensitivity。相对：pregnancy, psychiatric disorders."
                  - listitem [ref=e1399]:
                    - paragraph [ref=e1400]: "atazanavir and cobicistat: 阿扎那韦+考比司他。禁忌：过敏绝对。药物相互作用：考比司他是CYP3A强抑制剂，禁忌与高度依赖CYP3A代谢且浓度升高导致严重不良事件的药物（西沙必利、匹莫齐特、咪达唑仑、三唑仑、麦角衍生物、辛伐他汀、洛伐他汀等）。强CYP3A诱导剂如利福平禁用。阿扎那韦需要酸性环境，与质子泵抑制剂禁忌（绝对）。H2受体拮抗剂和抗酸剂需要分开。绝对禁忌：coadministration with proton pump inhibitors (PPIs) (atazanavir); coadministration with drugs highly dependent on CYP3A with narrow therapeutic index; strong CYP3A inducers. 严重肝损伤（阿扎那韦可能间接高胆红素血症，Child-Pugh B/C禁用）绝对。所以绝对：severe hepatic impairment。相对：bilirubin相关疾病，PR间期延长（阿扎那韦可能延长PR，慎用）。心律失常。过敏绝对。"
                  - listitem [ref=e1401]:
                    - paragraph [ref=e1402]: "doravirine: 禁忌绝对：过敏。绝对：与强CYP3A诱导剂（卡马西平、苯妥英、利福平、圣约翰草等）合用。相对：严重肝损伤？"
                  - listitem [ref=e1403]:
                    - paragraph [ref=e1404]: "cobicistat: 单独使用，作为增强剂。禁忌绝对：过敏。绝对：与高度依赖CYP3A代谢且浓度升高导致严重事件的药物合用（因为它是强CYP3A抑制剂）。绝对：与强CYP3A诱导剂合用。相对：严重肝损伤（禁用，因为考比司他与肝毒性？）。通常含考比司他的方案禁用于严重肝受损。所以绝对：severe hepatic impairment。"
                  - listitem [ref=e1405]:
                    - paragraph [ref=e1406]: "ibalizumab: 单克隆抗体，静脉注射。禁忌症：对ibalizumab-uiyk或任何辅料严重过敏。没有其他已知绝对禁忌。可能相对：活动性感染？需谨慎。我会列为绝对：prior severe hypersensitivity to ibalizumab. 无其他疾病禁忌。"
                  - listitem [ref=e1407]:
                    - paragraph [ref=e1408]: "immune globulin (IGIV) (intravenous): 禁忌症：对人免疫球蛋白过敏绝对；有抗IgA抗体合并IgA缺乏患者可能过敏，绝对禁忌。严重肾功能不全的相对禁忌，因为产品含蔗糖/麦芽糖可致渗透性肾病。高凝状态、血栓栓塞风险相对。绝对：hypersensitivity to immune globulin, IgA deficiency with antibodies to IgA. 相对：severe renal impairment, pre-existing thrombotic risk factors. 妊娠C。"
                  - listitem [ref=e1409]:
                    - paragraph [ref=e1410]: "fostemsavir: 富马酸福司艾韦？用于多药耐药HIV。禁忌：对fostemsavir过敏绝对。与强CYP3A诱导剂（利福平、卡马西平、圣约翰草等）合用会显著降低temavir（活性代谢物）水平，导致病毒学失败，绝对禁忌。通过CYP3A代谢。所以绝对：coadministration with strong CYP3A inducers。相对：肝毒性？转氨酶升高。"
                  - listitem [ref=e1411]:
                    - paragraph [ref=e1412]: "emtricitabine, lopinavir, ritonavir, and tenofovir: 组合。禁忌：所有成分禁忌汇总。绝对：过敏；严重肝病（洛匹那韦/利托那韦）；药物相互作用（CYP3A底物和诱导剂，洛匹那韦强CYP3A抑制剂，利托那韦也强抑制剂）。绝对：coadministration with drugs highly dependent on CYP3A clearance, strong CYP3A inducers. 替诺福韦肾毒性，相对CrCl < 50。恩曲他滨肾排泄，相对严重肾损伤。所以绝对：hypersensitivity, severe hepatic impairment, coadministration with narrow-therapeutic index CYP3A substrates, strong CYP3A inducers. 相对：severe renal impairment."
                  - listitem [ref=e1413]:
                    - paragraph [ref=e1414]: "emtricitabine, nelfinavir, and tenofovir: 奈非那韦+恩曲他滨+替诺福韦。奈非那韦是蛋白酶抑制剂，禁忌：过敏绝对。药物相互作用：奈非那韦是CYP3A抑制剂，禁忌与高度依赖CYP3A的底物（如阿普唑仑、咪达唑仑、三唑仑、西沙必利、麦角衍生物、辛伐他汀、洛伐他汀、匹莫齐特等）合用。强CYP3A诱导剂禁忌，如利福平（显著降低奈非那韦）。绝对：hypersensitivity, coadministration with CYP3A narrow therapeutic index substrates, strong CYP3A inducers. 替诺福韦相对严重肾损伤。恩曲他滨相对严重肾损伤。相对：severe renal impairment."
                  - listitem [ref=e1415]:
                    - paragraph [ref=e1416]: "cabotegravir: 整合酶抑制剂。绝对禁忌：对卡博特韦过敏。与诱导UGT1A1和CYP3A4的药物合用可能降低卡博特韦浓度，如利福平、利福喷丁、卡马西平、奥卡西平、苯妥英、苯巴比妥，这些都禁忌合用（可能导致耐药），此列在一些指南中有。卡博特韦注射液和口服片，口服片用于导入。绝对禁忌：coadministration with strong inducers of UGT1A1 and CYP3A4 (e.g., rifampicin, carbamazepine, phenytoin). 没有其他疾病禁忌。妊娠N。"
                  - listitem [ref=e1417]:
                    - paragraph [ref=e1418]: doravirine, lamivudine, and tenofovir (same as earlier without fumarate, same). 列出过敏，强CYP3A诱导剂禁忌，相对肾损伤。同14。
                  - listitem [ref=e1419]:
                    - paragraph [ref=e1420]: fostemsavir 同21。
                  - listitem [ref=e1421]:
                    - paragraph [ref=e1422]: "doxylamine (and doxylamine succinate): 抗组胺药，镇静剂。禁忌：绝对：hypersensitivity to doxylamine. 绝对：concomitant use with MAO inhibitors (possible hypertensive crisis, excitation). 哮喘？急性哮喘发作？由于抗胆碱能作用，窄角型青光眼、尿潴留（比如前列腺增生伴尿潴留）禁忌。绝对：narrow-angle glaucoma, urinary retention, severe hypertension? 典型抗组胺药禁忌。一些来源：多西拉敏禁用于新生儿或早产儿？不用于新生儿。哺乳禁忌？哺乳期可能抑制泌乳，相对慎用。也可有相对禁忌：severe hepatic impairment. 绝对：MAO inhibitor use within 14 days, narrow-angle glaucoma, bladder neck obstruction. 哮喘急性发作相对的。加上：peptic ulcer obstructed. 多西拉敏具有抗胆碱能，所以禁忌肠梗阻。我会列出：绝对：hypersensitivity, concurrent MAO inhibitor therapy, angle-closure glaucoma, stenosing peptic ulcer, pyloroduodenal obstruction, bladder neck obstruction. 相对：asthma, hyperthyroidism, cardiovascular disease. 因为多西拉敏常用于妊娠呕吐，妊娠分级B，无禁忌。"
                  - listitem [ref=e1423]:
                    - paragraph [ref=e1424]: "corticotropin: 促皮质素。禁忌：对促皮质素或猪源性蛋白过敏绝对。绝对：系统性真菌感染（因为免疫抑制作用，类似糖皮质激素）。绝对：ocular herpes simplex。绝对：recent administration of live or live-attenuated vaccines。相对：peptic ulcer, congestive heart failure, hypertension, osteoporosis, diabetes, tuberculosis, etc. 这些类似糖皮质激素禁忌。我会列出：absolute: hypersensitivity to corticotropin or porcine proteins, systemic fungal infections, ocular herpes simplex, administration of live vaccines. relative: peptic ulcer, uncontrolled hypertension, congestive heart failure, diabetes, osteoporosis, latent tuberculosis."
                  - listitem [ref=e1425]:
                    - paragraph [ref=e1426]: "dexbrompheniramine: 抗组胺药。禁忌：过敏绝对。MAO抑制剂合并绝对。窄角型青光眼、尿潴留、前列腺增生、幽门十二指肠梗阻绝对。严重高血压？慎用。绝对：hypersensitivity, concurrent MAOI therapy, narrow-angle glaucoma, bladder neck obstruction. 相对：asthma, hyperthyroidism, cardiovascular disease. 妊娠C。"
                  - listitem [ref=e1427]:
                    - paragraph [ref=e1428]: "dexbrompheniramine and phenylephrine: 加上去氧肾上腺素。禁忌：除上述抗组胺禁忌外，去氧肾上腺素是拟交感神经药，禁忌严重高血压、严重冠状动脉疾病、甲亢。绝对：hypersensitivity to components, MAOI therapy, severe hypertension, severe coronary artery disease, narrow-angle glaucoma, urinary retention. 相对：hyperthyroidism, diabetes, prostatic hyperplasia. 去氧肾上腺素也禁忌于10天内使用过MAOIs？绝对。"
                  - listitem [ref=e1429]:
                    - paragraph [ref=e1430]: "donepezil: 胆碱酯酶抑制剂。禁忌症：绝对：对多奈哌齐或哌啶衍生物过敏。绝对：有既往多奈哌齐相关心动过缓和晕厥？不是。相对：病态窦房结综合征、传导阻滞（窦房或房室阻滞）、活动性消化道溃疡、哮喘或阻塞性肺疾病、癫痫史，尿路梗阻。胆碱能作用可加重。绝对：hypersensitivity. absolute? 无其他绝对禁忌。考虑相对。"
                  - listitem [ref=e1431]:
                    - paragraph [ref=e1432]: "etanercept: TNFα抑制剂。禁忌：绝对：败血症或活动性严重感染（包括慢性或局部感染）。绝对：已知对依那西普过敏。相对：脱髓鞘疾病、严重心衰、恶性肿瘤史、活跃结核或潜伏结核未治疗、乙型肝炎复发风险。通常禁用于活动性感染。所以绝对：sepsis, active serious infections (such as tuberculosis, invasive fungal infections, etc.). 相对：demyelinating disorders, heart failure NYHA class III/IV, hepatitis B reactivation, malignancy."
                  - listitem [ref=e1433]:
                    - paragraph [ref=e1434]: "rivastigmine: 胆碱酯酶抑制剂。禁忌：过敏绝对。相对：病窦综合征、传导异常、活动性消化性溃疡、哮喘、癫痫、尿路梗阻等。妊娠B。"
                  - listitem [ref=e1435]:
                    - paragraph [ref=e1436]: "galantamine: 胆碱酯酶抑制剂。禁忌：绝对：过敏。相对：严重肝肾功能不全、病窦、传导阻滞、活动性消化性溃疡、慢阻肺、尿潴留等。"
                  - listitem [ref=e1437]:
                    - paragraph [ref=e1438]: "donepezil and memantine: 组合。多奈哌齐过敏绝对，美金刚过敏绝对。美金刚禁忌：严重肾功能不全（CrCl<30 mL/min 禁用）。美金刚主要经肾排泄。所以绝对：hypersensitivity to donepezil, memantine or any component. 相对：severe renal impairment (memantine). 多奈哌齐的相对禁忌同上。"
                  - listitem [ref=e1439]:
                    - paragraph [ref=e1440]: "vitamin E (tocopherol alpha): 禁忌：对维生素E过敏绝对。相对：长期大量使用可能增加出血风险（特别是与华法林等抗凝药物合用，相对禁忌需监测）。维生素K缺乏者相对。绝对：hypersensitivity to vitamin E. 相对：coagulation disorders or concomitant anticoagulant therapy due to increased bleeding risk (large doses)."
                  - listitem [ref=e1441]:
                    - paragraph [ref=e1442]: "aducanumab: 抗淀粉样蛋白单抗。禁忌：绝对：严重过敏反应史。相对：脑水肿ARIA（淀粉样蛋白相关影像学异常）高风险，可能需监测。有ApoE ε4等位基因增加ARIA风险，但不一定是禁忌。一般说明书：禁用于对aducanumab-avwa过敏严重者。没有绝对疾病禁忌。相对：presence of significant cerebral microhemorrhages or superficial siderosis? 需要。ARIA风险。我能列出：absolute: prior serious hypersensitivity to aducanumab. relative: known apolipoprotein E ε4 homozygotes (increased ARIA risk), recent transient ischemic attacks or stroke."
                  - listitem [ref=e1443]:
                    - paragraph [ref=e1444]: "aspirin (oral): 绝对禁忌：对阿司匹林、其他NSAIDs过敏，特别是阿司匹林加重的呼吸道疾病（AERD）或鼻息肉。绝对：活动性消化性溃疡。绝对：严重肝肾功能衰竭。绝对：出血性疾病（血友病等）。绝对：孕晚期（可能导致早产儿动脉导管早闭，羊水减少等，尽管妊娠分级N，但通常>30周禁忌）。相对：哮喘（部分患者敏感），痛风，与抗凝药合用。列出：absolute: hypersensitivity to aspirin or other NSAIDs, active peptic ulcer, hemorrhagic diathesis, severe renal impairment, severe hepatic impairment, third trimester pregnancy. 相对：asthma, gout, concurrent anticoagulants."
                  - listitem [ref=e1445]:
                    - paragraph [ref=e1446]: "nitroglycerin: 绝对禁忌：过敏。绝对：同时使用PDE5抑制剂（西地那非、他达拉非等）因为严重低血压。绝对：严重贫血？不是绝对。绝对：心包缩窄？不是绝对。禁忌：严重低血压、未矫正的血容量不足、肥厚性梗阻性心肌病？通常禁忌与PDE5抑制剂合用。也禁忌与利奥西呱合用。绝对：concomitant use of PDE5 inhibitors (sildenafil, tadalafil, etc.), riociguat, hypersensitivity. 相对：severe hypotension, hypertrophic obstructive cardiomyopathy, constrictive pericarditis, aortic stenosis."
                  - listitem [ref=e1447]:
                    - paragraph [ref=e1448]: "ranolazine: 禁忌：绝对：肝硬变（Child-Pugh B/C）。绝对：同时使用强CYP3A抑制剂（如酮康唑、克拉霉素、伊曲康唑、蛋白酶抑制剂等）导致雷帕嗪浓度升高。绝对：同时使用CYP3A诱导剂（利福平、卡马西平等）降低浓度。绝对：已知对雷帕嗪过敏。相对：严重肾功能不全（CrCl<30 mL/min），QTc间期延长。所以绝对：severe hepatic impairment (Child-Pugh B and C), coadministration with potent CYP3A inhibitors, coadministration with CYP3A inducers, hypersensitivity. 相对：severe renal impairment (CrCl < 30 mL/min), pre-existing QT prolongation."
                  - listitem [ref=e1449]:
                    - paragraph [ref=e1450]: "metoprolol: 绝对禁忌：过敏。绝对：心源性休克、失代偿性心力衰竭需要静脉正性肌力药物、重度窦性心动过缓、二度或三度房室传导阻滞（无起搏器）。相对：严重周围动脉疾病、支气管哮喘或COPD（β1选择性高，但大剂量可丧失选择性）、变异型心绞痛（普萘洛尔？但美托洛尔可能加重？可能存在冠脉痉挛禁用非选择性β阻滞剂，心脏选择性相对安全）。我会列绝对：severe bradycardia, second- or third-degree AV block without pacemaker, decompensated heart failure, cardiogenic shock, sick sinus syndrome without pacemaker, severe peripheral arterial disease (if gangrene), hypersensitivity. 相对：asthma/COPD, diabetes with hypoglycemia risk, Prinzmetal's angina. 对于metoprolol succinate，相同。"
                - paragraph [ref=e1451]: 现在根据要求输出JSON，每个药物一个对象。要注意generic_name要与输入一致。例如"tenofovir disoproxil", "lopinavir and ritonavir"等。重复的lamivudine and tenofovir与lamivudine and tenofovir (oral route)可以视为同一通用名，但输入里有两者，我可以生成相同的两个对象，或者忽略重复？输入有lamivudine and tenofovir (2次)和lamivudine and tenofovir (oral route)。我将在输出中为每个输入项生成一个条目，即使重复，但禁忌症列表相同。可复制。同样对于doxylamine和doxylamine succinate，维生素E各条目，阿司匹林各条目，都可分别生成相同禁忌症。对于corticotropin等。注意"immune globulin (IGIV) (intravenous)"。ibalizumab和ibalizumab-uiyk一样。fostemsavir和fostemsavir (extended-release tablets)一样。doravirine, lamivudine, and tenofovir， doravirine, lamivudine, and tenofovir disoproxil fumarate 后者多了fumarate，但活性成分相同，禁忌症相同。考比司他单独。等等。
