          - generic [ref=e108]: "请以临床药学专家的身份，评估以下14种疾病的用药推荐是否恰当。对每种疾病，根据推荐药物列表给出APPROPRIATE（恰当）、PARTIALLY（部分恰当）或INAPPROPRIATE（不恰当）评级，并简要说明理由。 请用JSON格式输出结果，格式为： [{\"disease\":\"疾病名\",\"rating\":\"评级\",\"reason\":\"理由\"},...] 疾病与推荐药物： 1. 上呼吸道感染: Amlodipine-Benazepril(氨氯地平-贝那普利), Nicardipine(尼卡地平), Terazosin(特拉唑嗪), Perindopril(培哚普利) 2. 子宫内膜异位症: Medroxyprogesterone(甲羟孕酮), Dexlansoprazole(右兰索拉唑), Norethindrone(炔诺酮), Goserelin(戈舍瑞林) 3. 宫颈炎: Cefoxitin(头孢西丁), Ofloxacin(氧氟沙星), Ampicillin-Sulbactam(氨苄西林舒巴坦), Clindamycin(克林霉素) 4. 干眼症: Fluorometholone(氟米龙), Acetaminophen+Chlorpheniramine+Phenylephrine(对乙酰氨基酚+扑尔敏+去氧肾上腺素), diphenhydramine+phenylephrine(苯海拉明+去氧肾上腺素), ciclesonide nasal(环索奈德鼻用) 5. 强迫症: Escitalopram(艾司西酞普兰), Fluvoxamine(氟伏沙明), Paroxetine(帕罗西汀), Sertraline(舍曲林) 6. 病毒感染: Probenecid(丙磺舒), Tobramycin(妥布霉素), COVID-19疫苗, Varicella Vaccine(水痘疫苗) 7. 月经不调: Etodolac(依托度酸), Ketoprofen(酮洛芬), Mefenemic Acid(甲灭酸), Metformin(二甲双胍) 8. 真菌感染: hydrocortisone+iodoquinol(氢化可的松+碘喹啉), Butoconazole(布康唑), Fluconazole(氟康唑), Terconazole(特康唑) 9. 结肠癌: methotrexate(甲氨蝶呤), Fluorouracil(氟尿嘧啶), methotrexate injection, Aspirin(阿司匹林) 10. 肺纤维化: interferon gamma-1b(干扰素γ-1b), Theophylline(茶碱), formoterol+mometasone(福莫特罗+莫米松), Zileuton(齐留通) 11. 白内障: 无推荐药物(0 recs) 12. 酗酒: Oxazepam(奥沙西泮), Phenobarbital(苯巴比妥), Clorazepate(氯拉西泮), Chlordiazepoxide(氯氮卓) 13. 阴道炎: Butoconazole(布康唑), Metronidazole(甲硝唑), Clindamycin(克林霉素), Tinidazole(替硝唑) 14. 帕金森病: Selegiline(司来吉兰), Orphenadrine(奥芬那君), Clozapine(氯氮平), Amantadine(金刚烷胺)"
