; Norgestimate-Ethinyl Estradiol; sarecycline 疾病: 癫痫 | Clonazepam; Clorazepate; Diazepam; Ethosuximide; Fosphenytoin 疾病: 癫痫发作 | Clonazepam; Clorazepate; Diazepam; Ethosuximide; Fosphenytoin 疾病: 白内障 | Timolol; betaxolol; Brimonidine; Brinzolamide; Latanoprost 疾病: 白血病 | Tretinoin; Folic Acid; Methotrexate; Doxorubicin; Bendamustine 疾病: 皮疹 | Betamethasone; Cetirizine; Desonide; Desoximetasone; Dexamethasone 疾病: 皮肤软组织感染 | Amoxicillin-Clavulanate; Bacitracin; Cefazolin; Cefepime; Cefotaxime 疾病: 盆腔炎 | Cefoxitin; Amikacin; Clindamycin; clindamycin(oral/injection); clindamycin(IM/IV) 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
