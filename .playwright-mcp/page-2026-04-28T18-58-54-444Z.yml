              - paragraph [ref=e364]: 有一些是重复的（如carbinoxamine出现两次，loratadine and pseudoephedrine两次，house dust mite allergen extract两次，brompheniramine and pseudoephedrine和液体形式，chlorpheniramine and pseudoephedrine和液体），但输入列出的每个条目都要输出，即便成分相同。可以保持一致的generic_name并适当区分。
              - paragraph [ref=e365]: 生成禁忌症需要专业知识。限于篇幅，我将为每种药物生成合理的禁忌症列表。注意要求详细、具体。将使用标准临床知识，例如：
              - list [ref=e366]:
                - listitem [ref=e367]:
                  - paragraph [ref=e368]: 抗组胺药（如扑尔敏、苯海拉明、氯雷他定等）的禁忌症：闭角型青光眼、前列腺增生尿潴留、新生儿或早产儿（某些）、严重肝病、MAO抑制剂合用等。
                - listitem [ref=e369]:
                  - paragraph [ref=e370]: 伪麻黄碱等减充血剂：严重高血压、冠心病、甲亢、闭角型青光眼、尿潴留、MAOIs。
                - listitem [ref=e371]:
                  - paragraph [ref=e372]: 鼻用糖皮质激素：局部感染（如鼻部未治疗的感染）、近期鼻部手术或创伤等（相对禁忌），对成分过敏。
                - listitem [ref=e373]:
                  - paragraph [ref=e374]: 组合药物要列出各成分的禁忌症。
                - listitem [ref=e375]:
                  - paragraph [ref=e376]: 口服激素地塞米松：全身真菌感染、未控制的感染、活疫苗等。
                - listitem [ref=e377]:
                  - paragraph [ref=e378]: 利尿剂：呋塞米：无尿、严重电解质紊乱、肝昏迷等。
                - listitem [ref=e379]:
                  - paragraph [ref=e380]: ACEI联用：妊娠绝对禁忌，血管性水肿史，双侧肾动脉狭窄等。
                - listitem [ref=e381]:
                  - paragraph [ref=e382]: 过敏原提取物：严重哮喘、β受体阻滞剂使用（过敏反应风险）、自身免疫性疾病等。
              - paragraph [ref=e383]: 我将为每个药物生成多个禁忌症，包括绝对和相对。
              - paragraph [ref=e384]: 注意妊娠分级：D级（如ACE抑制剂用于妊娠）有证据表明胎儿危害，但某些情况下获益可能大于风险，但通常绝对禁忌，特别是在妊娠中晚期。对于妊娠分级D的药物，如hydrochlorothiazide and lisinopril，通常ACE inhibitors在妊娠是绝对禁忌。我将把妊娠列为absolute。
