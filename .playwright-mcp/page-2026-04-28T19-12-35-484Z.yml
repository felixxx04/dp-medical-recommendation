              - generic [ref=e222]: 已思考（用时 28 秒）
              - img [ref=e224]
            - generic [ref=e230]:
              - paragraph [ref=e231]: 我们被要求以临床药学专家的身份，为给定的每种药物生成完整的禁忌症列表。输出JSON格式。需要涵盖所有列出的药物，注意每个药物的具体成分和组合。需要将禁忌症分类为疾病(disease)、过敏(allergy_type)、生理状态(physiological_condition)、药物类(drug_class)，严重程度分为absolute和relative。对于组合药物，列出每个成分的禁忌症。需要参考妊娠分级，但生理状态禁忌不仅仅是妊娠，还包括哺乳、儿童等。
              - paragraph [ref=e232]: 注意药物列表中有一些重复，比如diltiazem (oral route) 和 diltiazem hydrochloride 可视为同一种药物，但可能有一些细微差别，可以考虑合并，但为了准确，分别列出。还有hydrochlorothiazide and valsartan 与 valsartan and hydrochlorothiazide 等同。我们按要求生成各自的列表，组合药物列出成分禁忌症。
              - paragraph [ref=e233]: 需要仔细考虑每种药物的已知禁忌症。比如：
              - list [ref=e234]:
                - listitem [ref=e235]:
                  - paragraph [ref=e236]: ACEI/ARB：妊娠（D类，绝对禁忌），双侧肾动脉狭窄（绝对），与阿利吉仑在糖尿病患者中合用（绝对），血管性水肿史（绝对），严重肾功能损害（相对），高钾血症（相对）等。
                - listitem [ref=e268]:
                  - paragraph [ref=e269]: 噻嗪类利尿剂：无尿症（绝对），磺胺类药物过敏（相对，因为有些结构类似），严重肾功能损害（如CrCl<30 ml/min, 相对或绝对？通常氢氯噻嗪在严重肾功能不全时无效，相对），低钾血症（相对），高钙血症（相对）等。妊娠早期使用可能相对禁忌，但氢氯噻嗪妊娠B或C？列表中有B和C，组合药物D。一般来说，利尿剂在妊娠期可用于治疗高血压，但优先使用甲基多巴、拉贝洛尔。并非绝对禁忌。
                - listitem [ref=e270]:
                  - paragraph [ref=e271]: 钙通道阻滞剂（CCB）：严重低血压（相对），心源性休克（绝对），急性心肌梗死伴肺水肿（相对），病态窦房结综合征或房室传导阻滞（无起搏器）（维拉帕米/地尔硫卓绝对），严重主动脉瓣狭窄（相对）等。妊娠C类，一般不作为绝对禁忌。对于氨氯地平，心源性休克绝对禁忌，显著主动脉瓣狭窄相对。
                - listitem [ref=e272]:
                  - paragraph [ref=e273]: β阻滞剂：严重心动过缓、二度或三度房室传导阻滞（无起搏器）（绝对），失代偿性心力衰竭（绝对，但卡维地洛等用于心衰不同），心源性休克（绝对），严重外周动脉疾病（相对），支气管哮喘或慢阻肺（相对，非选择性β阻滞剂绝对，选择性相对），糖尿病伴低血糖风险（相对）等。妊娠C类。拉贝洛尔常用于妊娠高血压，相对安全。
                - listitem [ref=e274]:
                  - paragraph [ref=e275]: 可乐定：已知过敏。
                - listitem [ref=e276]:
                  - paragraph [ref=e277]: 阿利吉仑：与ACEI/ARB在糖尿病患者中合用禁忌，妊娠D类绝对禁忌。
                - listitem [ref=e278]:
                  - paragraph [ref=e279]: 螺内酯/阿米洛利：高钾血症（绝对），严重肾功能不全（绝对），Addison病，同时使用其他保钾利尿剂或补钾（相对）等。
                - listitem [ref=e280]:
                  - paragraph [ref=e281]: 甲基多巴：肝脏疾病（活动性肝炎、肝硬化）（绝对），嗜铬细胞瘤（相对？），妊娠B，用于妊娠高血压相对安全。
                - listitem [ref=e282]:
                  - paragraph [ref=e283]: 呋塞米类（托拉塞米）：无尿症（绝对），磺胺过敏（相对），严重电解质紊乱。
                - listitem [ref=e284]:
                  - paragraph [ref=e285]: 塞来昔布：磺胺过敏（绝对），冠状动脉搭桥术围手术期疼痛（绝对），严重心衰（绝对），活动性消化道出血（绝对），严重肝肾功能不全（相对）等。组合药物氨氯地平+塞来昔布，要包含两者的禁忌症。
              - paragraph [ref=e286]: 还要注意一些组合，如hydrochlorothiazide and spironolactone, hydrochlorothiazide and amiloride等。
              - paragraph [ref=e287]: 我们需要输出每个药物及其禁忌症列表，使用generic_name。对于某种药物如“hydrochlorothiazide and valsartan”，generic_name 可为 "hydrochlorothiazide / valsartan" 或直接使用提供的名字。按照输入保持一致。输入列表名称为：“hydrochlorothiazide and valsartan”等。我们使用输入中的名称。
              - paragraph [ref=e288]: 注意：有些药物如“amlodipine, hydrochlorothiazide, and valsartan”是三组分，应列出所有成分禁忌症。
              - paragraph [ref=e289]: 生成JSON时，每种药物对应一个对象，包含“generic_name”和“contraindications”数组。
              - paragraph [ref=e290]: 需要确保禁忌症具体且临床相关。
              - paragraph [ref=e291]: 我将逐个药物生成列表。然后汇总JSON。
              - paragraph [ref=e292]: 开始。
