            - text: "{\"contraindication_name\": \"bilateral renal artery stenosis\", \"contraindication_type\": \"disease\", \"severity\": \"absolute\", \"reason\": \"ARB use in patients with bilateral renal artery stenosis or stenosis of the artery to a solitary kidney may cause acute renal failure.\"},"
