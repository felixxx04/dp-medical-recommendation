        - generic [ref=e100]:
          - generic [ref=e102]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 真菌感染 | hydrocortisone+iodoquinol(topical); Iodoquinol+Hydrocortisone; hydrocortisone+iodoquinol; hydrocortisone+iodoquinol; hydrocortisone+iodochlorhydroxyquin 疾病: 眩晕 | Meclizine; Prochlorperazine; diphenhydramine HCl; dimenhydrinate; Temsirolimus 疾病: 社交焦虑 | Alprazolam; Aripiprazole; Venlafaxine; venlafaxine HCl; Pregabalin 疾病: 神经痛 | Aspirin; Amitriptyline; Baclofen; Carbamazepine; Carisoprodol 疾病: 类风湿关节炎 | Diclofenac; Etodolac; Flurbiprofen; Golimumab; Ibuprofen 疾病: 精神分裂症 | Aripiprazole; Valproic Acid; Brexpiprazole; Reserpine; Quetiapine 疾病: 糖尿病 | Canagliflozin; Colesevelam; teplizumab-mzwv; semaglutide; tirzepatide 疾病: 系统性红斑狼疮 | Hydroxychloroquine; Diclofenac; Prednisolone; Prednisone; Triamcinolone 疾病: 纤维肌痛 | Tapentadol; Amitriptyline; Diclofenac; Cyclobenzaprine; Etodolac 疾病: 细菌性尿路感染 | Amikacin; Fosfomycin; Gentamicin; Phenazopyridine; acetohydroxamic acid 疾病: 细菌性皮肤感染 | Betamethasone; Amoxicillin-Clavulanate; Bacitracin; Cefazolin; Cefepime 疾病: 细菌性结膜炎 | Azithromycin; Bacitracin; Cetirizine; Chloramphenicol; Ciprofloxacin 疾病: 细菌性鼻窦炎 | Amoxicillin; Amoxicillin-Clavulanate; Ampicillin; Azithromycin; Cefaclor 疾病: 细菌感染 | Amikacin; Tobramycin; plazomicin; lefamulin; cefiderocol 疾病: 结肠癌 | methotrexate(injection); Pamidronate; methotrexate(injection/SC); Aspirin; Goserelin 疾病: 结膜炎 | Cetirizine; Azithromycin; Bacitracin; Chloramphenicol; Ciprofloxacin 疾病: 缺铁性贫血 | Ferrous Sulfate; Folic Acid; Epoetin Alfa; Meperidine; Zidovudine 疾病: 老年痴呆 | aducanumab; Lorazepam; vitamin E; vitamin e(oral); Vitamin E Capsules 疾病: 肌肉酸痛 | Aspirin; Tapentadol; Diclofenac; Baclofen; Carisoprodol 疾病: 肝炎 | Tenofovir; Cimetidine; Lamivudine; Sofosbuvir; Telbivudine 疾病: 肝硬化 | torsemide; Cimetidine; hydrochlorothiazide; chlorothiazide; HCTZ+spironolactone 疾病: 肠易激综合征 | Rifaximin; Ciprofloxacin; psyllium; polycarbophil; Polycarbophil Tablets 疾病: 肠炎 | Ciprofloxacin; Lorazepam; Metoclopramide; Metronidazole; Meclizine 疾病: 肥胖 | Pramlintide; Phentermine; Orlistat; setmelanotide; semaglutide 疾病: 肩周炎 | Aspirin; Baclofen; Carisoprodol; Cyclobenzaprine; Diclofenac 疾病: 肺动脉高压 | Amlodipine; Amlodipine-Benazepril; Bosentan; Macitentan; Sildenafil 疾病: 肺栓塞 | Apixaban; Amlodipine; Rivaroxaban; Tenecteplase; Urokinase 疾病: 肺炎 | Amikacin; Amoxicillin; Amoxicillin-Clavulanate; Azithromycin; Cefaclor 疾病: 肺癌 | Methotrexate; Pamidronate; Gemcitabine; Paclitaxel; Pembrolizumab 疾病: 肺纤维化 | interferon gamma-1b; Dexamethasone; Epinephrine; Methylprednisolone; Mometasone 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
