              - paragraph [ref=e382]: 注意区分：ibuprofen 200mg、ibuprofen capsules、ibuprofen oral route都是ibuprofen。naproxen sodium和naproxen可以合并为naproxen。diclofenac potassium, diclofenac oral, 合并为diclofenac (oral)。diclofenac sodium topical, diclofenac gel, diclofenac topical solution 合并为diclofenac (topical)。但是注意diclofenac and misoprostol是口服复方，包括diclofenac和misoprostol，应该单独处理，交互里考虑diclofenac和misoprostol。diclofenac oral单独，但只列口服diclofenac的交互。
              - paragraph [ref=e383]: 另外，diflunisal是水杨酸类NSAID，需要交互。salsalate也是水杨酸类。piroxicam是NSAID。indomethacin是NSAID。
              - paragraph [ref=e384]: 我们必须提供每个药物的major和moderate交互。我会作为临床药学专家，回忆常见的交互。以下是我将生成的药物列表和交互：
              - list [ref=e385]:
                - listitem [ref=e386]:
                  - paragraph [ref=e387]: estradiol and progesterone (sex hormone combination)
                  - list [ref=e388]:
                    - listitem [ref=e389]:
                      - paragraph [ref=e390]: "estradiol: CYP3A4 inducers (降低雌激素效果), CYP3A4 inhibitors (增加雌激素暴露), anticoagulants (雌激素可能改变凝血)，可能影响甲状腺功能测试等。moderate: CYP3A4 inducers like rifampin, carbamazepine, phenytoin, St. John's wort 降低estradiol浓度; CYP3A4 inhibitors like ketoconazole, clarithromycin increase estradiol. 孕激素部分: progesterone可被CYP3A4 metabolized; 诱导剂降低效果。major: 与抗凝剂合用可能增加或减少抗凝作用，但临床上监测INR。与吸烟合用增加心血管风险。也可能与某些药物如拉莫三嗪(lamotrigine)降低lamotrigine浓度。主要的临床重要交互：雌激素+抗凝药: 可能改变凝血因子，虽然通常是降低抗凝效果，但也有增加血栓风险（尤其复方口服避孕药，而这里是激素替代疗法）。hormone replacement therapy: 与warfarin可能有相互作用，需要监测INR。与CYP3A4诱导剂合用会降低hormone疗效，导致潮热等。严重：与CYP3A4诱导剂可能显著降低激素水平，导致治疗失败(主要是中度)。与强效CYP3A4抑制剂会增加雌激素暴露，增加不良反应风险(血栓栓塞)。通常列为moderate。另外与甲状腺激素：雌激素增加甲状腺结合球蛋白，可能需调整左甲状腺素剂量。moderate。所以我们输出major几乎没有，但可以考虑与CYP3A4诱导剂合用降低疗效，可能导致骨质疏松预防失败，可能是moderate。不会列major。"
                - listitem [ref=e391]:
                  - paragraph [ref=e392]: "sumatriptan (all forms): major交互：与MAO inhibitors (特别是MAO-A inhibitors) 合用可显著增加sumatriptan浓度，导致5-HT综合征风险，禁忌。与ergotamines或其他5HT1 agonists (如dihydroergotamine) 合用24小时内增加血管痉挛风险，禁忌。与SSRIs/SNRIs合用增加血清素综合征风险，通常是moderate或major争议，但列为moderate到major，一般临床警告。列出major: MAO inhibitors; other serotonergic drugs (ergotamines, other triptans) within 24h。moderate: SSRIs, SNRIs增加血清素综合征风险。"
                - listitem [ref=e393]:
                  - paragraph [ref=e394]: "zolmitriptan: 类似sumatriptan。MAO inhibitors (MAO-A) 禁忌，因为zolmitriptan代谢通过MAO-A。与其他triptans/ergotamines。SSRIs/SNRIs moderate。"
                - listitem [ref=e395]:
                  - paragraph [ref=e396]: "rimegepant: CGRP拮抗剂，主要为CYP3A4底物，也通转运体。major: 强CYP3A4 inhibitors (如ketoconazole, clarithromycin) 显著增加rimegepant暴露，增加肝毒性风险; 强CYP3A4 inducers (rifampin, carbamazepine) 显著降低浓度导致无效。moderate: 中度CYP3A4抑制剂; 其他CGRP拮抗剂? 但rimegepant与其他gepants不要同时用。主要交互：强CYP3A4 inhibitors 和 inducers。"
                - listitem [ref=e397]:
                  - paragraph [ref=e398]: "lasmiditan: 一类新型抗偏头痛药，5HT1F激动剂，中枢神经系统抑制，导致显著镇静，驾驶危险。代谢不通过CYP450，但是是P-gp底物。主要交互：与酒精、其他CNS抑制剂 (benzodiazepines, opioids) 合用增强镇静; moderate/major: 与其他致CNS抑郁药物合用增加显著镇静和呼吸抑制风险。不与MAOIs有明显交互，但因为有5-HT1F活性，与血清素药物可能有血清素综合征风险，但较低，但仍可列moderate。主要列出：CNS depressants (alcohol, opioids, benzodiazepines, sedating antihistamines) causing profound sedation, impairment. 可谓major或moderate。由于lasmiditan标签警告：可引起显著驾驶障碍，与CNS抑制剂合用增加镇静。我认为列为major: alcohol, CNS depressants。另外，心率减慢：与降低心率的药物（如β-blockers, 地高辛）合用可能增加心动过缓，列为moderate。也可能与P-gp inhibitors有交互。"
                - listitem [ref=e399]:
                  - paragraph [ref=e400]: "acetaminophen, aspirin, and caffeine: 复方，需要分别看三个成分的交互。acetaminophen: major: 与酒精(长期饮酒)增加肝毒性; moderate: warfarin (大剂量acetaminophen可能增加INR)，但通常常规剂量影响小。aspirin: major: 与其他NSAIDs (增加溃疡出血风险), 抗凝药(warfarin, heparin, DOACs)增加出血, 甲氨蝶呤(减少甲氨蝶呤清除导致毒性), 丙戊酸(valproic acid)增加free valproic acid; moderate: 与ACEI/ARB削弱降压并增加肾损伤; 与磺脲类增加低血糖; 皮质类固醇增加溃疡风险。caffeine: moderate: 与CYP1A2抑制剂(如氟伏沙明, 环丙沙星)增加咖啡因浓度引起神经紧张; 与MAOIs可导致高血压危象(咖啡因大量); 与支气管扩张剂如茶碱协同。在复方中，重要的是出血风险(aspirin)，肝毒性(acetaminophen+酒精)，咖啡因的CNS兴奋与一些药物交互。列出major: 抗凝药, 其他NSAIDs, 甲氨蝶呤(低剂量间歇使用可能major), 缬沙坦/ACEIs(削弱降压，急性肾损伤) moderate; 丙戊酸 major出血？一般aspirin与丙戊酸是moderate。我们输出这个复方的交互。"
                - listitem [ref=e401]:
                  - paragraph [ref=e402]: "aspirin, butalbital, and caffeine: butalbital是巴比妥类，强CYP3A4诱导剂，也有其他CYP诱导。所以交互很多。butalbital 是CYP3A4, 2C9, 1A2诱导剂。会降低许多药物浓度。Major: 与hormonal contraceptives (降低避孕效果)，与warfarin (增加代谢降低抗凝，再停用butalbital出血风险)，与很多抗癫痫药、抗抑郁药、免疫抑制剂等。acetaminophen: butalbital诱导可能增加acetaminophen肝毒性代谢产物，增加肝损伤风险，特别与大量acetaminophen合用。实际上aspirin/butalbital/caffeine复方中的acetaminophen? 没有，这个组合是aspirin, butalbital, caffeine，不含acetaminophen。名字只有aspirin, butalbital, caffeine。所以注意，这个组合不含对乙酰氨基酚。所以交互主要是aspirin出血，butalbital诱导代谢。caffeine。对于butalbital，强诱导剂。major: 与warfarin, DOACs, 口服避孕药，抗癫痫药(拉莫三嗪等)，抗反转录病毒药物，免疫抑制剂(环孢素，他克莫司)，钙通道阻滞剂等，因为减少浓度。moderate: 与beta阻滞剂，抗抑郁药等。另外aspirin contribute bleeding risk with anticoagulants. 我们将列出主要交互。"
                - listitem [ref=e403]:
                  - paragraph [ref=e404]: "naproxen and sumatriptan: 复方。交互包括naproxen作为NSAID的交互：抗凝药，其他NSAIDs，甲氨蝶呤，ACEI/ARB，锂，等。sumatriptan交互：MAOIs，其他triptans/ergots，SSRIs。所以结合。列出major: naproxen + warfarin/anticoagulants，naproxen + methotrexate，naproxen + other NSAIDs；sumatriptan + MAOIs, sumatriptan + ergots/other triptans。Moderate: naproxen + ACEIs/ARBs, naproxen + SSRIs (出血风险可能叠加), sumatriptan + SSRIs/SNRIs."
                - listitem [ref=e405]:
                  - paragraph [ref=e406]: "ubrogepant: CGRP拮抗剂，CYP3A4底物，与rimegepant相似。major: 强CYP3A4 inhibitors, inducers; moderate: 中度CYP3A4 inhibitors; 与CGRP单抗？无已知交互。同时不要与其它gepants合用。"
                - listitem [ref=e407]:
                  - paragraph [ref=e408]: "almotriptan: 5HT1B/1D激动剂。代谢: MAO-A和CYP3A4。主要交互：MAOIs (禁忌，增加almotriptan浓度); 其他triptans/ergots; 强CYP3A4 inhibitors (如酮康唑) 中度增加浓度。Moderate: SSRIs/SNRIs血清素综合征。与CYP3A4 inhibitors moderate。Major: MAO inhibitors, ergot derivatives, other triptans within 24h."
                - listitem [ref=e409]:
                  - paragraph [ref=e410]: "methylergonovine: 麦角生物碱，子宫收缩药，CYP3A4底物。major: 强CYP3A4 inhibitors (如HIV蛋白酶抑制剂，大环内酯类，唑类抗真菌药) 会增加麦角中毒风险(vasospasm, ischemia)。与其他麦角类或triptans合用增加血管痉挛。与vasoconstrictors合用。重大交互: 强CYP3A4 inhibitors, 其他ergots, triptans, 拟交感神经药(如多巴胺，肾上腺素)引起严重高血压或缺血。"
                - listitem [ref=e411]:
                  - paragraph [ref=e412]: "dihydroergotamine (DHE): 麦角类，抗偏头痛，CYP3A4底物。major: 强CYP3A4 inhibitors (禁忌，导致危及生命的麦角中毒，如外周缺血); 其他triptans/ergots; 与vasoconstrictors。moderate: 中度CYP3A4 inhibitors; SSRIs (弱，但可能增加血清素综合征风险)。因为是妊娠X，严重的交互包括与强CYP3A4 inhibitors合用极度危险。同样，与一些药物如beta阻滞剂可能增加血管收缩。列出。"
                - listitem [ref=e413]:
                  - paragraph [ref=e414]: "ergotamine and caffeine: 麦角胺，CYP3A4底物，与咖啡因增加吸收。major: 强CYP3A4 inhibitors，如大环内酯类、抗真菌药、蛋白酶抑制剂，导致麦角中毒；与其他triptans, ergots; 与拟交感神经药。同样妊娠X。咖啡因的交互也可提及，但主要麦角胺。"
                - listitem [ref=e415]:
                  - paragraph [ref=e416]: "Acetaminophen, Aspirin, Caffeine, and Salicylamide Tablets: 这个含有salicylamide，是水杨酰胺，类似aspirin，但可能相互作用类似NSAIDs。我们可按照aspirin, acetaminophen, caffeine的交互处理，加上salicylamide可能增加额外的抗凝作用等。基本同acetaminophen, aspirin, and caffeine。"
                - listitem [ref=e417]:
                  - paragraph [ref=e418]: dihydroergotamine mesylate 同dihydroergotamine
                - listitem [ref=e419]:
                  - paragraph [ref=e420]: butalbital, aspirin, and caffeine (同aspirin, butalbital, and caffeine)
                - listitem [ref=e421]:
                  - paragraph [ref=e422]: "acetaminophen and codeine: 可待因为阿片类，前药，通过CYP2D6代谢为吗啡。交互：codeine + CYP2D6 inhibitors (如氟西汀，帕罗西汀，安非他酮) 会减少吗啡生成，减弱镇痛；CYP2D6 inducers? 可能增加转化但不太临床。codeine与其他CNS抑制剂 (酒精，苯二氮卓类，其他阿片类) 导致过度CNS抑郁，呼吸抑制，表现为major。acetaminophen: 酒精增加肝毒性；抗凝剂(warfarin) 长期大剂量acetaminophen可能增加INR。所以：major - CNS depressants (alcohol, benzodiazepines, other opioids, sedatives) 合用增加呼吸抑制、镇静、死亡风险。Moderate - CYP2D6 inhibitors减弱镇痛效果；抗凝剂(INR升高风险)。对乙酰氨基酚的肝毒性与酒精 interaction major。"
                - listitem [ref=e423]:
                  - paragraph [ref=e424]: "chondroitin and glucosamine (及含MSM变体): 营养保健品，主要交互：与抗凝药/抗血小板药 (warfarin, aspirin, clopidogrel) 可能增加出血风险，因为硫酸软骨素结构与肝素类似，有轻微抗凝作用。葡糖胺可能影响胰岛素敏感性，与抗糖尿病药合用需监测血糖。常用major: anticoagulants (warfarin) 可能增加INR，有出血报道。Moderate: antiplatelet drugs, diabetes medications."
                - listitem [ref=e425]:
                  - paragraph [ref=e426]: "diclofenac topical: 局部用双氯芬酸，全身吸收低，交互有限。但仍可能：理论上与抗凝药联用增加出血风险(因吸收少，通常无临床意义)，但高剂量大面积使用可能增加全身暴露。根据FDA标签，外用双氯芬酸与口服抗凝药、阿司匹林等合用应该注意出血。列为moderate: anticoagulants, aspirin。由于吸收低，一般没有major交互。但我们可以列出moderate: 与抗凝剂和抗血小板药物。另外与其它NSAIDs（包括低剂量阿司匹林）合用增加不良反应风险。moderate即可。"
                - listitem [ref=e427]:
                  - paragraph [ref=e428]: "diclofenac and misoprostol: 含有双氯芬酸和米索前列醇。双氯芬酸交互同其他口服NSAID：抗凝药，甲氨蝶呤，锂，ACEI/ARB，其他NSAIDs，皮质类固醇等。米索前列醇是前列腺素类似物，可引起腹泻，与含镁抗酸剂合用可能加重腹泻。无严重交互。可列出双氯芬酸的交互。"
                - listitem [ref=e429]:
                  - paragraph [ref=e430]: "ibuprofen (oral): 非选择性NSAID。major: 抗凝药(华法林，DOACs)增加出血，其他NSAIDs（包括阿司匹林）增加溃疡和出血，甲氨蝶呤（增加甲氨蝶呤毒性），锂（增加锂水平）。moderate: ACEI/ARB降低降压效果，肾功能恶化；选择性5-羟色胺再摄取抑制剂(SSRIs)增加出血风险; 皮质类固醇增加胃肠道溃疡风险；利尿剂降低效果；环孢素增加肾毒性。"
                - listitem [ref=e431]:
                  - paragraph [ref=e432]: "esomeprazole and naproxen: 含有埃索美拉唑(PPI)和萘普生。PPI 埃索美拉唑：主要CYP2C19代谢，CYP3A4 secondary。交互：与氯吡格雷（通过CYP2C19），PPI降低氯吡格雷活性代谢物，可能降低抗血小板作用，FDA警告major或moderate; 与甲氨蝶呤(大剂量) 减少甲氨蝶呤清除，增加毒性; 与抗真菌药(伊曲康唑，酮康唑)降低吸收；与利福平降低PPI效果。naproxen交互同NSAID。综合后，major: 与氯吡格雷合用可能降低氯吡格雷效果(许多国家警告，但争议)。与甲氨蝶呤(尤其是大剂量)。与抗凝药(naproxen)。moderate: 其他NSAIDs，SSRIs，皮质类固醇。所以我们为复方列出交互。"
                - listitem [ref=e433]:
                  - paragraph [ref=e434]: "diclofenac (oral): 同其它NSAID，major：抗凝药，甲氨蝶呤，其他NSAIDs。moderate: ACEI/ARBs, 锂, SSRIs, 皮质类固醇, 环孢素。"
                - listitem [ref=e435]:
                  - paragraph [ref=e436]: "indomethacin: NSAID，类似的交互，但可能还有与丙磺舒(增加indomethacin浓度)，与利尿剂等。major: anticoagulants, methotrexate, other NSAIDs。moderate: ACEI/ARBs, lithium, SSRIs, probenecid (增加 indomethacin 水平)，皮质类固醇。"
                - listitem [ref=e437]:
                  - paragraph [ref=e438]: "famotidine and ibuprofen: 含有法莫替丁(H2 antagonist)和布洛芬。法莫替丁：主要经肾排泄，少量CYP。交互：可降低酮康唑、伊曲康唑等需酸性环境药物吸收；与抗酸剂减少法莫替丁吸收。布洛芬交互如上。major: ibuprofen related: anticoagulants, methotrexate. Moderate: antiplatelets, SSRIs, ACEIs, ARBs. 可能法莫替丁与头孢类? 无。列出复方交互。"
                - listitem [ref=e439]:
                  - paragraph [ref=e440]: "naproxen (oral): 交互类似ibuprofen。major: anticoagulants, methotrexate, other NSAIDs; moderate: ACEI/ARB, SSRIs, lithium, corticosteroids, etc. 注意萘普生对血小板抑制持续时间长，可能与抗凝药有显著出血风险。"
                - listitem [ref=e441]:
                  - paragraph [ref=e442]: "diflunisal: 水杨酸类NSAID，交互还包括与抗酸药(降低diflunisal), 与acetaminophen(可能竞争代谢？不常见)。其实diflunisal是salicylic acid derivative, 高剂量时有urate lowering effect, 所以与抗痛风药? 不主要。主要交互：抗凝药(warfarin)，diflunisal增加PT; 甲氨蝶呤增加毒性；其他NSAIDs增加溃疡。中度: ACEIs, ARBs, 锂。"
                - listitem [ref=e443]:
                  - paragraph [ref=e444]: "piroxicam: 长效NSAID，交互类似，major: anticoagulants, methotrexate; moderate: ACEI/ARB, SSRIs, lithium, corticosteroids."
                - listitem [ref=e445]:
                  - paragraph [ref=e446]: "salsalate: 水杨酸前药，不抑制血小板聚集如阿司匹林，但高剂量仍有溃疡风险。交互：抗凝药(加强抗凝)，甲氨蝶呤(减少清除)，磺脲类降糖药(水杨酸类增加降糖)，皮质类固醇增加水杨酸清除。moderate: ACEI/ARB。我们列出。"
              - paragraph [ref=e447]: 最后，注意一些复方重复，我们可以合并为共同的generic_name。例如“aspirin, butalbital, and caffeine”，“butalbital, aspirin, and caffeine”是一样的，可以用一个名“butalbital, aspirin, and caffeine”。Acetaminophen, Aspirin, Caffeine, and Salicylamide Tablets和Acetaminophen, Aspirin, and Caffeine Tablets不同，需要区分。输入中出现了“acetaminophen, aspirin, and caffeine”和“Acetaminophen, Aspirin, and Caffeine Tablets”、“Acetaminophen, Aspirin, and Caffeine Powder Packet”为同一组合，可统一为“acetaminophen, aspirin, and caffeine”。另外有一个“Acetaminophen, Aspirin, Caffeine, and Salicylamide Tablets”，需要单独。还有“caffeine and ergotamine (oral/rectal)”、“ergotamine and caffeine (oral route)”、“Ergotamine and Caffeine Suppositories”合并为“ergotamine and caffeine”。dihydroergotamine (nasal), (injection), dihydroergotamine mesylate 合并为“dihydroergotamine”。sumatriptan (injection), (oral/nasal), (nasal route) 合并为“sumatriptan”。lasmiditan和Reyvow合并为“lasmiditan”。ubrogepant和Ubrelvy合并。ibuprofen (oral route), Ibuprofen Capsules, ibuprofen 200mg 合并为“ibuprofen”。diclofenac topical, Diclofenac Gel (1%), diclofenac sodium, Diclofenac Topical Solution 合并为“diclofenac (topical)”。口服diclofenac包括diclofenac (oral route), dicLofenac potassium，合并为“diclofenac (oral)”。注意diclofenac and misoprostol另算。naproxen (oral route), naproxen sodium, nproxen sodium (typo) 合并为“naproxen”。diflunisal和diflunisal (oral route)合并。chondroitin and glucosamine, chondroitin, glucosamine, and MSM，需要区分？可列出两个条目，但MSM的添加影响不大，但可以合并成一个chondroitin + glucosamine的组合，包括含MSM的。其实输入有两个：chondroitin and glucosamine，和chondroitin, glucosamine, and methylsulfonylmethane (MSM)，交互可能类似，但MSM可能也有轻微抗炎、抗凝风险。我们分别列出？最好分开，因为成分不同。可以列出“chondroitin and glucosamine”和“chondroitin, glucosamine, and MSM”。acetaminophen and codeine单独。methylergonovine单独。almotriptan单独。rimegepant单独。zolmitriptan单独。lasmiditan单独。estradiol and progesterone单独。esomeprazole and naproxen单独。famotidine and ibuprofen单独。naproxen and sumatriptan单独。piroxicam单独。salsalate单独。indomethacin单独。diflunisal单独。
