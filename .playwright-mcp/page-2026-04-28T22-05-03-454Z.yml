            - paragraph [ref=e136]: 我们需要生成一个JSON，列出每种药物的交互。输入药物列表中有许多重复和不同剂型（口服 vs 外用，组合药物等）。要求是“为以下每种药物生成重要的药物交互(interactions)列表”。由于有很多重复药物（如 isotretinoin oral, ISOtretinoin systemic 等），需归类。最终输出应该包括所有提到的药物（以generic_name区分，但注意口服与外用可能不同）。需求里说“对于组合药物,列出每个成分的交互”。所以组合药物如 sulfamethoxazole and trimethoprim，需要分别列出两种成分的交互？还是列出组合药物作为一个整体？提示说“对于组合药物,列出每个成分的交互”，可能意味着：在 interactions 数组中，它可能是作为一个条目，drug_a 是组合药物名，然后列出交互；或者分别以每个成分列出。但 JSON 格式例子只给了单个药物 generic_name 如 Isotretinoin，interactions 里 drug_a 是 "isotretinoin"。可能需要对于组合药物，将其作为一种药物，其交互是基于组成，且可列出主要成分的交互。我可以这样处理：针对每一个 unique generic name (或处方名)，生成交互列表。输入药物列表中有很多重复（如 doxycycline oral route, Doxycycline Tablets and Capsules, Doxycycline Injection），可以合并为 Doxycycline (systemic) oral/injection 吗？需要区分剂型吗？系统用药和局部用药交互不同。topical 通常全身吸收极少，交互较少，可能只有局部刺激或与其他外用产品相互作用。但问题要求“优先列出与常见药物类的交互(抗凝药、抗抑郁药、抗真菌药、抗酸药等)”，主要是口服系统性药物。对于外用维A酸、克林霉素、过氧化苯甲酰等，可能只有 minor 或没有临床意义的交互。要求只列出 major 和 moderate，且具有临床意义。那么外用药如 tretinoin topical, adapalene topical, benzoyl peroxide topical, clindamycin topical, erythromycin topical, dapsone topical, azelaic acid topical, salicylic acid topical, sulfur/sulfacetamide topical, minocycline topical 等，通常没有显著的全身药物相互作用，可跳过？但可能和其他外用药一起使用导致过度刺激等，这不属于传统药物相互作用分类，可能只是局部不良反应。不过权威数据库可能列出与局部维A酸同时使用的其他局部痤疮药物导致刺激增加（moderate）。也许可以列出一些 moderate 交互：如 tretinoin topical 与 benzoyl peroxide 同时使用可能降低疗效或增加刺激；与局部抗生素无显著交互。再查一下：tretinoin 遇 benzoyl peroxide 氧化失活，所以不应同时使用，这算 moderate interaction (降低疗效)。adapalene 更稳定，可与过氧化苯甲酰同时使用（实际上有组合产品 adapalene/benzoyl peroxide，所以无此交互）。对于组合药物 adapalene and benzoyl peroxide topical，其交互要列出每个成分的交互？既然已经是组合，可能单独列出 adapalene 交互、benzoyl peroxide 交互；但组合药物作为 generic_name "adapalene and benzoyl peroxide"，可以列出 moderate 交互如同时使用其他外用维A酸导致刺激。但最好简化。
            - paragraph [ref=e168]: 主要需要关注系统性药物：isotretinoin (口服), sulfamethoxazole/trimethoprim (口服/注射), doxycycline (口服/注射), minocycline (口服), tetracycline hydrochloride (口服), drospirenone/ethinyl estradiol (口服避孕药), ethinyl estradiol/norgestimate (口服避孕药), sarecycline (口服四环素类)。还有外用抗生素如 retapamulin (外用)，但那是治疗脓疱疮的，不属于痤疮系统用药，交互很少。
