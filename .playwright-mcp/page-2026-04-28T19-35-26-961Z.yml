            - generic [ref=e234]:
              - paragraph [ref=e235]: 我们被要求以临床药学专家的身份，为每种药物生成完整的禁忌症列表。需要按指定JSON格式输出。注意：只输出JSON，不要解释文本。输入药物列表提供了药品通用名、类别、适应症、妊娠分级。我们需要根据药理知识列出禁忌症，分为disease, allergy_type, physiological_condition, drug_class，严重程度absolute/relative。注意组合药物的每个成分禁忌。注意不要过于笼统。
              - paragraph [ref=e236]: 将从estradiol and progesterone开始，逐个分析。可能需要注意一些隐含禁忌：比如偏头痛药物（曲普坦类）禁忌于心血管疾病（冠心病、脑血管病、未控制的高血压等）；ergot类禁忌于心血管病、怀孕等；NSAIDs禁忌于严重肾损害、消化道溃疡、出血、过敏、哮喘等；对乙酰氨基酚禁忌于严重肝病；咖啡因组合；妊娠分级：X意味着绝对禁忌怀孕；C、D等也需考虑。我将依据标准临床药理学。
              - paragraph [ref=e268]: 输出为JSON数组，每个元素含generic_name 和 contraindications列表。
              - paragraph [ref=e269]: 现在开始逐药分析：
              - list [ref=e270]:
                - listitem [ref=e271]:
                  - paragraph [ref=e272]:
                    - text: "estradiol and progesterone (Sex hormone combinations, 适应症: menopausal symptoms|postmenopausal osteoporosis, 妊娠分级: N)"
                    - text: 注意：妊娠分级N表示未分类。绝对禁忌：怀孕(生理状态，由于激素可能影响胎儿)；已知或怀疑的乳腺癌(疾病，激素受体阳性肿瘤)；雌激素依赖性肿瘤(如子宫内膜癌)；未确诊的阴道出血；活动性深静脉血栓、肺栓塞或病史；活动性或近期动脉血栓栓塞疾病(如中风、心肌梗死)；肝功能障碍或疾病；蛋白C、蛋白S或抗凝血酶缺乏等。相对禁忌症：偏头痛伴先兆；高甘油三酯血症；胆囊疾病等等。组合药物中的雌激素为雌二醇，孕酮为孕激素。禁忌包括过敏。将列出。
                - listitem [ref=e273]:
                  - paragraph [ref=e274]: "sumatriptan (injection) - Antimigraine agents, 适应症: migraine|cluster headache, 妊娠分级: C. 禁忌：缺血性心脏病(疾病，绝对)；冠状动脉痉挛(变异型心绞痛)；脑血管综合征(如中风、TIA)；外周血管疾病；未控制的高血压；严重肝功能损害；同时使用MAO抑制剂或使用后2周内；24小时内使用其他曲普坦类或麦角类药物；偏瘫或基底型偏头痛；对舒马普坦过敏。相对禁忌：存在心血管危险因素但未确诊冠心病；轻度肝功能受损；妊娠C级需评估。sumatriptan注射、口服鼻用等类似。"
                - listitem [ref=e275]:
