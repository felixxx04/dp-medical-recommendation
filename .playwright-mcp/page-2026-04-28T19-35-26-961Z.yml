              - paragraph [ref=e374]: rimegepant 和 ubrogepant 的禁忌包括与强CYP3A4抑制剂同用为绝对禁忌吗？根据Ubrelvy处方信息，禁忌：与强CYP3A4抑制剂同时使用。所以是绝对禁忌。而rimegepant，单次75mg，与强CYP3A4抑制剂使用避免，但可视为禁忌或相对。按照Nurtec ODT标签，禁忌症包括：对本产品过敏；与强CYP3A4抑制剂同时使用（增加rimegepant暴露）。还有严重肝病（Child-Pugh C）应避免。我会列出。
              - paragraph [ref=e375]: lasmiditan：禁忌过敏，重度肝功能损害（Child-Pugh C）为相对或绝对？在标签中，未列为禁忌，但是警告重度肝损害增加暴露。严重的肝受损作为相对禁忌。同时，由于lasmiditan有显著驾驶损伤，可能不直接列为禁忌，但可以在禁用情况下加“activities requiring mental alertness”作为相对。我会列出：severe hepatic impairment (relative)，以及使用后8小时内驾驶或操作机械为相对禁忌。
              - paragraph [ref=e376]: butalbital组合：butalbital有滥用、依赖，可能导致药物诱导头痛。绝对禁忌：卟啉症；严重肝功能不全；严重呼吸障碍。过敏等。
              - paragraph [ref=e377]: "methylergonovine: 绝对禁忌怀孕(未到分娩产后)；高血压；先兆子痫/子痫；外周血管病；缺血性心脏病。过敏。"
              - paragraph [ref=e378]: "对dihydroergotamine: 强CYP3A4抑制剂（包括大环内酯类、唑类抗真菌药、蛋白酶抑制剂等）是绝对禁忌，为了避免麦角中毒。列出。"
