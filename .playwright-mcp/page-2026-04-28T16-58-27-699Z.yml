            - generic [ref=e213]:
              - paragraph [ref=e214]: 我们被要求输出JSON格式的禁忌症列表。需要为每个药物生成完整的禁忌症列表，包括绝对和相对禁忌症，禁忌症类型分为disease, allergy_type, physiological_condition, drug_class，严重程度absolute/relative。输入药物很多，包括抗肿瘤药物、降脂药、上呼吸道组合药物等。必须输出JSON。
              - paragraph [ref=e215]: 注意：有些药物是组合药物，需列出每个成分的禁忌症，但也要整合成一个药物的禁忌症列表。题目要求：“对于组合药物,列出每个成分的禁忌症”，可能意味着将各成分的禁忌症合并列出，可以标记成分来源，但JSON结构中没有要求标注成分，所以我们可以直接列出所有禁忌症，reason中可说明是来自哪个成分。不过JSON结构是每个药物一个对象，contraindications数组，每个包含contraindication_name, contraindication_type, severity, reason。对于组合药，我们可以综合所有成分的禁忌症。
              - paragraph [ref=e216]: 此外，适应症可以帮助推断禁忌症（例如高血压药禁忌低血压）。妊娠分级提供了生理状态禁忌信息。需要具体临床相关。
              - paragraph [ref=e248]: 我们将逐个分析药物，并生成禁忌症。由于输出为JSON，我将直接输出最终JSON。
              - paragraph [ref=e249]: 首先，整理药物列表，去重？有重复的如carboplatin和chlorambucil只出现一次？输入列表中有：carboplatin, chlorambucil (出现了两次，但品牌不同，一个是generic chlorambucil，一个是Leukeran，内容一样，可以合并处理，在contraindications中应该一致。fluorouracil (injection), etoposide (oral), cyclophosphamide (oral/injection), etoposide phosphate, etoposide (injection), topotecan (oral/injection), fludarabine (injection)。抗肿瘤药大多有骨髓抑制、感染、出血、肝肾功能损伤、妊娠D等禁忌。须注意每种药的特别禁忌，如卡铂有严重骨髓抑制、过敏，顺铂过敏史等；苯丁酸氮芥有耐药性、过敏。根据药理学知识。
              - paragraph [ref=e250]: 降脂药：atorvastatin, evolocumab, alirocumab, rosuvastatin, ezetimibe and simvastatin, niacin, fenofibric acid, niacin (oral route), simvastatin oral suspension, mycophenolate mofetil (注意这是免疫抑制剂，但输入在降脂药组合中？实际上在列表中mycophenolate mofetil出现，可能放错位置？不管它，按照输入列表顺序处理，但mycophenolate是免疫抑制剂，有特定禁忌。还有ezetimibe and rosuvastatin, inclisiran, lomitapide, ezetimibe and atorvastatin。这些降脂药，statins有肝病、妊娠X、哺乳等禁忌；PCSK9抑制剂过敏；依折麦布禁忌；烟酸有肝病、溃疡、痛风等；非诺贝特酸有肝胆疾病、严重肾损伤等；lomitapide有肝毒性、妊娠X等；inclisiran主要是过敏。
              - paragraph [ref=e251]: 上呼吸道组合药物：很多，成分包括acetaminophen, dextromethorphan, doxylamine, pseudoephedrine, chlorpheniramine, diphenhydramine, guaifenesin, phenylephrine, codeine, promethazine, ephedrine, triprolidine, hydrocodone等。需要列出各成分的禁忌症并整合。例如对乙酰氨基酚：严重肝损伤、过敏；右美沙芬：MAO抑制剂、严重高血压、咳嗽有痰等；多西拉敏：抗组胺药禁忌，如哮喘、窄角型青光眼、前列腺增生、哺乳等；伪麻黄碱/去氧肾上腺素：严重高血压、冠脉疾病、MAO抑制剂、甲亢、窄角型青光眼等；氯苯那敏/苯海拉明：新生儿、哺乳、哮喘、窄角型青光眼、前列腺增生、MAO抑制剂；愈创甘油醚：无特殊禁忌；可待因：呼吸抑制、儿童、MAO抑制剂、哮喘、头颅损伤等；曲普利啶：抗组胺药禁忌；氢可酮：阿片类禁忌；麻黄碱：类似伪麻黄碱。需要合理组合。妊娠分级N表示未分类，但应避免不必要用药。总之，生成列表。
