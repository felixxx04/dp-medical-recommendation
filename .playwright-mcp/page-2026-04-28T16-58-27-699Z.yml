              - paragraph [ref=e356]: 要为所有这些生成。由于数量多，需合理生成精简且准确的禁忌症。我将为每个创建JSON对象，必须按原generic_name。
              - paragraph [ref=e357]: 我会用专业知识。确保严重程度恰当。禁忌症理由要简洁。
              - paragraph [ref=e358]: 现在逐一生成了。考虑卡铂：禁忌症包括：对卡铂或其他含铂化合物过敏（allergy, absolute）；严重骨髓抑制（disease, absolute）；严重肾功能损伤（disease, relative，因主要经肾排泄，需调整剂量，若Ccr<20 mL/min可能绝对禁忌？说明书通常列为禁忌：严重骨髓抑制，对卡铂或顺铂过敏，严重出血。妊娠D，哺乳禁用。相对禁忌：肾功能不全、听力损伤等。我将列出：对铂类药物过敏（absolute）；严重骨髓抑制（absolute）；严重肾功能不全（e.g. CrCl < 20 mL/min）（absolute，应避免使用）；妊娠（absolute）；哺乳期（absolute）；合并使用活疫苗（relative，免疫抑制）。等等。
              - paragraph [ref=e359]: chlorambucil：过敏，严重骨髓抑制，严重肝损伤，妊娠D，哺乳，活疫苗，可能耐药性。绝对禁忌：对苯丁酸氮芥过敏；妊娠；哺乳。相对禁忌：肾功能不全（尚可），肝损伤，骨髓抑制，感染，既往放疗或化疗导致骨髓储备差。也注意致突变。
              - paragraph [ref=e360]: fluorouracil：禁忌症：对氟尿嘧啶过敏；严重骨髓抑制；严重感染；营养不良；妊娠D；哺乳；DPD酶缺乏（dihydropyrimidine dehydrogenase deficiency）是绝对禁忌，因为这会导致严重毒性。所以DPD缺乏必须绝对禁忌。相对禁忌：肝功能不全，肾功能不全，心脏疾病（可能心脏毒性），曾用放疗等。
              - paragraph [ref=e361]: etoposide：过敏，严重骨髓抑制，妊娠D，哺乳，严重肝肾功能不全（相对），同时接种黄热病疫苗（禁忌）。绝对：过敏，严重骨髓抑制，妊娠，哺乳。相对：肝肾功能不全。
              - paragraph [ref=e362]: cyclophosphamide：过敏，严重骨髓抑制，出血性膀胱炎（相对），妊娠D，哺乳，严重肝肾功能不全。也要注意尿路梗阻。
              - paragraph [ref=e363]: etoposide phosphate：同etoposide，再加磷酸盐过敏等。
              - paragraph [ref=e364]: topotecan：过敏，严重骨髓抑制（绝对），妊娠D，哺乳，严重肾功能不全（CrCl <20 mL/min绝对？）。相对：中度肾功能不全需减量。
              - paragraph [ref=e365]: fludarabine：过敏，严重骨髓抑制，妊娠D，哺乳，严重肾功能不全（Ccr <30 mL/min相对吗？说明书绝对禁忌：对fludarabine过敏，严重肾功能不全，失代偿性溶血性贫血？fludarabine可致自身免疫性溶血，所以既往有溶血性贫血反应绝对禁忌。妊娠，哺乳也绝对。相对：肝损伤，感染。
              - paragraph [ref=e366]:
                - text: 降脂药：
                - text: atorvastatin：禁忌：活动性肝病或不明原因转氨酶持续升高（absolute）；妊娠X（absolute）；哺乳（absolute）；同时使用某些CYP3A4强抑制剂如环孢素、克拉霉素等（relative，增加肌病风险，部分为禁忌或最大剂量限制）；过敏。相对：严重肾功能不全，既往他汀不耐受，甲状腺功能减退等。
              - paragraph [ref=e367]: evolocumab：过敏（absolute，含天然胶乳可能过敏）。妊娠N，动物无害，相对避免。无绝对疾病禁忌。但相对：严重肝肾功能不全无数据。
              - paragraph [ref=e368]: alirocumab：类似。
              - paragraph [ref=e369]: rosuvastatin：活动性肝病，妊娠X，哺乳，严重肾功能不全（CrCl<30 mL/min绝对禁忌吗？说明书对于某些剂量禁忌），对本品过敏。相对：亚裔人群可能血药浓度升高，需低剂量；易患肌病/横纹肌溶解的情况。
              - paragraph [ref=e370]: ezetimibe and simvastatin：禁忌为各成分的禁忌。依折麦布：过敏，活动性肝病，与fibrates联用（相对），妊娠X因simvastatin。所以组合禁忌：活动性肝病或转氨酶持续升高；妊娠；哺乳；同时使用强CYP3A4抑制剂（如伊曲康唑，酮康唑，红霉素，克拉霉素，蛋白酶抑制剂等）；对任何成分过敏。相对：严重肾功能不全（simvastatin），fibrates联用，华法林等。
              - paragraph [ref=e371]: niacin：绝对禁忌：活动性肝病或不明原因的转氨酶升高，活动性消化性溃疡，动脉出血。妊娠C，相对。过敏。相对：糖尿病（可升高血糖），痛风，不稳定心绞痛，冠心病急性期（可能不适合）。由于可能潮红，但非禁忌。
              - paragraph [ref=e372]: fenofibric acid：绝对禁忌：活动性肝病（包括胆汁性肝硬化），严重肾功能不全（包括透析），已知对fenofibrate过敏，胆囊疾病。妊娠C，哺乳禁忌。相对：肾功能轻中度不全需减量，与statins联用增加肌病风险。
              - paragraph [ref=e373]: niacin (oral route)：同上。
              - paragraph [ref=e374]: Simvastatin Oral Suspension：同simvastatin，禁忌：活动性肝病，妊娠X，哺乳，与强CYP3A4抑制剂同时使用，过敏。
              - paragraph [ref=e375]: mycophenolate mofetil：免疫抑制剂。绝对禁忌：过敏，妊娠D（致畸，必须避孕），哺乳。相对：严重消化道疾病（胃溃疡），肝肾功能不全，骨髓抑制，免疫缺陷患者，感染。
              - paragraph [ref=e376]: "ezetimibe and rosuvastatin：禁忌：活动性肝病，妊娠（rosuvastatin为X？不，rosuvastatin妊娠X，ezetimibe妊娠C，组合产品妊娠禁忌？列出组合药物的适应证，妊娠分级N？输入“ezetimibe and rosuvastatin”妊娠分级: N，实际上Rosuvastatin是X，但组合药可能没有正式分级，但基于成分应禁忌。所以绝对禁忌：活动性肝病，妊娠（绝对避免），哺乳。过敏。相对：肾功能不全，肌病风险。"
              - paragraph [ref=e377]: inclisiran：PCSK9抑制剂小干扰RNA。禁忌：对inclisiran过敏。妊娠N，相对避免。无严重疾病禁忌。
              - paragraph [ref=e378]: lomitapide：绝对禁忌：妊娠X，肝功能不全（中重度），同时使用强/中CYP3A4抑制剂（增加lomitapide浓度，导致肝毒性），过敏。相对：轻度肝损伤，心血管疾病等。
              - paragraph [ref=e379]: ezetimibe and atorvastatin：妊娠X（由atorvastatin决定），活动性肝病，哺乳，过敏。强CYP3A4抑制剂等。
              - paragraph [ref=e380]: 上呼吸道组合药物：需要整合。我将为每个组合列出关键禁忌症：主要成分的绝对禁忌症：MAO抑制剂使用（14天内）是多种成分的绝对禁忌（拟交感胺类、阿片类、右美沙芬）。严重高血压、冠心病等禁用拟交感胺。窄角型青光眼禁用抗组胺药和抗胆碱药。尿潴留/前列腺增生禁用抗组胺。消化性溃疡慎用抗组胺。呼吸抑制/哮喘禁用阿片类（可待因、氢可酮）。严重肝病禁用对乙氨基酚（过量风险，但治疗剂量下非绝对禁忌，除非肝功能衰竭，可列为相对禁忌：严重肝损伤或活动性肝病）。酒精使用增加肝毒性。对于含有doxylamine, diphenhydramine, chlorpheniramine等镇静抗组胺，禁忌从事驾驶等，但属警告。我们只列医学禁忌症。拟交感胺如伪麻黄碱、去氧肾上腺素、麻黄碱禁忌：MAO抑制剂、严重高血压、严重冠状动脉疾病、甲亢、窄角型青光眼。右美沙芬：MAO抑制剂（绝对禁忌），同时有痰多的咳嗽相对不宜用？可列为相对禁忌：慢性咳嗽或排痰性咳嗽。可待因/氢可酮：绝对禁忌包括MAO抑制剂，严重呼吸抑制，急性或严重支气管哮喘，已知对阿片类过敏，肠梗阻。小儿扁桃体切除术后（可待因禁忌于儿童，对12岁以下儿童应为绝对禁忌，在某些国家）。愈创甘油醚：无绝对禁忌。对乙酰氨基酚：已知过敏，严重肝损伤（绝对）。doxylamine：同其他乙醇胺类抗组胺药，绝对禁用于新生儿或早产儿，哺乳（因可致婴儿镇静），MAO抑制剂延长作用，窄角型青光眼，前列腺增生引起的尿潴留。氨酚那敏：类似。苯海拉明：类似，并且作为抗胆碱能药物禁用于新生儿、哺乳，以及下呼吸道疾病包括哮喘急性发作（相对），窄角型青光眼，前列腺增生。promethazine：吩噻嗪类，绝对禁忌包括对吩噻嗪类过敏，新生儿，哺乳，昏迷，中枢神经系统抑制，窄角型青光眼，前列腺增生，尤其在小于2岁儿童中可能引起严重呼吸抑制（绝对禁忌于2岁以下）。曲普利啶：烷基胺类抗组胺药，禁忌类似，新生儿/早产儿，哺乳，MAO抑制剂，窄角型青光眼，前列腺增生。氢可酮：阿片类，绝对禁忌 MAO抑制剂，严重呼吸抑制，哮喘，肠梗阻，过敏。儿童禁忌。等等。
              - paragraph [ref=e381]: 我将构建每个组合的具体禁忌症列表，需要适当整合成分禁忌，严重程度。对一些组合，还要注意饮酒禁忌（如对乙酰氨基酚），但可能列为相对。
              - paragraph [ref=e382]: 外用camphor, eucalyptus, menthol：禁忌：过敏，皮肤破损或炎症，新生儿/婴幼儿（不能涂抹于面部，避免吸入）。但严重程度？通常相对禁忌：2岁以下婴儿不宜涂抹于鼻下或胸前（可能引起喉痉挛）。绝对禁忌：对此类成分过敏。
              - paragraph [ref=e383]: 现在逐一生成。由于药物很多，我会用简洁描述，确保每个药物有至少3-5个禁忌症。注意识别重复组合，如Acetaminophen, Diphenhydramine, and Phenylephrine Tablets与前面的acetaminophen, diphenhydramine, and phenylephrine相同，所以禁忌症相同。同样，Diphenhydramine Chewable与Diphenhydramine Capsules and Tablets与diphenhydramine hydrochloride类似，但剂型不同，禁忌相同，但针对剂型可能有些差异，主要仍相同。chlorpheniramine原药禁忌。acetaminophen and chlorpheniramine组合等。
