                - paragraph [ref=e387]: estradiol and progesterone (sex hormone combination)
                - list [ref=e388]:
                  - listitem [ref=e389]:
                    - paragraph [ref=e390]: "estradiol: CYP3A4 inducers (降低雌激素效果), CYP3A4 inhibitors (增加雌激素暴露), anticoagulants (雌激素可能改变凝血)，可能影响甲状腺功能测试等。moderate: CYP3A4 inducers like rifampin, carbamazepine, phenytoin, St. John's wort 降低estradiol浓度; CYP3A4 inhibitors like ketoconazole, clarithromycin increase estradiol. 孕激素部分: progesterone可被CYP3A4 metabolized; 诱导剂降低效果。major: 与抗凝剂合用可能增加或减少抗凝作用，但临床上监测INR。与吸烟合用增加心血管风险。也可能与某些药物如拉莫三嗪(lamotrigine)降低lamotrigine浓度。主要的临床重要交互：雌激素+抗凝药: 可能改变凝血因子，虽然通常是降低抗凝效果，但也有增加血栓风险（尤其复方口服避孕药，而这里是激素替代疗法）。hormone replacement therapy: 与warfarin可能有相互作用，需要监测INR。与CYP3A4诱导剂合用会降低hormone疗效，导致潮热等。严重：与CYP3A4诱导剂可能显著降低激素水平，导致治疗失败(主要是中度)。与强效CYP3A4抑制剂会增加雌激素暴露，增加不良反应风险(血栓栓塞)。通常列为moderate。另外与甲状腺激素：雌激素增加甲状腺结合球蛋白，可能需调整左甲状腺素剂量。moderate。所以我们输出major几乎没有，但可以考虑与CYP3A4诱导剂合用降低疗效，可能导致骨质疏松预防失败，可能是moderate。不会列major。"
              - listitem [ref=e391]:
                - paragraph [ref=e392]: "sumatriptan (all forms): major交互：与MAO inhibitors (特别是MAO-A inhibitors) 合用可显著增加sumatriptan浓度，导致5-HT综合征风险，禁忌。与ergotamines或其他5HT1 agonists (如dihydroergotamine) 合用24小时内增加血管痉挛风险，禁忌。与SSRIs/SNRIs合用增加血清素综合征风险，通常是moderate或major争议，但列为moderate到major，一般临床警告。列出major: MAO inhibitors; other serotonergic drugs (ergotamines, other triptans) within 24h。moderate: SSRIs, SNRIs增加血清素综合征风险。"
              - listitem [ref=e393]:
                - paragraph [ref=e394]: "zolmitriptan: 类似sumatriptan。MAO inhibitors (MAO-A) 禁忌，因为zolmitriptan代谢通过MAO-A。与其他triptans/ergotamines。SSRIs/SNRIs moderate。"
              - listitem [ref=e395]:
                - paragraph [ref=e396]: "rimegepant: CGRP拮抗剂，主要为CYP3A4底物，也通转运体。major: 强CYP3A4 inhibitors (如ketoconazole, clarithromycin) 显著增加rimegepant暴露，增加肝毒性风险; 强CYP3A4 inducers (rifampin, carbamazepine) 显著降低浓度导致无效。moderate: 中度CYP3A4抑制剂; 其他CGRP拮抗剂? 但rimegepant与其他gepants不要同时用。主要交互：强"
