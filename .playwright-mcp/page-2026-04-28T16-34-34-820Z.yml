            - generic [ref=e210]:
              - paragraph [ref=e211]: 我们被要求为给定的每种药物生成完整的禁忌症列表。需要输出JSON。注意列表中有一些药物是组合药物。我们需要为每种药物生成JSON对象，列出generic_name和禁忌症列表。禁忌症类型分为disease, allergy_type, physiological_condition, drug_class，严重程度分为absolute和relative。必须基于药物的适应症、类别等推断禁忌症。
              - paragraph [ref=e212]: 我们需要处理所有药物。注意有些药物是重复的，比如amlodipine和atorvastatin组合，还有单独的amlodipine等。还有nitroglycerin有多种剂型（oral route, sublingual route, transdermal, topical），但本质都是nitroglycerin，禁忌症可能相同，但可能需要区分？输入药物列表中的名字不一样，有些有route。要求是“为以下每种药物生成完整的禁忌症列表”，输入药物列表中的每个条目都应该作为一个独立的generic_name处理，尽管有些是同一药物不同剂型。所以我们应按照给定的条目输出。
              - paragraph [ref=e244]: 我们谨慎分析每种药物的禁忌症：
              - list [ref=e245]:
                - listitem [ref=e246]:
                  - paragraph [ref=e247]: amlodipine and atorvastatin：这是氨氯地平（钙通道阻滞剂）和阿托伐他汀（他汀类）组合。适应症：高血压、高脂血症、预防心血管疾病。妊娠分级X。我们需要分别列出两者的禁忌症。组合药物禁忌症包括各成分的禁忌症。对于amlodipine：严重低血压（相对？绝对？），严重主动脉瓣狭窄（相对），不稳定心绞痛（相对？），肝功能损害（相对，氨氯地平在肝功能不全时需减量）。绝对禁忌：对氨氯地平过敏。相对：心力衰竭（非缺血性？但钙通道阻滞剂可能加重心衰，但氨氯地平在心力衰竭中可用？有证据显示氨氯地平对心衰安全，但严重心衰应谨慎）。更常见禁忌：严重低血压（收缩压<90 mmHg）绝对？氨氯地平说明书写：对二氢吡啶类过敏者禁用，严重低血压患者禁用。妊娠X级是组合中的atorvastatin，因为阿托伐他汀妊娠X级，整个组合妊娠X，所以绝对禁忌妊娠。阿托伐他汀：活动性肝病或无法解释的持续血清转氨酶升高（绝对）；妊娠和哺乳（绝对）；与他汀相关的肌病/横纹肌溶解症风险，相对禁忌严重肾功能不全？但阿托伐他汀不经肾排泄，但肾功能不全无需调整。相对禁忌：大量饮酒、肝病史。禁忌药物：CYP3A4强抑制剂（如克拉霉素、伊曲康唑等）增加肌病风险，属于drug_class相对禁忌。组合药物：绝对禁忌：妊娠（physiological_condition，因为atorvastatin X级），哺乳（atorvastatin可进入乳汁）。过敏：对氨氯地平、其他二氢吡啶类或阿托伐他汀任何成分过敏。疾病：活动性肝病或转氨酶持续升高（absolute，因他汀）；严重低血压（绝对）；心源性休克（绝对，因为氨氯地平）。相对：严重主动脉瓣狭窄，不稳定心绞痛（可能因血管扩张引起反射性心动过速），急性心肌梗死（？），严重肾功能不全（atorvastatin相对？），与强CYP3A4抑制剂合用（drug_class，相对）。等等。我们需简洁列出。
                - listitem [ref=e248]:
                  - paragraph [ref=e249]: nitroglycerin (oral route, sublingual route)：硝酸甘油，抗心绞痛药，血管扩张剂。禁忌：对硝酸酯过敏（absolute）；严重贫血（relative，可能引起高铁血红蛋白?）；闭角型青光眼（relative，可能增加眼压）；颅内压增高/头部创伤/脑出血（absolute，因为血管扩张增加颅内压）；严重低血压（收缩压<90 mmHg）（absolute）；血容量不足（relative）；肥厚型梗阻性心肌病（相对，可能加重流出道梗阻）；与PDE5抑制剂（西地那非等）合用（drug_class，absolute，因严重低血压风险）；与利奥西呱合用（absolute，可能低血压）。妊娠C级，非绝对禁忌，但通常避免使用。生理状态：哺乳期相对安全但应慎用。
                - listitem [ref=e250]:
                  - paragraph [ref=e251]: "verapamil (oral/injection): 维拉帕米，CCB，Group IV抗心律失常。适应症：高血压、心绞痛、房颤、室上速。妊娠C。禁忌：严重左心室功能不全（absolute，除非是房颤伴快速心室率，但一般心力衰竭慎用）；心源性休克（absolute）；低血压（收缩压<90 mmHg）（absolute）；病态窦房结综合征（无起搏器时，absolute）；二度或三度房室传导阻滞（无起搏器时，absolute）；心房扑动或房颤合并预激综合征（如WPW）（absolute，可能诱发室颤）；对维拉帕米过敏（absolute）；严重心动过缓（relative）；肝功能严重受损（relative，需减量）；与β受体阻滞剂合用（relative，加重负性肌力，相对禁忌，静脉给维拉帕米时禁用）；与伊伐布雷定合用（可能导致心动过缓）。静脉注射维拉帕米时禁止与β受体阻滞剂同时静脉使用。还要注意：妊娠C，哺乳期慎用。同时药物相互作用：CYP3A4底物，与强抑制剂合用增加毒性。列出禁忌类型。"
                - listitem [ref=e252]:
                  - paragraph [ref=e253]: "Aspirin Enteric-Coated and Buffered Tablets: 阿司匹林肠溶缓释片。适应症：疼痛、发热、炎症、心血管事件预防。妊娠分级N（说明无分级，但妊娠晚期高剂量可导致动脉导管早闭，属于D）。禁忌：对阿司匹林或水杨酸盐过敏（absolute）；哮喘、鼻息肉三联征（阿司匹林加重呼吸系统疾病，absolute）；活动性胃十二指肠溃疡（absolute）；出血倾向/血友病等（relative，增加出血风险）；严重肾功能不全（relative，肾毒性）；严重肝功能不全（relative）；妊娠晚期（生理状态，绝对，可致动脉导管早闭、分娩延长等）；哺乳期慎用；与抗凝药合用（drug_class，relative，出血风险增加）；儿童病毒感染期间（Reye综合征风险，生理状态absolute，对于儿童发热)。注意：阿司匹林在儿童中因病毒感染（如水痘、流感）禁用。列出。"
                - listitem [ref=e254]:
                  - paragraph [ref=e255]: "amlodipine (oral route): 单独氨氯地平。禁忌：对二氢吡啶类过敏（absolute）；严重低血压（absolute）；心源性休克（absolute）；严重主动脉瓣狭窄（relative）；不稳定心绞痛（relative？但氨氯地平可用于血管痉挛性心绞痛，并不是禁忌）；肝功能不全（relative，需减量）；妊娠C级，但通常可权衡利弊；哺乳期：可通过乳汁，但相对安全；与CYP3A4强抑制剂合用（relative，增加氨氯地平水平）。严重心力衰竭（非缺血性？相对）。没有绝对妊娠禁忌。列出。"
                - listitem [ref=e256]:
                  - paragraph [ref=e257]: Aspirin Tablets：与第4个类似，只是剂型不同。禁忌症相同。
                - listitem [ref=e258]:
                  - paragraph [ref=e259]: nitroglycerin (transdermal)：硝酸甘油贴片。禁忌症类似口服，因为同样药物。增加：对贴片粘合剂过敏（过敏类型？可能相对）。但通用：严重贫血、闭角型青光眼、颅内高压、严重低血压、PDE5抑制剂、利奥西呱等。列出。
                - listitem [ref=e260]:
                  - paragraph [ref=e261]: heparin (injection)：普通肝素。禁忌：对肝素或猪肉制品过敏（absolute）；严重血小板减少症（尤其是肝素诱导的血小板减少症HIT，absolute）；活动性大出血（如颅内出血、消化道出血等，absolute）；近期手术或创伤（relative，取决于出血风险）；严重肝病/食管静脉曲张（relative）；未控制的严重高血压（relative）；细菌性心内膜炎（相对）；怀疑或确诊的HIT病史（absolute）。妊娠C，但肝素不通过胎盘，是妊娠抗凝选择。哺乳安全。药物类：与抗血小板药、溶栓药等合用增加出血。应列出。
                - listitem [ref=e262]:
                  - paragraph [ref=e263]: propranolol (oral route)：普萘洛尔，非选择性β阻滞剂。适应症：高血压、心绞痛、偏头痛预防、特发性震颤、表演焦虑、心肌梗死。妊娠C。禁忌：支气管哮喘或慢性阻塞性肺疾病（绝对，非选择性β阻滞剂诱发支气管痉挛）；心源性休克（absolute）；失代偿性心力衰竭（absolute）；严重窦性心动过缓（absolute）；二度或三度房室传导阻滞（无起搏器，absolute）；病态窦房结综合征（absolute）；严重外周动脉疾病（相对，可加重）；变异型心绞痛（相对，可加重血管痉挛）；未控制的嗜铬细胞瘤（relative，必须先使用α阻滞剂）；糖尿病易发生低血糖者（相对，可掩盖低血糖症状）；甲状腺毒症（相对，突然停药可能诱发危象）；肝肾功能不全（需减量，相对）。与维拉帕米等非二氢吡啶类CCB合用（relative，负性肌力相加）。过敏：对普萘洛尔或任何成分过敏。哺乳期：进入乳汁，慎用。
                - listitem [ref=e264]:
                  - paragraph [ref=e265]: "Metoprolol Extended-Release Capsules: 美托洛尔，选择性β1阻滞剂。禁忌：严重心动过缓、心源性休克、失代偿性心力衰竭、病态窦房结综合征、二度或三度房室传导阻滞（无起搏器）为absolute。对美托洛尔过敏（absolute）。相对禁忌：支气管哮喘（选择性仍可诱发，但比非选择性安全，相对禁忌）；严重肝功能不全（美托洛尔肝脏代谢，需减量）；严重外周动脉疾病；变异型心绞痛；嗜铬细胞瘤未用α阻滞剂；糖尿病（掩盖低血糖，但心动过速不会有，相对好一些）。与维拉帕米、地尔硫卓合用（相对）。妊娠C，哺乳期：大量进入乳汁，可能引起婴儿心动过缓等，相对禁忌。"
                - listitem [ref=e266]:
                  - paragraph [ref=e267]: nitroglycerin (topical)：硝酸甘油软膏。适应症包括肛裂。禁忌症同样，但增加局部皮肤破损处不可用。妊娠C。
                - listitem [ref=e268]:
                  - paragraph [ref=e269]: dalteparin：达肝素，低分子肝素。禁忌：对肝素或猪肉制品过敏（包括达肝素过敏，absolute）；HIT病史（absolute）；活动性大出血（absolute）；严重凝血障碍（relative）；近期脑、脊柱或眼科手术（relative）；严重高血压；严重肝病；妊娠B，相对安全，用于妊娠抗凝；哺乳安全。与抗血小板药物合用增加出血。肾功能不全需调整剂量，相对禁忌。
                - listitem [ref=e270]:
                  - paragraph [ref=e271]: bivalirudin：比伐卢定，直接凝血酶抑制剂。适应症：PCI抗凝，ACS。禁忌：活动性大出血（absolute）；过敏（absolute）。相对禁忌：近期大手术、创伤、脑动脉瘤、出血倾向；严重高血压；肾功能不全（比伐卢定经肾排泄，Ccr<30ml/min需减量，相对禁忌？）；与抗血小板药等合用增加出血。妊娠B。
                - listitem [ref=e272]:
                  - paragraph [ref=e273]: verapamil (oral route)：与注射剂类似，禁忌症：严重左心室功能不全、低血压、心源性休克、病窦、二度或三度AVB（无起搏器）、房颤伴预激综合征、过敏。相对：肝功能不全、与β阻滞剂合用（口服相对，但需谨慎）、肾功能不全、妊娠C。列出。
                - listitem [ref=e274]:
                  - paragraph [ref=e275]: isosorbide dinitrate (oral route, sublingual route)：硝酸异山梨酯。禁忌症与硝酸甘油类似：严重低血压、血容量不足、严重贫血、闭角型青光眼、颅内高压/脑出血、肥厚型梗阻性心肌病、对硝酸酯类过敏。绝对禁忌：与PDE5抑制剂合用，与利奥西呱合用。妊娠C。
                - listitem [ref=e276]:
                  - paragraph [ref=e277]: nitroglycerin：与前面类似。可能包括口服，舌下等。禁忌相同。
                - listitem [ref=e278]:
                  - paragraph [ref=e279]: ranolazine (oral route)：雷诺嗪，抗心绞痛药。适应症：慢性心绞痛。禁忌：严重肝功能不全（absolute，因为CYP3A代谢）；肝硬化（absolute）；与CYP3A强抑制剂（如酮康唑、克拉霉素）合用（absolute，禁用）；与CYP3A诱导剂合用（relative，避免）；严重肾功能不全（Ccr<30 ml/min，相对禁忌，慎用）；长QT综合征或使用延长QT的药物（relative，可延长QT）；对雷诺嗪过敏（absolute）。妊娠C。
                - listitem [ref=e280]:
                  - paragraph [ref=e281]: lorazepam (oral)：劳拉西泮，苯二氮卓类。适应症：焦虑、失眠、癫痫持续状态、术前镇静、化疗止吐。妊娠D（妊娠期增加唇裂风险，新生儿戒断症状等，通常禁忌，除非必要）。绝对禁忌：对苯二氮卓类过敏；急性闭角型青光眼（绝对，由于抗胆碱能作用？劳拉西泮本身无显著抗胆碱作用，但所有苯二氮卓类禁用于急性闭角型青光眼？通常苯二氮卓类可安全用于开角型青光眼，但闭角型因为可能增加眼压？实际上苯二氮卓类不推荐用于急性闭角型青光眼，列为禁忌）；严重呼吸功能不全（relative，因呼吸抑制）；睡眠呼吸暂停综合症（relative）；重症肌无力（relative，肌松作用）；严重肝功能不全（relative，劳拉西泮葡糖醛酸化代谢，肝病可能延长作用）。生理状态：妊娠（绝对，除非获益大于风险，分类D通常视为相对禁忌，但病情必须时可用，分类D为有证据的胎儿风险，但可能获益大于风险，所以相对禁忌？临床上妊娠D药物一般避免使用，除非绝对必要。我列绝对还是相对？根据定义“绝对禁忌：不应使用”，妊娠D在某些情况下可使用，因此是相对禁忌？但许多资源将妊娠列为苯二氮卓类相对禁忌。可列为绝对禁忌通常如X级，D级相对）。哺乳：进入乳汁，可引起婴儿嗜睡，相对禁忌。与其他CNS抑制剂合用（drug_class，relative）。
                - listitem [ref=e282]:
                  - paragraph [ref=e283]: diazepam (oral)：地西泮，妊娠D。禁忌：过敏、急性闭角型青光眼、严重呼吸功能不全、睡眠呼吸暂停、重症肌无力、严重肝功能不全（地西泮经肝代谢，绝对？通常严重肝功能不全禁用）；妊娠相对禁忌；哺乳期相对禁忌。药物类：与CNS抑制剂合用。地西泮含有苯甲醇在注射剂，但口服无。禁忌症类似。
                - listitem [ref=e284]:
                  - paragraph [ref=e285]: Alprazolam Oral Solution：阿普唑仑，妊娠D。禁忌：与CYP3A强抑制剂（酮康唑、伊曲康唑）合用是绝对禁忌，因为增加阿普唑仑浓度导致过度镇静和呼吸抑制；急性闭角型青光眼；过敏；严重呼吸功能不全；严重肝功能不全。妊娠相对禁忌。哺乳。CNS抑制剂合用。
                - listitem [ref=e286]:
                  - paragraph [ref=e287]: risperidone (oral)：利培酮，非典型抗精神病药。适应症：精神分裂症、孤独症伴激惹、双相障碍。妊娠C。禁忌：对利培酮或帕利哌酮过敏（absolute）。相对禁忌：痴呆相关精神病老年患者（增加死亡风险，绝对？FDA黑框警告，对于精神行为症状的老年痴呆患者，死亡风险增加，通常应避免使用，视为相对？但指南常列为避免使用，可算relative但严重）；帕金森病（可能加重，相对）；低血压/脱水/血容量不足（导致晕厥，相对）；QT间期延长/心律失常史（relative，可延长QT）；癫痫发作（可降低惊厥阈，相对）；严重肝肾功能不全（需减量，相对）；糖尿病/高血糖风险（相对，监测）；泌乳素依赖性肿瘤（相对）；妊娠C，哺乳期慎用。药物类：与多巴胺激动剂合用（左旋多巴）拮抗作用；与延长QT药物合用增加风险；与CNS抑制剂合用增加镇静。过敏类型。
                - listitem [ref=e288]:
                  - paragraph [ref=e289]: clorazepate (oral route)：氯拉卓酸，苯二氮卓类，抗焦虑、酒精戒断、癫痫。妊娠N？未分级，但苯二氮卓类通常D，但输入显示妊娠分级N。可能较老药没有分级。实际为D。禁忌：急性闭角型青光眼；过敏；严重呼吸功能不全；重症肌无力；严重肝功能不全；妊娠（生理状态相对）；哺乳；与CNS抑制剂合用。药物类：CYP3A4代谢，与抑制剂合用。
                - listitem [ref=e290]:
                  - paragraph [ref=e291]: doxepin (capsules, oral concentrate)：多塞平，三环类抗抑郁药，也有抗焦虑和镇静作用。禁忌：对多塞平或三环类过敏；急性心肌梗死恢复期（绝对？TCAs有心血管毒性，急性心梗相对禁忌）；与MAO抑制剂合用（absolute，禁止合用，可引起5-HT综合征等）；尿潴留（前列腺增生等，抗胆碱作用，相对）；闭角型青光眼（绝对，抗胆碱引发）；严重肝功能不全；妊娠N（未分级，但C？实际多塞平妊娠C？可能未分级，但TCAs妊娠相对安全？但按其适应症可列出谨慎）。严重程度：MAOIs为绝对；过敏绝对；刚发生心梗相对？哺乳期：进入乳汁，相对禁忌。还有睡眠呼吸暂停（加重）。窦性心动过速/心律失常 相对。
                - listitem [ref=e292]:
                  - paragraph [ref=e293]: amitriptyline and perphenazine：阿米替林（TCA）和奋乃静（吩噻嗪类抗精神病药）。组合禁忌包括两者的。阿米替林：与MAOIs合用absolute；急性心梗恢复期relative；闭角型青光眼absolute；尿潴留。奋乃静：中枢神经系统抑制、骨髓抑制、肝功能严重异常、对吩噻嗪类过敏。绝对禁忌：与MAOIs同用（阿米替林）；过敏。相对：老年痴呆精神病（死亡率增加）；帕金森病（奋乃静）；癫痫；甲状腺毒症；妊娠N（可能D）。生理状态哺乳。
                - listitem [ref=e294]:
                  - paragraph [ref=e295]: diazepam (oral route)：与前面地西泮相同。
                - listitem [ref=e296]:
                  - paragraph [ref=e297]: phenytoin (oral)：苯妥英，抗癫痫，Ib类抗心律失常。禁忌：对苯妥英或乙内酰脲类过敏（absolute）；妊娠D（因胎儿乙内酰脲综合征，绝对禁忌通常列为相对？因为癫痫控制必要，但通常应避免，分类D可能需权衡，相对禁忌）；窦性心动过缓、窦房阻滞、二度或三度AVB（因为抗心律失常作用，相对？注射用有心脏禁忌，口服用于癫痫时心脏禁忌不是绝对，但有心脏传导阻滞禁用，列为absolute？实际上对于口服，严重缓慢性心律失常或心脏传导阻滞是禁忌，absolute）；肝功能衰竭（relative，代谢）；急性间歇性卟啉症（absolute，苯妥英可诱发发作）；与地拉罗司、某些抗肿瘤药等相互作用。正在服用含雌激素的避孕药可能失效，但非禁忌。严重低血压？静脉制剂有，口服无。列出：对苯妥英过敏绝对；妊娠相对；心脏传导阻滞absolute（任何程度？通常二度或三度AVB、病窦禁用）；肝病相对；卟啉症绝对。药物类：与CYP3A4/2C9抑制剂合用增加浓度，相对。哺乳期：进入乳汁，慎用。
                - listitem [ref=e298]:
                  - paragraph [ref=e299]: prochlorperazine (oral/injection)：丙氯拉嗪，吩噻嗪类，止吐和抗精神病。禁忌：对吩噻嗪类过敏；昏迷状态；中枢神经系统严重抑制（absolute）；骨髓抑制（relative）；肝功能严重异常；低血压；年龄小于2岁儿童（生理状态绝对，因锥体外系反应风险）；妊娠N（C？未分级）。闭角型青光眼；尿潴留（抗胆碱）；与CNS抑制剂合用加重；与延长QT药物合用。绝对：苯丙醇胺？没有。药物类：与其他吩噻嗪类有交叉过敏。
                - listitem [ref=e300]:
                  - paragraph [ref=e301]: amitriptyline and chlordiazepoxide：阿米替林和氯氮卓（苯二氮卓类）。阿米替林禁忌同上：MAOIs绝对，闭角型青光眼，尿潴留。氯氮卓：苯二氮卓类禁忌（急性闭角型青光眼，严重呼吸功能不全，重症肌无力）。组合绝对：与MAOIs同时使用；过敏。相对：妊娠（两药均D），哺乳，肝肾功能不全，老年痴呆。等。
                - listitem [ref=e302]:
                  - paragraph [ref=e303]: prochlorperazine (rectal)：相同，仅剂型，禁忌症一样。
                - listitem [ref=e304]:
                  - paragraph [ref=e305]: meprobamate：甲丙氨酯，抗焦虑、镇静催眠。属于氨基甲酸酯类。禁忌：对甲丙氨酯或卡立普多（carisoprodol）过敏（absolute，因为卡立普多在体内代谢成甲丙氨酯）；急性间歇性卟啉症（absolute，巴比妥类相关？甲丙氨酯可能诱发卟啉症，视为绝对？通常列为禁忌）；严重肾或肝功能不全（relative）；妊娠N（未分级，但历史上认为可能致畸，相对禁忌）；与CNS抑制剂合用增加镇静（drug_class relative）。也可有物质滥用史（relative）。
                - listitem [ref=e306]:
                  - paragraph [ref=e307]: fluticasone, umeclidinium, and vilanterol：氟替卡松（糖皮质激素）、乌美溴铵（长效抗胆碱）、维兰特罗（长效β2激动剂）。组合用于COPD。禁忌：对任何成分过敏；严重牛奶蛋白过敏（这些干粉吸入剂可能含有乳糖，乳糖含微量牛奶蛋白，对严重牛奶蛋白过敏者禁用，absolute）；乌美溴铵的抗胆碱禁忌：闭角型青光眼（相对，可能诱发），尿潴留（前列腺增生等，相对）；维兰特罗：哮喘急性发作（不可作为急救，但不一定是禁忌），严重心血管疾病（如心律失常、心力衰竭等使用β激动剂需谨慎，relative）。没有绝对禁忌妊娠（N，未知）。但通常LABA在妊娠时相对安全。列出过敏绝对；严重牛奶蛋白过敏绝对；未控制的闭角型青光眼、严重膀胱颈梗阻相对。
                - listitem [ref=e308]:
                  - paragraph [ref=e309]: benralizumab：贝那利珠单抗，IL-5受体α拮抗剂，用于严重嗜酸性粒细胞性哮喘、EGPA。禁忌：对贝那利珠单抗过敏（absolute）。相对禁忌：寄生虫感染（蠕虫），因为嗜酸性粒细胞参与清除，使用前治疗寄生虫。妊娠N（未知），但哺乳期可能安全。急性支气管痉挛或哮喘持续状态不可用（非抢救药）。无其他绝对禁忌。
                - listitem [ref=e310]:
                  - paragraph [ref=e311]: mepolizumab：美泊利单抗，抗IL-5。禁忌：过敏（absolute）。蠕虫感染相对。妊娠N。
                - listitem [ref=e312]:
                  - paragraph [ref=e313]: "benralizumab Brand name: Fasenra：与贝那利珠单抗相同，就是品牌名，但输入视为单独药物？就按贝那利珠单抗再写一次。"
                - listitem [ref=e314]:
                  - paragraph [ref=e315]: tezepelumab：胸腺基质淋巴细胞生成素(TSLP)单抗，适应症重症哮喘。禁忌：过敏（absolute）。相对：蠕虫感染。妊娠N。
                - listitem [ref=e316]:
                  - paragraph [ref=e317]: tezepelumab-ekko：同上，品牌后缀。同样禁忌。
                - listitem [ref=e318]:
                  - paragraph [ref=e319]: formoterol and mometasone：福莫特罗（LABA）和莫米松（糖皮质激素）吸入。适应症哮喘，COPD。禁忌：对成分过敏；哮喘持续状态或急性发作（不可作为急救，但不是绝对禁忌？通常LABA单独用于急性发作不适宜，但可维持治疗；禁忌症通常为哮喘急性加重？不是绝对禁忌，但不宜）；严重牛奶蛋白过敏如果含有乳糖。未控制的感染（肺结核等）相对。妊娠C：福莫特罗和莫米松通常权衡使用。药物类：与β阻滞剂合用（包括眼药水）可能拮抗，相对禁忌。单胺氧化酶抑制剂和三环类抗抑郁药可能增加心血管反应（相对）。列出：过敏绝对；严重牛奶蛋白过敏绝对；活动性肺结核、未治疗真菌/细菌/病毒感染（糖皮质激素禁忌）relative。
                - listitem [ref=e320]:
                  - paragraph [ref=e321]: ipratropium (inhalation route)：异丙托溴铵，抗胆碱支气管扩张剂。禁忌：对异丙托溴铵、阿托品或任何成分过敏（absolute）；对大豆卵磷脂或相关食物过敏（某些吸入剂含大豆卵磷脂，absolute过敏）。相对禁忌：闭角型青光眼（可能诱发）；膀胱颈梗阻/前列腺增生（尿潴留风险）。妊娠B，安全。
                - listitem [ref=e322]:
                  - paragraph [ref=e323]: fluticasone and vilanterol：氟替卡松和维兰特罗。禁忌类似氟替卡松/维兰特罗部分：对乳糖/牛奶蛋白严重过敏；对成分过敏；活动性肺结核/感染相对；严重心血管疾病相对；与β阻滞剂合用相对。妊娠C。
                - listitem [ref=e324]:
                  - paragraph [ref=e325]: ipratropium inhalation：同上。
                - listitem [ref=e326]:
                  - paragraph [ref=e327]: methylprednisolone (oral)：甲泼尼龙，糖皮质激素。禁忌：全身性真菌感染（absolute）；对成分过敏；活疫苗近期接种（relative）；未控制的感染（相对）；消化性溃疡（相对）；骨质疏松（相对）；糖尿病（相对）；精神病/情绪障碍（相对）；严重肝病（相对，甲泼尼龙需肝脏激活？但甲泼尼龙是活性形式，不需激活，但肝功能不全慎用）；妊娠C（早期可能致唇裂，相对），哺乳。绝对禁忌：全身真菌感染；过敏。药物类：与NSAIDs合用增加胃溃疡风险；与CYP3A4诱导剂/抑制剂相互作用。还可有：皮质类固醇可能导致卡波西肉瘤？不具体。列出。
                - listitem [ref=e328]:
                  - paragraph [ref=e329]: dexamethasone (oral)：地塞米松。禁忌相同：全身真菌感染（absolute）；过敏；活疫苗；未控制感染；消化性溃疡；糖尿病；骨质疏松；精神病；妊娠C（如用于促进胎肺成熟则获益大于风险，相对等）。列出。
                - listitem [ref=e330]:
                  - paragraph [ref=e331]: ciclesonide (inhalation)：环索奈德，吸入糖皮质激素。禁忌：对环索奈德或成分过敏（absolute）；哮喘持续状态或急性发作（非急救，但不绝对值）；活动性肺结核或未治疗感染（相对）。妊娠C。哺乳。与口服不同，无全身真菌感染禁忌，因为局部吸入。严重牛奶蛋白过敏如果含乳糖。列出。
                - listitem [ref=e332]:
                  - paragraph [ref=e333]: levalbuterol inhalation：左沙丁胺醇，短效β2激动剂。禁忌：对沙丁胺醇或左沙丁胺醇过敏（absolute）。相对禁忌：严重心血管疾病（如心律失常、冠状动脉功能不全、高血压）；甲状腺功能亢进；糖尿病；癫痫；低钾血症风险；与β阻滞剂合用拮抗。妊娠C。哺乳。
                - listitem [ref=e334]:
                  - paragraph [ref=e335]: Ipratropium Inhalation Solution：与异丙托溴铵相同。
                - listitem [ref=e336]:
                  - paragraph [ref=e337]: triamcinolone (oral)：曲安西龙口服，同其他糖皮质激素。禁忌：全身真菌感染绝对；过敏；活动性感染；消化道溃疡；糖尿病；骨质疏松等。妊娠C。
                - listitem [ref=e338]:
                  - paragraph [ref=e339]: dexamethasone (oral route)：同上。
                - listitem [ref=e340]:
                  - paragraph [ref=e341]: triamcinolone (injection)：曲安奈德注射，局部/全身。禁忌：全身真菌感染（不允许用于全身？注射也可能有全身作用，局部注射禁忌：注射部位感染；过敏；特发性血小板减少性紫癜时肌肉注射禁忌（相对，因为出血风险）。全身使用：未控制的感染等。皮内注射不可用于某些区域。
                - listitem [ref=e342]:
                  - paragraph [ref=e343]: methylprednisolone (injection)：甲泼尼龙注射。禁忌：全身真菌感染绝对；过敏；未控制感染；近期活疫苗；消化性溃疡；同时鞘内/硬膜外注射某些制剂（与防腐剂有关）？不具体。可列出绝对禁忌全身性真菌感染。对于冲击疗法，需除外全身感染。
                - listitem [ref=e344]:
                  - paragraph [ref=e345]: "Caffeine Brand names: NoDoz等，咖啡因。适应症：早产儿呼吸暂停、疲劳、辅助紧张性头痛、硬膜穿刺后头痛。妊娠C。禁忌：对咖啡因或任何成分过敏（absolute）。相对禁忌：严重焦虑/躁动（CNS刺激）；失眠；严重心血管疾病（如心律失常、近期心肌梗死）；胃溃疡（因为增加胃酸分泌）；肝肾功能不全（代谢延长）；与单胺氧化酶抑制剂？并无直接禁忌，但大量咖啡因可能诱发高血压。另外，与腺苷合用（咖啡因是腺苷受体拮抗剂，降低腺苷用于阵发性室上速的效果，相对禁忌）？可列出drug_class相对禁忌：与拟交感神经药合用增加心血管刺激。月经？不必要。早产儿呼吸暂停制剂不含防腐剂，口服咖啡因片禁忌同。"
              - paragraph [ref=e346]: 现在需要为每个药物JSON输出。注意列表里面有些药物相同，但不同剂型分别列，如nitroglycerin (oral route, sublingual route)、nitroglycerin (transdermal)、nitroglycerin (topical)、nitroglycerin。那我们分别输出，但禁忌症相似，可调整局部剂型特有禁忌。同样aspirin肠溶片和aspirin片。还有verapamil口服注射和verapamil口服。 Prochlorperazine口服注射和直肠。 Fluticasone组合等。为每个建立。
              - paragraph [ref=e347]: "注意avoid过于笼统，需具体临床相关。还要区分绝对和相对。如苯二氮卓类的妊娠D级，我决定列为相对禁忌（physiological_condition, severity: relative, reason: \"Pregnancy Category D, may cause congenital malformations and neonatal withdrawal, use only if benefit outweighs risk\"）。对一些如氨氯地平/阿托伐他汀组合的妊娠X级，绝对禁忌：pregnancy, absolute。肝素：HIT病史绝对，活动性大出血绝对。等等。"
