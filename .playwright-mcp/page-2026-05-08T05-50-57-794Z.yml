        - generic [ref=e100]:
          - generic [ref=e102]: "请评估以下用药推荐是否适当。对每种疾病，判断推荐的前5个药物是否适合治疗该疾病。 评分标准: - APPROPRIATE: 推荐药物完全适合治疗该疾病 - PARTIALLY: 部分推荐适合，部分不适合 - INAPPROPRIATE: 推荐药物完全不适合 疾病: 深静脉血栓 | Apixaban; Dabigatran; Clopidogrel; Enoxaparin; Dipyridamole 疾病: 湿疹 | Betamethasone; Cetirizine; Clobetasol; Desonide; Desoximetasone 疾病: 溃疡性结肠炎 | Golimumab; Ciprofloxacin; Infliximab; Tofacitinib; Mesalamine 疾病: 炎症 | Prednisolone; Prednisone; Triamcinolone; Aspirin Enteric-Coated; Aspirin Tablets 疾病: 焦虑 | Alprazolam; Aripiprazole; Venlafaxine; venlafaxine HCl; Pregabalin 疾病: 焦虑不安 | Alprazolam; Lamotrigine; Aripiprazole; Bupropion; Buspirone 疾病: 焦虑症 | Alprazolam; Aripiprazole; Venlafaxine; venlafaxine HCl; Pregabalin 疾病: 牛皮癣 | Betamethasone; Clobetasol; Desonide; Desoximetasone; Fluocinolone 疾病: 玫瑰痤疮 | Doxycycline; Erythromycin; Oxytetracycline; Spironolactone; Tazarotene 疾病: 甲亢 | Cinacalcet; Doxercalciferol; Methimazole; Propylthiouracil; Irbesartan 疾病: 甲减 | Levothyroxine; Liotrix; Liothyronine; levothyroxine(oral/injection); thyroid desiccated 疾病: 甲状腺功能亢进 | Cinacalcet; Doxercalciferol; Methimazole; Propylthiouracil; Irbesartan 疾病: 甲状腺功能减退 | Levothyroxine; Liotrix; Liothyronine; levothyroxine(oral/injection); thyroid desiccated 疾病: 甲状腺癌 | Vandetanib; Everolimus; Sorafenib; levothyroxine(oral/injection); levothyroxine(oral) 疾病: 甲状腺肿 | levothyroxine(oral/injection); levothyroxine(oral); thyroid desiccated; Cinacalcet; Doxercalciferol 疾病: 疱疹 | Valacyclovir; Acyclovir; acyclovir(oral); acyclovir(topical); Cidofovir 疾病: 疼痛 | Amitriptyline; Aspirin; Diclofenac; Flurbiprofen; Ibuprofen 疾病: 病毒感染 | Probenecid; Tobramycin; Dipyridamole; Ipratropium; enalapril(oral) 疾病: 痔疮 | Hydrocortisone; Cimetidine; Dexlansoprazole; Esomeprazole; Famotidine 疾病: 痘痘 | Doxycycline; Erythromycin; Tretinoin; Norgestimate-Ethinyl Estradiol; sarecycline 疾病: 痛经 | Diclofenac; Aspirin; Ibuprofen; Ketoprofen; Naproxen 疾病: 痛风 | Allopurinol; Colchicine; Diclofenac; Etodolac; Flurbiprofen 疾病: 痤疮 | Doxycycline; Erythromycin; Tretinoin; Norgestimate-Ethinyl Estradiol; sarecycline 疾病: 癫痫 | Clonazepam; Clorazepate; Diazepam; Ethosuximide; Fosphenytoin 疾病: 癫痫发作 | Clonazepam; Clorazepate; Diazepam; Ethosuximide; Fosphenytoin 疾病: 白内障 | Timolol; betaxolol; Brimonidine; Brinzolamide; Latanoprost 疾病: 白血病 | Tretinoin; Folic Acid; Methotrexate; Doxorubicin; Bendamustine 疾病: 皮疹 | Betamethasone; Cetirizine; Desonide; Desoximetasone; Dexamethasone 疾病: 皮肤软组织感染 | Amoxicillin-Clavulanate; Bacitracin; Cefazolin; Cefepime; Cefotaxime 疾病: 盆腔炎 | Cefoxitin; Amikacin; Clindamycin; clindamycin(oral/injection); clindamycin(IM/IV) 请对每种疾病给出评分(APPROPRIATE/PARTIALLY/INAPPROPRIATE)和简要理由。用表格格式输出。"
