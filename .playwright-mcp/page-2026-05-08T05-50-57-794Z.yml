              - generic [ref=e125]: 已思考（用时 75 秒）
              - img [ref=e127]
            - generic [ref=e133]:
              - paragraph [ref=e134]: 我们需评估每个疾病的推荐药物列表是否适合。注意每个疾病列出5个药物。我们需要判断是否全部适合（APPROPRIATE），部分适合（PARTIALLY），或完全不适合（INAPPROPRIATE）。考虑标准治疗指南。
              - paragraph [ref=e135]: 逐一分析：
              - list [ref=e136]:
                - listitem [ref=e137]:
                  - paragraph [ref=e138]: 深静脉血栓：推荐Apixaban（直接Xa抑制剂，适合），Dabigatran（直接凝血酶抑制剂，适合），Clopidogrel（抗血小板，不适合DVT治疗，DVT需抗凝而非抗血小板），Enoxaparin（低分子肝素，适合急性期），Dipyridamole（抗血小板，不适合）。所以有3个适合，2个不适合？实际上Clopidogrel和Dipyridamole不适合。所以部分适合。但注意DVT治疗抗凝药物包括华法林、DOACs、肝素。Clopidogrel和Dipyridamole不是标准治疗。因此评分PARTIALLY。
                - listitem [ref=e139]:
                  - paragraph [ref=e140]: 湿疹：推荐Betamethasone（中效糖皮质激素，适合），Cetirizine（抗组胺药，用于止痒，但非主要治疗，湿疹常用抗组胺辅助，可认为部分适合？但通常湿疹治疗局部糖皮质激素为主，口服抗组胺可缓解瘙痒，但不是核心治疗。严格来说，推荐列表中有4个糖皮质激素（Betamethasone, Clobetasol, Desonide, Desoximetasone）都是外用激素，适合湿疹。Cetirizine虽可辅助，但也算合理。所以全部5个药物都可以用于湿疹？但Cetirizine不是治疗湿疹本身，而是缓解瘙痒。在临床实践中常用。可能被认为是适当的。但需注意：湿疹治疗指南推荐外用糖皮质激素，口服抗组胺用于瘙痒。所以我认为APPROPRIATE。然而有些观点认为抗组胺对湿疹证据不强，但通常可接受。为了严谨，多数评分会认为部分适合？检查：四个激素从弱到强，都适合。所以总体合适。评分APPROPRIATE。
                - listitem [ref=e173]:
                  - paragraph [ref=e174]: 溃疡性结肠炎：推荐Golimumab（抗TNF，适合），Ciprofloxacin（抗生素，用于UC合并感染或 pouchitis，但不作为常规治疗UC本身，除非感染性结肠炎，一般UC治疗不首选抗生素），Infliximab（抗TNF，适合），Tofacitinib（JAK抑制剂，适合），Mesalamine（5-ASA，适合）。Ciprofloxacin通常不用于UC的诱导或维持缓解，除非有继发感染。所以不完全适合。因此PARTIALLY。
                - listitem [ref=e175]:
                  - paragraph [ref=e176]: 炎症：这是个非特异性疾病。推荐Prednisolone, Prednisone, Triamcinolone（均为糖皮质激素，抗炎），Aspirin Enteric-Coated, Aspirin Tablets（非甾体抗炎药，抗炎）。全部具有抗炎作用，但“炎症”可指多种情况。这些药物都是抗炎药，所以从广义上适合。但注意：炎症可能是急慢性，但药物合理。评分APPROPRIATE？可能需谨慎：阿司匹林作为抗炎药适用于某些炎症，但通常用于疼痛发热。总体上合理。给出APPROPRIATE。
                - listitem [ref=e177]:
                  - paragraph [ref=e178]: 焦虑：推荐Alprazolam（苯二氮䓬，抗焦虑，适合），Aripiprazole（抗精神病药，主要用于精神分裂症、双相，有时辅助治疗焦虑？非一线。FDA适应症？阿立哌唑不用于焦虑症，通常用于抑郁症辅助，焦虑障碍未批准），Venlafaxine（SNRI，抗焦虑，适合），venlafaxine HCl（同），Pregabalin（加巴喷丁类，用于广泛性焦虑障碍，适合）。Aripiprazole不适合作为一线或常规抗焦虑药，可能有证据用于难治性焦虑？但一般不推荐。所以部分适合。评分PARTIALLY。
                - listitem [ref=e179]:
                  - paragraph [ref=e180]: 焦虑不安：类似但疾病名“焦虑不安”可能指 agitation? 推荐Alprazolam（适合），Lamotrigine（抗癫痫/情绪稳定剂，用于癫痫和双相，不用于焦虑不安），Aripiprazole（可能用于激越？但有适应症？用于精神分裂症激越，但并非首选），Bupropion（抗抑郁，但有激活作用，可能加重焦虑不安，不适合），Buspirone（抗焦虑，适合用于焦虑，但焦虑不安？可能有效）。总体有很多不适合。评分INAPPROPRIATE？或PARTIALLY？检查：Alprazolam和Buspirone可能适合焦虑不安，但Lamotrigine、Aripiprazole、Bupropion通常不适合。所以至少2个适合，3个不适合。因此PARTIALLY。但需注意“焦虑不安”可能不是标准诊断，但通常苯二氮䓬和丁螺环酮可用，其他不典型。评分PARTIALLY。
                - listitem [ref=e181]:
                  - paragraph [ref=e182]: 焦虑症：同焦虑。推荐与焦虑相同：Alprazolam, Aripiprazole, Venlafaxine, venlafaxine HCl, Pregabalin。同样Aripiprazole不适合。所以PARTIALLY。
                - listitem [ref=e183]:
                  - paragraph [ref=e184]: 牛皮癣（银屑病）：推荐Betamethasone, Clobetasol, Desonide, Desoximetasone, Fluocinolone。全部是外用糖皮质激素，用于牛皮癣轻中度，适合。但注意长期使用强效激素需谨慎，但药物本身适用。评分APPROPRIATE。
                - listitem [ref=e185]:
                  - paragraph [ref=e186]: 玫瑰痤疮：推荐Doxycycline（口服抗生素，适合），Erythromycin（口服或外用？通常用于玫瑰痤疮，外用或口服，适合），Oxytetracycline（四环素类，适合），Spironolactone（螺内酯，用于女性痤疮或雄激素相关，但玫瑰痤疮不常用，主要用于寻常痤疮或多毛），Tazarotene（维A酸类，外用，可用于玫瑰痤疮？他扎罗汀刺激性强，通常用于痤疮和银屑病，玫瑰痤疮慎用。一般玫瑰痤疮治疗包括甲硝唑、壬二酸、伊维菌素、磺胺等。这里四环素类抗生素是合适的，但螺内酯和他扎罗汀不太标准。所以部分适合。评分PARTIALLY。
                - listitem [ref=e187]:
                  - paragraph [ref=e188]: "甲亢：推荐Cinacalcet（拟钙剂，用于甲状旁腺功能亢进，不用于甲亢），Doxercalciferol（维生素D类似物，用于继发性甲旁亢，不用于甲亢），Methimazole（甲巯咪唑，抗甲状腺药，适合），Propylthiouracil（丙硫氧嘧啶，适合），Irbesartan（ARB降压药，不用于甲亢）。所以只有2个适合，3个不适合。评分INAPPROPRIATE？但严格说，部分适合？有2个正确，但整体不适当，因为多数错误。通常认为如果超过一半不适合，可能INAPPROPRIATE。但评分标准：INAPPROPRIATE: 推荐药物完全不适合。这里不是完全不适合，因为有两个适合。所以应该是PARTIALLY？定义：“完全不适合”意味着没有一个适合。这里有两个适合，所以不是完全不适合。因此PARTIALLY。但需确认：Cinacalcet等完全错误。所以PARTIALLY合理。"
                - listitem [ref=e189]:
                  - paragraph [ref=e190]: 甲减：推荐Levothyroxine, Liotrix（甲状腺素/三碘甲腺原氨酸复合物，可用于甲减），Liothyronine（三碘甲腺原氨酸），levothyroxine(oral/injection)，thyroid desiccated（干甲状腺片）。全部可用于甲减治疗。注意Liotrix和干甲状腺片也是历史用药。所以全部适合。评分APPROPRIATE。
                - listitem [ref=e191]:
                  - paragraph [ref=e192]: 甲状腺功能亢进：同甲亢。推荐相同：Cinacalcet, Doxercalciferol, Methimazole, Propylthiouracil, Irbesartan。同样只有Methimazole和Propylthiouracil适合。所以PARTIALLY。
                - listitem [ref=e193]:
                  - paragraph [ref=e194]: 甲状腺功能减退：同甲减。推荐相同：Levothyroxine, Liotrix, Liothyronine, levothyroxine(oral/injection), thyroid desiccated。适合。APPROPRIATE。
                - listitem [ref=e195]:
                  - paragraph [ref=e196]: 甲状腺癌：推荐Vandetanib（用于髓样甲状腺癌，适合），Everolimus（mTOR抑制剂，用于某些甲状腺癌？有用于进展期甲状腺癌，但非标准一线），Sorafenib（多激酶抑制剂，用于分化型甲状腺癌，适合），levothyroxine(oral/injection)（甲状腺激素抑制治疗，用于分化型甲状腺癌术后抑制TSH，适合），levothyroxine(oral)（同上）。总体大部分适合。但Everolimus在甲状腺癌中适应症？FDA批准用于晚期肾细胞癌、胰腺神经内分泌肿瘤等，未专门批准用于甲状腺癌，但有研究使用。可能部分适合。另外注意Vandetanib和Sorafenib是靶向药，左甲状腺素是辅助。所以整体上5个药物中4个明确相关？Everolimus是否常用？更常见的是lenvatinib等。但可以认为部分适合。评分PARTIALLY。
                - listitem [ref=e197]:
                  - paragraph [ref=e198]: 甲状腺肿：推荐levothyroxine(oral/injection), levothyroxine(oral), thyroid desiccated（左甲状腺素和干甲状腺片用于抑制TSH，可缩小甲状腺肿，适合），Cinacalcet（不用于甲状腺肿，用于甲状旁腺），Doxercalciferol（不用于）。所以3个适合，2个不适合。PARTIALLY。
                - listitem [ref=e199]:
                  - paragraph [ref=e200]: 疱疹：推荐Valacyclovir, Acyclovir, acyclovir(oral), acyclovir(topical), Cidofovir。前四个均为抗疱疹病毒药物，适合。Cidofovir用于巨细胞病毒等，但对疱疹也有活性？通常用于CMV视网膜炎，不是一线疱疹治疗。但也可用于耐药HSV？可能不太常见。总体上大多数适合。但Cidofovir毒性大，不常规用于单纯疱疹或带状疱疹。因此部分适合？实际上Cidofovir对于HSV有活性，但通常不作为首选。可以认为部分适合。评分PARTIALLY。
                - listitem [ref=e201]:
                  - paragraph [ref=e202]: 疼痛：推荐Amitriptyline（三环抗抑郁药，用于神经病理性疼痛，适合），Aspirin（非甾体抗炎药，适合），Diclofenac（NSAID，适合），Flurbiprofen（NSAID，适合），Ibuprofen（NSAID，适合）。全部可用于疼痛治疗。但注意阿米替林主要用于慢性疼痛，也是合理的。所以APPROPRIATE。
                - listitem [ref=e203]:
                  - paragraph [ref=e204]: 病毒感染：这是个非常宽泛的疾病。推荐Probenecid（促进尿酸排泄，用于痛风，抗病毒？有报道增强抗病毒药效果，但本身不是抗病毒药），Tobramycin（氨基糖苷类抗生素，抗细菌，不抗病毒），Dipyridamole（抗血小板，有研究可能有抗病毒作用？但非标准），Ipratropium（抗胆碱能，用于COPD，不抗病毒），enalapril(oral)（ACEI降压药，不抗病毒）。这些药物均不是抗病毒药物。完全不适合。评分INAPPROPRIATE。
                - listitem [ref=e205]:
                  - paragraph [ref=e206]: 痔疮：推荐Hydrocortisone（外用糖皮质激素，适合），Cimetidine（H2受体拮抗剂，用于胃溃疡，不用于痔疮），Dexlansoprazole（质子泵抑制剂，不用于），Esomeprazole（PPI，不用于），Famotidine（H2拮抗剂，不用于）。只有氢化可的松适合痔疮（外用）。其他均为胃药，完全不相关。所以大部分不适合，只有1个适合。但标准：如果完全不适合则INAPPROPRIATE，但有一个适合？定义：“推荐药物完全不适合”意味着没有适合的。这里有一个适合，所以算PARTIALLY？然而其他4个明显错误。通常认为部分适合，但需注意临床中痔疮治疗可能包括口服静脉活性药物如地奥司明，而不是这些胃药。所以评分PARTIALLY。
                - listitem [ref=e207]:
                  - paragraph [ref=e208]: 痘痘（痤疮）：推荐Doxycycline, Erythromycin, Tretinoin, Norgestimate-Ethinyl Estradiol（口服避孕药），sarecycline（新型四环素类抗生素）。全部适合治疗痤疮。APPROPRIATE。
                - listitem [ref=e209]:
                  - paragraph [ref=e210]: 痛经：推荐Diclofenac, Aspirin, Ibuprofen, Ketoprofen, Naproxen。全部是NSAIDs，适合痛经。APPROPRIATE。
                - listitem [ref=e211]:
                  - paragraph [ref=e212]: 痛风：推荐Allopurinol（降尿酸，适合），Colchicine（秋水仙碱，急性期或预防，适合），Diclofenac（NSAID，适合急性痛风），Etodolac（NSAID，适合），Flurbiprofen（NSAID，适合）。全部适合。注意Allopurinol用于长期控制，急性期不用，但整体治疗痛风。APPROPRIATE。
                - listitem [ref=e213]:
                  - paragraph [ref=e214]: 痤疮：同痘痘，推荐相同。APPROPRIATE。
                - listitem [ref=e215]:
                  - paragraph [ref=e216]: 癫痫：推荐Clonazepam（苯二氮䓬，用于某些癫痫类型，如失神发作、肌阵挛，适合），Clorazepate（苯二氮䓬，用于部分性发作辅助，适合），Diazepam（用于癫痫持续状态，适合），Ethosuximide（失神发作首选，适合），Fosphenytoin（苯妥英前体，用于全身性强直-阵挛发作等，适合）。全部是抗癫痫药物，但需注意Clonazepam、Clorazepate、Diazepam长期使用有耐受性，但确实用于癫痫。所以APPROPRIATE。
                - listitem [ref=e217]:
                  - paragraph [ref=e218]: 癫痫发作：同癫痫，类似列表。但注意癫痫发作急性处理，这些药物大部分适用。同样APPROPRIATE。
                - listitem [ref=e219]:
                  - paragraph [ref=e220]: 白内障：推荐Timolol（β阻滞剂，降眼压，用于青光眼，不治疗白内障），betaxolol（同），Brimonidine（α激动剂，降眼压），Brinzolamide（碳酸酐酶抑制剂），Latanoprost（前列腺素类似物）。全部是抗青光眼药物，而非治疗白内障。白内障治疗只有手术。这些药物完全不适用于白内障。所以INAPPROPRIATE。
                - listitem [ref=e221]:
                  - paragraph [ref=e222]: 白血病：推荐Tretinoin（维A酸，用于急性早幼粒细胞白血病，适合），Folic Acid（叶酸，用于巨幼细胞贫血，不治疗白血病），Methotrexate（用于急性淋巴细胞白血病，适合），Doxorubicin（用于多种白血病，适合），Bendamustine（用于慢性淋巴细胞白血病，适合）。Folic Acid不适合。所以部分适合（4个适合，1个不适合）。PARTIALLY。
                - listitem [ref=e223]:
                  - paragraph [ref=e224]: 皮疹：推荐Betamethasone, Cetirizine, Desonide, Desoximetasone, Dexamethasone。外用糖皮质激素（Betamethasone, Desonide, Desoximetasone）和口服糖皮质激素（Dexamethasone），以及抗组胺药Cetirizine。这些均可用于治疗皮疹（各种原因引起的皮疹）。但需注意皮疹是非特异性，这些药物合理。所以APPROPRIATE。
                - listitem [ref=e225]:
                  - paragraph [ref=e226]: 皮肤软组织感染：推荐Amoxicillin-Clavulanate（口服，适合），Bacitracin（外用，适合），Cefazolin（一代头孢，适合），Cefepime（四代头孢，用于严重感染，适合但可能过度），Cefotaxime（三代头孢，适合）。全部是抗生素，可用于皮肤软组织感染。注意覆盖范围不同，但都是合理的。评分APPROPRIATE。
                - listitem [ref=e227]:
                  - paragraph [ref=e228]: 盆腔炎：推荐Cefoxitin（二代头孢，适合），Amikacin（氨基糖苷类，用于严重革兰阴性菌，但不作为盆腔炎一线，通常用于复杂感染），Clindamycin（适合，覆盖厌氧菌），clindamycin(oral/injection)（同），clindamycin(IM/IV)（同）。这里三个克林霉素重复，但实际药物不同剂型。Amikacin通常不首选，但对于盆腔炎可能联合使用吗？盆腔炎治疗指南推荐头孢曲松+多西环素，或克林霉素+庆大霉素等。阿米卡星类似庆大霉素，可以考虑。但通常不首选。然而总体这5个药物中，Cefoxitin和Clindamycin是核心，Amikacin可接受，但三个克林霉素其实是一种药。严格说，列表中有多个重复，但药物种类上，推荐了Cefoxitin, Amikacin, Clindamycin（三种抗生素）。这些都可以用于盆腔炎。所以可能APPROPRIATE。但需注意：盆腔炎需覆盖淋病奈瑟菌、衣原体、厌氧菌等，克林霉素和头孢西丁是合适的，阿米卡星可覆盖革兰阴性菌。所以我认为评分APPROPRIATE。但需确认是否完全适合？阿米卡星通常不是一线，但不为错误。因此APPROPRIATE。
              - paragraph [ref=e229]: 总结表格：疾病，评分，简要理由。注意格式。
