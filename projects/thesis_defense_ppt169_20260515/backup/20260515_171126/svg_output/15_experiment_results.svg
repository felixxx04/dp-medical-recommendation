<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="55" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">实验与测试结果</text>
  <rect x="80" y="67" width="120" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- KPI Cards — 1x4 row adapted from kpi_cards template -->
  <!-- KPI 1: Accuracy -->
  <rect x="80" y="95" width="270" height="130" rx="10" fill="#FFFFFF" stroke="#C62828" stroke-width="1.5"/>
  <text x="100" y="122" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">ε=0.1 准确率下降</text>
  <text x="100" y="170" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A1A2E">~10%</text>
  <text x="100" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">隐私保护代价可控</text>

  <!-- KPI 2: DP overhead -->
  <rect x="370" y="95" width="270" height="130" rx="10" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
  <text x="390" y="122" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">DP性能开销</text>
  <text x="390" y="170" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A1A2E">~5ms</text>
  <text x="390" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">噪声注入额外耗时</text>

  <!-- KPI 3: Response time -->
  <rect x="660" y="95" width="270" height="130" rx="10" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
  <text x="680" y="122" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00796B">推荐响应时间</text>
  <text x="680" y="170" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A1A2E">&lt;2s</text>
  <text x="680" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">含四层架构+DP全流程</text>

  <!-- KPI 4: Drug count -->
  <rect x="950" y="95" width="270" height="130" rx="10" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="970" y="122" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF8F00">药物候选规模</text>
  <text x="970" y="170" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1A1A2E">1807</text>
  <text x="970" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">种药物实时推荐</text>

  <!-- Data tables section -->
  <text x="80" y="260" font-family="KaiTi, Georgia, serif" font-size="18" font-weight="bold" fill="#1A1A2E">隐私预算 vs 准确率</text>

  <!-- Privacy budget table -->
  <rect x="80" y="278" width="540" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Table header -->
  <rect x="80" y="278" width="540" height="30" rx="8" fill="#00796B" fill-opacity="0.08"/>
  <rect x="80" y="300" width="540" height="8" fill="#00796B" fill-opacity="0.08"/>
  <text x="160" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#00796B" text-anchor="middle">ε 值</text>
  <text x="310" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#00796B" text-anchor="middle">准确率下降</text>
  <text x="490" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#00796B" text-anchor="middle">隐私保护强度</text>
  <!-- Row 1 -->
  <text x="160" y="330" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E" text-anchor="middle">1.0</text>
  <text x="310" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle">~2%</text>
  <text x="490" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">弱</text>
  <!-- Row 2 -->
  <text x="160" y="360" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E" text-anchor="middle">0.5</text>
  <text x="310" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" text-anchor="middle">~5%</text>
  <text x="490" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">中</text>
  <!-- Row 3 -->
  <text x="160" y="390" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E" text-anchor="middle">0.1</text>
  <text x="310" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#C62828" text-anchor="middle">~10%</text>
  <text x="490" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">强</text>

  <!-- Safety data coverage table -->
  <text x="660" y="260" font-family="KaiTi, Georgia, serif" font-size="18" font-weight="bold" fill="#1A1A2E">安全数据覆盖</text>

  <rect x="660" y="278" width="540" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="660" y="278" width="540" height="30" rx="8" fill="#1565C0" fill-opacity="0.08"/>
  <rect x="660" y="300" width="540" height="8" fill="#1565C0" fill-opacity="0.08"/>
  <text x="770" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0" text-anchor="middle">类别</text>
  <text x="930" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0" text-anchor="middle">覆盖率</text>
  <text x="1100" y="298" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0" text-anchor="middle">数量</text>
  <!-- Row 1 -->
  <text x="770" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" text-anchor="middle">禁忌症</text>
  <text x="930" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">95.3%</text>
  <text x="1100" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">1831/1815</text>
  <!-- Row 2 -->
  <text x="770" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" text-anchor="middle">药物交互</text>
  <text x="930" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" text-anchor="middle" font-weight="bold">81.5%</text>
  <text x="1100" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">1480/1815</text>
  <!-- Row 3 -->
  <text x="770" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" text-anchor="middle">任意安全数据</text>
  <text x="930" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">97.0%</text>
  <text x="1100" y="390" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A" text-anchor="middle">总体覆盖</text>

  <!-- Bottom section: additional results -->
  <rect x="80" y="440" width="1120" height="210" rx="10" fill="#F5F7FA"/>
  <text x="100" y="472" font-family="KaiTi, Georgia, serif" font-size="18" font-weight="bold" fill="#1A1A2E">其他关键指标</text>

  <!-- Metric cards in row -->
  <!-- Route coverage -->
  <rect x="100" y="490" width="250" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="225" y="518" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#00796B" text-anchor="middle">92.5%</text>
  <text x="225" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A" text-anchor="middle">适应症路由覆盖率</text>

  <!-- Chinese disease support -->
  <rect x="370" y="490" width="250" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="495" y="518" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">1295</text>
  <text x="495" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A" text-anchor="middle">种中文疾病输入支持</text>

  <!-- Functional tests -->
  <rect x="640" y="490" width="250" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="765" y="518" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2E7D32" text-anchor="middle">12/12</text>
  <text x="765" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A" text-anchor="middle">功能测试全部通过</text>

  <!-- Safety filter not affected -->
  <rect x="910" y="490" width="270" height="70" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1045" y="518" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2E7D32" text-anchor="middle">0 影响</text>
  <text x="1045" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A" text-anchor="middle">SafetyFilter不受DP噪声影响</text>

  <!-- Key finding -->
  <rect x="100" y="580" width="1080" height="50" rx="8" fill="#00796B" fill-opacity="0.06"/>
  <text x="640" y="610" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#00796B" text-anchor="middle" font-weight="bold">核心发现：DP保护不降低模型质量 — DP模型separation(0.85)高于无DP基线(0.75)，更好区分高/低分药物</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">15</text>
</svg>