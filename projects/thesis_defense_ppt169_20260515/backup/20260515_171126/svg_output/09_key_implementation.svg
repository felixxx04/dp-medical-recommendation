<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">关键实现</text>
  <rect x="80" y="72" width="100" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Q1: RBAC -->
  <rect x="80" y="105" width="550" height="250" rx="10" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
  <rect x="80" y="105" width="550" height="40" rx="10" fill="#00796B"/>
  <rect x="80" y="137" width="550" height="8" fill="#00796B"/>
  <text x="100" y="132" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">三角色RBAC权限控制</text>

  <text x="100" y="175" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#00796B">管理员</text>
  <text x="170" y="175" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">全权限</text>
  <text x="100" y="205" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">医生</text>
  <text x="150" y="205" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">患者管理 + 推荐审核</text>
  <text x="100" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FF8F00">研究员</text>
  <text x="165" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">隐私分析 + 统计查看</text>

  <rect x="100" y="265" width="510" height="30" rx="6" fill="#00796B" fill-opacity="0.06"/>
  <text x="355" y="286" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#00796B" text-anchor="middle">前后端双重权限校验</text>

  <!-- Q2: Feedback -->
  <rect x="650" y="105" width="550" height="250" rx="10" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="650" y="105" width="550" height="40" rx="10" fill="#1565C0"/>
  <rect x="650" y="137" width="550" height="8" fill="#1565C0"/>
  <text x="670" y="132" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">审核反馈闭环</text>

  <text x="670" y="175" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">FeedbackLearner 渐进式惩罚</text>
  <text x="670" y="205" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">1次拒绝 ×0.7，2次 ×0.5，3次+ ×0.3</text>
  <text x="670" y="235" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">被反复拒绝的药物权重持续衰减</text>

  <rect x="670" y="265" width="510" height="30" rx="6" fill="#1565C0" fill-opacity="0.06"/>
  <text x="925" y="286" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1565C0" text-anchor="middle">推荐 → 审核 → 惩罚 → 优化 → 推荐</text>

  <!-- Q3: Explanation -->
  <rect x="80" y="375" width="550" height="250" rx="10" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
  <rect x="80" y="375" width="550" height="40" rx="10" fill="#FF8F00"/>
  <rect x="80" y="407" width="550" height="8" fill="#FF8F00"/>
  <text x="100" y="402" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">推荐解释生成</text>

  <text x="100" y="445" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FF8F00">三维解释信息</text>
  <text x="100" y="475" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">1. 适应症匹配详情</text>
  <text x="100" y="500" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">2. 安全性分析（禁忌/交互/妊娠）</text>
  <text x="100" y="525" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">3. 推荐理由说明</text>

  <rect x="100" y="550" width="510" height="30" rx="6" fill="#FF8F00" fill-opacity="0.06"/>
  <text x="355" y="571" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" text-anchor="middle">ClinicalMatcher标准化匹配，准确率95%+</text>

  <!-- Q4: Translation -->
  <rect x="650" y="375" width="550" height="250" rx="10" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  <rect x="650" y="375" width="550" height="40" rx="10" fill="#2E7D32"/>
  <rect x="650" y="407" width="550" height="8" fill="#2E7D32"/>
  <text x="670" y="402" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">全字段中文翻译</text>

  <text x="670" y="445" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E7D32">双语翻译管线</text>
  <text x="670" y="475" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">drug_translator — 药物名 EN→CN</text>
  <text x="670" y="500" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">translation_mapper — 统一映射</text>
  <text x="670" y="525" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">disease_mapper — 中文疾病→英文</text>

  <rect x="670" y="550" width="510" height="30" rx="6" fill="#2E7D32" fill-opacity="0.06"/>
  <text x="925" y="571" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle">推荐结果同时返回中文 + 英文名称</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">09</text>
</svg>