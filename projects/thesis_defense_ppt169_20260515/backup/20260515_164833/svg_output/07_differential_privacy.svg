<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">差分隐私推理阶段保护</text>
  <rect x="80" y="72" width="160" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Left half: Noise + Post-processing -->
  <text x="80" y="110" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">噪声机制与临床后处理</text>

  <!-- Noise mechanisms -->
  <rect x="80" y="125" width="540" height="75" rx="8" fill="#F5F7FA" stroke="#1565C0" stroke-width="1"/>
  <rect x="80" y="125" width="4" height="75" rx="2" fill="#1565C0"/>
  <text x="100" y="152" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Laplace</text>
  <text x="100" y="175" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E">scale = Δf / ε</text>
  <text x="310" y="152" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Gaussian</text>
  <text x="310" y="175" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E">σ = Δf×√(2ln(1.25/δ)) / ε</text>
  <text x="520" y="175" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE">默认 ε=0.1</text>

  <!-- Clinical post-processing -->
  <rect x="80" y="215" width="540" height="200" rx="8" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
  <rect x="80" y="215" width="540" height="36" rx="8" fill="#00796B" fill-opacity="0.08"/>
  <rect x="80" y="245" width="540" height="6" fill="#00796B" fill-opacity="0.08"/>
  <text x="100" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#00796B">临床阈值后处理（DP后处理定理，不降低隐私保护）</text>

  <text x="100" y="282" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">1. 低分置零：score &lt; 0.15 → 0</text>
  <text x="400" y="282" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">低分不被噪声意外提升</text>

  <text x="100" y="316" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">2. 上限裁剪：ceiling = min(1.0, raw+0.35)</text>
  <text x="400" y="316" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">防止噪声放大超3.5倍</text>

  <text x="100" y="350" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">3. dpAnomaly标记：噪声改变排序方向时触发</text>

  <text x="100" y="384" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">4. 95%置信区间：Laplace ±2b/√3，Gaussian ±1.96σ</text>

  <!-- Right half: Budget management -->
  <text x="680" y="110" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">隐私预算管理</text>

  <!-- Dual tracking -->
  <rect x="680" y="125" width="520" height="120" rx="8" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="680" y="125" width="520" height="36" rx="8" fill="#1565C0" fill-opacity="0.08"/>
  <rect x="680" y="155" width="520" height="6" fill="#1565C0" fill-opacity="0.08"/>
  <text x="700" y="150" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">双重追踪机制</text>

  <text x="700" y="185" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">1. MySQL持久化：budget_used + ledger事件日志</text>
  <text x="700" y="215" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">2. 内存Tracker：强组合定理实时追踪</text>
  <text x="700" y="238" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">服务重启后从MySQL恢复预算状态</text>

  <!-- Warning levels — compact -->
  <rect x="680" y="260" width="520" height="155" rx="8" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
  <rect x="680" y="260" width="520" height="36" rx="8" fill="#FF8F00" fill-opacity="0.08"/>
  <rect x="680" y="290" width="520" height="6" fill="#FF8F00" fill-opacity="0.08"/>
  <text x="700" y="285" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FF8F00">三级预算预警</text>

  <circle cx="715" cy="320" r="8" fill="#2E7D32"/>
  <text x="730" y="325" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#2E7D32" font-weight="bold">GREEN</text>
  <text x="810" y="325" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">预算充足，正常推荐</text>

  <circle cx="715" cy="355" r="8" fill="#FF8F00"/>
  <text x="730" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#FF8F00" font-weight="bold">YELLOW</text>
  <text x="818" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">接近上限，警告提示</text>

  <circle cx="715" cy="390" r="8" fill="#C62828"/>
  <text x="730" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#C62828" font-weight="bold">RED</text>
  <text x="795" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">预算耗尽，拒绝推荐</text>

  <!-- Bottom summary -->
  <rect x="80" y="440" width="1120" height="60" rx="8" fill="#F5F7FA"/>
  <text x="100" y="468" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">核心思路</text>
  <text x="200" y="468" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#546E7A">后处理定理保证：对DP输出做确定性变换不降低隐私保护强度</text>
  <text x="100" y="492" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#546E7A">临床阈值裁剪是公开函数 → 安全性与精度可兼得</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">07</text>
</svg>