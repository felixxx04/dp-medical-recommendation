<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="coverDecor" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00796B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00796B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#coverDecor)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#bottomBar)"/>

  <!-- Left vertical accent -->
  <rect x="80" y="120" width="4" height="400" fill="#00796B" fill-opacity="0.15" rx="2"/>

  <!-- Main title area -->
  <g id="cover-title">
    <text x="120" y="200" font-family="KaiTi, Georgia, serif" font-size="42" font-weight="bold" fill="#1A1A2E">
      差分隐私保护的AI驱动的
    </text>
    <text x="120" y="260" font-family="KaiTi, Georgia, serif" font-size="42" font-weight="bold" fill="#1A1A2E">
      个性化医疗用药推荐系统
    </text>
    <text x="120" y="305" font-family="KaiTi, Georgia, serif" font-size="24" fill="#546E7A">
      的设计与实现
    </text>
    <!-- Title underline -->
    <rect x="120" y="318" width="200" height="3" rx="1.5" fill="url(#titleUnderline)"/>
  </g>

  <!-- Subtitle badge -->
  <g id="cover-badge">
    <rect x="120" y="350" width="220" height="36" rx="18" fill="#00796B" fill-opacity="0.1"/>
    <text x="230" y="374" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="600" fill="#00796B" text-anchor="middle">本科毕业设计答辩</text>
  </g>

  <!-- Info area -->
  <g id="cover-info">
    <text x="120" y="440" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#546E7A">
      <tspan x="120" dy="0">学　　生：晋修慧</tspan>
      <tspan x="120" dy="34">指导教师：侯慧莹　讲师</tspan>
      <tspan x="120" dy="34">院　　系：人工智能与大数据　大数据2203</tspan>
    </text>
  </g>

  <!-- Right side decorative element -->
  <g id="cover-decor">
    <!-- Abstract hexagon pattern suggesting medical/tech -->
    <polygon points="1050,160 1100,130 1150,160 1150,210 1100,240 1050,210" fill="none" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.2"/>
    <polygon points="1000,260 1050,230 1100,260 1100,310 1050,340 1000,310" fill="#00796B" fill-opacity="0.06" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.15"/>
    <polygon points="1100,260 1150,230 1200,260 1200,310 1150,340 1100,310" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.2"/>
    <polygon points="1050,360 1100,330 1150,360 1150,410 1100,440 1050,410" fill="#1565C0" fill-opacity="0.06" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.15"/>
    <polygon points="1150,360 1200,330 1250,360 1250,410 1200,440 1150,410" fill="none" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.2"/>
    <polygon points="1050,460 1100,430 1150,460 1150,510 1100,540 1050,510" fill="none" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.15"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="660" width="1280" height="60" fill="url(#bottomBar)" fill-opacity="0.06"/>
  <text x="120" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#90A4AE">2026年3月</text>
</svg>
