<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <clipPath id="clip1"><rect x="80" y="100" width="550" height="250" rx="8"/></clipPath>
    <clipPath id="clip2"><rect x="650" y="100" width="550" height="250" rx="8"/></clipPath>
    <clipPath id="clip3"><rect x="80" y="375" width="550" height="250" rx="8"/></clipPath>
    <clipPath id="clip4"><rect x="650" y="375" width="550" height="250" rx="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">系统界面展示</text>
  <rect x="80" y="72" width="120" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Screenshot 1: Review page -->
  <rect x="80" y="100" width="550" height="250" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <image href="images/screenshot_review.png" x="80" y="100" width="550" height="250" clip-path="url(#clip1)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="80" y="100" width="550" height="250" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="90" y="330" width="530" height="24" rx="4" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="100" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A1A2E">推荐审核页面</text>
  <text x="215" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#546E7A">待审核列表 + 审核面板 + 安全标签</text>

  <!-- Screenshot 2: Privacy page -->
  <rect x="650" y="100" width="550" height="250" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <image href="images/screenshot_privacy.png" x="650" y="100" width="550" height="250" clip-path="url(#clip2)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="650" y="100" width="550" height="250" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="660" y="330" width="530" height="24" rx="4" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="670" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A1A2E">隐私配置页面</text>
  <text x="785" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#546E7A">ε/δ参数 + 效用权衡 + 预算管理</text>

  <!-- Screenshot 3: Dashboard -->
  <rect x="80" y="375" width="550" height="250" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <image href="images/screenshot_dashboard.png" x="80" y="375" width="550" height="250" clip-path="url(#clip3)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="80" y="375" width="550" height="250" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="90" y="605" width="530" height="24" rx="4" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="100" y="623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A1A2E">推荐统计仪表板</text>
  <text x="227" y="623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#546E7A">趋势图 + Top10 + 安全分层</text>

  <!-- Screenshot 4: Home page -->
  <rect x="650" y="375" width="550" height="250" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <image href="images/screenshot_home.png" x="650" y="375" width="550" height="250" clip-path="url(#clip4)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="650" y="375" width="550" height="250" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="660" y="605" width="530" height="24" rx="4" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="670" y="623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A1A2E">系统首页</text>
  <text x="755" y="623" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#546E7A">核心指标 + 功能模块卡片</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">10</text>
</svg>