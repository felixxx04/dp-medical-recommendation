<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">研究背景与痛点</text>
  <rect x="80" y="72" width="120" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Left column: 3 big stat numbers -->
  <g id="left-stats">
    <rect x="80" y="130" width="420" height="130" rx="10" fill="#F5F7FA"/>
    <rect x="80" y="130" width="4" height="130" rx="2" fill="#00796B"/>
    <text x="110" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="52" font-weight="bold" fill="#00796B">30%+</text>
    <text x="110" y="210" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#546E7A">医疗数据年增长</text>
    <text x="110" y="245" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#90A4AE">互联网医院2700+，电子病历普及率85%+</text>

    <rect x="80" y="280" width="420" height="130" rx="10" fill="#F5F7FA"/>
    <rect x="80" y="280" width="4" height="130" rx="2" fill="#C62828"/>
    <text x="110" y="330" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="52" font-weight="bold" fill="#C62828">700+</text>
    <text x="110" y="360" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#546E7A">2022年医疗数据泄露</text>
    <text x="110" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#90A4AE">影响5000万+患者</text>

    <rect x="80" y="430" width="420" height="130" rx="10" fill="#F5F7FA"/>
    <rect x="80" y="430" width="4" height="130" rx="2" fill="#1565C0"/>
    <text x="110" y="480" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="52" font-weight="bold" fill="#1565C0">85%+</text>
    <text x="110" y="510" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#546E7A">电子病历普及率</text>
    <text x="110" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#90A4AE">数据规模与隐私风险矛盾突出</text>
  </g>

  <!-- Right column: 3 pain points, compressed -->
  <g id="right-painpoints">
    <text x="560" y="160" font-family="KaiTi, Georgia, serif" font-size="22" font-weight="bold" fill="#1A1A2E">三大核心痛点</text>

    <!-- Pain 1 -->
    <rect x="560" y="185" width="640" height="130" rx="10" fill="#FFFFFF" stroke="#C62828" stroke-width="1.5"/>
    <rect x="560" y="185" width="4" height="130" rx="2" fill="#C62828"/>
    <text x="590" y="222" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C62828">传统隐私保护失效</text>
    <text x="590" y="254" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#546E7A">K-匿名、L-多样性无法抵御关联攻击和背景知识推断</text>
    <text x="590" y="290" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#C62828">→ 缺乏数学可证明的安全保障</text>

    <!-- Pain 2 -->
    <rect x="560" y="335" width="640" height="130" rx="10" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
    <rect x="560" y="335" width="4" height="130" rx="2" fill="#FF8F00"/>
    <text x="590" y="372" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF8F00">差分隐私与推荐系统融合研究匮乏</text>
    <text x="590" y="404" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#546E7A">ε-差分隐私有数学证明，但与推荐系统结合极少</text>
    <text x="590" y="440" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#FF8F00">→ 噪声对推荐精度的影响缺乏系统性研究</text>

    <!-- Pain 3 -->
    <rect x="560" y="485" width="640" height="130" rx="10" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
    <rect x="560" y="485" width="4" height="130" rx="2" fill="#00796B"/>
    <text x="590" y="522" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="bold" fill="#00796B">安全性与可解释性不足</text>
    <text x="590" y="554" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#546E7A">医疗推荐缺乏安全约束，隐私与精度难兼顾</text>
    <text x="590" y="590" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#00796B">→ 医生难以信任和采纳推荐结果</text>
  </g>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">02</text>
</svg>