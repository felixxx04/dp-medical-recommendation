<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">系统界面展示</text>
  <rect x="80" y="72" width="120" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- 2x2 screenshot grid with placeholders -->
  <!-- Screenshot 1: Review page -->
  <rect x="80" y="105" width="540" height="260" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Placeholder for screenshot -->
  <rect x="100" y="125" width="500" height="180" rx="4" fill="#E8EDF2" stroke="#D0D7DE" stroke-width="1"/>
  <text x="350" y="210" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#90A4AE" text-anchor="middle">推荐审核页面截图</text>
  <text x="350" y="232" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#B0B8C0" text-anchor="middle">images/screenshot_review.png</text>
  <!-- Label -->
  <rect x="100" y="320" width="500" height="32" rx="4" fill="#FFFFFF"/>
  <text x="110" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">推荐审核页面</text>
  <text x="280" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">左侧待审核列表 + 右侧审核面板 + 安全级别标签(绿/黄/橙/紫)</text>

  <!-- Screenshot 2: Privacy page -->
  <rect x="660" y="105" width="540" height="260" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="680" y="125" width="500" height="180" rx="4" fill="#E8EDF2" stroke="#D0D7DE" stroke-width="1"/>
  <text x="930" y="210" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#90A4AE" text-anchor="middle">隐私配置页面截图</text>
  <text x="930" y="232" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#B0B8C0" text-anchor="middle">images/screenshot_privacy.png</text>
  <rect x="680" y="320" width="500" height="32" rx="4" fill="#FFFFFF"/>
  <text x="690" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">隐私配置页面</text>
  <text x="860" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">ε/δ/噪声机制参数 + 隐私-效用权衡图表 + 预算管理</text>

  <!-- Screenshot 3: Dashboard -->
  <rect x="80" y="390" width="540" height="260" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="100" y="410" width="500" height="180" rx="4" fill="#E8EDF2" stroke="#D0D7DE" stroke-width="1"/>
  <text x="350" y="495" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#90A4AE" text-anchor="middle">推荐统计仪表板截图</text>
  <text x="350" y="517" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#B0B8C0" text-anchor="middle">images/screenshot_dashboard.png</text>
  <rect x="100" y="605" width="500" height="32" rx="4" fill="#FFFFFF"/>
  <text x="110" y="627" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">推荐统计仪表板</text>
  <text x="280" y="627" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">趋势折线图 + 药物Top10 + ATC分类 + 安全分层漏斗</text>

  <!-- Screenshot 4: Home page -->
  <rect x="660" y="390" width="540" height="260" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="680" y="410" width="500" height="180" rx="4" fill="#E8EDF2" stroke="#D0D7DE" stroke-width="1"/>
  <text x="930" y="495" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#90A4AE" text-anchor="middle">系统首页截图</text>
  <text x="930" y="517" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#B0B8C0" text-anchor="middle">images/screenshot_home.png</text>
  <rect x="680" y="605" width="500" height="32" rx="4" fill="#FFFFFF"/>
  <text x="690" y="627" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">系统首页</text>
  <text x="800" y="627" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">核心数据指标 + 四大功能模块卡片</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">10</text>
