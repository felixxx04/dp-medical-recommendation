<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">差分隐私推理阶段保护</text>
  <rect x="80" y="72" width="160" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Left half: Noise mechanism + post-processing -->
  <text x="80" y="110" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">噪声机制与临床后处理</text>

  <!-- Noise mechanisms -->
  <rect x="80" y="125" width="540" height="90" rx="8" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="80" y="125" width="4" height="90" rx="2" fill="#1565C0"/>

  <text x="100" y="152" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Laplace机制</text>
  <text x="100" y="175" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E">scale = Δf / ε</text>
  <text x="300" y="152" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">Gaussian机制</text>
  <text x="300" y="175" font-family="Consolas, Courier New, monospace" font-size="14" fill="#1A1A2E">σ = Δf × √(2ln(1.25/δ)) / ε</text>
  <text x="100" y="200" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE">默认配置：ε=0.1 Gaussian噪声</text>

  <!-- Clinical threshold post-processing -->
  <rect x="80" y="230" width="540" height="250" rx="8" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
  <rect x="80" y="230" width="540" height="36" rx="8" fill="#00796B" fill-opacity="0.08"/>
  <rect x="80" y="260" width="540" height="6" fill="#00796B" fill-opacity="0.08"/>
  <text x="100" y="255" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#00796B">临床阈值后处理（基于DP后处理定理，不降低隐私保护）</text>

  <text x="100" y="292" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">1. 低分置零</text>
  <text x="100" y="314" font-family="Consolas, Courier New, monospace" font-size="13" fill="#546E7A">score &lt; 0.15 → 0</text>
  <text x="350" y="314" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE">低分药物不被噪声意外提升</text>

  <text x="100" y="344" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2. 上限裁剪</text>
  <text x="100" y="366" font-family="Consolas, Courier New, monospace" font-size="13" fill="#546E7A">ceiling = min(1.0, raw + 0.35)</text>
  <text x="350" y="366" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE">防止噪声将低分放大超3.5倍</text>

  <text x="100" y="396" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">3. dpAnomaly标记</text>
  <text x="100" y="418" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">噪声显著改变排序方向时触发</text>

  <text x="100" y="448" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">4. 95%置信区间</text>
  <text x="100" y="468" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">Laplace CI = ±2b/√3</text>
  <text x="280" y="468" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">Gaussian CI = ±1.96σ</text>

  <!-- Right half: Budget management -->
  <text x="680" y="110" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">隐私预算管理</text>

  <!-- Budget tracking -->
  <rect x="680" y="125" width="520" height="170" rx="8" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="680" y="125" width="520" height="36" rx="8" fill="#1565C0" fill-opacity="0.08"/>
  <rect x="680" y="155" width="520" height="6" fill="#1565C0" fill-opacity="0.08"/>
  <text x="700" y="150" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">双重追踪机制</text>

  <text x="700" y="185" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">1. MySQL持久化</text>
  <text x="700" y="205" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">privacy_config.budget_used + privacy_ledger 事件日志</text>

  <text x="700" y="232" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2. 内存Tracker</text>
  <text x="700" y="252" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">PrivacyBudgetTracker 强组合定理实时追踪</text>

  <text x="700" y="280" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">服务重启后从MySQL恢复预算状态</text>

  <!-- Budget warning levels -->
  <rect x="680" y="310" width="520" height="170" rx="8" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
  <rect x="680" y="310" width="520" height="36" rx="8" fill="#FF8F00" fill-opacity="0.08"/>
  <rect x="680" y="340" width="520" height="6" fill="#FF8F00" fill-opacity="0.08"/>
  <text x="700" y="335" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FF8F00">BudgetWarningLevel 三级预警</text>

  <rect x="700" y="360" width="460" height="36" rx="6" fill="#2E7D32" fill-opacity="0.08"/>
  <circle cx="720" cy="378" r="8" fill="#2E7D32"/>
  <text x="735" y="383" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">GREEN</text>
  <text x="800" y="383" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">预算充足，正常推荐</text>

  <rect x="700" y="404" width="460" height="36" rx="6" fill="#FF8F00" fill-opacity="0.08"/>
  <circle cx="720" cy="422" r="8" fill="#FF8F00"/>
  <text x="735" y="427" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" font-weight="bold">YELLOW</text>
  <text x="808" y="427" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">预算接近上限，警告提示</text>

  <rect x="700" y="448" width="460" height="36" rx="6" fill="#C62828" fill-opacity="0.08"/>
  <circle cx="720" cy="466" r="8" fill="#C62828"/>
  <text x="735" y="471" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#C62828" font-weight="bold">RED</text>
  <text x="785" y="471" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">预算耗尽，拒绝推荐请求</text>

  <!-- Bottom summary -->
  <rect x="80" y="510" width="1120" height="80" rx="8" fill="#F5F7FA"/>
  <text x="100" y="540" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">核心设计思路</text>
  <text x="100" y="565" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">后处理定理保证：对DP输出做确定性变换不降低隐私保护强度</text>
  <text x="100" y="585" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">临床阈值裁剪是公开函数，不泄露个体信息 → 安全性与精度可兼得</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">07</text>
</svg>