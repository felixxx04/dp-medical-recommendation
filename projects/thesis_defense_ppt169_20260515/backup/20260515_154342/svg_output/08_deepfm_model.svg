<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">DeepFM v3模型改进</text>
  <rect x="80" y="72" width="140" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Three-column cards -->
  <!-- Column 1: Merged Embedding -->
  <rect x="80" y="110" width="360" height="500" rx="10" fill="#FFFFFF" stroke="#00796B" stroke-width="1.5"/>
  <rect x="80" y="110" width="360" height="48" rx="10" fill="#00796B"/>
  <rect x="80" y="148" width="360" height="10" fill="#00796B"/>
  <text x="260" y="142" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">合并嵌入 Merged Embedding</text>

  <text x="100" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00796B">Opacus兼容DP训练</text>
  <rect x="100" y="200" width="320" height="1" fill="#E0E0E0"/>

  <text x="100" y="225" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">问题：传统做法每字段独立Embedding</text>
  <text x="100" y="248" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ Opacus不支持多Embedding梯度采样</text>

  <text x="100" y="280" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00796B">解决方案</text>
  <rect x="100" y="290" width="320" height="1" fill="#E0E0E0"/>

  <text x="100" y="315" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">单个 nn.Embedding 共享嵌入空间</text>
  <text x="100" y="340" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">+ field_offsets 寄存器分段索引</text>

  <rect x="100" y="365" width="320" height="70" rx="6" fill="#00796B" fill-opacity="0.05"/>
  <text x="260" y="390" font-family="Consolas, Courier New, monospace" font-size="13" fill="#00796B" text-anchor="middle">15个类别字段共享嵌入空间</text>
  <text x="260" y="412" font-family="Consolas, Courier New, monospace" font-size="13" fill="#00796B" text-anchor="middle">embed_dim = 8</text>
  <text x="260" y="430" font-family="Consolas, Courier New, monospace" font-size="13" fill="#00796B" text-anchor="middle">总vocab = 各字段词表之和</text>

  <text x="100" y="470" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#00796B">效果</text>
  <rect x="100" y="480" width="320" height="1" fill="#E0E0E0"/>
  <text x="100" y="505" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32">✓ 支持Opacus DP-SGD训练</text>
  <text x="100" y="528" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32">✓ 参数量减少，训练效率提升</text>
  <text x="100" y="551" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32">✓ 跨字段语义信息共享</text>

  <!-- Column 2: Continuous Feature Bypass -->
  <rect x="460" y="110" width="360" height="500" rx="10" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="460" y="110" width="360" height="48" rx="10" fill="#1565C0"/>
  <rect x="460" y="148" width="360" height="10" fill="#1565C0"/>
  <text x="640" y="142" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">连续特征旁路</text>

  <text x="480" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">绕过嵌入/FM/Deep的直通路</text>
  <rect x="480" y="200" width="320" height="1" fill="#E0E0E0"/>

  <text x="480" y="225" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">4个连续特征直接参与评分：</text>

  <rect x="480" y="245" width="320" height="30" rx="4" fill="#1565C0" fill-opacity="0.06"/>
  <text x="490" y="265" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0">age_raw, bmi_raw, gfr_raw, liver_score_raw</text>

  <text x="480" y="300" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">为什么需要旁路？</text>
  <rect x="480" y="310" width="320" height="1" fill="#E0E0E0"/>
  <text x="480" y="335" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">连续特征经Embedding层</text>
  <text x="480" y="358" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ 离散化损失精度</text>
  <text x="480" y="385" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">GFR和肝功能评分是关键临床指标</text>
  <text x="480" y="408" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ 必须保留原始数值精度</text>

  <text x="480" y="440" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">实现方式</text>
  <rect x="480" y="450" width="320" height="1" fill="#E0E0E0"/>
  <text x="480" y="475" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">独立线性变换</text>
  <text x="480" y="498" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ 与FM+Deep输出拼接</text>
  <text x="480" y="521" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ 共同进入最终预测层</text>

  <rect x="480" y="550" width="320" height="36" rx="6" fill="#1565C0" fill-opacity="0.06"/>
  <text x="640" y="574" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">肾/肝功能评分直接参与推荐决策</text>

  <!-- Column 3: Training Optimization -->
  <rect x="840" y="110" width="360" height="500" rx="10" fill="#FFFFFF" stroke="#FF8F00" stroke-width="1.5"/>
  <rect x="840" y="110" width="360" height="48" rx="10" fill="#FF8F00"/>
  <rect x="840" y="148" width="360" height="10" fill="#FF8F00"/>
  <text x="1020" y="142" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">训练优化</text>

  <text x="860" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF8F00">1. LayerNorm 替代 BatchNorm</text>
  <rect x="860" y="200" width="320" height="1" fill="#E0E0E0"/>
  <text x="860" y="225" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">推理无需批统计量</text>
  <text x="860" y="248" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">→ 单样本推理无偏差</text>
  <text x="860" y="271" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32">✓ 与Opacus DP-SGD兼容</text>

  <text x="860" y="310" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF8F00">2. 差异化Dropout</text>
  <rect x="860" y="320" width="320" height="1" fill="#E0E0E0"/>
  <text x="860" y="345" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">FM层 Dropout = 0.3</text>
  <text x="860" y="368" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">Deep层 Dropout = 0.1</text>
  <text x="860" y="395" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">FM低阶交叉需更强正则</text>
  <text x="860" y="418" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">Deep高阶网络自身有泛化性</text>

  <text x="860" y="460" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF8F00">3. Focal Loss</text>
  <rect x="860" y="470" width="320" height="1" fill="#E0E0E0"/>
  <text x="860" y="495" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">α = 0.25, γ = 2.0</text>
  <text x="860" y="518" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">聚焦难分样本，抑制易分样本</text>
  <text x="860" y="541" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">应对正负样本极度不平衡</text>

  <rect x="860" y="565" width="320" height="30" rx="6" fill="#FF8F00" fill-opacity="0.06"/>
  <text x="1020" y="585" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#FF8F00" text-anchor="middle" font-weight="bold">1807种候选药物 vs 少数适配药物</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">08</text>
</svg>