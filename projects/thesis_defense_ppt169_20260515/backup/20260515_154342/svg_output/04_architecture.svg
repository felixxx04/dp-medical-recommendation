<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0,0 L 8,4 L 0,8 Z" fill="#546E7A"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M 8,0 L 0,4 L 8,8 Z" fill="#546E7A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)"/>

  <!-- Header -->
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">系统总体架构</text>
  <rect x="80" y="72" width="120" height="3" rx="1.5" fill="url(#titleUnderline)"/>

  <!-- Three service blocks -->
  <!-- Frontend -->
  <rect x="80" y="120" width="320" height="200" rx="10" fill="#FFFFFF" stroke="#00796B" stroke-width="2"/>
  <rect x="80" y="120" width="320" height="40" rx="10" fill="#00796B"/>
  <rect x="80" y="150" width="320" height="10" fill="#00796B"/>
  <text x="240" y="148" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">前端服务 :5173</text>
  <text x="100" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" font-weight="bold">React 18 + TypeScript + Vite</text>
  <text x="100" y="214" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">Tailwind CSS 响应式界面</text>
  <text x="100" y="238" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">Auth Context + 状态管理</text>
  <text x="100" y="262" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">推荐审核 / 隐私配置 / 统计仪表板</text>
  <text x="100" y="290" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">四页面路由 + RBAC前端守卫</text>

  <!-- Backend -->
  <rect x="480" y="120" width="320" height="200" rx="10" fill="#FFFFFF" stroke="#1565C0" stroke-width="2"/>
  <rect x="480" y="120" width="320" height="40" rx="10" fill="#1565C0"/>
  <rect x="480" y="150" width="320" height="10" fill="#1565C0"/>
  <text x="640" y="148" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">后端服务 :8080</text>
  <text x="500" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" font-weight="bold">Spring Boot 3.2 + MyBatis</text>
  <text x="500" y="214" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">JWT认证 + RBAC权限校验</text>
  <text x="500" y="238" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">MySQL数据持久化 + RESTful API</text>
  <text x="500" y="262" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">代理模型服务调用 + 数据转发</text>
  <text x="500" y="290" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">启动时加载1807种药物至模型服务</text>

  <!-- Model Service -->
  <rect x="880" y="120" width="320" height="200" rx="10" fill="#FFFFFF" stroke="#FF8F00" stroke-width="2"/>
  <rect x="880" y="120" width="320" height="40" rx="10" fill="#FF8F00"/>
  <rect x="880" y="150" width="320" height="10" fill="#FF8F00"/>
  <text x="1040" y="148" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">模型服务 :8001</text>
  <text x="900" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" font-weight="bold">FastAPI + PyTorch DeepFM</text>
  <text x="900" y="214" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">四层推荐架构 + DP噪声注入</text>
  <text x="900" y="238" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">隐私预算追踪 + 审计日志</text>
  <text x="900" y="262" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#546E7A">中文翻译管线 (EN→CN)</text>
  <text x="900" y="290" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">口语增强 + 疾病映射 + 审核反馈</text>

  <!-- Arrows between services -->
  <line x1="400" y1="220" x2="480" y2="220" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="480" y1="240" x2="400" y2="240" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <line x1="800" y1="220" x2="880" y2="220" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="880" y1="240" x2="800" y2="240" stroke="#546E7A" stroke-width="2" marker-end="url(#arrowLeft)"/>

  <!-- Arrow labels -->
  <text x="440" y="215" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" fill="#546E7A" text-anchor="middle">请求</text>
  <text x="440" y="255" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" fill="#546E7A" text-anchor="middle">响应</text>
  <text x="840" y="215" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" fill="#546E7A" text-anchor="middle">/model/predict</text>
  <text x="840" y="255" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" fill="#546E7A" text-anchor="middle">推荐结果</text>

  <!-- Data flow section -->
  <text x="80" y="360" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">数据流</text>

  <rect x="80" y="380" width="1120" height="52" rx="8" fill="#F5F7FA"/>
  <text x="100" y="412" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">前端请求 → 后端认证/CRUD → 模型服务(/model/predict) → 四层架构 + DP噪声 → 返回推荐结果</text>

  <!-- Database section -->
  <text x="80" y="475" font-family="KaiTi, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">数据库设计</text>

  <!-- DB tables as small cards -->
  <rect x="80" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="165" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">sys_user</text>
  <text x="165" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">用户账户/RBAC</text>

  <rect x="265" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="350" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">patient</text>
  <text x="350" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">患者/健康档案</text>

  <rect x="450" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="535" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">drug</text>
  <text x="535" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">药物目录(1807种)</text>

  <rect x="635" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">recommendation</text>
  <text x="720" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">推荐记录/结果</text>

  <rect x="820" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="905" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">privacy_config</text>
  <text x="905" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">隐私参数配置</text>

  <rect x="1005" y="498" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1090" y="522" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1565C0" text-anchor="middle">privacy_ledger</text>
  <text x="1090" y="542" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#90A4AE" text-anchor="middle">隐私预算日志</text>

  <!-- Key tech stack summary -->
  <rect x="80" y="590" width="1120" height="60" rx="8" fill="#F5F7FA"/>
  <text x="100" y="616" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E" font-weight="bold">技术栈：</text>
  <text x="175" y="616" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">React 18 + TypeScript + Vite + Tailwind</text>
  <text x="470" y="616" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">Spring Boot 3.2 + MyBatis + MySQL</text>
  <text x="770" y="616" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">FastAPI + PyTorch DeepFM</text>
  <text x="100" y="638" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#90A4AE">启动时后端加载全部1807种药物 → 模型服务(/model/load-drugs)，初始化四层推荐引擎</text>

  <!-- Footer -->
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">04</text>
</svg>