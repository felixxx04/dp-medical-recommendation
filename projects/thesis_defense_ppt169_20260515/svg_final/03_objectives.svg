<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleUnderline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B" />
      <stop offset="100%" stop-color="#1565C0" />
    </linearGradient>
    <linearGradient id="coreBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00796B" />
      <stop offset="100%" stop-color="#00695C" />
    </linearGradient>
  </defs>

  
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="4" fill="url(#titleUnderline)" />

  
  <text x="80" y="60" font-family="KaiTi, Georgia, serif" font-size="34" font-weight="bold" fill="#1A1A2E">研究目标：四层推荐架构</text>
  <path fill="url(#titleUnderline)" d="M81.50,72 H238.50 A1.50,1.50 0 0 1 240,73.50 V73.50 A1.50,1.50 0 0 1 238.50,75 H81.50 A1.50,1.50 0 0 1 80,73.50 V73.50 A1.50,1.50 0 0 1 81.50,72 Z" />
  <text x="80" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#546E7A">核心目标：在差分隐私保护下兼顾临床安全与推荐精度</text>

  
  <path fill="url(#coreBg)" d="M525,130 H755 A35,35 0 0 1 790,165 V165 A35,35 0 0 1 755,200 H525 A35,35 0 0 1 490,165 V165 A35,35 0 0 1 525,130 Z" />
  <text x="640" y="160" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">安全 + 精准 + 隐私</text>
  <text x="640" y="183" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#B2DFDB" text-anchor="middle">四层递进架构</text>

  
  <line x1="520" y1="200" x2="200" y2="250" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.3" />
  <line x1="580" y1="200" x2="460" y2="250" stroke="#00796B" stroke-width="1.5" stroke-opacity="0.3" />
  <line x1="700" y1="200" x2="780" y2="250" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.3" />
  <line x1="760" y1="200" x2="1060" y2="250" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.3" />

  
  <path fill="#FFFFFF" stroke="#00796B" stroke-width="2" d="M90,250 H330 A10,10 0 0 1 340,260 V550 A10,10 0 0 1 330,560 H90 A10,10 0 0 1 80,550 V260 A10,10 0 0 1 90,250 Z" />
  <path fill="#00796B" d="M90,250 H330 A10,10 0 0 1 340,260 V280 A10,10 0 0 1 330,290 H90 A10,10 0 0 1 80,280 V260 A10,10 0 0 1 90,250 Z" />
  <rect x="80" y="280" width="260" height="10" fill="#00796B" />
  <text x="210" y="278" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">第零层 KnowledgeRouter</text>

  <text x="100" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#00796B">四级确定性路由</text>
  <text x="100" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">口语标准化 → 疾病归类</text>
  <text x="100" y="374" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">→ 适应症映射 → 药品召回</text>
  <text x="100" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">解决中文疾病名→英文适应症</text>
  <text x="100" y="436" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">的语义鸿沟</text>
  <text x="100" y="476" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#00796B" font-weight="bold">路由覆盖率 92.5%</text>
  <text x="100" y="502" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">支持1295种中文疾病输入</text>

  
  <path fill="#FFFFFF" stroke="#C62828" stroke-width="2" d="M370,250 H610 A10,10 0 0 1 620,260 V550 A10,10 0 0 1 610,560 H370 A10,10 0 0 1 360,550 V260 A10,10 0 0 1 370,250 Z" />
  <path fill="#C62828" d="M370,250 H610 A10,10 0 0 1 620,260 V280 A10,10 0 0 1 610,290 H370 A10,10 0 0 1 360,280 V260 A10,10 0 0 1 370,250 Z" />
  <rect x="360" y="280" width="260" height="10" fill="#C62828" />
  <text x="490" y="278" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">第一层 SafetyFilter</text>

  <text x="380" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#C62828">12条硬排除 + 9类软标记</text>
  <text x="380" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">硬排除：过敏冲突、绝对禁忌、</text>
  <text x="380" y="374" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">致命交互、妊娠X级等</text>
  <text x="380" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">软标记：相对禁忌标记待审</text>
  <text x="380" y="436" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">医生做最终判断</text>
  <text x="380" y="476" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#C62828" font-weight="bold">确定性判断，不受DP噪声影响</text>

  
  <path fill="#FFFFFF" stroke="#FF8F00" stroke-width="2" d="M670,250 H910 A10,10 0 0 1 920,260 V550 A10,10 0 0 1 910,560 H670 A10,10 0 0 1 660,550 V260 A10,10 0 0 1 670,250 Z" />
  <path fill="#FF8F00" d="M670,250 H910 A10,10 0 0 1 920,260 V280 A10,10 0 0 1 910,290 H670 A10,10 0 0 1 660,280 V260 A10,10 0 0 1 670,250 Z" />
  <rect x="660" y="280" width="260" height="10" fill="#FF8F00" />
  <text x="790" y="278" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">第二层 RuleMarker</text>

  <text x="680" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FF8F00">7种软标记规则</text>
  <text x="680" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">相对禁忌、中等交互</text>
  <text x="680" y="374" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">妊娠C/D、肾/肝功能警告等</text>
  <text x="680" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" font-weight="bold">标记而非排除</text>
  <text x="680" y="436" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">候选药物保留参与排序</text>
  <text x="680" y="476" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">为DeepFM提供安全上下文</text>

  
  <path fill="#FFFFFF" stroke="#1565C0" stroke-width="2" d="M950,250 H1190 A10,10 0 0 1 1200,260 V550 A10,10 0 0 1 1190,560 H950 A10,10 0 0 1 940,550 V260 A10,10 0 0 1 950,250 Z" />
  <path fill="#1565C0" d="M950,250 H1190 A10,10 0 0 1 1200,260 V280 A10,10 0 0 1 1190,290 H950 A10,10 0 0 1 940,280 V260 A10,10 0 0 1 950,250 Z" />
  <rect x="940" y="280" width="260" height="10" fill="#1565C0" />
  <text x="1070" y="278" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">第三层 DeepFM</text>

  <text x="960" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565C0">个性化排序 + DP噪声</text>
  <text x="960" y="348" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">FM特征交叉 + Deep高阶交互</text>
  <text x="960" y="374" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">+ 连续特征旁路</text>
  <text x="960" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1565C0" font-weight="bold">DP噪声仅在此层应用</text>
  <text x="960" y="436" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">临床阈值后处理保障安全</text>
  <text x="960" y="476" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">隐私保护与精度的平衡点</text>

  
  <path fill="#00796B" fill-opacity="0.06" d="M88,600 H1192 A8,8 0 0 1 1200,608 V648 A8,8 0 0 1 1192,656 H88 A8,8 0 0 1 80,648 V608 A8,8 0 0 1 88,600 Z" />
  <text x="640" y="630" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#00796B" text-anchor="middle" font-weight="bold">关键原则：噪声不影响安全过滤的确定性判断 — 隐私保护仅作用于个性化排序层</text>

  
  <text x="1200" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="end">03</text>
</svg>