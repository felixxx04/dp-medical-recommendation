  <text x="900" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0">个性化评分</text>
  <text x="900" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">FM特征交叉 + Deep高阶交互</text>
  <text x="900" y="244" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">+ 连续特征旁路直通输出</text>

  <text x="900" y="284" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0">DP噪声仅在此层</text>
  <text x="900" y="312" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">Laplace/Gaussian噪声注入</text>
  <text x="900" y="338" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">临床阈值后处理保障安全</text>
  <text x="900" y="364" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">隐私预算追踪与预警</text>

  <path fill="#1565C0" fill-opacity="0.08" d="M906,400 H1174 A6,6 0 0 1 1180,406 V436 A6,6 0 0 1 1174,442 H906 A6,6 0 0 1 900,436 V406 A6,6 0 0 1 906,400 Z" />
  <text x="1040" y="427" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">隐私保护与精度的平衡点</text>

  
  <path fill="#00796B" fill-opacity="0.06" d="M88,580 H1192 A8,8 0 0 1 1200,588 V622 A8,8 0 0 1 1192,630 H88 A8,8 0 0 1 80,622 V588 A8,8 0 0 1 88,580 Z" />
  <text x="640" y="610" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#00796B" text-anchor="middle" font-weight="bold">设计原则：前两层确定性安全判断不受DP噪声影响，噪声仅作用于个性化排序层</text>

  
