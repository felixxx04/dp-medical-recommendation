  <text x="100" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#C62828">12条硬排除规则</text>
  <text x="100" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">过敏冲突、绝对禁忌症</text>
  <text x="100" y="244" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">致命交互、妊娠X级</text>
  <text x="100" y="270" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">儿科禁忌、哺乳期L5 等</text>

  <text x="100" y="310" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF8F00">9类软标记</text>
  <text x="100" y="338" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">相对禁忌改为"标记待审"</text>
  <text x="100" y="364" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">医生做最终判断，不自动排除</text>

