  <text x="500" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF8F00">7种软标记规则</text>
  <text x="500" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">相对禁忌症、中等交互</text>
  <text x="500" y="244" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">妊娠C/D、肾/肝功能警告</text>
  <text x="500" y="270" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">生育力警告、数据未验证</text>

  <text x="500" y="310" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF8F00">标记而非排除</text>
  <text x="500" y="338" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">候选药物保留参与排序</text>
  <text x="500" y="364" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#546E7A">为DeepFM提供安全上下文</text>

  <path fill="#FF8F00" fill-opacity="0.08" d="M506,400 H794 A6,6 0 0 1 800,406 V436 A6,6 0 0 1 794,442 H506 A6,6 0 0 1 500,436 V406 A6,6 0 0 1 506,400 Z" />
  <text x="650" y="427" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FF8F00" text-anchor="middle" font-weight="bold">标记待审，医生可覆盖判断</text>

  
  <line x1="820" y1="320" x2="870" y2="320" stroke="#546E7A" stroke-width="3" marker-end="url(#flowArrow)" />

  
