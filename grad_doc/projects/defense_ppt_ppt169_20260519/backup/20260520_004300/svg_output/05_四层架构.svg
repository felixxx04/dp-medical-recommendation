<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55"/>
            <stop offset="100%" stop-color="#AE6339"/>
        </linearGradient>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#EFE6DD"/>
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)"/>
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55"/>
    <!-- Header -->
    <g id="header">
        <rect x="60" y="30" width="6" height="32" rx="3" fill="#AE6339"/>
        <text x="80" y="54" font-family="Georgia, SimSun, serif" font-size="26" font-weight="bold" fill="#2E3F55">四层推荐架构设计</text>
        <text x="80" y="74" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" letter-spacing="1">SAFETY-FIRST, PRIVACY-PROTECTED, PERSONALIZED</text>
    </g>
    <!-- Takeaway -->
    <rect x="60" y="88" width="1160" height="36" rx="8" fill="#2E3F55"/>
    <text x="80" y="112" font-family="Georgia, SimSun, serif" font-size="15" font-weight="bold" fill="#EFE6DD">安全优先：SafetyFilter硬排除 → RuleMarker软标记 → DeepFM个性化评分+DP噪声 | DP噪声永远不影响Layer 1</text>
    <!-- Layer 0: KnowledgeRouter -->
    <g id="layer-0">
        <rect x="40" y="142" width="40" height="110" rx="8" fill="#6B7B8D"/>
        <text x="60" y="205" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#FFFFFF">L0</text>
        <rect x="96" y="142" width="890" height="110" rx="10" fill="#6B7B8D" fill-opacity="0.06" stroke="#6B7B8D" stroke-width="1" stroke-dasharray="6 4"/>
        <text x="541" y="164" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#6B7B8D" letter-spacing="1">LAYER 0 · 知识路由 · 语义匹配候选药物集</text>
        <g filter="url(#cardShadow)">
            <rect x="114" y="178" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="130" y="200" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">疾病语义映射</text>
            <text x="130" y="220" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">disease_mapper EN→CN</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="330" y="178" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="346" y="200" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">适应症匹配</text>
            <text x="346" y="220" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">indication → 候选药物集</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="546" y="178" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="562" y="200" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">药物类目过滤</text>
            <text x="562" y="220" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">drug_class筛选</text>
        </g>
    </g>
    <!-- Layer 1: SafetyFilter -->
    <g id="layer-1">
        <rect x="40" y="268" width="40" height="110" rx="8" fill="#C62828"/>
        <text x="60" y="331" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#FFFFFF">L1</text>
        <rect x="96" y="268" width="890" height="110" rx="10" fill="#C62828" fill-opacity="0.06" stroke="#C62828" stroke-width="1.5" stroke-dasharray="6 4"/>
        <text x="541" y="290" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#C62828" letter-spacing="1">LAYER 1 · 安全过滤器 · 确定性硬排除（DP噪声永远不影响此层）</text>
        <g filter="url(#cardShadow)">
            <rect x="114" y="304" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="130" y="326" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#C62828">绝对禁忌症排除</text>
            <text x="130" y="346" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">contraindications检查</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="330" y="304" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="346" y="326" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#C62828">过敏冲突排除</text>
            <text x="346" y="346" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">allergy交叉检查</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="546" y="304" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="562" y="326" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#C62828">妊娠X级排除</text>
            <text x="562" y="346" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">pregnancy_cat=X</text>
        </g>
    </g>
    <!-- Layer 2: RuleMarker -->
    <g id="layer-2">
        <rect x="40" y="394" width="40" height="110" rx="8" fill="#AE6339"/>
        <text x="60" y="457" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#FFFFFF">L2</text>
        <rect x="96" y="394" width="890" height="110" rx="10" fill="#AE6339" fill-opacity="0.06" stroke="#AE6339" stroke-width="1.5" stroke-dasharray="6 4"/>
        <text x="541" y="416" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#AE6339" letter-spacing="1">LAYER 2 · 规则标记器 · 软标记不排除（添加requires_review标志）</text>
        <g filter="url(#cardShadow)">
            <rect x="114" y="430" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="130" y="452" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">相对禁忌警告</text>
            <text x="130" y="472" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">relative_contraindications</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="330" y="430" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="346" y="452" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">中等交互标记</text>
            <text x="346" y="472" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">moderate_interactions</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="546" y="430" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="562" y="452" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">妊娠C/D警告</text>
            <text x="562" y="472" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">pregnancy_cat=C/D</text>
        </g>
    </g>
    <!-- Layer 3: DeepFM -->
    <g id="layer-3">
        <rect x="40" y="520" width="40" height="110" rx="8" fill="#2E3F55"/>
        <text x="60" y="583" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#FFFFFF">L3</text>
        <rect x="96" y="520" width="890" height="110" rx="10" fill="#2E3F55" fill-opacity="0.06" stroke="#2E3F55" stroke-width="1.5" stroke-dasharray="6 4"/>
        <text x="541" y="542" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55" letter-spacing="1">LAYER 3 · DEEPFM排序 · 安全候选集上个性化评分 + DP噪声</text>
        <g filter="url(#cardShadow)">
            <rect x="114" y="556" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="130" y="578" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">FM交叉特征</text>
            <text x="130" y="598" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">二阶交互捕获</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="330" y="556" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="346" y="578" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Deep高阶特征</text>
            <text x="346" y="598" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">MLP (64→32) + LayerNorm</text>
        </g>
        <g filter="url(#cardShadow)">
            <rect x="546" y="556" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="562" y="578" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">+ DP噪声注入</text>
            <text x="562" y="598" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">Laplace/Gaussian</text>
        </g>
    </g>
    <!-- Right side: Key principle -->
    <g id="key-principle">
        <rect x="1010" y="142" width="240" height="488" rx="12" fill="#2E3F55" fill-opacity="0.05" stroke="#2E3F55" stroke-width="1" stroke-dasharray="4 4"/>
        <text x="1130" y="172" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55" letter-spacing="1">核心原则</text>
        <line x1="1030" y1="185" x2="1230" y2="185" stroke="#D4B5B2" stroke-width="1"/>
        <use data-icon="chunk-filled/shield-check" x="1082" y="200" width="48" height="48" fill="#C62828"/>
        <text x="1130" y="268" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#C62828">Layer 1 安全</text>
        <text x="1130" y="288" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#C62828">绝对不可妥协</text>
        <text x="1130" y="312" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">DP噪声零穿透</text>
        <line x1="1060" y1="335" x2="1200" y2="335" stroke="#D4B5B2" stroke-width="1"/>
        <use data-icon="chunk-filled/shield" x="1082" y="350" width="48" height="48" fill="#AE6339"/>
        <text x="1130" y="418" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#AE6339">Layer 2 标记</text>
        <text x="1130" y="438" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#AE6339">不排除只提醒</text>
        <line x1="1060" y1="460" x2="1200" y2="460" stroke="#D4B5B2" stroke-width="1"/>
        <use data-icon="chunk-filled/bolt" x="1082" y="475" width="48" height="48" fill="#2E3F55"/>
        <text x="1130" y="543" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#2E3F55">Layer 3 DP噪声</text>
        <text x="1130" y="563" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#2E3F55">仅作用于评分</text>
        <text x="1130" y="587" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">+ 临床安全后处理</text>
    </g>
    <!-- Bottom foundation bar -->
    <rect x="40" y="648" width="1210" height="50" rx="10" fill="#2E3F55" fill-opacity="0.04" stroke="#D4B5B2" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="645" y="668" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#6B7B8D" letter-spacing="1">数据流 · 患者画像输入 → L0语义匹配 → L1安全过滤 → L2规则标记 → L3个性化排序+DP → 安全推荐输出</text>
    <text x="645" y="688" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" fill="#6B7B8D">覆盖1815种药物 | 安全数据：禁忌症95.3% / 交互81.5% / 综合97.0%</text>
    <!-- Page number -->
    <text x="1220" y="700" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" text-anchor="end">05</text>
    <rect x="0" y="716" width="1280" height="4" fill="url(#topAccent)"/>
</svg>