<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55"/>
            <stop offset="100%" stop-color="#AE6339"/>
        </linearGradient>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#EFE6DD"/>
    <!-- Top accent bar -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)"/>
    <!-- Left decorative stripe -->
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55"/>
    <!-- Header -->
    <g id="header">
        <rect x="60" y="40" width="6" height="36" rx="3" fill="#AE6339"/>
        <text x="80" y="66" font-family="Georgia, SimSun, serif" font-size="32" font-weight="bold" fill="#2E3F55">研究框架</text>
        <text x="80" y="90" font-family="Georgia, SimSun, serif" font-size="14" fill="#6B7B8D" letter-spacing="1">RESEARCH FRAMEWORK</text>
    </g>
    <!-- Item 01 -->
    <g id="toc-01">
        <rect x="80" y="130" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="80" y="130" width="8" height="72" rx="4" fill="#2E3F55"/>
        <text x="110" y="158" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">01</text>
        <use data-icon="chunk-filled/book-open" x="140" y="142" width="32" height="32" fill="#2E3F55"/>
        <text x="184" y="163" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">研究背景与意义</text>
        <text x="184" y="185" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">医疗用药安全与隐私保护的双重挑战</text>
    </g>
    <!-- Item 02 -->
    <g id="toc-02">
        <rect x="680" y="130" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="680" y="130" width="8" height="72" rx="4" fill="#AE6339"/>
        <text x="710" y="158" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">02</text>
        <use data-icon="chunk-filled/clipboard" x="740" y="142" width="32" height="32" fill="#2E3F55"/>
        <text x="784" y="163" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">系统需求分析</text>
        <text x="784" y="185" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">功能、非功能与安全三层需求</text>
    </g>
    <!-- Item 03 -->
    <g id="toc-03">
        <rect x="80" y="222" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="80" y="222" width="8" height="72" rx="4" fill="#2E3F55"/>
        <text x="110" y="250" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">03</text>
        <use data-icon="chunk-filled/layers" x="140" y="234" width="32" height="32" fill="#2E3F55"/>
        <text x="184" y="255" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">四层推荐架构设计</text>
        <text x="184" y="277" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">KnowledgeRouter → SafetyFilter → RuleMarker → DeepFM</text>
    </g>
    <!-- Item 04 -->
    <g id="toc-04">
        <rect x="680" y="222" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="680" y="222" width="8" height="72" rx="4" fill="#AE6339"/>
        <text x="710" y="250" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">04</text>
        <use data-icon="chunk-filled/shield" x="740" y="234" width="32" height="32" fill="#2E3F55"/>
        <text x="784" y="255" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">差分隐私机制</text>
        <text x="784" y="277" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">DP噪声仅作用于评分层，临床安全不受影响</text>
    </g>
    <!-- Item 05 -->
    <g id="toc-05">
        <rect x="80" y="314" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="80" y="314" width="8" height="72" rx="4" fill="#2E3F55"/>
        <text x="110" y="342" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">05</text>
        <use data-icon="chunk-filled/bolt" x="140" y="326" width="32" height="32" fill="#2E3F55"/>
        <text x="184" y="347" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">DeepFM模型设计</text>
        <text x="184" y="369" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">FM交叉 + Deep高阶 + 连续特征旁路</text>
    </g>
    <!-- Item 06 -->
    <g id="toc-06">
        <rect x="680" y="314" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="680" y="314" width="8" height="72" rx="4" fill="#AE6339"/>
        <text x="710" y="342" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">06</text>
        <use data-icon="chunk-filled/code-block" x="740" y="326" width="32" height="32" fill="#2E3F55"/>
        <text x="784" y="347" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">系统实现</text>
        <text x="784" y="369" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">React + Spring Boot + FastAPI 三层架构</text>
    </g>
    <!-- Item 07 -->
    <g id="toc-07">
        <rect x="80" y="406" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="80" y="406" width="8" height="72" rx="4" fill="#2E3F55"/>
        <text x="110" y="434" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">07</text>
        <use data-icon="chunk-filled/chart-bar" x="140" y="418" width="32" height="32" fill="#2E3F55"/>
        <text x="184" y="439" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">实验结果与分析</text>
        <text x="184" y="461" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">DP保护不降质，模型区分度反而提升</text>
    </g>
    <!-- Item 08 -->
    <g id="toc-08">
        <rect x="680" y="406" width="560" height="72" rx="10" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="680" y="406" width="8" height="72" rx="4" fill="#AE6339"/>
        <text x="710" y="434" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">08</text>
        <use data-icon="chunk-filled/circle-checkmark" x="740" y="418" width="32" height="32" fill="#2E3F55"/>
        <text x="784" y="439" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">研究结论与展望</text>
        <text x="784" y="461" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">安全与隐私可以兼得</text>
    </g>
    <!-- Bottom decorative area with key metrics -->
    <g id="bottom-metrics">
        <rect x="80" y="530" width="1160" height="150" rx="12" fill="#2E3F55" fill-opacity="0.06" stroke="#D4B5B2" stroke-width="1"/>
        <text x="660" y="560" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#6B7B8D" letter-spacing="1">CORE METRICS</text>
        <!-- Metric 1 -->
        <text x="220" y="600" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#AE6339">0.9668</text>
        <text x="220" y="625" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">AUC-PR (No-DP)</text>
        <!-- Metric 2 -->
        <text x="520" y="600" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#2E7D32">0.9658</text>
        <text x="520" y="625" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">AUC-PR (DP ε=1.0)</text>
        <!-- Metric 3 -->
        <text x="800" y="600" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#2E7D32">+13.3%</text>
        <text x="800" y="625" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">Separation 提升</text>
        <!-- Metric 4 -->
        <text x="1060" y="600" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="36" font-weight="bold" fill="#2E3F55">97.0%</text>
        <text x="1060" y="625" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="13" fill="#6B7B8D">安全数据覆盖</text>
    </g>
    <!-- Page number -->
    <text x="1220" y="700" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" text-anchor="end">02</text>
    <!-- Bottom accent -->
    <rect x="0" y="716" width="1280" height="4" fill="url(#topAccent)"/>
</svg>