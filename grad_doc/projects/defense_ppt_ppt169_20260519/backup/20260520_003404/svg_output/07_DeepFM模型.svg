<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55"/>
            <stop offset="100%" stop-color="#AE6339"/>
        </linearGradient>
        <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,5 L0,10 Z" fill="#6B7B8D"/>
        </marker>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#EFE6DD"/>
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)"/>
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55"/>
    <!-- Header -->
    <g id="header">
        <rect x="60" y="30" width="6" height="32" rx="3" fill="#AE6339"/>
        <text x="80" y="54" font-family="Georgia, SimSun, serif" font-size="26" font-weight="bold" fill="#2E3F55">DeepFM模型设计</text>
        <text x="80" y="74" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" letter-spacing="1">FM交叉 + DEEP高阶 + CONTINUOUS特征旁路</text>
    </g>
    <!-- Takeaway -->
    <rect x="60" y="85" width="1160" height="36" rx="8" fill="#2E3F55"/>
    <text x="80" y="108" font-family="Georgia, SimSun, serif" font-size="15" font-weight="bold" fill="#EFE6DD">DeepFM = FM捕获二阶交叉 + Deep捕获高阶特征 + 连续特征旁路直连输出 | Opacus兼容的Merged Embedding</text>
    <!-- Left label -->
    <rect x="40" y="140" width="40" height="420" rx="8" fill="#2E3F55"/>
    <text x="60" y="360" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="20" fill="#FFFFFF">D</text>
    <!-- Parent container -->
    <rect x="96" y="140" width="1120" height="420" rx="12" fill="#2E3F55" fill-opacity="0.04" stroke="#2E3F55" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="656" y="162" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#2E3F55" letter-spacing="1">DEEPFM MODEL · 14 CATEGORICAL FIELDS + 4 CONTINUOUS FEATURES · OUTPUT: SIGMOID(LOGIT)</text>
    <!-- Card 1: FM Module -->
    <g id="card-fm">
        <rect x="120" y="180" width="330" height="355" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="120" y="200" width="6" height="40" rx="3" fill="#2E3F55"/>
        <rect x="138" y="200" width="36" height="36" rx="8" fill="#2E3F55" fill-opacity="0.08"/>
        <text x="156" y="224" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">FM</text>
        <text x="186" y="222" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">FM交叉模块</text>
        <rect x="138" y="250" width="294" height="28" rx="6" fill="#2E3F55" fill-opacity="0.04"/>
        <text x="285" y="269" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">二阶特征交互捕获</text>
        <circle cx="150" cy="305" r="4" fill="#2E3F55"/>
        <text x="162" y="310" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Merged Embedding</text>
        <text x="162" y="330" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">单nn.Embedding + field_offsets</text>
        <circle cx="150" cy="358" r="4" fill="#2E3F55"/>
        <text x="162" y="363" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Opacus兼容</text>
        <text x="162" y="383" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">支持DP-SGD训练</text>
        <circle cx="150" cy="411" r="4" fill="#2E3F55"/>
        <text x="162" y="416" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">embed_dim=8</text>
        <text x="162" y="436" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">14类别字段共享嵌入空间</text>
        <!-- Metrics -->
        <rect x="138" y="462" width="294" height="52" rx="6" fill="#2E3F55" fill-opacity="0.03"/>
        <line x1="285" y1="472" x2="285" y2="504" stroke="#D4B5B2" stroke-width="1"/>
        <text x="212" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">字段数</text>
        <text x="212" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">14</text>
        <text x="358" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">嵌入维度</text>
        <text x="358" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">8</text>
    </g>
    <!-- Arrow 1-2 -->
    <line x1="455" y1="358" x2="475" y2="358" stroke="#6B7B8D" stroke-width="2" marker-end="url(#flowArrow)"/>
    <!-- Card 2: Deep Module -->
    <g id="card-deep">
        <rect x="485" y="180" width="330" height="355" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="485" y="200" width="6" height="40" rx="3" fill="#AE6339"/>
        <rect x="503" y="200" width="36" height="36" rx="8" fill="#AE6339" fill-opacity="0.08"/>
        <text x="521" y="224" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#AE6339">D</text>
        <text x="551" y="222" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">Deep高阶模块</text>
        <rect x="503" y="250" width="294" height="28" rx="6" fill="#AE6339" fill-opacity="0.06"/>
        <text x="650" y="269" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#AE6339">高阶非线性特征组合</text>
        <circle cx="515" cy="305" r="4" fill="#AE6339"/>
        <text x="527" y="310" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">MLP (64 → 32)</text>
        <text x="527" y="330" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">两层全连接 + LayerNorm + ReLU</text>
        <circle cx="515" cy="358" r="4" fill="#AE6339"/>
        <text x="527" y="363" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">差异化Dropout</text>
        <text x="527" y="383" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">每层独立dropout率，防过拟合</text>
        <circle cx="515" cy="411" r="4" fill="#AE6339"/>
        <text x="527" y="416" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Focal Loss</text>
        <text x="527" y="436" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">处理正负样本不平衡</text>
        <!-- Metrics -->
        <rect x="503" y="462" width="294" height="52" rx="6" fill="#AE6339" fill-opacity="0.03"/>
        <line x1="650" y1="472" x2="650" y2="504" stroke="#D4B5B2" stroke-width="1"/>
        <text x="577" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">隐藏层</text>
        <text x="577" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#AE6339">[64,32]</text>
        <text x="723" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">激活函数</text>
        <text x="723" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#AE6339">ReLU</text>
    </g>
    <!-- Arrow 2-3 -->
    <line x1="820" y1="358" x2="840" y2="358" stroke="#6B7B8D" stroke-width="2" marker-end="url(#flowArrow)"/>
    <!-- Card 3: Continuous Bypass -->
    <g id="card-bypass">
        <rect x="850" y="180" width="340" height="355" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="850" y="200" width="6" height="40" rx="3" fill="#2E7D32"/>
        <rect x="868" y="200" width="36" height="36" rx="8" fill="#2E7D32" fill-opacity="0.08"/>
        <text x="886" y="224" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E7D32">B</text>
        <text x="916" y="222" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">连续特征旁路</text>
        <rect x="868" y="250" width="294" height="28" rx="6" fill="#2E7D32" fill-opacity="0.06"/>
        <text x="1015" y="269" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E7D32">绕过嵌入直接连输出层</text>
        <circle cx="880" cy="305" r="4" fill="#2E7D32"/>
        <text x="892" y="310" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">age_raw</text>
        <text x="892" y="330" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">患者年龄（连续值）</text>
        <circle cx="880" cy="358" r="4" fill="#2E7D32"/>
        <text x="892" y="363" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">bmi_raw</text>
        <text x="892" y="383" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">体质指数（连续值）</text>
        <circle cx="880" cy="411" r="4" fill="#2E7D32"/>
        <text x="892" y="416" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">gfr_raw / liver_score_raw</text>
        <text x="892" y="436" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">肾功能 / 肝功能评分</text>
        <!-- Metrics -->
        <rect x="868" y="462" width="294" height="52" rx="6" fill="#2E7D32" fill-opacity="0.03"/>
        <line x1="1015" y1="472" x2="1015" y2="504" stroke="#D4B5B2" stroke-width="1"/>
        <text x="942" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">特征数</text>
        <text x="942" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">4</text>
        <text x="1088" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">连接方式</text>
        <text x="1088" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">直连</text>
    </g>
    <!-- Bottom data section -->
    <rect x="40" y="580" width="40" height="100" rx="8" fill="#6B7B8D"/>
    <text x="60" y="638" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#FFFFFF">I/O</text>
    <rect x="96" y="580" width="1140" height="100" rx="12" fill="#2E3F55" fill-opacity="0.04" stroke="#D4B5B2" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="666" y="600" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D" letter-spacing="1">FEATURE SCHEMA · 14 CATEGORICAL + 4 CONTINUOUS = 18 TOTAL · 1815 DRUG CANDIDATES</text>
    <rect x="116" y="614" width="170" height="34" rx="6" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1"/>
    <text x="201" y="636" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">训练样本: 58,525</text>
    <rect x="300" y="614" width="170" height="34" rx="6" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1"/>
    <text x="385" y="636" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">药物候选: 1,815</text>
    <rect x="484" y="614" width="170" height="34" rx="6" fill="#2E3F55" fill-opacity="0.06" stroke="#AE6339" stroke-width="1"/>
    <text x="569" y="636" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#AE6339">AUC-PR: 0.9466</text>
    <rect x="668" y="614" width="240" height="34" rx="6" fill="#2E7D32" fill-opacity="0.08" stroke="#2E7D32" stroke-width="1"/>
    <text x="788" y="636" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E7D32">输出: sigmoid(logit) ∈ [0,1]</text>
    <rect x="924" y="614" width="280" height="34" rx="6" fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1"/>
    <text x="1064" y="636" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">14字段: age/gender/bmi/renal/...</text>
    <!-- Page number -->
    <text x="1220" y="700" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" text-anchor="end">07</text>
    <rect x="0" y="716" width="1280" height="4" fill="url(#topAccent)"/>
</svg>