    </g>
    
    <path fill="#2E3F55" d="M68,95 H1212 A8,8 0 0 1 1220,103 V135 A8,8 0 0 1 1212,143 H68 A8,8 0 0 1 60,135 V103 A8,8 0 0 1 68,95 Z" />
    <text x="80" y="125" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#EFE6DD">医疗用药推荐面临安全与隐私双重挑战，需构建安全过滤+隐私保护+个性化推荐的统一框架</text>
    
    <g id="problem-1">
        <path fill="#FFFFFF" stroke="#C62828" stroke-width="1.5" stroke-opacity="0.3" d="M72,175 H608 A12,12 0 0 1 620,187 V383 A12,12 0 0 1 608,395 H72 A12,12 0 0 1 60,383 V187 A12,12 0 0 1 72,175 Z" />
        <path fill="#C62828" d="M64,175 H64 A4,4 0 0 1 68,179 V391 A4,4 0 0 1 64,395 H64 A4,4 0 0 1 60,391 V179 A4,4 0 0 1 64,175 Z" />
        
  <g transform="translate(90.0, 195.0) scale(2.25)" fill="#C62828">
    <path d="M6.94864 0.15391C8.52047 0.677853 9.36995 2.37681 8.84601 3.94864L7.66225 7.49992L1.97015 5.60256L3.15391 2.05128C3.67785 0.479446 5.37681 -0.370034 6.94864 0.15391Z" />
    <path d="M7.02979 9.39729L5.84601 12.9486C5.32207 14.5205 3.62311 15.37 2.05128 14.846C0.479446 14.3221 -0.370034 12.6231 0.15391 11.0513L1.33769 7.49992L7.02979 9.39729Z" />
