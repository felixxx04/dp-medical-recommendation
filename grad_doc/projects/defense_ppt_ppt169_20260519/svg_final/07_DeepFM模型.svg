    <path fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" d="M122,614 H280 A6,6 0 0 1 286,620 V642 A6,6 0 0 1 280,648 H122 A6,6 0 0 1 116,642 V620 A6,6 0 0 1 122,614 Z" />
