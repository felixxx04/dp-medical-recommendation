        <text x="942" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">4</text>
        <text x="1088" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">连接方式</text>
        <text x="1088" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">直连</text>
    </g>
    
    <path fill="#6B7B8D" d="M48,580 H72 A8,8 0 0 1 80,588 V672 A8,8 0 0 1 72,680 H48 A8,8 0 0 1 40,672 V588 A8,8 0 0 1 48,580 Z" />
