        <text x="551" y="222" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">Deep高阶模块</text>
        <path fill="#AE6339" fill-opacity="0.06" d="M509,250 H791 A6,6 0 0 1 797,256 V272 A6,6 0 0 1 791,278 H509 A6,6 0 0 1 503,272 V256 A6,6 0 0 1 509,250 Z" />
        <text x="650" y="269" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#AE6339">高阶非线性特征组合</text>
        <circle cx="515" cy="305" r="4" fill="#AE6339" />
        <text x="527" y="310" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">MLP (64 → 32)</text>
        <text x="527" y="330" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">两层全连接 + LayerNorm + ReLU</text>
        <circle cx="515" cy="358" r="4" fill="#AE6339" />
        <text x="527" y="363" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">差异化Dropout</text>
        <text x="527" y="383" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">每层独立dropout率，防过拟合</text>
        <circle cx="515" cy="411" r="4" fill="#AE6339" />
        <text x="527" y="416" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Focal Loss</text>
        <text x="527" y="436" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">处理正负样本不平衡</text>
        
        <path fill="#AE6339" fill-opacity="0.03" d="M509,462 H791 A6,6 0 0 1 797,468 V508 A6,6 0 0 1 791,514 H509 A6,6 0 0 1 503,508 V468 A6,6 0 0 1 509,462 Z" />
