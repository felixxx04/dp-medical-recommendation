        <text x="577" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#AE6339">[64,32]</text>
        <text x="723" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">激活函数</text>
        <text x="723" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#AE6339">ReLU</text>
    </g>
    
    <line x1="820" y1="358" x2="840" y2="358" stroke="#6B7B8D" stroke-width="2" marker-end="url(#flowArrow)" />
    
