    <path fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" d="M930,614 H1198 A6,6 0 0 1 1204,620 V642 A6,6 0 0 1 1198,648 H930 A6,6 0 0 1 924,642 V620 A6,6 0 0 1 930,614 Z" />
