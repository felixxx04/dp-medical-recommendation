<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55" />
            <stop offset="100%" stop-color="#AE6339" />
        </linearGradient>
        <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,5 L0,10 Z" fill="#6B7B8D" />
        </marker>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="2" result="offsetblur" />
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    
    <rect width="1280" height="720" fill="#EFE6DD" />
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)" />
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55" />
    
    <g id="header">
        <path fill="#AE6339" d="M63,30 H63 A3,3 0 0 1 66,33 V59 A3,3 0 0 1 63,62 H63 A3,3 0 0 1 60,59 V33 A3,3 0 0 1 63,30 Z" />
        <text x="80" y="54" font-family="Georgia, SimSun, serif" font-size="26" font-weight="bold" fill="#2E3F55">DeepFM模型设计</text>
        <text x="80" y="74" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" letter-spacing="1">FM交叉 + DEEP高阶 + CONTINUOUS特征旁路</text>
    </g>
    
    <path fill="#2E3F55" d="M68,85 H1212 A8,8 0 0 1 1220,93 V113 A8,8 0 0 1 1212,121 H68 A8,8 0 0 1 60,113 V93 A8,8 0 0 1 68,85 Z" />
    <text x="80" y="108" font-family="Georgia, SimSun, serif" font-size="15" font-weight="bold" fill="#EFE6DD">DeepFM = FM捕获二阶交叉 + Deep捕获高阶特征 + 连续特征旁路直连输出 | Opacus兼容的Merged Embedding</text>
    
    <path fill="#2E3F55" d="M48,140 H72 A8,8 0 0 1 80,148 V552 A8,8 0 0 1 72,560 H48 A8,8 0 0 1 40,552 V148 A8,8 0 0 1 48,140 Z" />
    <text x="60" y="360" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="20" fill="#FFFFFF">D</text>
    
    <path fill="#2E3F55" fill-opacity="0.04" stroke="#2E3F55" stroke-width="1.5" stroke-dasharray="6 4" d="M108,140 H1204 A12,12 0 0 1 1216,152 V548 A12,12 0 0 1 1204,560 H108 A12,12 0 0 1 96,548 V152 A12,12 0 0 1 108,140 Z" />
    <text x="656" y="162" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#2E3F55" letter-spacing="1">DEEPFM MODEL · 14 CATEGORICAL FIELDS + 4 CONTINUOUS FEATURES · OUTPUT: SIGMOID(LOGIT)</text>
    
    <g id="card-fm">
        <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)" d="M128,180 H442 A8,8 0 0 1 450,188 V527 A8,8 0 0 1 442,535 H128 A8,8 0 0 1 120,527 V188 A8,8 0 0 1 128,180 Z" />
        <path fill="#2E3F55" d="M123,200 H123 A3,3 0 0 1 126,203 V237 A3,3 0 0 1 123,240 H123 A3,3 0 0 1 120,237 V203 A3,3 0 0 1 123,200 Z" />
        <path fill="#2E3F55" fill-opacity="0.08" d="M146,200 H166 A8,8 0 0 1 174,208 V228 A8,8 0 0 1 166,236 H146 A8,8 0 0 1 138,228 V208 A8,8 0 0 1 146,200 Z" />
        <text x="156" y="224" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">FM</text>
        <text x="186" y="222" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">FM交叉模块</text>
        <path fill="#2E3F55" fill-opacity="0.04" d="M144,250 H426 A6,6 0 0 1 432,256 V272 A6,6 0 0 1 426,278 H144 A6,6 0 0 1 138,272 V256 A6,6 0 0 1 144,250 Z" />
        <text x="285" y="269" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">二阶特征交互捕获</text>
        <circle cx="150" cy="305" r="4" fill="#2E3F55" />
        <text x="162" y="310" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Merged Embedding</text>
        <text x="162" y="330" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">单nn.Embedding + field_offsets</text>
        <circle cx="150" cy="358" r="4" fill="#2E3F55" />
        <text x="162" y="363" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">Opacus兼容</text>
        <text x="162" y="383" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">支持DP-SGD训练</text>
        <circle cx="150" cy="411" r="4" fill="#2E3F55" />
        <text x="162" y="416" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">embed_dim=8</text>
        <text x="162" y="436" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">14类别字段共享嵌入空间</text>
        
        <path fill="#2E3F55" fill-opacity="0.03" d="M144,462 H426 A6,6 0 0 1 432,468 V508 A6,6 0 0 1 426,514 H144 A6,6 0 0 1 138,508 V468 A6,6 0 0 1 144,462 Z" />
        <line x1="285" y1="472" x2="285" y2="504" stroke="#D4B5B2" stroke-width="1" />
        <text x="212" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">字段数</text>
        <text x="212" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">14</text>
        <text x="358" y="484" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="11" font-weight="bold" fill="#6B7B8D">嵌入维度</text>
        <text x="358" y="504" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">8</text>
    </g>
    
    <line x1="455" y1="358" x2="475" y2="358" stroke="#6B7B8D" stroke-width="2" marker-end="url(#flowArrow)" />
    
    <g id="card-deep">
        <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)" d="M493,180 H807 A8,8 0 0 1 815,188 V527 A8,8 0 0 1 807,535 H493 A8,8 0 0 1 485,527 V188 A8,8 0 0 1 493,180 Z" />
        <path fill="#AE6339" d="M488,200 H488 A3,3 0 0 1 491,203 V237 A3,3 0 0 1 488,240 H488 A3,3 0 0 1 485,237 V203 A3,3 0 0 1 488,200 Z" />
        <path fill="#AE6339" fill-opacity="0.08" d="M511,200 H531 A8,8 0 0 1 539,208 V228 A8,8 0 0 1 531,236 H511 A8,8 0 0 1 503,228 V208 A8,8 0 0 1 511,200 Z" />
