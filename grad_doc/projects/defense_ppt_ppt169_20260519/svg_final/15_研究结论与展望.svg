<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55" />
            <stop offset="100%" stop-color="#AE6339" />
        </linearGradient>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="2" result="offsetblur" />
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    
    <rect width="1280" height="720" fill="#EFE6DD" />
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)" />
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55" />
    
    <circle cx="1100" cy="400" r="220" fill="#2E3F55" fill-opacity="0.03" />
    <circle cx="200" cy="600" r="140" fill="#AE6339" fill-opacity="0.04" />
    
    <g id="header">
        <path fill="#AE6339" d="M63,40 H63 A3,3 0 0 1 66,43 V73 A3,3 0 0 1 63,76 H63 A3,3 0 0 1 60,73 V43 A3,3 0 0 1 63,40 Z" />
        <text x="80" y="68" font-family="Georgia, SimSun, serif" font-size="28" font-weight="bold" fill="#2E3F55">研究结论与展望</text>
    </g>
    
    <path fill="#2E3F55" d="M68,95 H1212 A8,8 0 0 1 1220,103 V135 A8,8 0 0 1 1212,143 H68 A8,8 0 0 1 60,135 V103 A8,8 0 0 1 68,95 Z" />
    <text x="80" y="125" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#EFE6DD">安全与隐私可以兼得 — 四层架构 + DP噪声实现双保障</text>
    
    <g id="conclusion-1">
        <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)" d="M72,175 H1208 A12,12 0 0 1 1220,187 V278 A12,12 0 0 1 1208,290 H72 A12,12 0 0 1 60,278 V187 A12,12 0 0 1 72,175 Z" />
        <path fill="#2E3F55" d="M64,175 H64 A4,4 0 0 1 68,179 V286 A4,4 0 0 1 64,290 H64 A4,4 0 0 1 60,286 V179 A4,4 0 0 1 64,175 Z" />
        <path fill="#2E3F55" fill-opacity="0.08" d="M96,192 H116 A8,8 0 0 1 124,200 V220 A8,8 0 0 1 116,228 H96 A8,8 0 0 1 88,220 V200 A8,8 0 0 1 96,192 Z" />
        <text x="106" y="216" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">1</text>
        <text x="140" y="215" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">四层推荐架构实现安全过滤与个性化推荐的统一</text>
        <text x="88" y="250" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7B8D">KnowledgeRouter语义匹配 → SafetyFilter硬排除 → RuleMarker软标记 → DeepFM个性化评分</text>
        <text x="88" y="275" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E3F55">安全数据综合覆盖率达97%，禁忌症95.3%，交互81.5%</text>
    </g>
    
    <g id="conclusion-2">
        <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)" d="M72,310 H1208 A12,12 0 0 1 1220,322 V413 A12,12 0 0 1 1208,425 H72 A12,12 0 0 1 60,413 V322 A12,12 0 0 1 72,310 Z" />
        <path fill="#AE6339" d="M64,310 H64 A4,4 0 0 1 68,314 V421 A4,4 0 0 1 64,425 H64 A4,4 0 0 1 60,421 V314 A4,4 0 0 1 64,310 Z" />
        <path fill="#AE6339" fill-opacity="0.08" d="M96,327 H116 A8,8 0 0 1 124,335 V355 A8,8 0 0 1 116,363 H96 A8,8 0 0 1 88,355 V335 A8,8 0 0 1 96,327 Z" />
        <text x="106" y="351" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#AE6339">2</text>
        <text x="140" y="350" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">差分隐私保护不降低推荐质量，反而提升模型区分度</text>
        <text x="88" y="385" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7B8D">AUC-PR基本持平（0.9668→0.9662），Separation显著提升（0.75→0.85，+13.3%）</text>
        <text x="88" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#AE6339" font-weight="bold">ε=0.5强隐私保护下仍保持高质量推荐</text>
    </g>
    
    <g id="conclusion-3">
        <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)" d="M72,445 H1208 A12,12 0 0 1 1220,457 V548 A12,12 0 0 1 1208,560 H72 A12,12 0 0 1 60,548 V457 A12,12 0 0 1 72,445 Z" />
        <path fill="#2E7D32" d="M64,445 H64 A4,4 0 0 1 68,449 V556 A4,4 0 0 1 64,560 H64 A4,4 0 0 1 60,556 V449 A4,4 0 0 1 64,445 Z" />
        <path fill="#2E7D32" fill-opacity="0.08" d="M96,462 H116 A8,8 0 0 1 124,470 V490 A8,8 0 0 1 116,498 H96 A8,8 0 0 1 88,490 V470 A8,8 0 0 1 96,462 Z" />
        <text x="106" y="486" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">3</text>
        <text x="140" y="485" font-family="Georgia, SimSun, serif" font-size="20" font-weight="bold" fill="#2E3F55">安全后处理机制确保DP噪声不影响临床安全性</text>
        <text x="88" y="520" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7B8D">低分置零（score&lt;0.15→0）+ 上限截断（min(1.0, raw+0.35)）+ 置信区间 + 异常标记</text>
        <text x="88" y="545" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">SafetyFilter层100%保留，DP噪声零穿透，安全过滤在所有ε值下完全一致</text>
    </g>
    
    <g id="future">
        <path fill="#2E3F55" fill-opacity="0.06" stroke="#2E3F55" stroke-width="1" stroke-dasharray="6 4" d="M72,585 H1208 A12,12 0 0 1 1220,597 V673 A12,12 0 0 1 1208,685 H72 A12,12 0 0 1 60,673 V597 A12,12 0 0 1 72,585 Z" />
        <path fill="#2E3F55" d="M64,585 H64 A4,4 0 0 1 68,589 V681 A4,4 0 0 1 64,685 H64 A4,4 0 0 1 60,681 V589 A4,4 0 0 1 64,585 Z" />
        <text x="96" y="615" font-family="Georgia, SimSun, serif" font-size="18" font-weight="bold" fill="#2E3F55">研究展望</text>
        <circle cx="96" cy="640" r="4" fill="#2E3F55" />
        <text x="112" y="645" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E3F55">联邦学习扩展多机构协作，在不出域前提下联合训练模型</text>
        <circle cx="96" cy="668" r="4" fill="#2E3F55" />
        <text x="112" y="673" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E3F55">更大规模药物数据集验证（扩展至5000+药物候选）</text>
        <circle cx="600" cy="640" r="4" fill="#2E3F55" />
        <text x="616" y="645" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E3F55">临床专家评估推荐结果的可信度与实用性</text>
        <circle cx="600" cy="668" r="4" fill="#2E3F55" />
        <text x="616" y="673" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#2E3F55">探索R-DP（Rényi差分隐私）更紧密的隐私预算组合</text>
    </g>
    
    <text x="1220" y="700" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" text-anchor="end">15</text>
    <rect x="0" y="716" width="1280" height="4" fill="url(#topAccent)" />
</svg>