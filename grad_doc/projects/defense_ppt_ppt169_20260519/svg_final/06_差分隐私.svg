<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2E3F55" />
            <stop offset="100%" stop-color="#AE6339" />
        </linearGradient>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="2" result="offsetblur" />
            <feFlood flood-color="#2E3F55" flood-opacity="0.06" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    
    <rect width="1280" height="720" fill="#EFE6DD" />
    <rect x="0" y="0" width="1280" height="6" fill="url(#topAccent)" />
    <rect x="0" y="0" width="6" height="720" fill="#2E3F55" />
    
    <g id="header">
        <path fill="#AE6339" d="M63,30 H63 A3,3 0 0 1 66,33 V59 A3,3 0 0 1 63,62 H63 A3,3 0 0 1 60,59 V33 A3,3 0 0 1 63,30 Z" />
        <text x="80" y="54" font-family="Georgia, SimSun, serif" font-size="26" font-weight="bold" fill="#2E3F55">差分隐私机制</text>
    </g>
    
    <path fill="#2E3F55" d="M68,75 H1212 A8,8 0 0 1 1220,83 V105 A8,8 0 0 1 1212,113 H68 A8,8 0 0 1 60,105 V83 A8,8 0 0 1 68,75 Z" />
    <text x="80" y="100" font-family="Georgia, SimSun, serif" font-size="15" font-weight="bold" fill="#EFE6DD">DP噪声仅作用于评分层，临床安全不受影响 | 安全后处理确保噪声不放大低分药物</text>
    
    <g id="dp-principles">
        <path fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)" d="M72,130 H618 A12,12 0 0 1 630,142 V678 A12,12 0 0 1 618,690 H72 A12,12 0 0 1 60,678 V142 A12,12 0 0 1 72,130 Z" />
        <path fill="#2E3F55" d="M72,130 H618 A12,12 0 0 1 630,142 V164 A12,12 0 0 1 618,176 H72 A12,12 0 0 1 60,164 V142 A12,12 0 0 1 72,130 Z" />
        <rect x="60" y="164" width="570" height="12" fill="#2E3F55" />
        
  <g transform="translate(80.0, 140.0) scale(1.75)" fill="#EFE6DD">
    <path d="M4.35009 13.3929L8 16L11.6499 13.3929C13.7523 11.8912 15 9.46667 15 6.88306V3L8 0L1 3V6.88306C1 9.46667 2.24773 11.8912 4.35009 13.3929Z" />
  </g>
        <text x="118" y="160" font-family="Georgia, SimSun, serif" font-size="17" font-weight="bold" fill="#EFE6DD">DP原理与噪声机制</text>
        
        <text x="85" y="210" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">Laplace机制</text>
        <path fill="#2E3F55" fill-opacity="0.04" d="M93,220 H597 A8,8 0 0 1 605,228 V262 A8,8 0 0 1 597,270 H93 A8,8 0 0 1 85,262 V228 A8,8 0 0 1 93,220 Z" />
        <text x="100" y="242" font-family="Consolas, Courier New, monospace" font-size="14" fill="#2E3F55">scale = sensitivity / ε</text>
        <text x="100" y="260" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">ε越小 → 噪声越大 → 隐私保护越强</text>
        
        <text x="85" y="300" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">Gaussian机制</text>
        <path fill="#2E3F55" fill-opacity="0.04" d="M93,310 H597 A8,8 0 0 1 605,318 V352 A8,8 0 0 1 597,360 H93 A8,8 0 0 1 85,352 V318 A8,8 0 0 1 93,310 Z" />
        <text x="100" y="332" font-family="Consolas, Courier New, monospace" font-size="14" fill="#2E3F55">σ = sensitivity × √(2·ln(1.25/δ)) / ε</text>
        <text x="100" y="350" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">提供(ε,δ)-DP，δ为失败概率</text>
        
        <text x="85" y="390" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">预算追踪：强组合定理</text>
        <path fill="#AE6339" fill-opacity="0.06" d="M93,400 H597 A8,8 0 0 1 605,408 V442 A8,8 0 0 1 597,450 H93 A8,8 0 0 1 85,442 V408 A8,8 0 0 1 93,400 Z" />
        <text x="100" y="422" font-family="Consolas, Courier New, monospace" font-size="13" fill="#2E3F55">ε总 = Σ √(2k·ln(1/δ')) · εi</text>
        <text x="100" y="440" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">多次查询的总隐私消耗严格可计算</text>
        
        <text x="85" y="478" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">双重预算追踪</text>
        <path fill="#2E3F55" fill-opacity="0.04" stroke="#D4B5B2" stroke-width="1" d="M93,488 H322 A8,8 0 0 1 330,496 V524 A8,8 0 0 1 322,532 H93 A8,8 0 0 1 85,524 V496 A8,8 0 0 1 93,488 Z" />
        <text x="100" y="508" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#2E3F55">后端：MySQL持久化</text>
        <text x="100" y="524" font-family="Georgia, SimSun, serif" font-size="11" fill="#6B7B8D">privacy_config + privacy_ledger</text>
        <path fill="#AE6339" fill-opacity="0.06" stroke="#D4B5B2" stroke-width="1" d="M358,488 H597 A8,8 0 0 1 605,496 V524 A8,8 0 0 1 597,532 H358 A8,8 0 0 1 350,524 V496 A8,8 0 0 1 358,488 Z" />
        <text x="365" y="508" font-family="Georgia, SimSun, serif" font-size="13" font-weight="bold" fill="#2E3F55">模型：内存组合定理</text>
        <text x="365" y="524" font-family="Georgia, SimSun, serif" font-size="11" fill="#6B7B8D">PrivacyBudgetTracker (ephemeral)</text>
        
        <text x="85" y="564" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#2E3F55">ε值与隐私-效用权衡</text>
        <path fill="#2E3F55" d="M91,575 H159 A6,6 0 0 1 165,581 V597 A6,6 0 0 1 159,603 H91 A6,6 0 0 1 85,597 V581 A6,6 0 0 1 91,575 Z" />
        <text x="125" y="594" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#EFE6DD">ε=0.5</text>
        <text x="175" y="594" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">强隐私</text>
        <path fill="#AE6339" d="M246,575 H314 A6,6 0 0 1 320,581 V597 A6,6 0 0 1 314,603 H246 A6,6 0 0 1 240,597 V581 A6,6 0 0 1 246,575 Z" />
        <text x="280" y="594" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#EFE6DD">ε=1.0</text>
        <text x="330" y="594" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">平衡</text>
        <path fill="#D4B5B2" d="M401,575 H469 A6,6 0 0 1 475,581 V597 A6,6 0 0 1 469,603 H401 A6,6 0 0 1 395,597 V581 A6,6 0 0 1 401,575 Z" />
        <text x="435" y="594" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E3F55">ε=5.0</text>
        <text x="485" y="594" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">弱隐私</text>
        <path fill="#2E7D32" fill-opacity="0.08" d="M91,615 H599 A6,6 0 0 1 605,621 V637 A6,6 0 0 1 599,643 H91 A6,6 0 0 1 85,637 V621 A6,6 0 0 1 91,615 Z" />
        <text x="345" y="634" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="12" font-weight="bold" fill="#2E7D32">实验验证：ε=0.5时AUC-PR仍达0.9662，几乎无损失</text>
    </g>
    
    <g id="safety-postprocess">
        <path fill="#FFFFFF" stroke="#D4B5B2" stroke-width="1" filter="url(#cardShadow)" d="M672,130 H1208 A12,12 0 0 1 1220,142 V678 A12,12 0 0 1 1208,690 H672 A12,12 0 0 1 660,678 V142 A12,12 0 0 1 672,130 Z" />
        <path fill="#AE6339" d="M672,130 H1208 A12,12 0 0 1 1220,142 V164 A12,12 0 0 1 1208,176 H672 A12,12 0 0 1 660,164 V142 A12,12 0 0 1 672,130 Z" />
        <rect x="660" y="164" width="560" height="12" fill="#AE6339" />
        
  <g transform="translate(680.0, 140.0) scale(1.75)" fill="#EFE6DD">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16L4.35009 13.3929C2.24773 11.8912 1 9.46667 1 6.88306V3L8 0L15 3V6.88306C15 9.46667 13.7523 11.8912 11.6499 13.3929L8 16ZM12.2071 5.70711L10.7929 4.29289L7 8.08579L5.20711 6.29289L3.79289 7.70711L7 10.9142L12.2071 5.70711Z" />
  </g>
        <text x="718" y="160" font-family="Georgia, SimSun, serif" font-size="17" font-weight="bold" fill="#EFE6DD">临床安全后处理</text>
        
        <path fill="#C62828" d="M701,195 H701 A16,16 0 0 1 717,211 V211 A16,16 0 0 1 701,227 H701 A16,16 0 0 1 685,211 V211 A16,16 0 0 1 701,195 Z" />
        <text x="701" y="216" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
        <text x="728" y="210" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">低分置零（公开阈值）</text>
        <path fill="#C62828" fill-opacity="0.05" d="M693,225 H1177 A8,8 0 0 1 1185,233 V272 A8,8 0 0 1 1177,280 H693 A8,8 0 0 1 685,272 V233 A8,8 0 0 1 693,225 Z" />
        <text x="700" y="248" font-family="Consolas, Courier New, monospace" font-size="14" fill="#2E3F55">score &lt; 0.15 → 0</text>
        <text x="700" y="268" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">DP后处理定理：公开阈值操作不破坏DP保证</text>
        
        <path fill="#AE6339" d="M701,298 H701 A16,16 0 0 1 717,314 V314 A16,16 0 0 1 701,330 H701 A16,16 0 0 1 685,314 V314 A16,16 0 0 1 701,298 Z" />
        <text x="701" y="319" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
        <text x="728" y="313" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">上限截断（防噪声放大）</text>
        <path fill="#AE6339" fill-opacity="0.05" d="M693,328 H1177 A8,8 0 0 1 1185,336 V375 A8,8 0 0 1 1177,383 H693 A8,8 0 0 1 685,375 V336 A8,8 0 0 1 693,328 Z" />
        <text x="700" y="351" font-family="Consolas, Courier New, monospace" font-size="14" fill="#2E3F55">ceiling = min(1.0, raw_score + 0.35)</text>
        <text x="700" y="371" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">防止噪声将低分药物放大超过3.5倍</text>
        
        <path fill="#2E3F55" d="M701,401 H701 A16,16 0 0 1 717,417 V417 A16,16 0 0 1 701,433 H701 A16,16 0 0 1 685,417 V417 A16,16 0 0 1 701,401 Z" />
        <text x="701" y="422" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
        <text x="728" y="416" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E3F55">置信区间与异常标记</text>
        <path fill="#2E3F55" fill-opacity="0.04" d="M693,431 H1177 A8,8 0 0 1 1185,439 V478 A8,8 0 0 1 1177,486 H693 A8,8 0 0 1 685,478 V439 A8,8 0 0 1 693,431 Z" />
        <text x="700" y="454" font-family="Georgia, SimSun, serif" font-size="14" fill="#2E3F55">95% CI: score ± 1.96 × noise_std</text>
        <text x="700" y="474" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">dpAnomaly: 噪声显著改变排序方向时标记</text>
        
        <path fill="#2E7D32" fill-opacity="0.08" stroke="#2E7D32" stroke-width="1.5" d="M695,505 H1175 A10,10 0 0 1 1185,515 V575 A10,10 0 0 1 1175,585 H695 A10,10 0 0 1 685,575 V515 A10,10 0 0 1 695,505 Z" />
        
  <g transform="translate(700.0, 520.0) scale(2.25)" fill="#2E7D32">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16L4.35009 13.3929C2.24773 11.8912 1 9.46667 1 6.88306V3L8 0L15 3V6.88306C15 9.46667 13.7523 11.8912 11.6499 13.3929L8 16ZM12.2071 5.70711L10.7929 4.29289L7 8.08579L5.20711 6.29289L3.79289 7.70711L7 10.9142L12.2071 5.70711Z" />
  </g>
        <text x="748" y="540" font-family="Georgia, SimSun, serif" font-size="16" font-weight="bold" fill="#2E7D32">安全保障定理</text>
        <text x="700" y="565" font-family="Georgia, SimSun, serif" font-size="14" fill="#2E3F55">SafetyFilter层<tspan font-weight="bold" fill="#2E7D32">100%保留</tspan>，DP噪声零穿透</text>
        <text x="700" y="580" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D">实验验证：所有安全过滤在所有ε值下完全一致</text>
    </g>
    
    <text x="1220" y="700" font-family="Georgia, SimSun, serif" font-size="12" fill="#6B7B8D" text-anchor="end">06</text>
    <rect x="0" y="716" width="1280" height="4" fill="url(#topAccent)" />
</svg>